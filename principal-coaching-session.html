<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal Coaching Session — Central Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<!-- SHARED_NAVBAR -->
<style>
:root { --accent: #6c5ce7; --accent-dk: #4e3db8; --accent-2: #ddd6fe; }
body { padding-top: 62px; background: var(--paper); }
.page-wrap { max-width: 940px; margin: 0 auto; padding: 28px 20px 80px; }
.page-header { background: linear-gradient(135deg, #1a1530 0%, #2d2354 55%, #0a0815 100%); color: #fff; padding: 32px 28px; border-radius: 16px; margin-bottom: 24px; position: relative; overflow: hidden; }
.page-header::before { content: ''; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 80% 20%, rgba(108,92,231,0.22) 0%, transparent 55%); }
.page-header > * { position: relative; z-index: 1; }
.page-header .eyebrow { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.page-header h1 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; margin: 0 0 6px; }
.page-header p { font-size: 14px; color: rgba(255,255,255,0.65); max-width: 700px; margin: 0; }

.context-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 20px; box-shadow: var(--shadow-sm); display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
.ctx-row { display: flex; flex-direction: column; gap: 2px; }
.ctx-label { font-size: 10px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
.ctx-value { font-size: 14px; color: var(--ink); font-weight: 500; }
.ctx-row select, .ctx-row input { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 14px; background: var(--white); }
.ctx-row select:focus, .ctx-row input:focus { outline: none; border-color: var(--accent); }

.charter-banner { background: linear-gradient(180deg, var(--accent-2) 0%, #fff 100%); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: #4c1d95; line-height: 1.55; }
.charter-banner strong { display: block; font-weight: 700; margin-bottom: 3px; color: #3b0764; }

.stage-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; box-shadow: var(--shadow-sm); position: relative; }
.stage-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 14px 0 0 14px; background: linear-gradient(180deg, var(--accent), var(--accent-dk)); }
.stage-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.stage-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent-dk); padding: 2px 10px; background: var(--accent-2); border-radius: 6px; font-weight: 700; }
.stage-title { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 600; flex: 1; }
.stage-time { font-size: 11px; color: var(--ink-3); font-weight: 600; padding: 3px 9px; background: #f3f4f6; border-radius: 999px; font-family: 'DM Mono', monospace; }
.stage-purpose { font-size: 13px; color: var(--ink-2); margin-bottom: 12px; line-height: 1.55; }
.stage-prompts { background: #faf5ff; border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 12.5px; color: var(--ink-2); margin-bottom: 12px; line-height: 1.55; }
.stage-prompts ul { margin: 0; padding-left: 20px; }
.stage-prompts li { margin-bottom: 4px; }

.notes-area { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; color: var(--ink); background: var(--paper); outline: none; resize: vertical; min-height: 100px; line-height: 1.55; }
.notes-area:focus { border-color: var(--accent); background: var(--white); }
.notes-area.private { background: #fef3c7; border-color: #d97706; }
.notes-area.private:focus { background: #fff; border-color: #d97706; box-shadow: 0 0 0 2px rgba(217,119,6,0.2); }
.private-hint { font-size: 11px; color: #92400e; font-weight: 600; margin-bottom: 4px; }

.commitment-row { display: grid; grid-template-columns: 1fr 160px; gap: 10px; align-items: flex-start; margin-bottom: 10px; }

.action-bar { position: sticky; bottom: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 14px 20px; margin: 24px -20px 0; display: flex; gap: 12px; align-items: center; justify-content: flex-end; }
.action-bar .progress-info { margin-right: auto; font-size: 12.5px; color: var(--ink-3); }
.btn { padding: 10px 22px; border: none; border-radius: 9px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: transform 0.1s; }
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dk); }
.btn-secondary { background: #f3f4f6; color: var(--ink); border: 1px solid var(--border); }
.btn-secondary:hover { background: #e5e7eb; }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 22px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #dc2626; }
.loading-state, .access-denied { text-align: center; padding: 80px 20px; color: var(--ink-3); }
.access-denied h2 { font-family: 'Lora', serif; color: #991b1b; margin-bottom: 8px; }
@media (max-width: 720px) {
  .page-header { padding: 22px 18px; }
  .stage-card { padding: 18px 16px; }
  .stage-head { flex-wrap: wrap; }
  .commitment-row { grid-template-columns: 1fr; }
  .action-bar { flex-wrap: wrap; }
  .action-bar .progress-info { flex: 1 100%; margin-bottom: 8px; }
}
</style>
</head>
<body style="display:none">
<div class="page-wrap">
  <div class="page-header">
    <div class="eyebrow">Principal Coaching · 60-min session</div>
    <h1>Coaching Session</h1>
    <p>5-stage agenda. Personal check-in is private (mentor + coachee only). Other stages, commitments, and outcome metrics are visible to network governance for audit.</p>
  </div>
  <div id="content"><div class="loading-state">Loading framework…</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="auth-guard.js"></script>
<script type="module">
import { collection, doc, getDoc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// URL params: ?principalUid=X[&date=YYYY-MM-DD]
const params = new URLSearchParams(window.location.search);
const PRINCIPAL_UID = params.get('principalUid');
const SESSION_DATE  = params.get('date') || new Date().toISOString().slice(0, 10);
const DOC_ID = PRINCIPAL_UID ? `${PRINCIPAL_UID}_${SESSION_DATE}` : null;

let framework = null;
let principal = null;
let mentorProfile = null;
let formData = {
  agenda: {},          // { '1_check_in': { notes }, '2_review_commitments': { commitment, outcome, outcome_reason }, ... }
  newCommitments: [],  // [ { text, dueWeek, supportNeeded } ]
  outcomeMetrics: {},
  status: 'draft',
};

document.addEventListener('authReady', async () => {
  document.body.style.display = '';

  // Audience: HQ Director (CH director sub-role) or central_admin.
  // Foundation Reps explicitly excluded per the framework's
  // access_control table — coaching confidentiality protected.
  const profile = window.userProfile;
  mentorProfile = profile;
  const chSubs = profile?.ch_sub_roles || [];
  const isAdmin = profile?.role_centralhub === 'central_admin';
  const eligible = isAdmin || chSubs.includes('director');
  if (!eligible) {
    showAccessDenied('Coaching sessions can only be logged by HQ Directors. Foundation Reps are intentionally excluded to protect coaching confidentiality (Charter NN).');
    return;
  }
  if (!PRINCIPAL_UID) {
    showAccessDenied('Missing principalUid in URL.');
    return;
  }

  try {
    const fwRes = await fetch('/references-data/audits/principal-coaching-framework-v1.json');
    if (!fwRes.ok) throw new Error('Could not load framework (HTTP ' + fwRes.status + ')');
    framework = await fwRes.json();

    const pSnap = await getDoc(doc(window.db, 'users', PRINCIPAL_UID));
    if (pSnap.exists()) principal = pSnap.data();

    const sSnap = await getDoc(doc(window.db, 'principal_coaching_sessions', DOC_ID));
    if (sSnap.exists()) {
      const d = sSnap.data();
      formData = { ...formData, ...d };
      if (d.status === 'logged') {
        showAccessDenied('This session is logged and immutable. Open the next session date to record the next conversation.');
        return;
      }
    }

    render();
  } catch (err) {
    console.error('boot', err);
    document.getElementById('content').innerHTML = `<div class="access-denied"><h2>Could not load</h2><p>${escapeHtml(err.message || 'unknown error')}</p></div>`;
  }
});

function render() {
  const root = document.getElementById('content');
  const stages = (framework.session_structure?.agenda_stages) || [];

  root.innerHTML = `
    <div class="charter-banner">
      <strong>Confidentiality</strong>
      Stage 1 (personal check-in) is visible only to mentor + coachee. Other stages contribute to audit. Submitted sessions are immutable — open the next session date for the next conversation.
    </div>

    <div class="context-card">
      <div class="ctx-row"><span class="ctx-label">Coachee (Principal)</span><span class="ctx-value">${escapeHtml(principal?.displayName || PRINCIPAL_UID)}</span></div>
      <div class="ctx-row"><span class="ctx-label">School</span><span class="ctx-value">${escapeHtml(principal?.school || '—')}</span></div>
      <div class="ctx-row"><span class="ctx-label">Session date</span><span class="ctx-value">${escapeHtml(SESSION_DATE)}</span></div>
      <div class="ctx-row"><span class="ctx-label">Mode</span>
        <select id="mode">
          <option value="year_1_induction" ${formData.mode === 'year_1_induction' ? 'selected' : ''}>Year 1 Induction</option>
          <option value="year_2_plus" ${formData.mode !== 'year_1_induction' ? 'selected' : ''}>Year 2+</option>
        </select>
      </div>
    </div>

    ${stages.map(s => renderStage(s)).join('')}

    ${renderCommitmentsCard()}

    <div class="action-bar">
      <div class="progress-info" id="progressInfo">—</div>
      <button class="btn btn-secondary" id="btnSaveDraft">Save draft</button>
      <button class="btn btn-primary" id="btnLog">Log session</button>
    </div>
  `;

  document.getElementById('mode').addEventListener('change', e => { formData.mode = e.target.value; });
  stages.forEach(s => wireStage(s));
  document.getElementById('btnSaveDraft').addEventListener('click', () => save('draft'));
  document.getElementById('btnLog').addEventListener('click', () => save('logged'));
  updateProgress();
}

function renderStage(s) {
  const cur = formData.agenda[s.stage_id] || {};
  const isPrivate = s.stage_id === '1_check_in';
  const isReview  = s.stage_id === '2_review_commitments';

  return `
    <div class="stage-card">
      <div class="stage-head">
        <span class="stage-id">${escapeHtml(s.stage_id)}</span>
        <h2 class="stage-title">${escapeHtml(s.label)}</h2>
        <span class="stage-time">${s.duration_minutes} min</span>
      </div>
      <div class="stage-purpose">${escapeHtml(s.purpose || '')}</div>
      ${(s.facilitator_questions || []).length ? `
        <div class="stage-prompts">
          <strong style="font-size:11px;color:var(--accent-dk);text-transform:uppercase;letter-spacing:0.06em;">Mentor prompts</strong>
          <ul>${s.facilitator_questions.map(q => `<li>${escapeHtml(q)}</li>`).join('')}</ul>
        </div>
      ` : ''}
      ${isPrivate ? '<div class="private-hint">⚠ Private — visible only to you and the coachee.</div>' : ''}
      ${isReview ? renderReviewBlock(cur) : `<textarea class="notes-area ${isPrivate ? 'private' : ''}" data-stage="${escapeAttr(s.stage_id)}" placeholder="Notes…">${escapeHtml(cur.notes || '')}</textarea>`}
    </div>
  `;
}

function renderReviewBlock(cur) {
  return `
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Last session's commitment</label>
      <textarea class="notes-area" data-review-field="commitment" placeholder="What was the principal's commitment last time?">${escapeHtml(cur.commitment || '')}</textarea>
    </div>
    <div class="commitment-row">
      <textarea class="notes-area" data-review-field="outcome_reason" placeholder="Why did it land or not land?">${escapeHtml(cur.outcome_reason || '')}</textarea>
      <select class="ctx-row" data-review-field="outcome" style="padding: 9px 10px; border: 1px solid var(--border); border-radius: 7px;">
        <option value="">— outcome —</option>
        <option value="landed"        ${cur.outcome === 'landed' ? 'selected' : ''}>Landed</option>
        <option value="partial"       ${cur.outcome === 'partial' ? 'selected' : ''}>Partial</option>
        <option value="did_not_land"  ${cur.outcome === 'did_not_land' ? 'selected' : ''}>Did not land</option>
      </select>
    </div>
  `;
}

function renderCommitmentsCard() {
  const c = formData.newCommitments;
  return `
    <div class="stage-card">
      <div class="stage-head">
        <span class="stage-id">Outputs</span>
        <h2 class="stage-title">New commitments &amp; outcome metrics</h2>
      </div>
      <div class="stage-purpose">Capture 1-3 specific commitments the principal will land before the next session. Vague intentions ("be more strategic") are a red flag — push for specific, observable, week-tagged actions.</div>
      <div id="commitList">${c.map((com, idx) => renderCommitment(com, idx)).join('')}</div>
      <button class="btn btn-secondary" id="btnAddCommitment" type="button" style="margin-top:8px;">+ Add commitment</button>

      <div style="margin-top:18px;">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Mentor reflection</label>
        <textarea class="notes-area" data-stage="mentor_reflection" placeholder="What did this session surface? Any patterns to flag?">${escapeHtml(formData.mentorReflection || '')}</textarea>
      </div>
    </div>
  `;
}

function renderCommitment(com, idx) {
  return `
    <div class="commitment-row" data-cidx="${idx}">
      <textarea class="notes-area" data-com-field="text" data-cidx="${idx}" placeholder="Specific, observable commitment…">${escapeHtml(com.text || '')}</textarea>
      <input type="text" data-com-field="dueWeek" data-cidx="${idx}" placeholder="Due (e.g. W14)" value="${escapeAttr(com.dueWeek || '')}" style="padding: 9px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 13px;">
    </div>
  `;
}

function wireStage(s) {
  const ta = document.querySelector(`[data-stage="${cssEsc(s.stage_id)}"]`);
  if (ta) ta.addEventListener('input', e => { formData.agenda[s.stage_id] = { ...(formData.agenda[s.stage_id] || {}), notes: e.target.value }; updateProgress(); });
  if (s.stage_id === '2_review_commitments') {
    document.querySelectorAll('[data-review-field]').forEach(el => {
      el.addEventListener('input', e => {
        formData.agenda['2_review_commitments'] = { ...(formData.agenda['2_review_commitments'] || {}), [el.dataset.reviewField]: el.value };
        updateProgress();
      });
      if (el.tagName === 'SELECT') {
        el.addEventListener('change', e => {
          formData.agenda['2_review_commitments'] = { ...(formData.agenda['2_review_commitments'] || {}), [el.dataset.reviewField]: el.value };
          updateProgress();
        });
      }
    });
  }
  // Mentor reflection
  const mr = document.querySelector('[data-stage="mentor_reflection"]');
  if (mr) mr.addEventListener('input', e => { formData.mentorReflection = e.target.value; });
  // Commitments
  const addBtn = document.getElementById('btnAddCommitment');
  if (addBtn && !addBtn.dataset.wired) {
    addBtn.dataset.wired = '1';
    addBtn.addEventListener('click', () => {
      formData.newCommitments.push({ text: '', dueWeek: '' });
      const list = document.getElementById('commitList');
      list.insertAdjacentHTML('beforeend', renderCommitment({}, formData.newCommitments.length - 1));
      wireCommitments();
      updateProgress();
    });
    wireCommitments();
  }
}

function wireCommitments() {
  document.querySelectorAll('[data-com-field]').forEach(el => {
    if (el.dataset.wired) return;
    el.dataset.wired = '1';
    el.addEventListener('input', e => {
      const idx = Number(el.dataset.cidx);
      formData.newCommitments[idx] = { ...(formData.newCommitments[idx] || {}), [el.dataset.comField]: el.value };
      updateProgress();
    });
  });
}

function updateProgress() {
  const stages = (framework.session_structure?.agenda_stages) || [];
  const stagesFilled = stages.filter(s => {
    const v = formData.agenda[s.stage_id];
    if (!v) return false;
    if (s.stage_id === '2_review_commitments') return v.commitment || v.outcome;
    return (v.notes || '').trim().length > 0;
  }).length;
  const com = formData.newCommitments.filter(c => (c.text || '').trim()).length;
  const info = document.getElementById('progressInfo');
  if (info) info.innerHTML = `<strong>${stagesFilled}/${stages.length}</strong> stages noted · <strong>${com}</strong> new commitment${com === 1 ? '' : 's'}`;
}

async function save(targetStatus) {
  if (targetStatus === 'logged') {
    if (!confirm('Log this session? Logged sessions are immutable. Use the next session date for the next conversation.')) return;
  }

  const payload = {
    principalUid: PRINCIPAL_UID,
    schoolId: principal?.schoolId || null,
    mentorUid: window.currentUser.uid,
    mentorName: mentorProfile?.displayName || null,
    sessionDate: SESSION_DATE,
    mode: formData.mode || 'year_1_induction',
    agenda: { ...formData.agenda },
    newCommitments: formData.newCommitments.filter(c => (c.text || '').trim()),
    mentorReflection: formData.mentorReflection || '',
    status: targetStatus,
    updatedAt: serverTimestamp(),
  };
  if (targetStatus === 'logged') payload.loggedAt = serverTimestamp();

  const btnLog = document.getElementById('btnLog');
  const btnDraft = document.getElementById('btnSaveDraft');
  if (btnLog)   btnLog.disabled = true;
  if (btnDraft) btnDraft.disabled = true;

  try {
    await setDoc(doc(window.db, 'principal_coaching_sessions', DOC_ID), payload, { merge: true });
    toast(targetStatus === 'logged' ? 'Session logged ✓' : 'Draft saved ✓');
  } catch (err) {
    console.error('save', err);
    toast('Could not save: ' + (err.message || err.code), true);
  } finally {
    if (btnLog)   btnLog.disabled = false;
    if (btnDraft) btnDraft.disabled = false;
  }
}

function showAccessDenied(msg) {
  document.body.style.display = '';
  document.getElementById('content').innerHTML = `<div class="access-denied"><h2>Cannot open form</h2><p>${escapeHtml(msg)}</p></div>`;
}
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.toggle('error', !!isErr); t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function cssEsc(s) { return String(s).replace(/[^A-Za-z0-9_-]/g, ''); }
</script>
</body>
</html>
