<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surveys - CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <style>
    /* Surveys belongs to Communication family — cyan accent.
       Hero markup uses canonical <header class="page-hero" data-accent="cyan">.
       Container aligned to --container-max (1200px) + 40px horizontal padding
       so hero inner edges line up with the body content's left edge. */
    .page-wrap {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 24px 40px 48px;
    }

    /* Toolbar controls — search + status select in a single sticky row */
    .sv-toolbar-search {
      flex: 1 1 240px; min-width: 200px;
      position: relative;
    }
    .sv-toolbar-search .search-input {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; color: var(--ink);
    }
    .sv-toolbar-search .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--ink-3); pointer-events: none;
    }
    .sv-toolbar-select {
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; color: var(--ink); cursor: pointer; min-width: 140px;
    }

    .survey-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .survey-card {
      background: #fff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      padding: 18px 20px 18px 18px;
      transition: box-shadow 0.22s ease, border-color 0.22s ease, transform 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .survey-card::before {
      /* Soft state-tinted wash that fades from left → right.
         Stays in pseudo so it doesn't interfere with content stacking. */
      content: '';
      position: absolute; inset: 0;
      background: transparent;
      pointer-events: none;
      transition: background 0.22s ease;
    }
    .survey-card > * { position: relative; z-index: 1; }
    .survey-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

    /* AWAITING — amber call-to-action (the visually loudest state) */
    .survey-card.is-awaiting { border-left-color: #f59e0b; }
    .survey-card.is-awaiting::before {
      background: linear-gradient(90deg, rgba(254,243,199,0.55) 0%, rgba(254,243,199,0) 60%);
    }
    .survey-card.is-awaiting:hover {
      border-left-color: #d97706;
      box-shadow: 0 8px 22px -10px rgba(245,158,11,0.45), var(--shadow);
    }

    /* RESPONDED — green completed */
    .survey-card.is-responded { border-left-color: #10b981; }
    .survey-card.is-responded::before {
      background: linear-gradient(90deg, rgba(209,250,229,0.5) 0%, rgba(209,250,229,0) 55%);
    }
    .survey-card.is-responded:hover {
      border-left-color: #059669;
      box-shadow: 0 8px 22px -10px rgba(16,185,129,0.4), var(--shadow);
    }

    /* CLOSED — slate, muted */
    .survey-card.is-closed { border-left-color: #94a3b8; opacity: 0.85; }
    .survey-card.is-closed::before {
      background: linear-gradient(90deg, rgba(241,245,249,0.5) 0%, rgba(241,245,249,0) 50%);
    }
    .survey-card.is-closed:hover { opacity: 1; }

    /* EXPANDED — cyan accent on top of any state */
    .survey-card.is-expanded {
      border-color: #7dd3fc;
      box-shadow: 0 10px 26px -14px rgba(8,145,178,0.35), var(--shadow);
    }
    .survey-card.is-expanded.is-awaiting { border-left-color: #f59e0b; }
    .survey-card.is-expanded.is-responded { border-left-color: #10b981; }
    .survey-card.is-expanded.is-closed { border-left-color: #94a3b8; }
    .survey-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      user-select: none;
      outline: none;
    }
    .survey-head:focus-visible { box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.18); border-radius: 8px; }
    .survey-head__main {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .survey-head__cta {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
    }
    .survey-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #0e7490;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #e0f2fe 0%, #cffafe 100%);
      transition: background 0.18s, color 0.18s, transform 0.18s;
    }
    .survey-toggle-btn svg {
      transition: transform 0.25s ease;
    }
    .survey-card.is-expanded .survey-toggle-btn {
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      color: #fff;
    }
    .survey-card.is-expanded .survey-toggle-btn svg {
      transform: rotate(180deg);
    }
    .survey-head:hover .survey-toggle-btn {
      transform: translateY(-1px);
    }
    .survey-card:not(.is-expanded) .survey-head:hover .survey-toggle-btn {
      background: linear-gradient(135deg, #bae6fd 0%, #a5f3fc 100%);
    }
    .survey-title {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
      letter-spacing: -0.005em;
    }
    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 3px 11px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    /* "Awaiting you" — amber, attention-getting */
    .badge-open {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      box-shadow: 0 1px 0 rgba(245,158,11,0.15);
    }
    .badge-open::before {
      content: '⏳'; font-size: 0.85em; line-height: 1;
    }
    /* "Closed" — muted grey */
    .badge-closed {
      background: #e2e8f0; color: #475569;
    }
    .badge-closed::before {
      content: '🔒'; font-size: 0.85em; line-height: 1;
    }
    /* "Responded" — green check + a hint of celebration */
    .badge-responded {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #065f46;
      box-shadow: 0 1px 0 rgba(16,185,129,0.18);
    }
    .badge-responded::before {
      content: '✓'; font-size: 0.95em; line-height: 1; font-weight: 900;
    }
    .badge-status {
      background: #e0f2fe; color: #0e7490;
    }

    /* Collapsed-card summary row — questions count + last-saved hint */
    .survey-summary {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--ink-3);
    }
    .survey-summary__count {
      font-weight: 600;
      color: var(--ink-2);
    }
    .survey-summary__dot {
      color: var(--ink-3);
    }
    .survey-summary__note {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .survey-body {
      color: var(--ink-2);
      font-size: 0.89rem;
      line-height: 1.62;
      margin: 14px 0 12px;
      word-break: break-word;
    }
    .questions-wrap {
      background: linear-gradient(135deg, #f0f9ff 0%, #faf8ff 100%);
      border: 1px solid #bae6fd;
      border-left: 3px solid #0891b2;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .questions-title {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0e7490;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .questions-title::before {
      content: '❓'; font-size: 0.85em; line-height: 1;
    }
    .questions-list {
      margin-left: 18px;
      color: var(--ink-2);
      font-size: 0.86rem;
      line-height: 1.55;
    }
    .questions-list li + li {
      margin-top: 5px;
    }

    .platforms {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .chip {
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .chip-on-academic { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }
    .chip-on-central { background: #e0f2fe; color: #0e7490; border-color: #7dd3fc; }
    .chip-on-teachers { background: #dcfce7; color: #166534; border-color: #86efac; }
    .chip-off { background: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; }

    .survey-meta {
      font-size: 0.78rem;
      color: var(--ink-3);
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed #ece9e3;
    }
    .survey-card:not(.is-expanded) .survey-meta {
      border-top: none;
      padding-top: 0;
      margin-top: 8px;
    }
    .response-wrap {
      border-top: 1px solid #bae6fd;
      margin-top: 12px;
      padding-top: 12px;
      display: grid;
      gap: 9px;
    }
    .response-title {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0e7490;
      font-weight: 700;
    }
    .response-item {
      display: grid;
      gap: 5px;
    }
    .response-item + .response-item {
      border-top: 1px solid var(--border);
      padding-top: 13px;
      margin-top: 4px;
    }
    .response-label {
      font-size: 0.79rem;
      color: var(--ink-2);
      font-weight: 600;
    }
    .response-input {
      width: 100%;
      min-height: 66px;
      resize: vertical;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.84rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      line-height: 1.5;
    }
    .response-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.12);
    }
    .response-input:disabled {
      background: #f0f9ff;
      color: #7f7f97;
    }
    .response-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .response-btn {
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s ease, transform 0.15s ease, box-shadow 0.18s ease;
      box-shadow: 0 3px 10px -4px rgba(124,58,237,0.5);
    }
    .response-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px -6px rgba(124,58,237,0.55);
    }
    .response-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .response-note {
      font-size: 0.8rem;
      color: var(--ink-3);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .response-note.ok {
      color: #047857;
      animation: noteBounce 0.4s ease;
    }
    .response-note.ok::before { content: '✓'; font-weight: 900; }
    .response-note.err {
      color: #b91c1c;
    }
    .response-note.err::before { content: '⚠'; }
    @keyframes noteBounce {
      0%   { transform: translateY(-4px); opacity: 0; }
      60%  { transform: translateY(2px); opacity: 1; }
      100% { transform: translateY(0); }
    }
    .empty {
      position: relative;
      background: linear-gradient(135deg, #f0f9ff 0%, #faf8ff 50%, #f0fdf4 100%);
      border: 1px solid #e0e7ff;
      border-radius: 16px;
      padding: 56px 24px 48px;
      text-align: center;
      color: var(--ink-2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      overflow: hidden;
    }
    .empty::before {
      /* Soft radial highlight in the top-right */
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 85% 15%, rgba(108,92,231,0.08) 0%, transparent 55%);
      pointer-events: none;
    }
    .empty > * { position: relative; z-index: 1; }
    .empty-emoji {
      font-size: 3.2rem;
      line-height: 1;
      filter: drop-shadow(0 4px 10px rgba(108,92,231,0.18));
      animation: emptyFloat 4s ease-in-out infinite;
    }
    @keyframes emptyFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .empty-title {
      font-family: 'Lora', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.25;
      margin-top: 2px;
    }
    .empty-desc {
      font-size: 0.9rem;
      color: var(--ink-2);
      max-width: 460px;
      line-height: 1.6;
    }
    .empty-hint {
      font-size: 0.78rem;
      color: var(--ink-3);
      margin-top: 6px;
      font-style: italic;
    }
    .loading-line {
      height: 12px;
      border-radius: 8px;
      background: linear-gradient(90deg, #efede8 25%, #f7f6f3 50%, #efede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Multi-type response inputs */
    .response-mc { display: flex; flex-direction: column; gap: 7px; }
    .response-mc label { display: flex; align-items: center; gap: 8px; font-size: 0.86rem; color: var(--ink-2); cursor: pointer; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--white); transition: border-color 0.15s, background 0.15s; }
    .response-mc label:hover { border-color: var(--accent); background: var(--accent-2); }
    .response-mc label:has(input:checked) { border-color: var(--accent); background: var(--accent-2); font-weight: 700; color: var(--ink); }
    .response-mc input[type="radio"] { accent-color: var(--accent); flex-shrink: 0; }
    .response-mc label.disabled-label { cursor: not-allowed; opacity: 0.6; }
    .response-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 2px; margin: 2px 0; }
    .response-rating input[type="radio"] { display: none; }
    .response-rating label { font-size: 1.75rem; cursor: pointer; color: #d1d5db; transition: color 0.1s; line-height: 1; }
    .response-rating label:hover { color: #f59e0b; }
    .response-rating label:hover ~ label { color: #f59e0b; }
    .response-rating input:checked + label { color: #f59e0b; }
    .response-rating input:checked + label ~ label { color: #f59e0b; }
    .rating-disabled label { cursor: not-allowed; pointer-events: none; opacity: 0.7; }
    .response-likert { display: flex; gap: 4px; flex-wrap: wrap; }
    .likert-opt { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 78px; }
    .likert-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .likert-opt label { width: 100%; text-align: center; font-size: 0.7rem; padding: 8px 5px; border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer; color: var(--ink-2); background: var(--white); transition: all 0.15s; line-height: 1.35; }
    .likert-opt label:hover { border-color: var(--accent); background: var(--accent-2); }
    .likert-opt:has(input:checked) label { border-color: var(--accent); background: var(--accent-2); font-weight: 700; color: var(--ink); }
    .likert-disabled .likert-opt label { cursor: not-allowed; opacity: 0.65; pointer-events: none; }
    .response-section-header { font-size: 0.72rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 0 4px; border-top: 1.5px dashed #ece9e3; margin-top: 6px; }
    .q-type-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.66rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      margin-left: 6px; vertical-align: middle;
      letter-spacing: 0.02em;
    }
    .q-type-chip::before { font-size: 0.92em; line-height: 1; }
    .q-type-chip-mc     { background: #ede9fe; color: #5b21b6; }
    .q-type-chip-mc::before     { content: '🔘'; }
    .q-type-chip-rating { background: #fef3c7; color: #92400e; }
    .q-type-chip-rating::before { content: '⭐'; }
    .q-type-chip-likert { background: #dcfce7; color: #166534; }
    .q-type-chip-likert::before { content: '📊'; }

    @media (max-width: 760px) {
      .page-wrap { padding: 20px 20px 40px; }
      .sv-toolbar-select { min-width: 110px; }
      .response-likert { flex-direction: column; }
      .likert-opt { min-width: unset; flex-direction: row; }
      .likert-opt label { text-align: left; padding: 7px 10px; }
    }
  </style>
</head>
<body>

<!-- SHARED_NAVBAR -->

<header class="page-hero" data-accent="cyan" aria-label="Surveys header">
  <div class="page-hero__inner">
    <div class="page-hero__icon" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
        <line x1="9" y1="18" x2="13" y2="18"/>
      </svg>
    </div>
    <div class="page-hero__text">
      <p class="page-hero__eyebrow">Communications · CentralHub</p>
      <h1 class="page-hero__title">Surveys</h1>
      <p class="page-hero__desc">Surveys shared to CentralHub appear here. Open the ones awaiting your response — only surveys you've been invited to are listed.</p>
    </div>
    <div class="page-hero__kpis" id="heroKpis">
      <div class="page-hero__kpi">
        <div class="page-hero__kpi-num" id="kpiAwaiting">–</div>
        <div class="page-hero__kpi-lbl">Awaiting you</div>
      </div>
      <div class="page-hero__kpi">
        <div class="page-hero__kpi-num" id="kpiResponded">–</div>
        <div class="page-hero__kpi-lbl">Responded</div>
      </div>
      <div class="page-hero__kpi">
        <div class="page-hero__kpi-num" id="kpiTotal">–</div>
        <div class="page-hero__kpi-lbl">Total shared</div>
      </div>
    </div>
  </div>
</header>

<!-- Search + status toolbar — sticky below the hero -->
<div class="page-toolbar" aria-label="Survey filters">
  <div class="page-toolbar__inner">
    <div class="sv-toolbar-search">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search surveys, descriptions, or questions…" aria-label="Search surveys">
    </div>
    <select class="sv-toolbar-select" id="statusFilter" aria-label="Status filter">
      <option value="awaiting">Awaiting your response</option>
      <option value="responded">Responded</option>
      <option value="open">Open (all)</option>
      <option value="closed">Closed</option>
      <option value="all">All surveys</option>
    </select>
  </div>
</div>

<main class="page-wrap">
    <section id="surveyList" class="survey-list" aria-live="polite">
      <article class="survey-card" aria-hidden="true">
        <div class="loading-line" style="width: 52%; margin-bottom: 10px;"></div>
        <div class="loading-line" style="width: 30%;"></div>
      </article>
      <article class="survey-card" aria-hidden="true">
        <div class="loading-line" style="width: 66%; margin-bottom: 10px;"></div>
        <div class="loading-line" style="width: 38%;"></div>
      </article>
      <article class="survey-card" aria-hidden="true">
        <div class="loading-line" style="width: 44%; margin-bottom: 10px;"></div>
        <div class="loading-line" style="width: 34%;"></div>
      </article>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module">
    import {
      collection, getDocs, query, where,
      doc, getDoc, setDoc, serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const PLATFORM_KEY = "centralhub";
    const LIKERT_LABELS = ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"];

    let db;
    let currentUser = null;
    let allSurveys = [];
    let myResponses = {};
    let responseUiState = {};
    let savingSurveyId = null;
    let searchText = "";
    let statusFilter = "awaiting";
    let expandedSurveyIds = new Set();
    let controlsBound = false;

    document.addEventListener("authReady", async ({ detail: { user } }) => {
      db = window.db;
      currentUser = user;
      bindControls();
      await loadSurveys();
    });

    function bindControls() {
      if (controlsBound) return;
      controlsBound = true;

      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchText = e.target.value.trim().toLowerCase();
        renderSurveys();
      });

      document.getElementById("statusFilter").addEventListener("change", (e) => {
        statusFilter = e.target.value;
        renderSurveys();
      });

      document.getElementById("surveyList").addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const toggle = e.target.closest(".survey-toggle");
        if (!toggle) return;
        e.preventDefault();
        const surveyId = toggle.dataset.surveyId;
        if (!surveyId) return;
        if (expandedSurveyIds.has(surveyId)) expandedSurveyIds.delete(surveyId);
        else expandedSurveyIds.add(surveyId);
        renderSurveys();
      });

      document.getElementById("surveyList").addEventListener("click", async (e) => {
        // Expand / collapse toggle — click on .survey-toggle anywhere on the head.
        const toggle = e.target.closest(".survey-toggle");
        if (toggle) {
          const surveyId = toggle.dataset.surveyId;
          if (!surveyId) return;
          if (expandedSurveyIds.has(surveyId)) expandedSurveyIds.delete(surveyId);
          else expandedSurveyIds.add(surveyId);
          renderSurveys();
          return;
        }

        // Submit / Update response.
        const btn = e.target.closest(".response-btn");
        if (!btn) return;

        const surveyId = btn.dataset.surveyId;
        const survey = allSurveys.find((s) => s.id === surveyId);
        if (!survey) return;

        const status = normalizeStatus(survey.status);
        const isOpen = status === "published" && survey.allowResponses !== false;
        if (!isOpen || savingSurveyId) return;

        const card = btn.closest(".survey-card");
        if (!card) return;

        const questions = getQuestions(survey.questionsRaw, survey.questions);
        const answers = questions.map((q, idx) => {
          if (!q.type || q.type === "text") {
            const el = card.querySelector(`textarea.response-input[data-survey-id="${surveyId}"][data-qidx="${idx}"]`);
            return el ? el.value.trim() : "";
          }
          const checked = card.querySelector(`input[name="resp-${surveyId}-${idx}"]:checked`);
          return checked ? checked.value : "";
        });

        if (!answers.length || answers.some((x) => !x)) {
          setResponseUi(surveyId, "Please answer all questions before submitting.", true);
          renderSurveys();
          return;
        }

        await saveResponse(survey, answers);
      });
    }

    async function loadSurveys() {
      const listEl = document.getElementById("surveyList");
      try {
        const snap = await getDocs(query(
          collection(db, "surveys"),
          where("platforms", "array-contains", PLATFORM_KEY),
        ));
        allSurveys = snap.docs
          .map((d) => ({ id: d.id, ...d.data() }))
          .filter((s) => {
            const status = normalizeStatus(s.status);
            return status !== "draft";
          })
          .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
        await loadMyResponses();
        renderSurveys();
      } catch (err) {
        console.error("Failed to load surveys:", err);
        listEl.innerHTML = '<div class="empty">Could not load surveys.</div>';
      }
    }

    async function loadMyResponses() {
      myResponses = {};
      if (!currentUser || !allSurveys.length) return;

      // Single query for all responses by this user — avoids N+1 individual getDoc calls
      const snap = await getDocs(query(
        collection(db, "survey_responses"),
        where("userId", "==", currentUser.uid),
        where("platform", "==", PLATFORM_KEY),
      ));
      snap.forEach(d => {
        const data = d.data();
        if (data.surveyId) myResponses[data.surveyId] = data;
      });
    }

    async function saveResponse(survey, answers) {
      const surveyId = survey.id;
      savingSurveyId = surveyId;
      setResponseUi(surveyId, "", false);
      renderSurveys();

      try {
        const responseRef = doc(db, "survey_responses", buildResponseDocId(surveyId, currentUser.uid));
        const alreadyExists = !!myResponses[surveyId];
        const payload = {
          surveyId,
          userId: currentUser.uid,
          platform: PLATFORM_KEY,
          answers,
          authorName: window.userProfile?.displayName || currentUser.displayName || "",
          authorEmail: currentUser.email || "",
          updatedAt: serverTimestamp(),
        };
        if (!alreadyExists) payload.createdAt = serverTimestamp();

        await setDoc(responseRef, payload, { merge: true });

        const savedSnap = await getDoc(responseRef);
        if (savedSnap.exists()) {
          myResponses[surveyId] = savedSnap.data();
        } else {
          myResponses[surveyId] = { ...payload, updatedAt: new Date() };
        }
        setResponseUi(surveyId, "Response saved successfully.", false);
      } catch (err) {
        console.error("Failed to save response:", err);
        setResponseUi(surveyId, "Could not save your response. Please try again.", true);
      } finally {
        savingSurveyId = null;
        renderSurveys();
      }
    }

    function updateKpis() {
      let total = 0, responded = 0, awaiting = 0;
      allSurveys.forEach((s) => {
        const status = normalizeStatus(s.status);
        const isOpen = status === "published" && s.allowResponses !== false;
        const questions = getQuestions(s.questionsRaw, s.questions);
        if (!questions.length) return;
        total++;
        const hasResp = !!myResponses[s.id];
        if (hasResp) responded++;
        else if (isOpen) awaiting++;
      });
      document.getElementById("kpiAwaiting").textContent = awaiting;
      document.getElementById("kpiResponded").textContent = responded;
      document.getElementById("kpiTotal").textContent = total;
    }

    function renderSurveys() {
      updateKpis();
      const listEl = document.getElementById("surveyList");
      const filtered = allSurveys.filter((s) => {
        const status = normalizeStatus(s.status);
        const isOpen = status === "published" && s.allowResponses !== false;
        const hasResp = !!myResponses[s.id];

        if (statusFilter === "open" && !isOpen) return false;
        if (statusFilter === "closed" && isOpen) return false;
        if (statusFilter === "awaiting" && (hasResp || !isOpen)) return false;
        if (statusFilter === "responded" && !hasResp) return false;
        if (!searchText) return true;
        const qTexts = getQuestions(s.questionsRaw, s.questions).map((q) => q.text).join(" ");
        const haystack = [s.title || "", stripHtml(s.body || ""), s.questionsRaw || "", qTexts].join(" ").toLowerCase();
        return haystack.includes(searchText);
      });

      if (!filtered.length) {
        const emptyMsg = emptyStateFor(statusFilter, !!searchText);
        const hintHtml = emptyMsg.hint ? `<div class="empty-hint">${esc(emptyMsg.hint)}</div>` : "";
        listEl.innerHTML = `<div class="empty">
          <div class="empty-emoji" aria-hidden="true">${emptyMsg.emoji}</div>
          <div class="empty-title">${esc(emptyMsg.title)}</div>
          <div class="empty-desc">${esc(emptyMsg.desc)}</div>
          ${hintHtml}
        </div>`;
        return;
      }

      listEl.innerHTML = filtered.map((s) => {
        const status = normalizeStatus(s.status);
        const isOpen = status === "published" && s.allowResponses !== false;
        const questions = getQuestions(s.questionsRaw, s.questions);
        const response = myResponses[s.id] || null;
        const isExpanded = expandedSurveyIds.has(s.id);

        // State drives both the badge AND the card's left-border colour
        // (.is-awaiting / .is-responded / .is-closed → tinted wash + amber/green/slate stripe).
        const stateBadge = response
          ? `<span class="badge badge-responded">Responded</span>`
          : (isOpen ? `<span class="badge badge-open">Awaiting you</span>` : `<span class="badge badge-closed">Closed</span>`);
        const stateCls = response ? 'is-responded' : (isOpen ? 'is-awaiting' : 'is-closed');

        const plats = Array.isArray(s.platforms) ? s.platforms : [];
        const chip = (enabled, cls, label) => enabled ? `<span class="chip ${cls}">${label}</span>` : "";
        const platformChips = [
          chip(plats.includes("centralhub"), "chip-on-central", "CentralHub"),
          chip(plats.includes("academichub"), "chip-on-academic", "Academic Hub"),
          chip(plats.includes("teachershub"), "chip-on-teachers", "Teachers Hub"),
        ].filter(Boolean).join("");

        const savedAnswers = normalizeAnswers(response?.answers, questions.length);
        const responseUi = responseUiState[s.id];
        const noteClass = responseUi ? (responseUi.isError ? "response-note err" : "response-note ok") : "response-note";
        const defaultNote = response
          ? `Last saved: ${formatDateTime(response.updatedAt || response.createdAt)}`
          : (isOpen ? "You have not submitted a response yet." : "This survey is closed for responses.");

        let lastGroup = null;
        const responseInputs = !isExpanded ? "" : questions.map((q, idx) => {
          let sectionHdr = "";
          if (q.group && q.group !== lastGroup) {
            lastGroup = q.group;
            sectionHdr = `<div class="response-section-header">${esc(q.group)}</div>`;
          }
          const savedVal = savedAnswers[idx] || "";
          const dis = !isOpen ? "disabled" : "";
          let inputHtml = "";

          if (q.type === "multiple_choice" && q.options && q.options.length) {
            const opts = q.options.map((opt, oi) => {
              const optId = `resp-${s.id}-${idx}-mc-${oi}`;
              const checked = savedVal === opt ? "checked" : "";
              return `<label class="${dis ? "disabled-label" : ""}">
                <input type="radio" id="${optId}" name="resp-${s.id}-${idx}" value="${esc(opt)}" ${checked} ${dis}>
                ${String.fromCharCode(65 + oi)}. ${esc(opt)}
              </label>`;
            }).join("");
            inputHtml = `<div class="response-mc">${opts}</div>`;

          } else if (q.type === "rating") {
            const scale = q.scale || 5;
            const stars = Array.from({ length: scale }, (_, i) => scale - i).map((n) => {
              const starId = `resp-${s.id}-${idx}-star-${n}`;
              const checked = savedVal === String(n) ? "checked" : "";
              return `<input type="radio" id="${starId}" name="resp-${s.id}-${idx}" value="${n}" ${checked} ${dis}><label for="${starId}" title="${n} star${n > 1 ? "s" : ""}">★</label>`;
            }).join("");
            const selLabel = savedVal ? ` · Selected: ${savedVal}/${scale}` : "";
            inputHtml = `<div class="response-rating${dis ? " rating-disabled" : ""}">${stars}</div>
              <div style="font-size:0.75rem;color:var(--ink-3);margin-top:3px;">1 = lowest · ${scale} = highest${selLabel}</div>`;

          } else if (q.type === "likert") {
            const opts = LIKERT_LABELS.map((lbl, li) => {
              const lid = `resp-${s.id}-${idx}-lik-${li}`;
              const checked = savedVal === lbl ? "checked" : "";
              return `<div class="likert-opt">
                <input type="radio" id="${lid}" name="resp-${s.id}-${idx}" value="${lbl}" ${checked} ${dis}>
                <label for="${lid}">${lbl}</label>
              </div>`;
            }).join("");
            inputHtml = `<div class="response-likert${dis ? " likert-disabled" : ""}">${opts}</div>`;

          } else {
            inputHtml = `<textarea
              id="resp-${s.id}-${idx}"
              class="response-input"
              data-survey-id="${s.id}"
              data-qidx="${idx}"
              placeholder="Write your response..."
              ${dis}
            >${esc(savedVal)}</textarea>`;
          }

          const labelFor = (!q.type || q.type === "text") ? `for="resp-${s.id}-${idx}"` : "";
          return `${sectionHdr}<div class="response-item">
            <label class="response-label" ${labelFor}>Q${idx + 1}: ${esc(q.text)}</label>
            ${inputHtml}
          </div>`;
        }).join("");

        const responseSection = isExpanded && questions.length ? `
          <div class="response-wrap">
            <div class="response-title">Your Response</div>
            ${responseInputs}
            <div class="response-actions">
              <button type="button" class="response-btn" data-survey-id="${s.id}" ${!isOpen || savingSurveyId === s.id ? "disabled" : ""}>
                ${savingSurveyId === s.id ? "Saving..." : (response ? "Update Response" : "Submit Response")}
              </button>
              <span class="${noteClass}">${esc(responseUi?.text || defaultNote)}</span>
            </div>
          </div>
        ` : "";

        const qCount = questions.length;
        const ctaLabel = isExpanded
          ? "Hide"
          : (response ? "Edit response" : (isOpen ? "Respond" : "View"));

        const collapsedSummary = !isExpanded ? `
          <div class="survey-summary">
            <span class="survey-summary__count">${qCount} question${qCount === 1 ? "" : "s"}</span>
            <span class="survey-summary__dot">·</span>
            <span class="survey-summary__note">${esc(defaultNote)}</span>
          </div>
        ` : "";

        const expandedBody = isExpanded ? `
          <div class="survey-body">${renderBody(s.body || "")}</div>
          ${platformChips ? `<div class="platforms">${platformChips}</div>` : ""}
          ${responseSection}
        ` : "";

        return `
          <article class="survey-card ${stateCls} ${isExpanded ? "is-expanded" : ""}">
            <div class="survey-head survey-toggle" data-survey-id="${s.id}" role="button" tabindex="0" aria-expanded="${isExpanded}">
              <div class="survey-head__main">
                <h2 class="survey-title">${esc(s.title || "Untitled Survey")}</h2>
                <div class="badge-row">${stateBadge}</div>
              </div>
              <div class="survey-head__cta">
                <span class="survey-toggle-btn">${ctaLabel}
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </span>
              </div>
            </div>
            ${collapsedSummary}
            ${expandedBody}
            <div class="survey-meta">${esc(s.author || "Admin")} &middot; ${formatDate(s.createdAt)}</div>
          </article>
        `;
      }).join("");
    }

    function emptyStateFor(filterKey, hasSearch) {
      if (hasSearch) return {
        emoji: "🔍",
        title: "Nothing matches that search",
        desc:  "Try a different keyword or clear the search box to see everything again.",
        hint:  "Tip: search hits titles, descriptions, and question text.",
      };
      switch (filterKey) {
        case "awaiting": return {
          emoji: "🎉",
          title: "You're all caught up!",
          desc:  "Every open survey shared with CentralHub has your response.",
          hint:  "Switch to 'Responded' to review what you've submitted.",
        };
        case "responded": return {
          emoji: "📭",
          title: "No responses yet",
          desc:  "You haven't submitted any survey responses. When you do, they'll land here.",
          hint:  "Switch to 'Awaiting your response' to see what's open.",
        };
        case "open": return {
          emoji: "🌱",
          title: "No open surveys right now",
          desc:  "Nothing is currently open for response on CentralHub.",
          hint:  "Check back when HQ publishes a new one.",
        };
        case "closed": return {
          emoji: "🗃️",
          title: "Archive is empty",
          desc:  "No surveys have been closed yet.",
          hint:  "",
        };
        default: return {
          emoji: "📬",
          title: "No surveys shared yet",
          desc:  "When HQ publishes a survey to CentralHub it will appear here.",
          hint:  "",
        };
      }
    }

    function buildResponseDocId(surveyId, uid) {
      return `${surveyId}__${uid}__${PLATFORM_KEY}`;
    }

    function setResponseUi(surveyId, text, isError) {
      if (!text) {
        delete responseUiState[surveyId];
        return;
      }
      responseUiState[surveyId] = { text, isError };
    }

    function normalizeStatus(value) {
      const status = String(value || "published").toLowerCase();
      if (status === "closed") return "closed";
      if (status === "draft") return "draft";
      return "published";
    }

    function getQuestions(raw, arr) {
      if (Array.isArray(arr) && arr.length) {
        return arr.map((q) => {
          if (typeof q === "string") return { type: "text", text: q.trim(), options: [], scale: 5, group: null };
          return { type: q.type || "text", text: (q.text || "").trim(), options: q.options || [], scale: q.scale || 5, group: q.group || null, likertLabels: q.likertLabels || null };
        }).filter((q) => q.text);
      }
      return String(raw || "").split(/\r?\n/).map((t) => t.trim()).filter(Boolean)
        .map((t) => ({ type: "text", text: t, options: [], scale: 5, group: null, likertLabels: null }));
    }

    function sanitizeHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html;
      tmp.querySelectorAll("script,style,iframe,object,embed,form,input,textarea,button,link,meta").forEach((el) => el.remove());
      tmp.querySelectorAll("*").forEach((el) => {
        [...el.attributes].forEach((attr) => {
          if (attr.name.startsWith("on") || attr.name === "action") el.removeAttribute(attr.name);
          if ((attr.name === "href" || attr.name === "src") && /^javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
        });
      });
      return tmp.innerHTML;
    }

    function stripHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html;
      return tmp.textContent || "";
    }

    function renderBody(body) {
      if (!body) return "";
      if (/<[a-z][\s\S]*>/i.test(body)) return sanitizeHtml(body);
      return esc(body).replace(/\n/g, "<br>");
    }

    function formatDate(timestamp) {
      const d = timestamp?.toDate?.();
      if (!d) return "Unknown date";
      return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    }

    function formatDateTime(timestamp) {
      const d = timestamp?.toDate?.();
      if (!d) return "just now";
      return d.toLocaleString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function normalizeAnswers(answers, expectedLength) {
      const arr = Array.isArray(answers) ? answers : [];
      return Array.from({ length: expectedLength }, (_, idx) => String(arr[idx] || "").trim());
    }

    function esc(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
