<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Management - CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <style>
    .page-wrap {
      max-width: 1020px;
      margin: 0 auto;
      padding: 26px 16px 64px;
    }
    .page-hero {
      background: linear-gradient(145deg, #fff 0%, #faf5ff 100%);
      border: 1px solid #e9d5ff;
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      padding: 20px 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-hero h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 5px;
    }
    .page-hero p {
      font-size: 0.87rem;
      color: var(--ink-2);
      line-height: 1.55;
    }

    /* Stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-pill {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 14px 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .stat-pill .sp-num {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-pill .sp-label {
      font-size: 0.74rem;
      color: var(--ink-2);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-pill.sp-ch .sp-num  { color: #0e7490; }
    .stat-pill.sp-th .sp-num  { color: #166534; }
    .stat-pill.sp-ah .sp-num  { color: #3730a3; }
    .stat-pill.sp-tot .sp-num { color: #7c3aed; }

    /* Controls */
    .controls-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }
    .search-box {
      flex: 1;
      min-width: 180px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 0.87rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }
    .search-box:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    .ctrl-select {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 9px;
      padding: 8px 11px;
      font-size: 0.87rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      cursor: pointer;
    }
    .ctrl-select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    /* Table */
    .table-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 13px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: #faf5ff;
      border-bottom: 1px solid #e9d5ff;
    }
    th {
      padding: 11px 14px;
      text-align: left;
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #7c3aed;
      white-space: nowrap;
    }
    td {
      padding: 13px 14px;
      font-size: 0.87rem;
      color: var(--ink);
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #faf5ff; }

    .td-source {
      white-space: nowrap;
    }
    .td-subject {
      font-weight: 600;
      white-space: nowrap;
    }
    .td-message {
      max-width: 320px;
      word-break: break-word;
      color: var(--ink-2);
      line-height: 1.5;
    }
    .td-user {
      white-space: nowrap;
      color: var(--ink-2);
      font-size: 0.82rem;
    }
    .td-date {
      white-space: nowrap;
      color: var(--ink-3);
      font-size: 0.81rem;
      font-family: 'DM Mono', monospace;
    }
    .td-actions {
      white-space: nowrap;
    }

    /* Source chips */
    .src-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .src-ch  { background: #e0f2fe; color: #0e7490; }
    .src-th  { background: #dcfce7; color: #166534; }
    .src-ah  { background: #e0e7ff; color: #3730a3; }

    /* Status badge */
    .status-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .s-new      { background: #fee2e2; color: #991b1b; }
    .s-reviewed { background: #fef9c3; color: #854d0e; }
    .s-done     { background: #dcfce7; color: #166534; }
    .s-other    { background: #f3f4f6; color: #6b7280; }

    /* Action buttons */
    .btn-status {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      transition: background 0.15s, color 0.15s;
    }
    .btn-status:hover { background: #f3f4f6; }
    .btn-del {
      border: 1px solid #fecaca;
      background: #fff;
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      color: #dc2626;
      transition: background 0.15s;
      margin-left: 5px;
    }
    .btn-del:hover { background: #fee2e2; }
    .btn-del[data-confirming="true"] {
      background: #dc2626;
      color: #fff;
      border-color: #dc2626;
    }

    /* Pagination */
    .pagination-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pg-info {
      font-size: 0.83rem;
      color: var(--ink-3);
    }
    .pg-btns {
      display: flex;
      gap: 5px;
    }

    /* Detail modal */
    .detail-pre {
      background: #f8f7f5;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 14px;
      font-size: 0.89rem;
      color: var(--ink);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'DM Sans', sans-serif;
    }
    .detail-meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--ink-2);
    }
    .detail-meta-row span { display: flex; align-items: center; gap: 4px; }
    .status-sel {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ss-btn {
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .ss-btn[data-val="new"]      { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .ss-btn[data-val="reviewed"] { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
    .ss-btn[data-val="done"]     { background: #dcfce7; color: #166534; border-color: #86efac; }
    .ss-btn.active               { border-color: var(--ink); }

    .loading-row {
      text-align: center;
      padding: 40px;
      color: var(--ink-2);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<script src="firebase-config.js"></script>
<!-- SHARED_NAVBAR -->
<script type="module" src="auth-guard.js"></script>

<div class="page-wrap">

  <!-- Hero -->
  <div class="page-hero">
    <div>
      <h1>Feedback Management</h1>
      <p>All feedback submitted from Central Hub, Teachers Hub, and Academic Hub in one place.</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-strip">
    <div class="stat-pill sp-tot">
      <div class="sp-num" id="statTotal">–</div>
      <div class="sp-label">Total</div>
    </div>
    <div class="stat-pill sp-ch">
      <div class="sp-num" id="statCH">–</div>
      <div class="sp-label">Central Hub</div>
    </div>
    <div class="stat-pill sp-th">
      <div class="sp-num" id="statTH">–</div>
      <div class="sp-label">Teachers Hub</div>
    </div>
    <div class="stat-pill sp-ah">
      <div class="sp-num" id="statAH">–</div>
      <div class="sp-label">Academic Hub</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <input type="search" class="search-box" id="searchBox" placeholder="Search by subject, message, or user…">
    <select class="ctrl-select" id="filterSource">
      <option value="">All Sources</option>
      <option value="ch">Central Hub</option>
      <option value="th">Teachers Hub</option>
      <option value="ah">Academic Hub</option>
    </select>
    <select class="ctrl-select" id="filterStatus">
      <option value="">All Statuses</option>
      <option value="new">New</option>
      <option value="reviewed">Reviewed</option>
      <option value="done">Done</option>
    </select>
    <select class="ctrl-select" id="filterSubject">
      <option value="">All Subjects</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Source</th>
          <th>Subject</th>
          <th>Message</th>
          <th>Submitted By</th>
          <th>Date</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="feedbackTbody">
        <tr><td colspan="7" class="loading-row">Loading feedback…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination-row">
    <span class="pg-info" id="pgInfo"></span>
    <div class="pg-btns" id="pgBtns"></div>
  </div>

</div>

<!-- Detail / Edit Modal -->
<div class="modal-overlay" id="detailOverlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
  <div class="modal" style="max-width:560px">
    <div class="modal-head">
      <h2 class="modal-title" id="detailTitle">Feedback Detail</h2>
      <button class="modal-close" id="detailClose" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="detail-meta-row" id="detailMeta" style="margin-bottom:14px"></div>

      <div class="form-group">
        <div class="form-label">Message</div>
        <div class="detail-pre" id="detailMessage"></div>
      </div>

      <div class="form-group" id="statusRow" style="display:none">
        <div class="form-label">Status</div>
        <div class="status-sel" id="statusSel">
          <button class="ss-btn" data-val="new">New</button>
          <button class="ss-btn" data-val="reviewed">Reviewed</button>
          <button class="ss-btn" data-val="done">Done</button>
        </div>
        <div class="modal-error" id="statusErr"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="detailCancel">Close</button>
      <button class="btn-save" id="statusSaveBtn" style="display:none">Save Status</button>
    </div>
  </div>
</div>

<script type="module">
import {
  collection, getDocs, getDoc, doc, updateDoc, deleteDoc,
  query, orderBy, where, limit, startAfter, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const PAGE_SIZE = 25;

let allItems   = [];      // merged, sorted
let filtered   = [];      // after search/filter
let page       = 0;
let detailItem = null;
let pendingStatus = null;
let isAdmin    = false;

/* ── helpers ─────────────────────────────────── */
function fmtDate(ts) {
  if (!ts) return '–';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function statusCls(s) {
  if (!s || s === 'new')  return 's-new';
  if (s === 'reviewed')   return 's-reviewed';
  if (s === 'done')       return 's-done';
  return 's-other';
}
function statusLabel(s) {
  if (!s || s === 'new') return 'New';
  if (s === 'reviewed')  return 'Reviewed';
  if (s === 'done')      return 'Done';
  return s;
}

function srcChip(src) {
  if (src === 'ch') return `<span class="src-chip src-ch">Central Hub</span>`;
  if (src === 'th') return `<span class="src-chip src-th">Teachers Hub</span>`;
  if (src === 'ah') return `<span class="src-chip src-ah">Academic Hub</span>`;
  return '';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── load data ───────────────────────────────── */
async function loadAll() {
  const db = window.db;
  const rows = [];

  // Single canonical `feedbacks` collection (consolidated 2026-05-03).
  // Discriminate by `__src` when present; fall back to field-presence
  // heuristics for legacy docs that pre-date the __src convention.
  try {
    const qFB = query(collection(db, 'feedbacks'), orderBy('createdAt', 'desc'));
    const snapFB = await getDocs(qFB);
    snapFB.forEach(d => {
      const data = d.data();
      let src = data.__src;
      if (!src) {
        // Legacy docs — heuristic:
        //   TH: has 'uid' + 'displayName'
        //   AH: has 'userId' or 'userEmail', no displayName
        //   CH: shouldn't reach here (CH legacy docs lived in `feedback` and
        //        were migrated by merge-feedback-into-feedbacks.js with
        //        __src='centralhub'); treat them as 'th' by default if
        //        a stray doc shows up.
        const isTH = 'displayName' in data || 'uid' in data;
        src = isTH ? 'teachershub' : 'academichub';
      }
      // Map canonical platform names to the short codes the UI uses.
      const shortSrc = src === 'centralhub' ? 'ch'
                     : src === 'teachershub' ? 'th'
                     : src === 'academichub' ? 'ah'
                     : src;
      const ts = data.createdAt || data.timestamp || null;
      rows.push({
        id:        d.id,
        src:       shortSrc,
        subject:   data.subject || '',
        message:   data.message || '',
        user:      data.email || data.userEmail || data.displayName || '–',
        createdAt: ts,
        status:    data.status || null,   // TH/AH may not have status — we can set one
        extra:     data,
      });
    });
  } catch(e) { console.warn('feedbacks fetch failed', e); }

  // Sort by date desc (null last)
  rows.sort((a, b) => {
    const ta = a.createdAt?.toMillis?.() ?? 0;
    const tb = b.createdAt?.toMillis?.() ?? 0;
    return tb - ta;
  });

  allItems = rows;

  // Stats
  document.getElementById('statTotal').textContent = rows.length;
  document.getElementById('statCH').textContent    = rows.filter(r => r.src === 'ch').length;
  document.getElementById('statTH').textContent    = rows.filter(r => r.src === 'th').length;
  document.getElementById('statAH').textContent    = rows.filter(r => r.src === 'ah').length;

  // Populate subject filter
  const subjects = [...new Set(rows.map(r => r.subject).filter(Boolean))].sort();
  const sel = document.getElementById('filterSubject');
  subjects.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });

  applyFilters();
}

/* ── filters ─────────────────────────────────── */
function applyFilters() {
  const q   = document.getElementById('searchBox').value.trim().toLowerCase();
  const src = document.getElementById('filterSource').value;
  const st  = document.getElementById('filterStatus').value;
  const sub = document.getElementById('filterSubject').value;

  filtered = allItems.filter(r => {
    if (src && r.src !== src) return false;
    if (st  && (r.status || 'new') !== st) return false;
    if (sub && r.subject !== sub) return false;
    if (q) {
      const hay = (r.subject + ' ' + r.message + ' ' + r.user).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  page = 0;
  renderTable();
}

/* ── render ──────────────────────────────────── */
function renderTable() {
  const tbody = document.getElementById('feedbackTbody');
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="loading-row" style="color:var(--ink-3)">No feedback found.</td></tr>`;
    document.getElementById('pgInfo').textContent = '';
    document.getElementById('pgBtns').innerHTML = '';
    return;
  }

  tbody.innerHTML = slice.map(r => `
    <tr>
      <td class="td-source">${srcChip(r.src)}</td>
      <td class="td-subject">${esc(r.subject)}</td>
      <td class="td-message">${esc(r.message.length > 140 ? r.message.slice(0,140) + '…' : r.message)}</td>
      <td class="td-user">${esc(r.user)}</td>
      <td class="td-date">${fmtDate(r.createdAt)}</td>
      <td><span class="status-badge ${statusCls(r.status)}">${statusLabel(r.status)}</span></td>
      <td class="td-actions">
        <button class="btn-status" data-id="${esc(r.id)}" data-src="${r.src}">View</button>
        ${isAdmin ? `<button class="btn-del" data-id="${esc(r.id)}" data-src="${r.src}">Delete</button>` : ''}
      </td>
    </tr>
  `).join('');

  // Pagination info
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  document.getElementById('pgInfo').textContent =
    `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total}`;

  // Pagination buttons
  const pgBtns = document.getElementById('pgBtns');
  pgBtns.innerHTML = '';
  for (let i = 0; i < pages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === page ? ' active' : '');
    btn.textContent = i + 1;
    btn.addEventListener('click', () => { page = i; renderTable(); });
    pgBtns.appendChild(btn);
  }

  // Row events
  tbody.querySelectorAll('.btn-status').forEach(btn => {
    btn.addEventListener('click', () => openDetail(btn.dataset.id, btn.dataset.src));
  });
  if (isAdmin) {
    tbody.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', () => handleDelete(btn));
    });
  }
}

/* ── delete ──────────────────────────────────── */
async function handleDelete(btn) {
  if (btn.dataset.confirming === 'true') {
    const id  = btn.dataset.id;
    const src = btn.dataset.src;
    const col = src === 'ch' ? 'feedback' : 'feedbacks';
    try {
      await deleteDoc(doc(window.db, col, id));
      allItems = allItems.filter(r => r.id !== id);
      applyFilters();
    } catch(e) {
      console.error('Delete failed', e);
    }
    return;
  }
  btn.dataset.confirming = 'true';
  btn.textContent = 'Confirm?';
  setTimeout(() => {
    btn.dataset.confirming = 'false';
    btn.textContent = 'Delete';
  }, 3000);
}

/* ── detail modal ────────────────────────────── */
function openDetail(id, src) {
  detailItem = allItems.find(r => r.id === id && r.src === src);
  if (!detailItem) return;

  document.getElementById('detailTitle').textContent = detailItem.subject || 'Feedback Detail';
  document.getElementById('detailMessage').textContent = detailItem.message || '–';

  const meta = document.getElementById('detailMeta');
  meta.innerHTML = `
    <span>${srcChip(detailItem.src)}</span>
    <span>👤 ${esc(detailItem.user)}</span>
    <span>🕐 ${fmtDate(detailItem.createdAt)}</span>
    ${detailItem.page ? `<span>📄 ${esc(detailItem.page)}</span>` : ''}
  `;

  // Status edit: only for CH (has status field) or if admin wants to add
  if (isAdmin) {
    document.getElementById('statusRow').style.display = '';
    document.getElementById('statusSaveBtn').style.display = '';
    pendingStatus = detailItem.status || 'new';
    document.querySelectorAll('.ss-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.val === pendingStatus);
    });
  } else {
    document.getElementById('statusRow').style.display = 'none';
    document.getElementById('statusSaveBtn').style.display = 'none';
  }

  document.getElementById('statusErr').textContent = '';
  document.getElementById('detailOverlay').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detailOverlay').style.display = 'none';
  detailItem = null;
}

/* ── status save ─────────────────────────────── */
async function saveStatus() {
  if (!detailItem || !pendingStatus) return;
  const col = detailItem.src === 'ch' ? 'feedback' : 'feedbacks';
  const saveBtn = document.getElementById('statusSaveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';
  try {
    await updateDoc(doc(window.db, col, detailItem.id), { status: pendingStatus });
    detailItem.status = pendingStatus;
    const item = allItems.find(r => r.id === detailItem.id && r.src === detailItem.src);
    if (item) item.status = pendingStatus;
    renderTable();
    closeDetail();
  } catch(e) {
    document.getElementById('statusErr').textContent = 'Failed to save status. Try again.';
    console.error(e);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Status';
  }
}

/* ── init ─────────────────────────────────────── */
document.addEventListener('authReady', ({ detail: { profile } }) => {
  isAdmin = profile?.role_centralhub === 'central_admin';
  if (!isAdmin) {
    // central_user can view but not delete or change status
  }
  loadAll();

  // Filters
  ['searchBox','filterSource','filterStatus','filterSubject'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener(id === 'searchBox' ? 'input' : 'change', applyFilters);
  });

  // Status buttons in modal
  document.querySelectorAll('.ss-btn').forEach(b => {
    b.addEventListener('click', () => {
      pendingStatus = b.dataset.val;
      document.querySelectorAll('.ss-btn').forEach(x => x.classList.toggle('active', x === b));
    });
  });

  // Modal close
  document.getElementById('statusSaveBtn').addEventListener('click', saveStatus);
  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('detailCancel').addEventListener('click', closeDetail);
  document.getElementById('detailOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detailOverlay')) closeDetail();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });
});
</script>
</body>
</html>
