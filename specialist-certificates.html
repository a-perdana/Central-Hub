<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Specialist Certificates — CentralHub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<style>
:root { --accent: #6c5ce7; --accent-dk: #5a4bd1; --accent-2: #ede9fe; }

.hero {
  background: linear-gradient(135deg, #0a0a1a 0%, #1a1438 55%, #0c1028 100%);
  padding: 36px 40px 32px; position: relative; overflow: hidden;
}
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 12% 80%, rgba(108,92,231,0.22) 0%, transparent 48%); }
.hero-inner { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }
.hero-eyebrow { font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.hero-title { font-family: 'Lora', serif; font-size: 1.6rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
.hero-sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); }

.page-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 40px 80px; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; box-shadow: var(--shadow-sm); transition: box-shadow .2s, transform .2s; }
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.stat-num { font-size: 28px; font-weight: 800; color: var(--ink); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--ink-3); }

.section-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--ink); margin: 28px 0 14px; }

.cert-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; margin-bottom: 40px; }
.cert-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow .2s, transform .2s; }
.cert-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
.cert-card-banner { height: 80px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.cert-card-banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--banner-from, #1e1248) 0%, var(--banner-to, #0c1028) 100%); }
.banner-icon { position: relative; z-index: 1; font-size: 32px; }
.cert-card-body { padding: 18px 18px 14px; }
.cert-domain-tag { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; }
.cert-name { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.cert-meta { font-size: 12px; color: var(--ink-3); margin-bottom: 10px; }
.cert-verify-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); background: var(--paper); padding: 4px 8px; border-radius: 5px; display: inline-block; margin-bottom: 12px; letter-spacing: .04em; }

.domain-progress-list { display: flex; flex-direction: column; gap: 10px; }
.dp-row { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); }
.dp-icon { font-size: 22px; flex-shrink: 0; }
.dp-name { flex: 1; font-size: 13.5px; font-weight: 600; color: var(--ink); }
.dp-bar { flex: 1.2; height: 8px; border-radius: 4px; background: var(--paper); overflow: hidden; }
.dp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent) 0%, #8b5cf6 100%); border-radius: 4px; transition: width .4s ease; }
.dp-count { font-size: 12px; color: var(--ink-3); min-width: 60px; text-align: right; font-weight: 600; }
.dp-badge { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 4px 8px; border-radius: 5px; }
.dp-badge.complete { background: #d1fae5; color: #047857; }
.dp-badge.in-progress { background: var(--accent-2); color: var(--accent-dk); }
.dp-badge.not-started { background: var(--paper); color: var(--ink-3); }

.empty-state { text-align: center; padding: 56px 28px; background: var(--white); border: 1px dashed var(--border); border-radius: 16px; }
.empty-icon { font-size: 42px; margin-bottom: 14px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; max-width: 380px; margin-left: auto; margin-right: auto; line-height: 1.55; }
.empty-cta { display: inline-flex; align-items: center; gap: 7px; padding: 10px 22px; border-radius: 11px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; text-decoration: none; transition: all .18s ease; }
.empty-cta:hover { background: var(--accent-dk); transform: translateY(-1px); }

.skel { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

@media (max-width: 720px) {
  .hero { padding: 28px 22px 26px; }
  .hero-title { font-size: 1.3rem; }
  .page-wrap { padding: 22px 18px 60px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 22px; }
  .stat-card { padding: 14px 12px; }
  .stat-num { font-size: 22px; }
  .cert-grid { grid-template-columns: 1fr; gap: 14px; }
}
</style>
<script type="module" src="auth-guard.js"></script>
</head>
<body>

<!-- SHARED_NAVBAR -->

<div class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Eduversal · HQ Subject Specialist · Certificates</p>
    <h1 class="hero-title">My Certificates</h1>
    <p class="hero-sub">Issued by central_admin once you have demonstrated all competencies in a domain at Lead level.</p>
  </div>
</div>

<div class="page-wrap">

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="skel" style="height:40px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:40px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:40px;"></div></div>
  </div>

  <div class="section-title">🎓 Earned Certificates</div>
  <div class="cert-grid" id="certGrid">
    <div class="skel" style="height:220px;border-radius:18px;"></div>
    <div class="skel" style="height:220px;border-radius:18px;"></div>
  </div>

  <div class="section-title">📊 Domain Progress Towards Certification</div>
  <div class="domain-progress-list" id="domainProgressList">
    <div class="skel" style="height:56px;border-radius:12px;"></div>
    <div class="skel" style="height:56px;border-radius:12px;"></div>
    <div class="skel" style="height:56px;border-radius:12px;"></div>
  </div>

</div>

<script type="module">
import { collection, doc, getDoc, getDocs, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

let uid = '';
let userName = '';
let earned = {};
let myCerts = [];
let DOMAINS = [];   // populated from Firestore (full domain objects)

document.addEventListener('authReady', async ({ detail: { user, profile } }) => {
  uid = user.uid;
  userName = profile?.displayName || user.displayName || 'Specialist';
  await loadFramework();
  await loadData();
  render();
});

async function loadFramework() {
  // The Specialist track keeps domain icons/banner colours in the
  // framework doc itself — no inline duplication needed here.
  const snap = await getDoc(doc(window.db, 'competency_framework', 'specialists'));
  if (!snap.exists()) return;
  const fw = snap.data();
  // Build a unified domain object: framework domains + which competencies belong to them.
  const compsByDomain = {};
  for (const c of (fw.competencies || [])) (compsByDomain[c.domainId] ||= []).push(c.id);
  DOMAINS = (fw.domains || []).map(d => ({
    id: d.id,
    name: d.name,
    icon: d.icon,
    color: '#6c5ce7',
    bannerFrom: '#1a1438',
    bannerTo: '#0c1028',
    comps: (compsByDomain[d.id] || []).sort((a,b) => a.localeCompare(b, undefined, { numeric: true })),
  }));
}

async function loadData() {
  // CH Subject Specialists track their progress under earned_central on
  // the same user_competencies/{uid} doc that TH (earned) and AH
  // (earned_academic) use — see competency-admin.html C.4.B helper.
  const ucSnap = await getDoc(doc(window.db, 'user_competencies', uid));
  if (ucSnap.exists()) earned = ucSnap.data().earned_central || {};

  const certQ = query(
    collection(window.db, 'competency_certificates'),
    where('userId', '==', uid),
    where('platform', '==', 'central'),
    orderBy('issuedAt', 'desc')
  );
  const certSnap = await getDocs(certQ);
  myCerts = certSnap.docs.map(d => ({ id: d.id, ...d.data() }));
}

function getEarnedCount(comps) { return comps.filter(c => earned[c]?.level).length; }
function isLeadOnAll(comps)    { return comps.every(c => earned[c]?.level === 'lead'); }

function render() {
  renderStats();
  renderCerts();
  renderDomainProgress();
}

function renderStats() {
  const totalCerts = myCerts.length;
  let totalComps = 0, earnedCount = 0;
  for (const d of DOMAINS) {
    for (const c of d.comps) {
      totalComps++;
      if (earned[c]?.level) earnedCount++;
    }
  }
  const domainsComplete = DOMAINS.filter(d => isLeadOnAll(d.comps)).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${totalCerts}</div><div class="stat-label">Certificates Issued</div></div>
    <div class="stat-card"><div class="stat-num">${earnedCount}</div><div class="stat-label">Competencies Earned</div></div>
    <div class="stat-card"><div class="stat-num">${domainsComplete}</div><div class="stat-label">Domains Mastered</div></div>
    <div class="stat-card"><div class="stat-num">${totalComps - earnedCount}</div><div class="stat-label">Still to Earn</div></div>
  `;
}

function renderCerts() {
  const grid = document.getElementById('certGrid');
  if (myCerts.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🎓</div>
        <div class="empty-title">No certificates yet</div>
        <div class="empty-sub">Demonstrate every competency in a domain at Lead level and central_admin will issue your certificate.</div>
        <a href="/specialist-portfolio" class="empty-cta">📤 Submit Evidence</a>
      </div>
    `;
    return;
  }
  grid.innerHTML = myCerts.map(cert => {
    const domain = DOMAINS.find(d => d.id === cert.domainId) || {};
    const date = cert.issuedAt?.toDate?.()?.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) || '';
    return `
      <div class="cert-card">
        <div class="cert-card-banner" style="--banner-from:${domain.bannerFrom || '#1e1248'};--banner-to:${domain.bannerTo || '#0c1028'}">
          <div class="banner-icon">${domain.icon || '🎓'}</div>
        </div>
        <div class="cert-card-body">
          <div class="cert-domain-tag" style="color:${domain.color || 'var(--accent)'};">${domain.name || cert.domainName}</div>
          <div class="cert-name">Certificate of Specialist Competency</div>
          <div class="cert-meta">Issued ${date} · ${cert.issuedBy || 'Eduversal'}</div>
          <div class="cert-verify-id">${cert.id.substring(0, 8).toUpperCase()}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderDomainProgress() {
  const list = document.getElementById('domainProgressList');
  list.innerHTML = DOMAINS.map(domain => {
    const earnedInDomain = getEarnedCount(domain.comps);
    const total = domain.comps.length;
    const pct = total ? Math.round((earnedInDomain / total) * 100) : 0;
    const isComplete = isLeadOnAll(domain.comps);
    const hasAny = earnedInDomain > 0;
    const badgeClass = isComplete ? 'complete' : hasAny ? 'in-progress' : 'not-started';
    const badgeLabel = isComplete ? '✓ Certified' : hasAny ? 'In Progress' : 'Not Started';
    return `
      <div class="dp-row">
        <div class="dp-icon">${domain.icon}</div>
        <div class="dp-name">${domain.name}</div>
        <div class="dp-bar"><div class="dp-bar-fill" style="width:${pct}%;"></div></div>
        <div class="dp-count">${earnedInDomain} / ${total}</div>
        <span class="dp-badge ${badgeClass}">${badgeLabel}</span>
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
