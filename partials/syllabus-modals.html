<div class="modal-bg" id="teachSchedModal" role="dialog" aria-modal="true" aria-labelledby="teachSchedTitle">
  <div class="modal-box" style="max-width:1320px;width:98%;max-height:92vh;display:flex;flex-direction:column">
    <div class="modal-head">
      <h3 id="teachSchedTitle" style="margin:0">Teaching Schedule</h3>
      <button class="modal-close" onclick="closeTeachingScheduleModal()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="teachSchedBody" style="overflow-y:auto;flex:1;padding:0;position:relative">
      <!-- populated by JS -->
    </div>
  </div>
</div>
