<!--
  syllabus-modals.html — shared modal markup for all four syllabus pages.
  Injected by build.js wherever the page contains:
    <!-- SYLLABUS_MODALS -->

  Provides:
    - #teachSchedModal — Teaching Schedule + Calendar/Simulation views

  The #syllabusDetailModal and #toast are left inline per page because
  pages render them in different positions and may customise content.
-->

<!-- ===== TEACHING SCHEDULE MODAL ===== -->
<div class="modal-bg" id="teachSchedModal" role="dialog" aria-modal="true" aria-labelledby="teachSchedTitle">
  <div class="modal-box" style="max-width:1100px;width:95%;max-height:90vh;display:flex;flex-direction:column">
    <div class="modal-head">
      <h3 id="teachSchedTitle" style="margin:0">Teaching Schedule</h3>
      <button class="modal-close" onclick="closeTeachingScheduleModal()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="teachSchedBody" style="overflow-y:auto;flex:1;padding:0;position:relative">
      <!-- populated by JS -->
    </div>
  </div>
</div>
