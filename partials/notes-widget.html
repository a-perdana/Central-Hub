<!-- Personal notes widget — injected into index.html by build.js. -->
<style>
  .notes-widget {
    background: #ffffff;
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm, 0 1px 2px rgba(0,0,0,0.04));
  }
  .notes-widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 14px;
    flex-wrap: wrap;
  }
  .notes-widget-title {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink, #111827);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notes-widget-subtitle {
    font-size: 0.78rem;
    color: #6b7280;
    margin-top: 2px;
  }
  .notes-widget-tabs {
    display: flex;
    gap: 4px;
    background: #f3f4f6;
    border-radius: 8px;
    padding: 3px;
  }
  .notes-tab-btn {
    background: transparent;
    border: 0;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
  }
  .notes-tab-btn.is-active {
    background: #ffffff;
    color: #111827;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .notes-tab-btn .tab-count {
    margin-left: 4px;
    color: #9ca3af;
    font-weight: 400;
    font-size: 0.72rem;
  }
  .notes-widget-add {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #6c5ce7;
    color: #fff;
    border: 0;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 120ms ease;
  }
  .notes-widget-add:hover { background: #5a4fcc; }
  .notes-widget-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .notes-widget-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .note-card {
    position: relative;
    border-radius: 10px;
    padding: 14px 14px 36px 14px;
    min-height: 140px;
    font-size: 0.85rem;
    line-height: 1.45;
    color: #1f2937;
    cursor: text;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 1px 1px rgba(0,0,0,0.04);
    transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .note-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.08), 0 2px 3px rgba(0,0,0,0.05);
  }
  @keyframes notePulse {
    0%   { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(108, 92, 231, 0); }
    100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0); }
  }
  .note-card.is-highlight {
    animation: notePulse 1.4s ease-out 1;
  }
  .note-card.is-done {
    opacity: 0.55;
  }
  .note-card.is-done .note-card-title,
  .note-card.is-done .note-card-body {
    text-decoration: line-through;
    text-decoration-color: rgba(0,0,0,0.45);
  }
  .note-card.is-readonly { cursor: default; }
  .note-card.color-yellow { background: #fef9c3; }
  .note-card.color-pink   { background: #fce7f3; }
  .note-card.color-green  { background: #d1fae5; }
  .note-card.color-blue   { background: #dbeafe; }
  .note-card.color-violet { background: #ede9fe; }
  .note-card.color-orange { background: #ffedd5; }

  /* Team (public) notes get a distinct mor-tinted frame so they don't visually
     blend with private notes. Border + top accent strip + faint inner glow. */
  .note-card.is-team {
    border: 1.5px solid rgba(108, 92, 231, 0.45);
    box-shadow:
      0 1px 2px rgba(108, 92, 231, 0.12),
      0 1px 1px rgba(0, 0, 0, 0.04),
      inset 0 0 0 1px rgba(255, 255, 255, 0.4);
  }
  .note-card.is-team::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6c5ce7 0%, #0891b2 100%);
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
  }
  .note-card.is-team:hover {
    box-shadow:
      0 4px 10px rgba(108, 92, 231, 0.18),
      0 2px 3px rgba(0, 0, 0, 0.05),
      inset 0 0 0 1px rgba(255, 255, 255, 0.4);
  }

  /* Private (My Notes) get a softer, dashed neutral frame so they read as
     personal-scratch vs the team-shared frame above. */
  .note-card.is-mine {
    border: 1px dashed rgba(0, 0, 0, 0.12);
  }

  .note-card-toprow {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .note-done-toggle {
    width: 16px;
    height: 16px;
    border: 1.5px solid #6b7280;
    border-radius: 4px;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #047857;
    flex: 0 0 auto;
  }
  .note-done-toggle.is-on {
    background: #047857;
    border-color: #047857;
    color: #fff;
  }
  .note-done-toggle svg { width: 12px; height: 12px; display: block; }
  .note-visibility-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 0.68rem;
    font-weight: 500;
    cursor: pointer;
    background: rgba(255,255,255,0.6);
    color: #374151;
    border: 0;
    margin-left: auto;
  }
  .note-visibility-chip.is-public {
    background: rgba(108, 92, 231, 0.18);
    color: #4c1d95;
  }
  .note-visibility-chip[disabled] { cursor: default; }
  .note-author-chip {
    font-size: 0.68rem;
    color: #6b7280;
    background: rgba(255,255,255,0.6);
    border-radius: 999px;
    padding: 2px 8px;
    margin-left: auto;
  }

  .note-card-title {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 4px;
    color: #111827;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    outline: none;
  }
  .note-card-title:empty::before {
    content: attr(data-placeholder);
    color: #9ca3af;
    font-weight: 400;
  }
  .note-card-body {
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    outline: none;
  }
  .note-card-body:empty::before {
    content: attr(data-placeholder);
    color: #9ca3af;
  }
  /* Expanded mode — overrides line-clamp + lets the card grow */
  .note-card.is-expanded .note-card-body {
    display: block;
    -webkit-line-clamp: unset;
    overflow: visible;
  }
  .note-card.is-expanded {
    /* Push the meta row back into the flow so a long note can grow
       without overlapping the action bar. */
    padding-bottom: 16px;
  }
  .note-card.is-expanded .note-card-meta {
    position: static;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed rgba(0,0,0,0.08);
  }
  .note-readmore-row {
    margin-top: 6px;
    display: none;
  }
  .note-readmore-row.is-on { display: block; }
  .note-readmore-btn {
    background: transparent;
    border: 0;
    padding: 0;
    font: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    color: #4c1d95;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .note-readmore-btn:hover { color: #2e1065; }

  .note-attachments {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .note-attachment {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.7);
    border-radius: 6px;
    padding: 3px 6px 3px 8px;
    font-size: 0.7rem;
    color: #1f2937;
    text-decoration: none;
    max-width: 100%;
  }
  .note-attachment:hover { background: rgba(255,255,255,0.95); }
  .note-attachment-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 110px;
  }
  .note-attachment-remove {
    background: transparent;
    border: 0;
    color: #6b7280;
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1;
    padding: 0 2px;
  }
  .note-attachment-remove:hover { color: #dc2626; }

  .note-card-meta {
    position: absolute;
    bottom: 6px;
    left: 14px;
    right: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.7rem;
    color: #6b7280;
  }
  .note-card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 120ms ease;
  }
  .note-card:hover .note-card-actions,
  .note-card:focus-within .note-card-actions { opacity: 1; }
  .note-action-btn {
    background: rgba(255,255,255,0.6);
    border: 0;
    border-radius: 4px;
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    cursor: pointer;
    color: #374151;
    transition: background 120ms ease;
  }
  .note-action-btn:hover { background: rgba(255,255,255,0.95); }
  .note-action-btn[data-confirming="1"] {
    background: #dc2626;
    color: #fff;
  }
  .note-color-swatches {
    display: none;
    position: absolute;
    bottom: 32px;
    left: 14px;
    right: 14px;
    background: rgba(255,255,255,0.95);
    border-radius: 6px;
    padding: 6px;
    gap: 4px;
    z-index: 2;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .note-color-swatches.is-open { display: flex; flex-wrap: wrap; }
  .note-color-swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.12);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .notes-widget-empty {
    text-align: center;
    padding: 28px 12px;
    color: #9ca3af;
    font-size: 0.88rem;
    grid-column: 1 / -1;
  }
  .notes-widget-empty strong {
    display: block;
    font-size: 0.95rem;
    color: #6b7280;
    margin-bottom: 4px;
  }
  .notes-widget-error {
    grid-column: 1 / -1;
    background: #fef2f2;
    color: #991b1b;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.82rem;
    display: none;
  }
  .notes-widget-error.visible { display: block; }
  .notes-widget-saving {
    font-size: 0.7rem;
    color: #6b7280;
    font-weight: 400;
    margin-left: 8px;
    opacity: 0;
    transition: opacity 120ms ease;
  }
  .notes-widget-saving.is-on { opacity: 1; }
</style>

<section class="notes-widget" role="region" aria-label="Personal notes">
  <div class="notes-widget-header">
    <div>
      <h2 class="notes-widget-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="13" y2="17"/>
        </svg>
        Notes
        <span class="notes-widget-saving" id="notesWidgetSaving">Saving…</span>
      </h2>
      <p class="notes-widget-subtitle" id="notesWidgetSubtitle">Public notes shared across Central Hub</p>
    </div>
    <div class="notes-widget-tabs" id="notesWidgetTabs" role="tablist">
      <button type="button" class="notes-tab-btn" data-tab="mine" role="tab">My Notes <span class="tab-count" id="notesCountMine"></span></button>
      <button type="button" class="notes-tab-btn is-active" data-tab="team" role="tab">Team <span class="tab-count" id="notesCountTeam"></span></button>
    </div>
    <button type="button" class="notes-widget-add" id="notesWidgetAddBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Note
    </button>
  </div>
  <div class="notes-widget-grid" id="notesWidgetGrid" aria-live="polite">
    <div class="notes-widget-empty">Loading…</div>
  </div>
  <div class="notes-widget-error" id="notesWidgetError"></div>
</section>

<script type="module">
  (function bootstrapNotesWidget() {
    if (window.__notesWidgetBooted) return;
    window.__notesWidgetBooted = true;

    function ready(cb) {
      if (window.db && window.currentUser) { cb(); return; }
      // Fire-once guard: authReady is dispatched on BOTH document and window,
      // and we ALSO poll as a fallback. Without this guard the boot could run
      // 2-3× per page-load → click handlers registered multiple times → one
      // "+ New Note" click creates two (or three) notes.
      let fired = false;
      let poll = null;
      const fire = () => {
        if (fired) return;
        fired = true;
        document.removeEventListener('authReady', fire);
        window.removeEventListener('authReady', fire);
        if (poll) { clearInterval(poll); poll = null; }
        cb();
      };
      document.addEventListener('authReady', fire);
      window.addEventListener('authReady', fire);
      let waited = 0;
      poll = setInterval(() => {
        waited += 250;
        if (window.db && window.currentUser) fire();
        else if (waited > 8000) { clearInterval(poll); poll = null; console.warn('[notes] auth never became ready'); }
      }, 250);
    }

    ready(async () => {
      console.log('[notes] booting');
      const [
        { collection, query, where, orderBy, limit, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, arrayUnion, arrayRemove },
        { ref, uploadBytes, getDownloadURL, deleteObject },
      ] = await Promise.all([
        import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"),
        import("https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"),
      ]);

      const db   = window.db;
      const storage = window.storage;
      const uid  = window.currentUser.uid;
      const myDisplayName = window.userProfile?.displayName || window.currentUser?.displayName || window.currentUser?.email || 'Someone';

      const grid = document.getElementById('notesWidgetGrid');
      const addBtn = document.getElementById('notesWidgetAddBtn');
      const errEl  = document.getElementById('notesWidgetError');
      const savingEl = document.getElementById('notesWidgetSaving');
      const tabsEl = document.getElementById('notesWidgetTabs');
      const subtitleEl = document.getElementById('notesWidgetSubtitle');
      const countMineEl = document.getElementById('notesCountMine');
      const countTeamEl = document.getElementById('notesCountTeam');

      const COLOURS = ['yellow', 'pink', 'green', 'blue', 'violet', 'orange'];
      const WIDGET_LIMIT = 12;
      const TEAM_LIMIT   = 12;
      const MAX_FILE_BYTES = 10 * 1024 * 1024;
      let inFlight = 0;
      let activeTab = 'team';
      let mineCache = [];
      let teamCache = [];
      let pendingHighlightId = null;
      // Notes currently being typed in (debounce save in flight). We
      // skip re-rendering these from snapshot so the contentEditable
      // caret + expanded state aren't yanked out from under the user.
      const dirtyNotes = new Set();
      // Cards we've already painted, by id → DOM node. Lets us update
      // metadata (timestamp, attachments) on a card without re-creating
      // it, which would also blow away the caret.
      const cardNodes = new Map();

      const showSaving = (on) => savingEl.classList.toggle('is-on', on);
      const beginWrite = () => { inFlight++; showSaving(true); };
      const endWrite   = () => { inFlight = Math.max(0, inFlight - 1); if (!inFlight) showSaving(false); };
      const showError  = (msg) => {
        errEl.textContent = msg;
        errEl.classList.add('visible');
        setTimeout(() => errEl.classList.remove('visible'), 4500);
      };

      const saveTimers = new Map();
      function scheduleSave(noteId, patch) {
        dirtyNotes.add(noteId);
        clearTimeout(saveTimers.get(noteId));
        saveTimers.set(noteId, setTimeout(async () => {
          try {
            beginWrite();
            await updateDoc(doc(db, 'user_notes', noteId), {
              ...patch,
              updatedAt: serverTimestamp(),
            });
          } catch (err) {
            console.warn('[notes] update failed', err);
            showError('Could not save note. Please try again.');
          } finally {
            endWrite();
            // Hold the dirty flag a hair longer than the snapshot
            // round-trip so the listener can echo our own write
            // without re-rendering the card we're typing in.
            setTimeout(() => dirtyNotes.delete(noteId), 600);
          }
        }, 500));
      }

      // Immediate (non-debounced) save — for toggles where the click IS the intent.
      async function saveNow(noteId, patch) {
        try {
          beginWrite();
          await updateDoc(doc(db, 'user_notes', noteId), { ...patch, updatedAt: serverTimestamp() });
        } catch (err) {
          console.warn('[notes] saveNow failed', err);
          showError('Could not update note.');
        } finally { endWrite(); }
      }

      function fmtRelative(ts) {
        if (!ts || !ts.toDate) return '';
        const d = ts.toDate();
        const diffMs = Date.now() - d.getTime();
        const min = Math.round(diffMs / 60000);
        if (min < 1) return 'just now';
        if (min < 60) return `${min}m ago`;
        const hr = Math.round(min / 60);
        if (hr < 24) return `${hr}h ago`;
        const day = Math.round(hr / 24);
        if (day < 7) return `${day}d ago`;
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
      }

      function fmtSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function safeUrl(url) {
        return /^https?:\/\//i.test(url) ? url : '#';
      }

      async function uploadAttachment(noteId, file) {
        if (file.size > MAX_FILE_BYTES) {
          showError(`"${file.name}" is too large (max 10 MB).`);
          return null;
        }
        const ts = Date.now();
        // Sanitise filename — Storage tolerates most chars but we strip path traversal + slashes.
        const safeName = file.name.replace(/[\/\\?%*:|"<>]/g, '_').slice(0, 120);
        const storagePath = `user_notes/${uid}/${noteId}/${ts}_${safeName}`;
        const r = ref(storage, storagePath);
        await uploadBytes(r, file, { contentType: file.type || undefined });
        const url = await getDownloadURL(r);
        return {
          name: safeName,
          url,
          size: file.size,
          contentType: file.type || 'application/octet-stream',
          path: storagePath,
          addedAt: Date.now(),
        };
      }

      async function attachFiles(noteId, fileList) {
        const files = Array.from(fileList || []);
        if (!files.length) return;
        try {
          beginWrite();
          for (const f of files) {
            const meta = await uploadAttachment(noteId, f);
            if (meta) {
              await updateDoc(doc(db, 'user_notes', noteId), {
                attachments: arrayUnion(meta),
                updatedAt: serverTimestamp(),
              });
            }
          }
        } catch (err) {
          console.warn('[notes] upload failed', err);
          showError('Could not upload file. Please try again.');
        } finally { endWrite(); }
      }

      async function removeAttachment(noteId, attachment) {
        try {
          beginWrite();
          // Storage delete first; then Firestore arrayRemove. If the storage
          // delete fails (e.g. file already gone) we still strip the metadata.
          if (attachment.path) {
            try { await deleteObject(ref(storage, attachment.path)); }
            catch (e) { console.warn('[notes] storage delete failed (continuing)', e); }
          }
          await updateDoc(doc(db, 'user_notes', noteId), {
            attachments: arrayRemove(attachment),
            updatedAt: serverTimestamp(),
          });
        } catch (err) {
          console.warn('[notes] removeAttachment failed', err);
          showError('Could not remove file.');
        } finally { endWrite(); }
      }

      async function deleteNote(noteId, attachments) {
        try {
          beginWrite();
          // Best-effort cleanup of attached files; missing files don't block delete.
          for (const att of (attachments || [])) {
            if (att?.path) {
              try { await deleteObject(ref(storage, att.path)); }
              catch (e) { console.warn('[notes] storage delete failed (continuing)', e); }
            }
          }
          await deleteDoc(doc(db, 'user_notes', noteId));
        } catch (err) {
          console.warn('[notes] delete failed', err);
          showError('Could not delete note.');
        } finally { endWrite(); }
      }

      function renderNote(noteData, noteId, isOwner) {
        const colour = COLOURS.includes(noteData.color) ? noteData.color : 'yellow';
        const card = document.createElement('div');
        card.className = `note-card color-${colour}`;
        card.dataset.id = noteId;
        if (noteData.done) card.classList.add('is-done');
        if (!isOwner) card.classList.add('is-readonly');
        // Visual scope marker: public notes (team) vs private (mine). Distinct
        // frames so the two grids don't blend when a user looks across tabs.
        card.classList.add(noteData.isPublic ? 'is-team' : 'is-mine');

        // Top row: done toggle (owner only) + visibility chip / author chip
        const topRow = document.createElement('div');
        topRow.className = 'note-card-toprow';

        if (isOwner) {
          const doneBtn = document.createElement('button');
          doneBtn.type = 'button';
          doneBtn.className = 'note-done-toggle' + (noteData.done ? ' is-on' : '');
          doneBtn.title = noteData.done ? 'Mark as not done' : 'Mark as done';
          doneBtn.innerHTML = noteData.done
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
            : '';
          doneBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            saveNow(noteId, { done: !noteData.done });
          });
          topRow.appendChild(doneBtn);
        }

        if (isOwner) {
          const visBtn = document.createElement('button');
          visBtn.type = 'button';
          visBtn.className = 'note-visibility-chip' + (noteData.isPublic ? ' is-public' : '');
          visBtn.title = noteData.isPublic ? 'Public — every CH user can read this. Click to make private.' : 'Private — only you can read this. Click to share with all CH users.';
          visBtn.innerHTML = noteData.isPublic
            ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Public'
            : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Private';
          visBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const goingPublic = !noteData.isPublic;
            saveNow(noteId, {
              isPublic: goingPublic,
              userDisplayName: myDisplayName,
            });
            // Follow the card to its new home so the user doesn't
            // wonder where it went. Switch tabs and flag the card so
            // the next render scrolls it briefly into view.
            const targetTab = goingPublic ? 'team' : 'mine';
            if (targetTab !== activeTab) {
              activeTab = targetTab;
              tabsEl.querySelectorAll('.notes-tab-btn').forEach(b => b.classList.toggle('is-active', b.dataset.tab === activeTab));
              subtitleEl.textContent = activeTab === 'mine'
                ? 'Private notes — only you can read these'
                : 'Public notes shared across Central Hub';
              pendingHighlightId = noteId;
              renderActiveTab();
            }
          });
          topRow.appendChild(visBtn);
        } else {
          const authorChip = document.createElement('span');
          authorChip.className = 'note-author-chip';
          authorChip.textContent = noteData.userDisplayName || 'Team member';
          topRow.appendChild(authorChip);
        }

        const title = document.createElement('div');
        title.className = 'note-card-title';
        title.spellcheck = true;
        title.dataset.placeholder = 'Title';
        title.textContent = noteData.title || '';
        if (isOwner) {
          title.contentEditable = 'true';
          title.addEventListener('input', () => {
            scheduleSave(noteId, { title: title.textContent.trim().slice(0, 120) });
          });
        }

        const body = document.createElement('div');
        body.className = 'note-card-body';
        body.spellcheck = true;
        body.dataset.placeholder = 'Write your note…';
        body.textContent = noteData.body || '';

        // Read more / show less row — visibility computed after layout
        // (we don't know if the body actually overflows until it's in
        // the DOM with its real width).
        const readMoreRow = document.createElement('div');
        readMoreRow.className = 'note-readmore-row';
        const readMoreBtn = document.createElement('button');
        readMoreBtn.type = 'button';
        readMoreBtn.className = 'note-readmore-btn';
        readMoreBtn.textContent = 'Read more';
        readMoreRow.appendChild(readMoreBtn);
        readMoreBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const nowExpanded = card.classList.toggle('is-expanded');
          readMoreBtn.textContent = nowExpanded ? 'Show less' : 'Read more';
          // If owner expands, drop the caret at the end of the body
          // so they can keep typing without an extra click.
          if (nowExpanded && isOwner) {
            body.focus();
            try {
              const range = document.createRange();
              range.selectNodeContents(body);
              range.collapse(false);
              const s = window.getSelection();
              s.removeAllRanges();
              s.addRange(range);
            } catch (_) { /* best-effort */ }
          }
        });

        if (isOwner) {
          body.contentEditable = 'true';
          // Focusing the body to type → expand immediately so the
          // user never has to click "Read more" first.
          body.addEventListener('focus', () => {
            if (!card.classList.contains('is-expanded')) {
              card.classList.add('is-expanded');
              readMoreBtn.textContent = 'Show less';
            }
          });
          body.addEventListener('input', () => {
            scheduleSave(noteId, { body: body.textContent.slice(0, 4000) });
            // Make sure expanded stays on while typing (defence-in-depth
            // in case some upstream code collapsed it).
            if (!card.classList.contains('is-expanded')) {
              card.classList.add('is-expanded');
              readMoreBtn.textContent = 'Show less';
            }
          });
          // Re-check overflow after edits stop (so a shrinking note hides the link).
          body.addEventListener('blur', () => {
            setTimeout(() => recheckOverflow(card, body, readMoreRow, readMoreBtn), 30);
          });
        }
        // Track for after-mount overflow check
        card._notesOverflow = { body, row: readMoreRow, btn: readMoreBtn };

        // Attachments
        const attachments = Array.isArray(noteData.attachments) ? noteData.attachments : [];
        let attachmentsEl = null;
        if (attachments.length) {
          attachmentsEl = document.createElement('div');
          attachmentsEl.className = 'note-attachments';
          attachments.forEach(att => {
            const link = document.createElement('a');
            link.className = 'note-attachment';
            link.href = safeUrl(att.url);
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.title = `${att.name} · ${fmtSize(att.size || 0)}`;
            link.innerHTML = `
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
              <span class="note-attachment-name">${att.name}</span>`;
            if (isOwner) {
              const rm = document.createElement('button');
              rm.type = 'button';
              rm.className = 'note-attachment-remove';
              rm.title = 'Remove file';
              rm.textContent = '×';
              rm.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (rm.dataset.confirming !== '1') {
                  rm.dataset.confirming = '1';
                  rm.title = 'Click again to remove';
                  setTimeout(() => { delete rm.dataset.confirming; rm.title = 'Remove file'; }, 3000);
                  return;
                }
                delete rm.dataset.confirming;
                removeAttachment(noteId, att);
              });
              link.appendChild(rm);
            }
            attachmentsEl.appendChild(link);
          });
        }

        const meta = document.createElement('div');
        meta.className = 'note-card-meta';
        const stamp = document.createElement('span');
        stamp.textContent = fmtRelative(noteData.updatedAt || noteData.createdAt);
        const actions = document.createElement('div');
        actions.className = 'note-card-actions';

        if (isOwner) {
          // Colour swatches popover
          const swatches = document.createElement('div');
          swatches.className = 'note-color-swatches';
          COLOURS.forEach(c => {
            const sw = document.createElement('button');
            sw.type = 'button';
            sw.className = 'note-color-swatch';
            const fallback = { yellow:'#fef9c3', pink:'#fce7f3', green:'#d1fae5', blue:'#dbeafe', violet:'#ede9fe', orange:'#ffedd5' };
            sw.style.background = fallback[c];
            sw.title = c;
            sw.addEventListener('click', (e) => {
              e.stopPropagation();
              swatches.classList.remove('is-open');
              saveNow(noteId, { color: c });
            });
            swatches.appendChild(sw);
          });
          card.appendChild(swatches);

          const colourBtn = document.createElement('button');
          colourBtn.type = 'button';
          colourBtn.className = 'note-action-btn';
          colourBtn.title = 'Colour';
          colourBtn.textContent = '🎨';
          colourBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            swatches.classList.toggle('is-open');
          });

          // Hidden file input + attach button
          const fileInput = document.createElement('input');
          fileInput.type = 'file';
          fileInput.multiple = true;
          fileInput.style.display = 'none';
          fileInput.addEventListener('change', () => {
            attachFiles(noteId, fileInput.files);
            fileInput.value = '';
          });
          const attachBtn = document.createElement('button');
          attachBtn.type = 'button';
          attachBtn.className = 'note-action-btn';
          attachBtn.title = 'Attach file (max 10 MB)';
          attachBtn.innerHTML = '📎';
          attachBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
          });

          const delBtn = document.createElement('button');
          delBtn.type = 'button';
          delBtn.className = 'note-action-btn';
          delBtn.title = 'Delete';
          delBtn.textContent = '✕';
          delBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (delBtn.dataset.confirming !== '1') {
              delBtn.dataset.confirming = '1';
              delBtn.title = 'Click again to delete';
              setTimeout(() => { delete delBtn.dataset.confirming; delBtn.title = 'Delete'; }, 3000);
              return;
            }
            delete delBtn.dataset.confirming;
            await deleteNote(noteId, attachments);
          });

          actions.appendChild(attachBtn);
          actions.appendChild(colourBtn);
          actions.appendChild(delBtn);
          card.appendChild(fileInput);

          card.addEventListener('click', (e) => {
            if (!swatches.contains(e.target) && e.target !== colourBtn) {
              swatches.classList.remove('is-open');
            }
          });
        }

        meta.appendChild(stamp);
        meta.appendChild(actions);

        card.appendChild(topRow);
        card.appendChild(title);
        card.appendChild(body);
        card.appendChild(readMoreRow);
        if (attachmentsEl) card.appendChild(attachmentsEl);
        card.appendChild(meta);

        return card;
      }

      // Show "Read more" only when the body is actually clipped by the
      // line-clamp. Called after each render once cards are in the DOM
      // (line-clamp + overflow are CSS-layout dependent — can't compute
      // before mount).
      function recheckOverflow(card, body, row, btn) {
        if (card.classList.contains('is-expanded')) {
          // Already expanded — keep the button so user can collapse again,
          // but only if there's enough content to actually need clamping.
          // We measure by temporarily collapsing.
          card.classList.remove('is-expanded');
          const overflows = body.scrollHeight > body.clientHeight + 2;
          card.classList.add('is-expanded');
          row.classList.toggle('is-on', overflows);
          btn.textContent = 'Show less';
        } else {
          const overflows = body.scrollHeight > body.clientHeight + 2;
          row.classList.toggle('is-on', overflows);
          btn.textContent = 'Read more';
        }
      }
      function recheckAllOverflows() {
        grid.querySelectorAll('.note-card').forEach(card => {
          const o = card._notesOverflow;
          if (o) recheckOverflow(card, o.body, o.row, o.btn);
        });
      }

      function renderEmpty(msg) {
        const empty = document.createElement('div');
        empty.className = 'notes-widget-empty';
        empty.innerHTML = msg;
        return empty;
      }

      function renderActiveTab() {
        // Capture currently-focused card so caret survives the re-render.
        const focused = document.activeElement;
        const focusedId = focused?.closest?.('.note-card')?.dataset?.id;
        const focusedRole = focused?.classList?.contains('note-card-title') ? 'title'
          : focused?.classList?.contains('note-card-body') ? 'body' : null;
        const sel = window.getSelection();
        const cursorOffset = sel && sel.focusNode ? sel.focusOffset : 0;

        // Detach (don't destroy) any cards we're actively typing in,
        // so we can re-attach them in their new position without
        // clobbering the contentEditable state.
        const detached = new Map();
        dirtyNotes.forEach(id => {
          const node = cardNodes.get(id);
          if (node && node.parentNode === grid) {
            grid.removeChild(node);
            detached.set(id, node);
          }
        });

        grid.innerHTML = '';
        cardNodes.clear();

        let list;
        if (activeTab === 'mine') {
          // My Notes shows ONLY my private notes. Once a note is made
          // public it moves to the Team tab so the two views never
          // double-count it.
          list = mineCache.filter(({ data }) => !data.isPublic).map(x => ({ ...x, isOwner: true }));
          if (!list.length) {
            grid.appendChild(renderEmpty('<strong>No private notes</strong>Click "New Note" to jot down something quickly. Public notes show up in the Team tab.'));
          }
        } else {
          // Team tab shows all public notes — including my own. Owner
          // controls (edit / colour / attach / delete) stay live for
          // the cards I own; other people's cards render read-only.
          list = teamCache.map(x => ({ ...x, isOwner: x.data.userId === uid }));
          if (!list.length) {
            grid.appendChild(renderEmpty('<strong>No team notes yet</strong>Toggle a note to Public (or wait for a teammate) to populate this tab.'));
          }
        }

        list.forEach(({ id, data, isOwner }) => {
          // Reuse the in-progress edit node if we have one — preserves
          // the contentEditable caret + any local "is-expanded" state.
          const reused = detached.get(id);
          const node = reused || renderNote(data, id, isOwner);
          if (reused) detached.delete(id);
          grid.appendChild(node);
          cardNodes.set(id, node);
        });

        // Anything left in `detached` is a card the new snapshot dropped
        // (e.g. note made public while on My Notes). Discard.
        detached.forEach(node => { /* GC'd */ });

        // After mount: decide which cards actually overflow + reveal "Read more".
        // requestAnimationFrame so layout has settled (line-clamp needs render pass).
        requestAnimationFrame(recheckAllOverflows);

        // Brief pulse on a card that just moved tabs (visibility toggle).
        if (pendingHighlightId) {
          const moved = grid.querySelector(`.note-card[data-id="${pendingHighlightId}"]`);
          if (moved) {
            moved.classList.add('is-highlight');
            moved.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            setTimeout(() => moved.classList.remove('is-highlight'), 1500);
          }
          pendingHighlightId = null;
        }

        // Restore focus + caret (only when a card I own is focused).
        if (focusedId && focusedRole) {
          const card = grid.querySelector(`.note-card[data-id="${focusedId}"]`);
          const target = card?.querySelector(focusedRole === 'title' ? '.note-card-title' : '.note-card-body');
          if (target) {
            target.focus();
            try {
              const range = document.createRange();
              const node = target.firstChild || target;
              const max = node.textContent ? node.textContent.length : 0;
              range.setStart(node, Math.min(cursorOffset, max));
              range.collapse(true);
              sel.removeAllRanges();
              sel.addRange(range);
            } catch (_) { /* best-effort */ }
          }
        }
      }

      function updateCounts() {
        const privateOnly = mineCache.filter(({ data }) => !data.isPublic).length;
        countMineEl.textContent = privateOnly ? `(${privateOnly})` : '';
        countTeamEl.textContent = teamCache.length ? `(${teamCache.length})` : '';
      }

      // -- Subscriptions ----------------------------------------------------
      // Sort: pinned first, then not-done before done, then most-recent.
      // Composite index `(userId, pinned desc, done asc, updatedAt desc)`.
      const myQuery = query(
        collection(db, 'user_notes'),
        where('userId', '==', uid),
        orderBy('pinned', 'desc'),
        orderBy('done', 'asc'),
        orderBy('updatedAt', 'desc'),
        limit(WIDGET_LIMIT)
      );

      // Public notes feed — anyone CH-wide. Index `(isPublic, updatedAt desc)`.
      const teamQuery = query(
        collection(db, 'user_notes'),
        where('isPublic', '==', true),
        orderBy('updatedAt', 'desc'),
        limit(TEAM_LIMIT)
      );

      let firstMineSnap = true;
      let firstTeamSnap = true;
      const stuckTimer = setTimeout(() => {
        // Show "still loading" only if the snapshot driving the
        // currently-visible tab hasn't arrived yet.
        const stuck = (activeTab === 'mine' && firstMineSnap) || (activeTab === 'team' && firstTeamSnap);
        if (stuck) {
          console.warn('[notes] no snapshot in 6s — index likely still building or query rejected');
          grid.innerHTML = '';
          grid.appendChild(renderEmpty('<strong>Still loading…</strong>The Firestore index may still be building (1–5 min after first deploy). Try refreshing in a minute.'));
        }
      }, 6000);

      onSnapshot(myQuery, (snap) => {
        firstMineSnap = false;
        if (activeTab === 'mine') clearTimeout(stuckTimer);
        mineCache = snap.docs.map(d => ({ id: d.id, data: d.data() }));
        updateCounts();
        if (activeTab === 'mine') renderActiveTab();
      }, (err) => {
        console.warn('[notes] my-notes subscription failed', err);
        const isIndex = /index|requires an index/i.test(err?.message || '');
        const isPerm  = /permission|insufficient/i.test(err?.message || '');
        let msg = 'Check your connection and refresh.';
        if (isIndex) msg = 'Firestore index is still building (this can take 1–5 minutes after deploy). Refresh shortly.';
        else if (isPerm) msg = 'Firestore rule rejected the read. Check that user_notes rules are deployed.';
        if (activeTab === 'mine') {
          grid.innerHTML = '';
          grid.appendChild(renderEmpty(`<strong>Could not load notes</strong>${msg}`));
        }
      });

      onSnapshot(teamQuery, (snap) => {
        firstTeamSnap = false;
        if (activeTab === 'team') clearTimeout(stuckTimer);
        teamCache = snap.docs.map(d => ({ id: d.id, data: d.data() }));
        updateCounts();
        if (activeTab === 'team') renderActiveTab();
      }, (err) => {
        console.warn('[notes] team-notes subscription failed', err);
        if (activeTab === 'team') {
          grid.innerHTML = '';
          grid.appendChild(renderEmpty('<strong>Could not load team notes</strong>Check your connection and refresh.'));
        }
      });

      // Window resize → cards may rewrap to fewer/more lines
      let resizeTimer = null;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(recheckAllOverflows, 150);
      });

      // -- Tab switching ----------------------------------------------------
      tabsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.notes-tab-btn');
        if (!btn) return;
        const tab = btn.dataset.tab;
        if (!tab || tab === activeTab) return;
        activeTab = tab;
        tabsEl.querySelectorAll('.notes-tab-btn').forEach(b => b.classList.toggle('is-active', b.dataset.tab === activeTab));
        subtitleEl.textContent = activeTab === 'mine'
          ? 'Private notes — only you can read these'
          : 'Public notes shared across Central Hub';
        renderActiveTab();
      });

      // -- Add note ---------------------------------------------------------
      addBtn.addEventListener('click', async () => {
        addBtn.disabled = true;
        // New note inherits the active tab's scope: clicking "+ New Note"
        // while viewing Team creates a public/shared note (so it shows up
        // right there); on My Notes it creates a private one as before.
        const createPublic = activeTab === 'team';
        try {
          beginWrite();
          await addDoc(collection(db, 'user_notes'), {
            userId: uid,
            userDisplayName: myDisplayName,
            title: '',
            body: '',
            color: 'yellow',
            pinned: false,
            done: false,
            isPublic: createPublic,
            attachments: [],
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
          });
          setTimeout(() => {
            const newest = grid.querySelector('.note-card .note-card-body');
            if (newest) newest.focus();
          }, 250);
        } catch (err) {
          console.warn('[notes] create failed', err);
          showError('Could not create note. Please try again.');
        } finally {
          endWrite();
          addBtn.disabled = false;
        }
      });
    });
  })();
</script>
