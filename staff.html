<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    /* PAGE */
    .page-content { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* Staff-specific toolbar */
    .filter-select { padding: 9px 12px; background: var(--white); box-shadow: var(--shadow-sm); }
    .staff-count { font-size: 0.85rem; color: var(--ink-3); padding: 0 4px; }
    .btn-add { display: none; flex-shrink: 0; }

    /* Staff table overrides */
    th { cursor: pointer; user-select: none; }
    .staff-name-cell { display: flex; align-items: center; gap: 10px; }
    .staff-name { font-weight: 500; }
    .staff-email { font-size: 0.78rem; color: var(--ink-3); font-family: 'DM Mono', monospace; }
    .td-actions { display: flex; gap: 6px; }

    /* Staff badges */
    .badge-violet { background: #ede9fe; color: #5b21b6; }

    /* Level mini-chips: small inline tag for SMP/SMA/SD/KG/PG */
    .level-chip-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .level-chip {
      display: inline-flex; align-items: center; padding: 2px 7px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.02em;
      background: #f1f5f9; color: var(--ink-2);
      border-radius: 4px; line-height: 1.4;
    }

    /* Linked / Not-yet badges */
    .badge-linked  { background: #dcfce7; color: #166534; }
    .badge-invited { background: #fef3c7; color: #92400e; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .page-content { padding: 20px 16px; }
      table { font-size: 0.82rem; }
      th, td { padding: 10px 10px; }
      .staff-email { display: none; }
    }
    @media (max-width: 560px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-search { min-width: 0; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- SHARED_NAVBAR -->

<div class="page-content">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-search">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="search" placeholder="Search by name, email, school…" aria-label="Search staff">
    </div>
    <select class="filter-select" id="schoolFilter" aria-label="Filter by school"><option value="">All schools</option></select>
    <select class="filter-select" id="roleFilter" aria-label="Filter by role">
      <option value="">All roles</option>
      <option value="teacher">Teacher</option>
      <option value="admin">Admin</option>
      <option value="staff">Staff</option>
      <option value="coordinator">Coordinator</option>
    </select>
    <select class="filter-select" id="statusFilter" aria-label="Filter by status">
      <option value="">All statuses</option>
      <option value="active">Active</option>
      <option value="pending">Pending</option>
      <option value="inactive">Inactive</option>
    </select>
    <select class="filter-select" id="levelFilter" aria-label="Filter by level">
      <option value="">All levels</option>
      <option value="PG">PG</option>
      <option value="KG">KG</option>
      <option value="SD">SD</option>
      <option value="SMP">SMP</option>
      <option value="SMA">SMA</option>
    </select>
    <select class="filter-select" id="linkedFilter" aria-label="Filter by linked status">
      <option value="">All link states</option>
      <option value="linked">Linked</option>
      <option value="invited">Not yet linked</option>
    </select>
    <span class="staff-count" id="staffCount"></span>
    <button class="btn-add" id="addStaffBtn" aria-label="Add staff member">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Staff
    </button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table aria-label="Staff directory">
      <thead>
        <tr>
          <th data-sort="name">Name ↕</th>
          <th data-sort="role">Role ↕</th>
          <th data-sort="school">School ↕</th>
          <th>Department</th>
          <th>Levels</th>
          <th data-sort="status">Status ↕</th>
          <th>Linked</th>
          <th id="actionsHeader" style="display:none">Actions</th>
        </tr>
      </thead>
      <tbody id="staffBody">
        <tr><td colspan="8" style="padding:48px;text-align:center;color:var(--ink-3)">
          <span class="skel" style="height:16px;width:60%;display:block;margin:auto"></span>
        </td></tr>
      </tbody>
    </table>
    <div class="pagination" id="staffPagination"></div>
  </div>

</div>

<!-- ADD / EDIT DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <div class="drawer">
    <div class="drawer-head">
      <h3 id="drawerTitle">Add Staff Member</h3>
      <button class="drawer-close" id="drawerClose" aria-label="Close">&#215;</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-error" id="drawerError" role="alert"></div>
      <div class="form-group">
        <label class="form-label" for="fieldName">Full Name *</label>
        <input class="form-input" id="fieldName" placeholder="e.g. Budi Santoso">
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldEmail">Email *</label>
        <input class="form-input" type="email" id="fieldEmail" placeholder="budi@eduversal.org">
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldSchool">School *</label>
        <select class="form-select" id="fieldSchool">
          <option value="">Select school…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldRole">Role *</label>
        <select class="form-select" id="fieldRole">
          <option value="teacher">Teacher</option>
          <option value="admin">Admin</option>
          <option value="staff">Staff</option>
          <option value="coordinator">Coordinator</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldDept">Department</label>
        <input class="form-input" id="fieldDept" placeholder="e.g. Mathematics, Science…">
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldStatus">Status</label>
        <select class="form-select" id="fieldStatus">
          <option value="active">Active</option>
          <option value="pending">Pending</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-save"   id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
  import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc as fsDoc, query, orderBy, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  let db;
  let allStaff    = [];
  let allSchools  = [];
  let isAdmin     = false;
  let editingId   = null;
  let sortKey     = 'name';
  let sortAsc     = true;
  let staffPage   = 1;
  const STAFF_PAGE_SIZE = 25;

  const ROLE_BADGE = {
    teacher:     '<span class="badge badge-teal">Teacher</span>',
    admin:       '<span class="badge badge-violet">Admin</span>',
    staff:       '<span class="badge badge-amber">Staff</span>',
    coordinator: '<span class="badge badge-green">Coordinator</span>',
  };
  const STATUS_BADGE = {
    active:   '<span class="badge badge-teal">Active</span>',
    pending:  '<span class="badge badge-amber">Pending</span>',
    inactive: '<span class="badge badge-red">Inactive</span>',
  };

  document.addEventListener('authReady', async ({ detail: { profile } }) => {
    db = window.db;
    isAdmin = profile.role === 'central_admin';
    if (isAdmin) {
      document.getElementById('addStaffBtn').style.display = 'flex';
      document.getElementById('actionsHeader').style.display = '';
    }
    await Promise.all([loadSchools(), loadStaff()]);
    bindEvents();
  });

  async function loadSchools() {
    const snap = await getDocs(query(collection(db, 'partner_schools'), orderBy('name')));
    allSchools = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Filter options keep `name` as value (so existing free-text staff docs
    // still match in applyFilters). Drawer options use `id` as value so we
    // can write a real `schoolId` FK on save.
    const filterOptions = allSchools.map(s => `<option value="${esc(s.name)}">${esc(s.name)}</option>`).join('');
    const drawerOptions = allSchools.map(s => `<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('');
    document.getElementById('schoolFilter').insertAdjacentHTML('beforeend', filterOptions);
    document.getElementById('fieldSchool').insertAdjacentHTML('beforeend', drawerOptions);
  }

  async function loadStaff() {
    try {
      // @lint-allow-unbounded — auto-annotated; revisit if collection grows large
      const snap = await getDocs(collection(db, 'staff'));
      allStaff = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      applyFilters();
    } catch(e) {
      document.getElementById('staffBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--ink-3)">Could not load staff data.</td></tr>';
    }
  }

  function bindEvents() {
    // Filter changes always reset to page 1 — otherwise narrowing the
    // result set leaves the user on a now-empty page.
    ['searchInput','schoolFilter','roleFilter','statusFilter','levelFilter','linkedFilter'].forEach(id =>
      document.getElementById(id).addEventListener('input', () => { staffPage = 1; applyFilters(); }));
    document.querySelectorAll('th[data-sort]').forEach(th =>
      th.addEventListener('click', () => {
        const k = th.dataset.sort;
        sortAsc = sortKey === k ? !sortAsc : true;
        sortKey = k;
        document.querySelectorAll('th[data-sort]').forEach(t => t.classList.remove('sorted'));
        th.classList.add('sorted');
        applyFilters();
      })
    );
    document.getElementById('addStaffBtn').addEventListener('click', openAddDrawer);
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('cancelBtn').addEventListener('click', closeDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDrawer(); });
    document.getElementById('saveBtn').addEventListener('click', saveStaff);
  }

  function applyFilters() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    const sc  = document.getElementById('schoolFilter').value;
    const ro  = document.getElementById('roleFilter').value;
    const st  = document.getElementById('statusFilter').value;
    const lv  = document.getElementById('levelFilter').value;
    const lk  = document.getElementById('linkedFilter').value;
    let list = allStaff.filter(s =>
      (!q  || s.name?.toLowerCase().includes(q) || s.email?.toLowerCase().includes(q) || s.school?.toLowerCase().includes(q)) &&
      (!sc || s.school === sc) &&
      (!ro || s.role   === ro) &&
      (!st || s.status === st) &&
      (!lv || (Array.isArray(s.levels) && s.levels.includes(lv))) &&
      (!lk
        || (lk === 'linked'  && !!s.userId)
        || (lk === 'invited' && !s.userId))
    ).sort((a, b) => {
      const va = (a[sortKey] || '').toLowerCase();
      const vb = (b[sortKey] || '').toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    // Clamp page if filter shrunk the result set (e.g. user was on
    // page 12 then typed a query that returns 30 rows).
    const totalPages = Math.max(1, Math.ceil(list.length / STAFF_PAGE_SIZE));
    if (staffPage > totalPages) staffPage = totalPages;

    const start = (staffPage - 1) * STAFF_PAGE_SIZE;
    const pageRows = list.slice(start, start + STAFF_PAGE_SIZE);

    const countEl = document.getElementById('staffCount');
    if (list.length === 0) {
      countEl.textContent = '0 members';
    } else {
      const rangeEnd = Math.min(start + STAFF_PAGE_SIZE, list.length);
      countEl.textContent = `Showing ${start + 1}–${rangeEnd} of ${list.length}`;
    }

    renderTable(pageRows);
    renderPagination(list.length, totalPages);
  }

  function renderPagination(total, totalPages) {
    const el = document.getElementById('staffPagination');
    if (total <= STAFF_PAGE_SIZE) { el.innerHTML = ''; return; }

    // Build a windowed page list — first, last, and a slice around the
    // current page — so 463 rows / 25 (=19 pages) doesn't render 19
    // buttons in a row on small screens.
    const pages = new Set([1, totalPages]);
    for (let p = staffPage - 2; p <= staffPage + 2; p++) {
      if (p > 1 && p < totalPages) pages.add(p);
    }
    const sorted = [...pages].sort((a, b) => a - b);

    let html = '';
    html += `<button class="page-btn" ${staffPage === 1 ? 'disabled' : ''} data-page="${staffPage - 1}">‹ Prev</button>`;
    let prev = 0;
    for (const p of sorted) {
      if (prev && p > prev + 1) html += `<span class="page-btn" style="border:none;background:transparent;cursor:default">…</span>`;
      const cls = p === staffPage ? 'page-btn active' : 'page-btn';
      html += `<button class="${cls}" data-page="${p}">${p}</button>`;
      prev = p;
    }
    html += `<button class="page-btn" ${staffPage === totalPages ? 'disabled' : ''} data-page="${staffPage + 1}">Next ›</button>`;
    el.innerHTML = html;

    el.querySelectorAll('button[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = Number(btn.dataset.page);
        if (target >= 1 && target <= totalPages && target !== staffPage) {
          staffPage = target;
          applyFilters();
          // Scroll the table-wrap (not the page) so the user sees the new
          // top row after clicking a page button.
          document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  }

  function renderTable(list) {
    const body = document.getElementById('staffBody');
    if (!list.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="8">No staff members match your filters.</td></tr>';
      return;
    }
    body.innerHTML = list.map(s => {
      const initials = s.name ? s.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() : '??';
      const actions  = isAdmin ? `
        <td><div class="td-actions">
          <button class="btn-action" onclick="editStaff('${s.id}')">Edit</button>
          <button class="btn-action btn-action-del" onclick="deleteStaff('${s.id}')">Delete</button>
        </div></td>` : '';
      const levelsHtml = Array.isArray(s.levels) && s.levels.length
        ? `<div class="level-chip-row">${s.levels.map(l => `<span class="level-chip">${esc(l)}</span>`).join('')}</div>`
        : '<span style="color:var(--ink-3)">—</span>';
      const linkedHtml = s.userId
        ? '<span class="badge badge-linked">Linked</span>'
        : '<span class="badge badge-invited">Not yet</span>';
      return `
        <tr>
          <td>
            <div class="staff-name-cell">
              <div class="staff-avatar" aria-hidden="true">${initials}</div>
              <div>
                <p class="staff-name">${esc(s.name||'—')}</p>
                <p class="staff-email">${esc(s.email||'')}</p>
              </div>
            </div>
          </td>
          <td>${ROLE_BADGE[s.role] || esc(s.role||'—')}</td>
          <td>${esc(s.school||'—')}</td>
          <td>${esc(s.department||'—')}</td>
          <td>${levelsHtml}</td>
          <td>${STATUS_BADGE[s.status] || esc(s.status||'—')}</td>
          <td>${linkedHtml}</td>
          ${actions}
        </tr>`;
    }).join('');
  }

  // ===== Delete =====
  async function deleteStaff(id) {
    if (!confirm('Remove this staff member? This cannot be undone.')) return;
    await deleteDoc(fsDoc(db, 'staff', id));
    allStaff = allStaff.filter(s => s.id !== id);
    applyFilters();
  }

  // ===== Drawer =====
  function openAddDrawer() {
    editingId = null;
    document.getElementById('drawerTitle').textContent = 'Add Staff Member';
    ['fieldName','fieldEmail','fieldDept'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fieldSchool').value = '';
    document.getElementById('fieldRole').value   = 'teacher';
    document.getElementById('fieldStatus').value = 'active';
    hideErr();
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('fieldName').focus();
  }

  function editStaff(id) {
    const s = allStaff.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('drawerTitle').textContent  = 'Edit Staff Member';
    document.getElementById('fieldName').value   = s.name       || '';
    document.getElementById('fieldEmail').value  = s.email      || '';
    // Prefer the FK schoolId; fall back to a name lookup for legacy docs
    // that only have the free-text `school` field.
    const editingSchoolId = s.schoolId
      || (allSchools.find(x => x.name === s.school)?.id || '');
    document.getElementById('fieldSchool').value = editingSchoolId;
    document.getElementById('fieldRole').value   = s.role       || 'teacher';
    document.getElementById('fieldDept').value   = s.department || '';
    document.getElementById('fieldStatus').value = s.status     || 'active';
    hideErr();
    document.getElementById('drawerOverlay').classList.add('open');
  }

  function closeDrawer() { document.getElementById('drawerOverlay').classList.remove('open'); }
  function showErr(m)    { const e=document.getElementById('drawerError'); e.textContent=m; e.classList.add('visible'); }
  function hideErr()     { document.getElementById('drawerError').classList.remove('visible'); }

  async function saveStaff() {
    const name     = document.getElementById('fieldName').value.trim();
    const email    = document.getElementById('fieldEmail').value.trim();
    const schoolId = document.getElementById('fieldSchool').value;
    if (!name || !email || !schoolId) { showErr('Name, email, and school are required.'); return; }

    // schoolId is the canonical FK; school is the denormalised display name
    // so list/filter/search code that doesn't join can still render it.
    const schoolDoc = allSchools.find(s => s.id === schoolId);
    const schoolName = schoolDoc?.name || '';

    const data = {
      name, email,
      schoolId,
      school: schoolName,
      role:       document.getElementById('fieldRole').value,
      department: document.getElementById('fieldDept').value.trim(),
      status:     document.getElementById('fieldStatus').value,
    };
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      if (editingId) {
        await updateDoc(fsDoc(db, 'staff', editingId), data);
      } else {
        data.createdAt = serverTimestamp();
        const ref = await addDoc(collection(db, 'staff'), data);
        data.id = ref.id;
      }
      closeDrawer();
      await loadStaff();
    } catch(e) {
      showErr(e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Save';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.editStaff   = editStaff;
  window.deleteStaff = deleteStaff;
</script>
</body>
</html>
