<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Checklist — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    :root {
      --green:   #059669;
      --green-2: #d1fae5;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(130deg, #0a1628 0%, #0c2d4a 40%, #0a4a6e 72%, #0891b2 100%);
      padding: 36px 40px 0; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 8% 80%, rgba(8,145,178,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(255,255,255,0.04) 0%, transparent 45%),
        radial-gradient(ellipse at 55% 50%, rgba(0,0,0,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 30%, rgba(8,145,178,0.4) 55%, rgba(255,255,255,0.12) 80%, transparent 100%);
    }
    .hero-inner { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }
    .hero-top { padding-bottom: 28px; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
    .hero-text { flex: 1; min-width: 0; }
    .hero-text .eyebrow {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.42); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .hero-text .eyebrow::before {
      content: ''; display: inline-block; width: 18px; height: 1.5px;
      background: rgba(8,145,178,0.7); border-radius: 2px; flex-shrink: 0;
    }
    .hero-text h1 {
      font-family: 'Lora', serif; font-size: 1.9rem; font-weight: 600;
      color: #fff; line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.01em;
      text-shadow: 0 1px 20px rgba(0,0,0,0.3);
    }
    .hero-text .sub { font-size: 0.875rem; color: rgba(255,255,255,0.55); line-height: 1.5; }

    /* Progress ring */
    .progress-ring-wrap {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .progress-ring-wrap .ring-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.55);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .ring-svg   { transform: rotate(-90deg); }
    .ring-bg    { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 6; }
    .ring-fill  { fill: none; stroke: #38bdf8; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
    .ring-text  { font-size: 18px; font-weight: 800; fill: #fff; dominant-baseline: middle; text-anchor: middle; }
    .ring-sub   { font-size: 9px; font-weight: 600; fill: rgba(255,255,255,0.55); dominant-baseline: middle; text-anchor: middle; }

    /* ── HERO TABS ── */
    .hero-tabs [data-tab="director"]   { --tc: #818cf8; --tc-bg: rgba(129,140,248,0.12); }
    .hero-tabs [data-tab="coordinator"]{ --tc: #fb923c; --tc-bg: rgba(251,146,60,0.12); }
    .hero-tabs {
      display: flex; gap: 0; position: relative; z-index: 2;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .hero-tabs::-webkit-scrollbar { display: none; }
    .hero-tabs .checklist-tab {
      padding: 12px 22px; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600;
      color: color-mix(in srgb, var(--tc) 65%, transparent);
      cursor: pointer; border-radius: 10px 10px 0 0;
      transition: color 0.2s, background 0.2s;
      position: relative; white-space: nowrap; letter-spacing: 0.01em;
    }
    .hero-tabs .checklist-tab::after {
      content: ''; position: absolute; bottom: 0; left: 14px; right: 14px; height: 2.5px;
      background: color-mix(in srgb, var(--tc) 40%, transparent);
      border-radius: 2px 2px 0 0; transition: background 0.2s, left 0.2s, right 0.2s;
    }
    .hero-tabs .checklist-tab:hover { color: var(--tc); background: var(--tc-bg); }
    .hero-tabs .checklist-tab:hover::after { background: var(--tc); left: 10px; right: 10px; }
    .hero-tabs .checklist-tab.active { color: var(--tc); background: var(--tc-bg); font-weight: 700; }
    .hero-tabs .checklist-tab.active::after { background: var(--tc); left: 10px; right: 10px; }

    /* ── PAGE WRAP ── */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 40px 72px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.875rem; font-weight: 500; color: var(--ink-2);
      text-decoration: none; margin-bottom: 28px; transition: color 0.2s ease;
    }
    .back-link:hover { color: var(--ink); }

    /* ── WEEK NAV ── */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 20px; margin-bottom: 24px; box-shadow: var(--shadow-sm); gap: 12px;
    }
    .week-nav-center { text-align: center; flex: 1; }
    .week-num   { font-size: 1.1rem; font-weight: 700; color: var(--ink); }
    .week-dates { font-size: 0.78rem; color: var(--ink-3); margin-top: 2px; }
    .week-this  { font-size: 11px; font-weight: 700; color: var(--green); margin-top: 2px; }
    .btn-nav {
      padding: 8px 16px; background: var(--paper); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--ink-2); transition: all 0.15s; font-family: 'DM Sans', sans-serif; flex-shrink: 0;
    }
    .btn-nav:hover:not(:disabled) { background: var(--paper-2); color: var(--ink); }
    .btn-nav:disabled { opacity: 0.35; cursor: default; }
    .week-jump-select {
      padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--ink);
      background: var(--paper); cursor: pointer; outline: none; flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .week-jump-select:focus { border-color: var(--accent); }

    /* ── WEEKLY ESSENTIALS ── */
    .essentials-section {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
      margin-bottom: 20px; overflow: hidden;
    }
    .essentials-header { padding: 10px 18px; display: flex; align-items: center; gap: 8px; }
    .essentials-header h4 {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--ink-3); margin: 0;
    }
    .essentials-list { display: flex; flex-direction: column; gap: 6px; padding: 0 18px 14px; }
    .ess-pager { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .ess-pager-btn {
      width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--border);
      background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; color: var(--ink-3); font-size: 0.75rem;
    }
    .ess-pager-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .ess-pager-btn:disabled { opacity: 0.35; cursor: default; }
    .ess-pager-info { font-size: 0.72rem; color: var(--ink-3); font-weight: 500; }
    .ess-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--paper);
      cursor: pointer; transition: all 0.15s; user-select: none; width: 100%;
    }
    .ess-item:hover { border-color: var(--accent); background: var(--accent-2); }
    .ess-item.checked { border-color: var(--green); background: var(--green-2); }
    .ess-checkbox {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--white);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .ess-item.checked .ess-checkbox { background: var(--green); border-color: var(--green); }
    .ess-checkbox svg { display: none; }
    .ess-item.checked .ess-checkbox svg { display: block; }
    .ess-title { font-size: 0.82rem; font-weight: 500; color: var(--ink); }
    .ess-item.checked .ess-title { color: var(--green); }

    /* ── ADMIN BAR ── */
    .admin-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #fef9ee; border: 1px solid #fde68a; border-radius: var(--radius);
      padding: 12px 18px; margin-bottom: 20px; gap: 12px;
    }
    .admin-bar-label { font-size: 12px; font-weight: 700; color: #92400e; }
    .admin-bar-actions { display: flex; gap: 8px; }

    /* ── CATEGORY FILTER ── */
    .cat-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .cat-btn {
      padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--white); font-size: 12px; font-weight: 600; color: var(--ink-3);
      cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── TASK LIST ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-card {
      display: flex; align-items: flex-start; gap: 14px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      transition: border-color 0.18s, box-shadow 0.18s; cursor: pointer;
    }
    .task-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
    .task-card.checked { background: var(--green-2); border-color: #6ee7b7; }
    .task-card.checked .task-title { text-decoration: line-through; color: var(--ink-3); }

    .checkbox-wrap {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border); background: var(--white);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px; transition: all 0.18s;
    }
    .task-card.checked .checkbox-wrap { background: var(--green); border-color: var(--green); }
    .checkmark { width: 12px; height: 12px; display: none; }
    .task-card.checked .checkmark { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.9rem; font-weight: 500; color: var(--ink); line-height: 1.4; }
    .task-meta  { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .task-cat {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .task-note-indicator { font-size: 11px; color: var(--ink-3); }

    .task-admin-actions {
      display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s;
    }
    .task-card:hover .task-admin-actions { opacity: 1; }
    .btn-icon {
      padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--white); cursor: pointer; font-size: 11px; font-weight: 600;
      color: var(--ink-3); transition: all 0.15s; font-family: 'DM Sans', sans-serif; line-height: 1;
    }
    .btn-icon:hover { background: var(--paper-2); color: var(--ink); }
    .btn-icon.danger:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    /* ── NOTES ── */
    .task-note-area { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .task-note-textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px;
      font-family: 'DM Sans', sans-serif; font-size: 12.5px; color: var(--ink);
      background: var(--paper); outline: none; resize: vertical; min-height: 60px;
      transition: border-color 0.15s;
    }
    .task-note-textarea:focus { border-color: var(--accent); }
    .note-save-btn {
      margin-top: 6px; padding: 5px 14px; background: #eef2ff; color: #4f46e5;
      border: 1px solid #c7d2fe; border-radius: 6px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .note-save-btn:hover { background: #e0e7ff; }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      text-align: center; padding: 64px 24px;
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .empty-state h3 { font-size: 1rem; font-weight: 600; color: var(--ink-2); margin-bottom: 8px; }
    .empty-state p  { font-size: 0.875rem; color: var(--ink-3); margin-bottom: 20px; }
    .loading-state  { text-align: center; padding: 56px; color: var(--ink-3); }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(28,28,46,0.55);
      backdrop-filter: blur(4px); z-index: 9000;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: var(--white); border-radius: 14px; width: 100%; max-width: 460px;
      box-shadow: var(--shadow-lg);
    }
    .modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-head h3 { font-size: 1rem; font-weight: 600; color: var(--ink); }
    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 14px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
      background: var(--paper); border-radius: 0 0 14px 14px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
    .field-error { font-size: 0.75rem; color: #dc2626; margin-top: 4px; display: none; }
    .form-input.invalid { border-color: #dc2626; }

    /* ── BUTTONS ── */
    .btn {
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
      padding: 9px 18px; border-radius: 8px; border: 1px solid transparent;
      cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 6px; line-height: 1;
    }
    .btn-primary   { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dk); border-color: var(--accent-dk); }
    .btn-secondary { background: var(--white); color: var(--ink-2); border-color: var(--border); }
    .btn-secondary:hover { background: var(--paper); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; font-size: 0.875rem;
      padding: 12px 20px; border-radius: 10px; z-index: 9999;
      opacity: 0; transform: translateY(8px); transition: all 0.28s;
      pointer-events: none; max-width: 320px; background: var(--ink); color: #fff;
    }
    .toast.show  { opacity: 1; transform: translateY(0); }
    .toast.error { background: #dc2626; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .hero { padding: 28px 20px 0; }
      .page-wrap { padding: 20px 16px 56px; }
      .week-nav { flex-wrap: wrap; justify-content: center; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- SHARED_NAVBAR -->

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div class="hero-text">
        <p class="eyebrow">CentralHub · 2025–2026</p>
        <h1 id="heroTitle">Week — Weekly Checklist</h1>
        <p class="sub" id="heroSub">Track your weekly responsibilities and tasks.</p>
      </div>
      <div class="progress-ring-wrap">
        <svg class="ring-svg" width="84" height="84" viewBox="0 0 84 84">
          <circle class="ring-bg"   cx="42" cy="42" r="36"/>
          <circle class="ring-fill" id="ringFill" cx="42" cy="42" r="36"
            stroke-dasharray="226.2" stroke-dashoffset="226.2"/>
          <text class="ring-text" x="42" y="40" transform="rotate(90 42 42)" id="ringPct">0%</text>
          <text class="ring-sub"  x="42" y="52" transform="rotate(90 42 42)" id="ringFrac">0/0</text>
        </svg>
        <span class="ring-label">Progress</span>
      </div>
    </div>
    <nav class="hero-tabs" id="checklistTabs" style="display:none">
      <button class="checklist-tab active" data-tab="director">Director</button>
      <button class="checklist-tab" data-tab="coordinator" id="coordinatorTab" style="display:none">Coordinator</button>
    </nav>
  </div>
</section>

<!-- ── MAIN ── -->
<main class="page-wrap">

  <a href="index" class="back-link" aria-label="Back to Dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Back to Dashboard
  </a>

  <!-- Week Navigator -->
  <div class="week-nav">
    <button class="btn-nav" id="prevWeekBtn">← Prev</button>
    <div class="week-nav-center">
      <div class="week-num" id="weekLabel">Week —</div>
      <div class="week-dates" id="weekDates"></div>
      <div class="week-this" id="weekThisIndicator" style="display:none">This week</div>
    </div>
    <select class="week-jump-select" id="weekJumpSelect" title="Jump to week"></select>
    <button class="btn-nav" id="nextWeekBtn">Next →</button>
  </div>

  <!-- Weekly Essentials -->
  <div class="essentials-section" id="essentialsSection" style="display:none">
    <div class="essentials-header">
      <h4>Weekly Essentials</h4>
      <div class="ess-pager" id="essPager" style="display:none">
        <button class="ess-pager-btn" id="essPrev" onclick="essPage--;renderEssentials()">&#8592;</button>
        <span class="ess-pager-info" id="essPageInfo"></span>
        <button class="ess-pager-btn" id="essNext" onclick="essPage++;renderEssentials()">&#8594;</button>
      </div>
    </div>
    <div class="essentials-list" id="essentialsList"></div>
  </div>

  <!-- Admin Bar (central_admin only) -->
  <div class="admin-bar" id="adminBar" style="display:none">
    <span class="admin-bar-label" id="adminBarLabel">Admin — manage tasks for this week</span>
    <div class="admin-bar-actions">
      <button class="btn btn-secondary" style="font-size:13px;padding:7px 14px" onclick="openTaskModal(null)">
        + Add Task
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    Loading tasks…
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState" style="display:none">
    <h3 id="emptyTitle">No tasks for this week</h3>
    <p id="emptyMsg">Check back later.</p>
    <button class="btn btn-primary" id="emptyAddBtn" style="display:none" onclick="openTaskModal(null)">
      Add First Task
    </button>
  </div>

  <!-- Task list -->
  <div id="taskArea" style="display:none"></div>

</main>

<!-- ── TASK MODAL (admin only) ── -->
<div class="modal-bg" id="taskModal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="taskModalTitle">Add Task</h3></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="taskTitleInput">Task</label>
        <input class="form-input" id="taskTitleInput" type="text" placeholder="e.g. Review weekly reports"
          onkeydown="if(event.key==='Enter')saveTask()"
          oninput="this.classList.remove('invalid');document.getElementById('taskTitleError').style.display='none'">
        <p class="field-error" id="taskTitleError">Task description is required.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="taskCatInput">Category</label>
        <select class="form-select" id="taskCatInput"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
import {
  doc, getDoc, setDoc, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── Constants ─────────────────────────────────────────────────────
const ACADEMIC_YEAR = '2025-26';
const TOTAL_WEEKS   = 40;
const WEEK1_START   = new Date(2025, 6, 21);

const PLATFORM_CATS = {
  director: [
    'Strategic Planning', 'Staff Meeting', 'Data Review',
    'Reporting', 'Parent Communication', 'School Visit',
    'Professional Development', 'Administration', 'Other',
  ],
  coordinator: [
    'Planning', 'Staff Meeting', 'Data Review',
    'Reporting', 'Communication', 'School Visit',
    'Professional Development', 'Administration', 'Other',
  ],
};

const CAT_COLORS = {
  'Strategic Planning':       { color: '#4f46e5', bg: '#eef2ff' },
  'Planning':                 { color: '#2563eb', bg: '#eff6ff' },
  'Staff Meeting':            { color: '#2563eb', bg: '#eff6ff' },
  'Data Review':              { color: '#0891b2', bg: '#f0f9ff' },
  'Reporting':                { color: '#dc2626', bg: '#fef2f2' },
  'Parent Communication':     { color: '#059669', bg: '#ecfdf5' },
  'Communication':            { color: '#d97706', bg: '#fffbeb' },
  'School Visit':             { color: '#059669', bg: '#ecfdf5' },
  'Professional Development': { color: '#059669', bg: '#ecfdf5' },
  'Administration':           { color: '#0891b2', bg: '#f0f9ff' },
  'Other':                    { color: '#6b7280', bg: '#f9fafb' },
};

// ── State ─────────────────────────────────────────────────────────
let currentPlatform = 'director';
let currentWeek     = 1;
let isAdmin         = false;
let currentUid      = null;
let tasks           = [];
let myProgress      = {};
let myEssProgress   = {};
let openNoteId      = null;
let editTaskId      = null;
let activeFilter    = 'All';
let essentials      = [];
let essPage         = 0;
const ESS_PAGE_SIZE = 5;
let unsubTasks      = null;
let unsubProgress   = null;
let unsubEssentials = null;

// ── Auth ──────────────────────────────────────────────────────────
document.addEventListener('authReady', ({ detail: { user, profile } }) => {
  currentUid = user.uid;
  isAdmin    = profile?.role_centralhub === 'central_admin';

  const chSubRoles = Array.isArray(profile?.ch_sub_roles) ? profile.ch_sub_roles : [];

  // Determine which tabs this user can see
  const canSeeDirector    = isAdmin || chSubRoles.includes('director');
  const canSeeCoordinator = isAdmin || chSubRoles.includes('coordinator');

  // If user has no applicable sub-role and is not admin, default to first available
  const tabsEl = document.getElementById('checklistTabs');

  if (!canSeeDirector && !canSeeCoordinator) {
    // No relevant sub-role — show a friendly message, hide tabs
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').style.display = '';
    document.getElementById('emptyTitle').textContent = 'No checklist assigned';
    document.getElementById('emptyMsg').textContent = 'You do not have a Director or Coordinator role assigned.';
    return;
  }

  // Show/hide tabs
  tabsEl.style.display = '';
  if (!canSeeDirector) {
    // Only coordinator — hide director tab, activate coordinator
    document.querySelector('[data-tab="director"]').style.display = 'none';
    document.getElementById('coordinatorTab').style.display = '';
    document.querySelector('[data-tab="director"]').classList.remove('active');
    document.getElementById('coordinatorTab').classList.add('active');
    currentPlatform = 'coordinator';
  } else {
    // Director visible (default active)
    if (canSeeCoordinator) {
      document.getElementById('coordinatorTab').style.display = '';
    }
    currentPlatform = 'director';
  }

  // Admin bar
  if (isAdmin) {
    document.getElementById('adminBar').style.display = 'flex';
    document.getElementById('emptyAddBtn').style.display = '';
  }

  // Tab click handlers
  document.querySelectorAll('.checklist-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.checklist-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentPlatform = tab.dataset.tab;
      activeFilter = 'All';
      if (isAdmin) {
        document.getElementById('adminBarLabel').textContent =
          `Admin — manage ${getPlatformLabel(currentPlatform)} tasks for this week`;
      }
      updateHeroSub();
      loadWeek(currentWeek);
      loadEssentials();
    });
  });

  updateHeroSub();
  currentWeek = getWeekNumber(new Date());
  setupWeekNav();
  loadWeek(currentWeek);
  loadEssentials();
});

// ── Helpers ───────────────────────────────────────────────────────
function getPlatformLabel(plat) {
  return plat === 'coordinator' ? 'Coordinator' : 'Director';
}

function getWeekNumber(date) {
  const diff = date - WEEK1_START;
  const week = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1;
  return Math.max(1, Math.min(TOTAL_WEEKS, week));
}

function getWeekDates(weekNum) {
  const start = new Date(WEEK1_START);
  start.setDate(start.getDate() + (weekNum - 1) * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 4);
  const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return `${fmt(start)} – ${fmt(end)}`;
}

function updateHeroSub() {
  const sub = document.getElementById('heroSub');
  if (!sub) return;
  sub.textContent = currentPlatform === 'coordinator'
    ? 'Track your Coordinator responsibilities and weekly tasks.'
    : 'Track your Director responsibilities and weekly tasks.';
}

function updateWeekUI() {
  document.getElementById('weekLabel').textContent   = `Week ${currentWeek}`;
  document.getElementById('weekDates').textContent    = getWeekDates(currentWeek);
  document.getElementById('heroTitle').textContent    = `Week ${currentWeek} — Weekly Checklist`;
  document.getElementById('prevWeekBtn').disabled     = currentWeek <= 1;
  document.getElementById('nextWeekBtn').disabled     = currentWeek >= TOTAL_WEEKS;
  document.getElementById('weekThisIndicator').style.display =
    (currentWeek === getWeekNumber(new Date())) ? '' : 'none';
  const jumpSel = document.getElementById('weekJumpSelect');
  if (jumpSel) jumpSel.value = currentWeek;
}

function setupWeekNav() {
  document.getElementById('prevWeekBtn').addEventListener('click', () => {
    if (currentWeek > 1) loadWeek(currentWeek - 1);
  });
  document.getElementById('nextWeekBtn').addEventListener('click', () => {
    if (currentWeek < TOTAL_WEEKS) loadWeek(currentWeek + 1);
  });
  const jumpSel = document.getElementById('weekJumpSelect');
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const opt = document.createElement('option');
    opt.value = w;
    opt.textContent = `Wk ${w}  (${getWeekDates(w)})`;
    jumpSel.appendChild(opt);
  }
  jumpSel.addEventListener('change', () => loadWeek(Number(jumpSel.value)));
}

// ── Load week ─────────────────────────────────────────────────────
function loadWeek(week) {
  currentWeek  = week;
  updateWeekUI();

  if (unsubTasks)    { unsubTasks();    unsubTasks = null; }
  if (unsubProgress) { unsubProgress(); unsubProgress = null; }

  tasks        = [];
  myProgress   = {};
  myEssProgress = {};
  openNoteId   = null;

  document.getElementById('loadingState').style.display = '';
  document.getElementById('emptyState').style.display   = 'none';
  document.getElementById('taskArea').style.display     = 'none';

  const db         = window.db;
  const templateId = `${ACADEMIC_YEAR}_w${String(week).padStart(2,'0')}_${currentPlatform}`;
  const progressId = `${currentUid}_${ACADEMIC_YEAR}_w${String(week).padStart(2,'0')}_${currentPlatform}`;

  // Subscribe to template
  unsubTasks = onSnapshot(doc(db, 'weekly_templates', templateId), snap => {
    tasks = (snap.exists() && Array.isArray(snap.data().tasks)) ? snap.data().tasks : [];
    render();
  }, err => {
    console.error('Template error:', err);
    document.getElementById('loadingState').style.display = 'none';
  });

  // Subscribe to user progress
  unsubProgress = onSnapshot(doc(db, 'weekly_progress', progressId), snap => {
    myProgress    = {};
    myEssProgress = {};
    if (snap.exists()) {
      const data = snap.data();
      if (data.items)     myProgress    = data.items;
      if (data.essentials) myEssProgress = data.essentials;
    }
    renderEssentials();
    render();
  }, err => {
    console.error('Progress error:', err);
  });
}

// ── Save progress ─────────────────────────────────────────────────
async function saveProgress() {
  const db         = window.db;
  const progressId = `${currentUid}_${ACADEMIC_YEAR}_w${String(currentWeek).padStart(2,'0')}_${currentPlatform}`;
  await setDoc(doc(db, 'weekly_progress', progressId), {
    uid:          currentUid,
    weekNumber:   currentWeek,
    academicYear: ACADEMIC_YEAR,
    platform:     currentPlatform,
    items:        myProgress,
    updatedAt:    serverTimestamp(),
  }, { merge: true });
}

async function toggleTask(taskId) {
  const prev    = myProgress[taskId] || {};
  myProgress[taskId] = { ...prev, checked: !prev.checked };
  render();
  await saveProgress();
}

async function saveNote(taskId, note) {
  const prev = myProgress[taskId] || {};
  myProgress[taskId] = { ...prev, note };
  await saveProgress();
  showToast('Note saved.');
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  document.getElementById('loadingState').style.display = 'none';
  updateProgressRing();

  if (tasks.length === 0) {
    document.getElementById('emptyState').style.display = '';
    document.getElementById('taskArea').style.display   = 'none';
    document.getElementById('emptyTitle').textContent =
      isAdmin ? 'No tasks for this week' : 'No tasks set for this week';
    document.getElementById('emptyMsg').textContent =
      isAdmin ? 'Add tasks using the button above.' : 'Check back later.';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('taskArea').style.display   = '';

  const taskArea = document.getElementById('taskArea');
  taskArea.innerHTML = '';

  const filterDiv = document.createElement('div');
  filterDiv.className = 'cat-filter';
  taskArea.appendChild(filterDiv);
  renderCatFilter(filterDiv);

  const filtered = activeFilter === 'All'
    ? tasks
    : tasks.filter(t => t.category === activeFilter);

  const listEl = document.createElement('div');
  listEl.className = 'task-list';
  taskArea.appendChild(listEl);

  filtered.forEach(task => {
    const catColor = CAT_COLORS[task.category] || CAT_COLORS['Other'];
    listEl.appendChild(buildTaskCard(task, catColor));
  });
}

function renderCatFilter(row) {
  const cats = ['All', ...Object.keys(CAT_COLORS).filter(c => tasks.some(t => t.category === c))];
  row.innerHTML = cats.map(c =>
    `<button class="cat-btn${activeFilter === c ? ' active' : ''}" data-cat="${escAttr(c)}">${escHtml(c)}</button>`
  ).join('');
  row.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeFilter = btn.dataset.cat; render(); });
  });
}

function buildTaskCard(task, catColor) {
  const prog    = myProgress[task.id] || {};
  const checked = !!prog.checked;
  const note    = prog.note || '';
  const noteOpen = openNoteId === task.id;

  const card = document.createElement('div');
  card.className = 'task-card' + (checked ? ' checked' : '');
  card.dataset.taskId = task.id;

  card.innerHTML = `
    <div class="checkbox-wrap">
      <svg class="checkmark" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="task-body">
      <div class="task-title">${escHtml(task.title)}</div>
      <div class="task-meta">
        <span class="task-cat" style="color:${catColor.color};background:${catColor.bg}">${escHtml(task.category)}</span>
        ${note ? `<span class="task-note-indicator">📝 Has note</span>` : ''}
      </div>
      ${noteOpen ? `
        <div class="task-note-area">
          <textarea class="task-note-textarea" id="note-${escAttr(task.id)}" placeholder="Add a personal note…">${escHtml(note)}</textarea>
          <button class="note-save-btn" data-task-id="${escAttr(task.id)}">Save note</button>
        </div>` : ''}
    </div>
    ${isAdmin ? `
      <div class="task-admin-actions">
        <button class="btn-icon" data-edit="${escAttr(task.id)}">Edit</button>
        <button class="btn-icon danger" data-delete="${escAttr(task.id)}">Del</button>
      </div>` : ''}
  `;

  card.addEventListener('click', e => {
    if (e.target.closest('.task-admin-actions')) return;
    if (e.target.closest('.task-note-area')) return;
    if (e.target.closest('.task-meta')) {
      openNoteId = openNoteId === task.id ? null : task.id;
      render();
      return;
    }
    toggleTask(task.id);
  });

  const noteSaveBtn = card.querySelector('.note-save-btn');
  if (noteSaveBtn) {
    noteSaveBtn.addEventListener('click', e => {
      e.stopPropagation();
      const ta = document.getElementById(`note-${task.id}`);
      saveNote(task.id, ta ? ta.value.trim() : '');
    });
  }

  if (isAdmin) {
    const editBtn   = card.querySelector('[data-edit]');
    const deleteBtn = card.querySelector('[data-delete]');
    if (editBtn) editBtn.addEventListener('click', e => { e.stopPropagation(); openTaskModal(task.id); });
    if (deleteBtn) deleteBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (deleteBtn.dataset.confirming === 'true') {
        deleteTask(task.id);
      } else {
        deleteBtn.dataset.confirming = 'true';
        deleteBtn.textContent = '?';
        setTimeout(() => { deleteBtn.dataset.confirming = 'false'; deleteBtn.textContent = 'Del'; }, 2500);
      }
    });
  }

  return card;
}

function updateProgressRing() {
  const total  = tasks.length;
  const done   = tasks.filter(t => myProgress[t.id]?.checked).length;
  const pct    = total > 0 ? Math.round(done / total * 100) : 0;
  const circ   = 2 * Math.PI * 36;
  const offset = circ - (pct / 100) * circ;

  const fill  = document.getElementById('ringFill');
  const pctEl = document.getElementById('ringPct');
  const fracEl = document.getElementById('ringFrac');
  if (fill)  fill.style.strokeDashoffset = offset;
  if (pctEl) pctEl.textContent = pct + '%';
  if (fracEl) fracEl.textContent = `${done}/${total}`;

  const sub = document.getElementById('heroSub');
  if (tasks.length > 0) {
    sub.textContent = done === total && total > 0
      ? `All ${total} tasks completed this week!`
      : `${done} of ${total} tasks completed.`;
  }
}

// ── Weekly Essentials ─────────────────────────────────────────────
function loadEssentials() {
  if (unsubEssentials) { unsubEssentials(); unsubEssentials = null; }
  essPage = 0;
  const db = window.db;
  unsubEssentials = onSnapshot(doc(db, 'weekly_essentials', currentPlatform), snap => {
    essentials = (snap.exists() && Array.isArray(snap.data().items)) ? snap.data().items : [];
    essPage = 0;
    renderEssentials();
  }, err => console.error('Essentials error:', err));
}

function renderEssentials() {
  const section = document.getElementById('essentialsSection');
  const list    = document.getElementById('essentialsList');
  if (!section || !list) return;
  if (essentials.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  const totalPages = Math.ceil(essentials.length / ESS_PAGE_SIZE);
  essPage = Math.min(essPage, totalPages - 1);
  const pageItems = essentials.slice(essPage * ESS_PAGE_SIZE, (essPage + 1) * ESS_PAGE_SIZE);

  // update pager in header
  const pager = document.getElementById('essPager');
  if (pager) {
    if (totalPages > 1) {
      pager.style.display = 'flex';
      pager.querySelector('#essPrev').disabled = essPage === 0;
      pager.querySelector('#essNext').disabled = essPage >= totalPages - 1;
      pager.querySelector('#essPageInfo').textContent = `${essPage + 1} / ${totalPages}`;
    } else {
      pager.style.display = 'none';
    }
  }

  list.innerHTML = pageItems.map(e => {
    const checked = !!myEssProgress[e.id]?.checked;
    return `
      <div class="ess-item${checked ? ' checked' : ''}" data-ess-id="${escAttr(e.id)}">
        <div class="ess-checkbox">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="ess-title">${escHtml(e.title)}</span>
      </div>`;
  }).join('');
  list.querySelectorAll('.ess-item').forEach(el => {
    el.addEventListener('click', () => toggleEssential(el.dataset.essId));
  });
}

async function toggleEssential(id) {
  const prev = myEssProgress[id] || {};
  myEssProgress[id] = { checked: !prev.checked };
  renderEssentials();
  const db         = window.db;
  const progressId = `${currentUid}_${ACADEMIC_YEAR}_w${String(currentWeek).padStart(2,'0')}_${currentPlatform}`;
  await setDoc(doc(db, 'weekly_progress', progressId), {
    uid: currentUid, weekNumber: currentWeek,
    academicYear: ACADEMIC_YEAR, platform: currentPlatform,
    essentials: myEssProgress, updatedAt: serverTimestamp(),
  }, { merge: true });
}

// ── Admin: task template ─────────────────────────────────────────
async function saveTaskTemplate() {
  const db         = window.db;
  const templateId = `${ACADEMIC_YEAR}_w${String(currentWeek).padStart(2,'0')}_${currentPlatform}`;
  await setDoc(doc(db, 'weekly_templates', templateId), {
    weekNumber:   currentWeek,
    academicYear: ACADEMIC_YEAR,
    platform:     currentPlatform,
    tasks,
    updatedAt: serverTimestamp(),
  }, { merge: true });
}

function openTaskModal(taskId) {
  editTaskId = taskId;
  const task = taskId ? tasks.find(t => t.id === taskId) : null;
  document.getElementById('taskModalTitle').textContent = task ? 'Edit Task' : 'Add Task';
  document.getElementById('taskTitleInput').value       = task?.title || '';

  const cats   = PLATFORM_CATS[currentPlatform] || PLATFORM_CATS.director;
  const catSel = document.getElementById('taskCatInput');
  catSel.innerHTML = cats.map(c =>
    `<option value="${escAttr(c)}"${task?.category === c ? ' selected' : ''}>${escHtml(c)}</option>`
  ).join('');

  document.getElementById('taskModal').classList.add('open');
  document.getElementById('taskTitleInput').focus();
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('open');
  editTaskId = null;
}

async function saveTask() {
  const title = document.getElementById('taskTitleInput').value.trim();
  const cat   = document.getElementById('taskCatInput').value;
  if (!title) {
    document.getElementById('taskTitleInput').classList.add('invalid');
    document.getElementById('taskTitleError').style.display = 'block';
    return;
  }

  if (editTaskId) {
    const idx = tasks.findIndex(t => t.id === editTaskId);
    if (idx >= 0) tasks[idx] = { ...tasks[idx], title, category: cat };
  } else {
    tasks.push({ id: genId(), title, category: cat });
  }

  closeTaskModal();
  await saveTaskTemplate();
  showToast(editTaskId ? 'Task updated.' : 'Task added.');
}

async function deleteTask(taskId) {
  tasks = tasks.filter(t => t.id !== taskId);
  await saveTaskTemplate();
  showToast('Task deleted.');
}

// ── Utilities ─────────────────────────────────────────────────────
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Expose to HTML ────────────────────────────────────────────────
Object.assign(window, { openTaskModal, closeTaskModal, saveTask });

document.getElementById('taskModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeTaskModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeTaskModal();
});
</script>
</body>
