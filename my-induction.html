<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Induction — CentralHub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <!-- SHARED_NAVBAR -->
  <style>
    :root { --accent: #6c5ce7; --accent-dk: #4e3db8; --accent-2: #ddd6fe; }

    .welcome-hero {
      background: linear-gradient(135deg, #1a1530 0%, #2d2354 55%, #0a0815 100%);
      color: #fff; padding: 30px 28px; border-radius: 16px;
      margin-bottom: 24px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
    }
    .welcome-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(108,92,231,0.22) 0%, transparent 55%); }
    .welcome-hero > * { position: relative; z-index: 1; }
    .welcome-eyebrow { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
    .welcome-title { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; margin-bottom: 4px; }
    .welcome-meta { font-size: 13px; color: rgba(255,255,255,0.65); }
    .window-pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.12); padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; }
    .window-pill .day-num { font-weight: 700; }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 40px 80px; }
    @media (max-width: 720px) { .page-wrap { padding: 20px 20px 60px; } }

    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    .section { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-bottom: 18px; box-shadow: var(--shadow-sm); }
    .section h2 { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
    .section h2 .pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--accent-2); color: var(--accent-dk); text-transform: uppercase; letter-spacing: 0.04em; }

    .window-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    @media (max-width: 700px) { .window-grid { grid-template-columns: 1fr 1fr; } }
    .window-card { padding: 14px; border: 2px solid var(--border); border-radius: 12px; background: #fafafa; }
    .window-card.current { background: var(--accent-2); border-color: var(--accent); }
    .window-card.complete { background: #d1fae5; border-color: #6ee7b7; }
    .window-card-day { font-size: 10px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .window-card-label { font-size: 13px; font-weight: 700; color: var(--ink); margin: 4px 0; }
    .window-card-priority { font-size: 11px; color: var(--ink-2); line-height: 1.4; }
    .window-card-progress { font-size: 11px; color: var(--accent-dk); margin-top: 6px; font-weight: 500; }

    .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .task-row:last-child { border: none; }
    .task-checkbox { flex-shrink: 0; width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; transition: all .15s; background: #fff; display: flex; align-items: center; justify-content: center; }
    .task-checkbox:hover { border-color: var(--accent); }
    .task-checkbox.completed { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
    .task-info { flex: 1; }
    .task-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
    .task-row.completed .task-title { color: var(--ink-3); text-decoration: line-through; }
    .task-meta { font-size: 11px; color: var(--ink-3); display: flex; gap: 12px; flex-wrap: wrap; }
    .task-meta .pill-stage { background: #f3f4f6; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .task-meta .pill-mentor { background: #fef3c7; padding: 2px 8px; border-radius: 999px; color: #92400e; }
    .task-meta .pill-cts { background: var(--accent-2); padding: 2px 8px; border-radius: 999px; color: var(--accent-dk); font-family: 'DM Mono', monospace; }

    .walkthrough-progress { display: flex; gap: 4px; align-items: center; }
    .walkthrough-tile { width: 26px; height: 26px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--ink-3); background: #fafafa; }
    .walkthrough-tile.complete { background: var(--accent); border-color: var(--accent); color: #fff; }
    .walkthrough-tile.shadow { background: #f3f4f6; border-color: #e5e7eb; }
    .walkthrough-tile.coled { background: #fef9c3; border-color: #fde047; }
    .walkthrough-tile.solo { background: #ddd6fe; border-color: #a78bfa; }

    .sidebar-section h3 { font-size: 13px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

    .journal-prompt label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 4px; }
    .journal-prompt textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; background: #fff; color: var(--ink); resize: vertical; }
    .journal-prompt textarea:focus { outline: none; border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }

    .pulse-row { display: flex; gap: 6px; justify-content: space-between; margin-bottom: 10px; }
    .pulse-emoji { flex: 1; padding: 10px 4px; border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 22px; }
    .pulse-emoji:hover { border-color: var(--accent); }
    .pulse-emoji.selected { background: var(--accent-2); border-color: var(--accent); }
    .pulse-emoji span { font-size: 9px; font-weight: 600; color: var(--ink-3); margin-top: 2px; }

    .mentor-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; background: #f9f9f9; }
    .mentor-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; }
    .mentor-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .mentor-role { font-size: 11px; color: var(--ink-3); }

    .charter-banner { background: linear-gradient(180deg, #ddd6fe 0%, #fff 100%); border: 1px solid #c4b5fd; border-radius: 12px; padding: 14px 16px; font-size: 12px; color: #5b21b6; margin-bottom: 18px; }
    .charter-banner strong { color: #4c1d95; }

    .no-induction { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 60px 40px; text-align: center; box-shadow: var(--shadow-sm); }
    .no-induction h2 { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
    .no-induction p { font-size: 14px; color: var(--ink-3); max-width: 480px; margin: 0 auto; }
  </style>
</head>
<body>

<div class="page-wrap" id="pageWrap">
  <div id="loadingState" style="padding:40px;text-align:center;color:var(--ink-3);">Loading your induction…</div>
  <div id="mainContent" style="display:none;"></div>
</div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
import { collection, doc, getDoc, getDocs, setDoc, query, where, orderBy, limit, serverTimestamp, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const db = window.db;

let assignment = null, program = null, mentorProfile = null;
let progressMap = {}, dayOfInduction = 0, currentWindow = null, allTasks = [];
let walkthroughs = [];

document.addEventListener('authReady', async ({ detail: { user } }) => {
  try {
    const assignSnap = await getDoc(doc(db, 'induction_assignments', user.uid));
    if (!assignSnap.exists()) { showNoInduction(); return; }
    assignment = assignSnap.data();
    if (!['pre_arrival','active','extended','paused'].includes(assignment.status)) { showCompletedOrWithdrawn(); return; }

    if (assignment.programId) {
      const progSnap = await getDoc(doc(db, 'induction_programs', assignment.programId));
      if (progSnap.exists()) program = progSnap.data();
    }
    if (assignment.mentorUid) {
      const m = await getDoc(doc(db, 'users', assignment.mentorUid));
      mentorProfile = m.exists() ? m.data() : null;
    }
    const hire = assignment.hireDate?.toDate ? assignment.hireDate.toDate() : new Date(assignment.hireDate);
    dayOfInduction = Math.floor((Date.now() - hire.getTime()) / (1000 * 60 * 60 * 24));
    flattenTasks();
    if (program?.stages) currentWindow = program.stages.find(s => dayOfInduction >= s.dayStart && dayOfInduction <= s.dayEnd) || program.stages[0];

    const [progSnap, walkSnap] = await Promise.all([
      getDocs(query(collection(db, 'induction_progress'), where('uid', '==', user.uid), limit(500))),
      getDocs(query(collection(db, 'induction_observations'), where('menteeUid', '==', user.uid), where('observationType', '==', 'specialist_walkthrough'), orderBy('observationNumber', 'asc'), limit(20))),
    ]);
    progSnap.docs.forEach(d => { progressMap[d.data().taskId] = { id: d.id, ...d.data() }; });
    walkthroughs = walkSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    render();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
  } catch (err) {
    console.error('boot', err);
    document.getElementById('loadingState').innerHTML = `<div class="no-induction"><h2>Could not load</h2><p>${escapeHtml(err.message || err.code || 'unknown')}</p></div>`;
  }
});

function flattenTasks() {
  allTasks = [];
  if (!program?.stages) return;
  program.stages.forEach(stage => {
    (stage.tasks || []).forEach(t => {
      allTasks.push({ ...t, stageId: stage.stageId, stageLabel: stage.label, stageDayStart: stage.dayStart, stageDayEnd: stage.dayEnd });
    });
  });
}

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function isCompleted(taskId) { return !!progressMap[taskId]?.completedAt; }

function showNoInduction() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('mainContent').style.display = '';
  document.getElementById('mainContent').innerHTML = `<div class="no-induction"><h2>You don't have an active induction</h2><p>HQ Subject Specialist induction is for first-year specialists at Eduversal HQ. If you should have an active induction, contact your reporting Director.</p></div>`;
}
function showCompletedOrWithdrawn() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('mainContent').style.display = '';
  document.getElementById('mainContent').innerHTML = `<div class="no-induction"><h2>Your induction is ${escapeHtml(assignment.status)}</h2><p>Year-2 specialist development continues through the network competency framework and your subject's strategic-initiative cycle.</p></div>`;
}

function render() {
  const totalDays = program?.duration?.totalDays || 365;
  const completed = allTasks.filter(t => isCompleted(t.taskId)).length;
  const total = allTasks.length;
  const stageLabel = currentWindow?.label || 'Pre-arrival';

  document.getElementById('mainContent').innerHTML = `
    <div class="welcome-hero">
      <div>
        <p class="welcome-eyebrow">CentralHub · Subject Specialist Induction · Year 1</p>
        <h1 class="welcome-title">Welcome, ${escapeHtml(window.userProfile?.displayName || 'colleague')}</h1>
        <div class="welcome-meta">
          ${escapeHtml(program?.title || 'Network → Apprenticeship → Solo → Strategic')} · ${completed} / ${total} tasks completed
          ${program?.id || assignment.programId ? ` · <a href="handbook?id=${encodeURIComponent(program?.id || assignment.programId)}" style="color:rgba(255,255,255,0.85);text-decoration:underline;">View full handbook</a>` : ''}
        </div>
      </div>
      <div class="window-pill"><span class="day-num">Day ${dayOfInduction}</span> of ${totalDays} · ${escapeHtml(stageLabel)}</div>
    </div>

    <div class="charter-banner">
      <strong>Know the network before coaching it.</strong> The most damaging combination in subject specialist work is wrong advice given with confidence. Your first 30 days are deliberately Network Sense-Making — read the school landscape before opening your mouth on coaching.
    </div>

    <div class="layout">
      <div>
        <div class="section">
          <h2>Your four windows <span class="pill">Network · Apprenticeship · Solo · Strategic</span></h2>
          <div class="window-grid" id="windowGrid"></div>
        </div>

        <div class="section">
          <h2>Today <span class="pill">Day ${dayOfInduction}</span></h2>
          <div id="todayList"></div>
        </div>

        <div class="section">
          <h2>This week</h2>
          <div id="thisWeekList"></div>
        </div>

        <div class="section">
          <h2>Walkthrough cycle <span class="pill">Stage 2 · 10 walkthroughs</span></h2>
          <div id="walkthroughGrid"></div>
        </div>
      </div>

      <aside>
        <div class="section sidebar-section">
          <h3>Your specialist mentor</h3>
          <div class="mentor-card">
            <div class="mentor-avatar">${escapeHtml(((mentorProfile?.displayName || '?').match(/\b([A-Z])/g) || ['?']).slice(0,2).join(''))}</div>
            <div>
              <div class="mentor-name">${escapeHtml(mentorProfile?.displayName || assignment.mentorUid)}</div>
              <div class="mentor-role">${escapeHtml(mentorProfile?.email || 'Senior HQ Specialist')}</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--ink-3);margin-top:8px;">Hard cap of 2 specialist mentees per mentor — specialist mentoring is more demanding than teacher mentoring.</div>
        </div>

        <div class="section sidebar-section">
          <h3>This week's reflection</h3>
          <div class="journal-prompt"><label>What pattern am I seeing across schools?</label><textarea id="jp1" rows="3"></textarea></div>
          <div class="journal-prompt" style="margin-top:8px;"><label>What gap am I most uncertain about?</label><textarea id="jp2" rows="2"></textarea></div>
          <div class="journal-prompt" style="margin-top:8px;"><label>What did my mentor question this week?</label><textarea id="jp3" rows="2"></textarea></div>
          <div style="font-size:11px;color:var(--ink-3);margin:8px 0;">Visible to you and your mentor only.</div>
          <button class="btn-primary" id="btnSaveJournal">Save weekly reflection</button>
        </div>

        <div class="section sidebar-section">
          <h3>Weekly pulse</h3>
          <div class="pulse-row" id="pulseRow">
            <div class="pulse-emoji" data-score="1">😰<span>Very hard</span></div>
            <div class="pulse-emoji" data-score="2">😟<span>Hard</span></div>
            <div class="pulse-emoji" data-score="3">😐<span>OK</span></div>
            <div class="pulse-emoji" data-score="4">🙂<span>Good</span></div>
            <div class="pulse-emoji" data-score="5">😊<span>Great</span></div>
          </div>
          <div style="font-size:11px;color:var(--ink-3);" id="pulseMeta">One question per week. Anonymised for HQ.</div>
        </div>
      </aside>
    </div>
  `;

  renderWindowGrid();
  renderToday();
  renderThisWeek();
  renderWalkthroughs();
  setupJournal();
  setupPulse();
}

function renderWindowGrid() {
  if (!program?.stages) return;
  document.getElementById('windowGrid').innerHTML = program.stages.filter(s => s.dayStart >= 1 || s.stageId !== 'stage_0_preparation').map(s => {
    const isCurrent = s.stageId === currentWindow?.stageId;
    const isPast = dayOfInduction > s.dayEnd;
    const stageTasks = allTasks.filter(t => t.stageId === s.stageId);
    const stageDone = stageTasks.filter(t => isCompleted(t.taskId)).length;
    const firstSentence = s.narrative ? s.narrative.split('.')[0] + '.' : '';
    return `<div class="window-card ${isCurrent?'current':''} ${isPast?'complete':''}">
      <div class="window-card-day">Day ${s.dayStart} → ${s.dayEnd}</div>
      <div class="window-card-label">${escapeHtml(s.label)}</div>
      <div class="window-card-priority">${escapeHtml(firstSentence)}</div>
      <div class="window-card-progress">${stageDone} / ${stageTasks.length} tasks</div>
    </div>`;
  }).join('');
}

function renderTasksInto(elId, tasks, emptyMsg) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (tasks.length === 0) { el.innerHTML = `<div style="padding:14px;color:var(--ink-3);font-size:13px;">${escapeHtml(emptyMsg)}</div>`; return; }
  el.innerHTML = tasks.map(t => {
    const completed = isCompleted(t.taskId);
    const cts = Array.isArray(t.cambridgeStandardRefs) ? t.cambridgeStandardRefs : [];
    return `<div class="task-row ${completed?'completed':''}">
      <div class="task-checkbox ${completed?'completed':''}" data-task-id="${escapeHtml(t.taskId)}">${completed?'✓':''}</div>
      <div class="task-info">
        <div class="task-title">${escapeHtml(t.title || t.taskId)}</div>
        <div class="task-meta">
          <span class="pill-stage">${escapeHtml(t.stageLabel || t.stageId)}</span>
          ${t.mentorRequired ? '<span class="pill-mentor">Mentor</span>' : ''}
          ${t.estimatedMinutes ? `<span>~${Math.round(t.estimatedMinutes/60)} hr</span>` : ''}
          ${cts.map(c => `<span class="pill-cts">CTS ${escapeHtml(c)}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.task-checkbox').forEach(cb => cb.addEventListener('click', () => toggleTask(cb.dataset.taskId)));
}

function renderToday() {
  const today = allTasks.filter(t => t.stageId === currentWindow?.stageId && !isCompleted(t.taskId) && t.mandatory !== false).slice(0, 5);
  renderTasksInto('todayList', today, 'No required tasks for today.');
}

function renderThisWeek() {
  const minDay = dayOfInduction - 1, maxDay = dayOfInduction + 7;
  const tasks = allTasks
    .filter(t => !isCompleted(t.taskId) && (t.stageDayStart || 0) <= maxDay && (t.stageDayEnd || 365) >= minDay)
    .filter(t => t.stageId !== currentWindow?.stageId || t.mandatory === false)
    .slice(0, 6);
  renderTasksInto('thisWeekList', tasks, 'Nothing else scheduled this week.');
}

function renderWalkthroughs() {
  const el = document.getElementById('walkthroughGrid');
  if (!el) return;
  // 10 walkthroughs: 1-3 shadow, 4-6 co-led, 7 mentor-present, 8-10 solo
  const phases = [
    { range: [1,2,3], type: 'shadow', label: 'Shadow' },
    { range: [4,5,6], type: 'coled', label: 'Co-led' },
    { range: [7], type: 'solo', label: 'Mentor present' },
    { range: [8,9,10], type: 'solo', label: 'Solo' },
  ];
  let html = '<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;">';
  phases.forEach(p => {
    html += `<div><div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:6px;">${escapeHtml(p.label)}</div><div class="walkthrough-progress">`;
    p.range.forEach(num => {
      const w = walkthroughs.find(w => w.observationNumber === num);
      const isComplete = !!w?.completedAt;
      html += `<div class="walkthrough-tile ${p.type} ${isComplete ? 'complete' : ''}" title="Walkthrough #${num}${isComplete ? ' (done)' : ''}">${isComplete ? '✓' : num}</div>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  const done = walkthroughs.filter(w => w.completedAt).length;
  html += `<div style="margin-top:14px;font-size:12px;color:var(--ink-3);">${done} / 10 completed. Window 2 success signal: structuring a Glow/Grow/Go conversation that the teacher experiences as helpful.</div>`;
  el.innerHTML = html;
}

async function toggleTask(taskId) {
  const task = allTasks.find(t => t.taskId === taskId);
  if (!task) return;
  if (task.ownerRole && !['mentee','mentor_and_mentee'].includes(task.ownerRole)) return;
  const current = progressMap[taskId];
  const isCurrentlyComplete = !!current?.completedAt;
  const docId = `${window.currentUser.uid}_${taskId}`;
  const payload = {
    // @lint-allow-uid
    uid: window.currentUser.uid,
    programId: assignment.programId,
    stageId: task.stageId, taskId,
    completedAt: isCurrentlyComplete ? null : serverTimestamp(),
    completedBy: isCurrentlyComplete ? null : window.currentUser.uid,
    updatedAt: serverTimestamp(),
  };
  if (!current) payload.createdAt = serverTimestamp();
  try {
    await setDoc(doc(db, 'induction_progress', docId), payload, { merge: true });
    progressMap[taskId] = { id: docId, ...payload };
    renderToday(); renderThisWeek(); renderWindowGrid();
  } catch (err) { console.error('toggleTask', err); }
}

async function setupJournal() {
  const today = new Date().toISOString().slice(0, 10);
  const entryId = `${window.currentUser.uid}_${today}_weekly`;
  try {
    const snap = await getDoc(doc(db, 'induction_journal', entryId));
    if (snap.exists()) {
      const data = snap.data();
      document.getElementById('jp1').value = data.responses?.pattern || '';
      document.getElementById('jp2').value = data.responses?.gap || '';
      document.getElementById('jp3').value = data.responses?.mentor_question || '';
    }
  } catch (err) {}
  document.getElementById('btnSaveJournal').addEventListener('click', saveJournal);
}

async function saveJournal() {
  const btn = document.getElementById('btnSaveJournal');
  btn.disabled = true; btn.textContent = 'Saving…';
  const today = new Date().toISOString().slice(0, 10);
  const entryId = `${window.currentUser.uid}_${today}_weekly`;
  const responses = {
    pattern: document.getElementById('jp1').value.trim(),
    gap: document.getElementById('jp2').value.trim(),
    mentor_question: document.getElementById('jp3').value.trim(),
  };
  const payload = {
    // @lint-allow-uid
    uid: window.currentUser.uid,
    programId: assignment.programId,
    stageId: currentWindow?.stageId || null,
    entryType: 'weekly_micro_reflection',
    entryDate: Timestamp.fromDate(new Date(today)),
    promptSet: 'specialist_pattern_v1',
    responses, visibility: 'mentee_and_mentor', updatedAt: serverTimestamp(),
  };
  try {
    const snap = await getDoc(doc(db, 'induction_journal', entryId));
    if (!snap.exists()) payload.createdAt = serverTimestamp();
    await setDoc(doc(db, 'induction_journal', entryId), payload, { merge: true });
  } catch (err) { console.error('saveJournal', err); }
  btn.disabled = false; btn.textContent = 'Save weekly reflection';
}

async function setupPulse() {
  const weekStart = isoWeekStart(new Date());
  const pulseId = `${window.currentUser.uid}_${weekStart}`;
  let savedScore = null;
  try {
    const snap = await getDoc(doc(db, 'induction_pulses', pulseId));
    if (snap.exists()) savedScore = snap.data().score;
  } catch (err) {}
  document.querySelectorAll('.pulse-emoji').forEach(el => {
    if (parseInt(el.dataset.score, 10) === savedScore) el.classList.add('selected');
    el.addEventListener('click', () => savePulse(parseInt(el.dataset.score, 10), el));
  });
  if (savedScore) document.getElementById('pulseMeta').textContent = 'Recorded for this week.';
}

async function savePulse(score, el) {
  document.querySelectorAll('.pulse-emoji').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  const weekStart = isoWeekStart(new Date());
  const pulseId = `${window.currentUser.uid}_${weekStart}`;
  const payload = {
    // @lint-allow-uid
    uid: window.currentUser.uid,
    programId: assignment.programId,
    schoolId: window.userProfile?.schoolId || 'eduversal_hq',
    stageId: currentWindow?.stageId || null,
    weekStartDate: Timestamp.fromDate(new Date(weekStart)),
    score, createdAt: serverTimestamp(),
  };
  try {
    await setDoc(doc(db, 'induction_pulses', pulseId), payload);
    document.getElementById('pulseMeta').textContent = 'Recorded for this week.';
  } catch (err) { console.error('savePulse', err); }
}

function isoWeekStart(d) {
  const date = new Date(d);
  const day = date.getDay() || 7;
  if (day !== 1) date.setHours(-24 * (day - 1));
  return date.toISOString().slice(0, 10);
}
