<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competency Admin — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <!-- SHARED_NAVBAR -->
  <style>
    :root { --accent: #0d9488; --accent-dk: #0f766e; --accent-2: #ccfbf1; }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #0f1e1a 0%, #0e3530 55%, #071814 100%);
      padding: 40px 40px 36px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 10% 72%, rgba(13,148,136,0.22) 0%, transparent 50%),
        radial-gradient(circle at 84% 18%, rgba(20,184,166,0.14) 0%, transparent 48%);
    }
    .hero-inner {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }
    .hero-eyebrow { font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.38); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .hero-title { font-family: 'Lora', serif; font-size: 2rem; font-weight: 600; color: #fff; margin-bottom: 8px; line-height: 1.2; }
    .hero-sub { font-size: 0.875rem; color: rgba(255,255,255,0.42); }

    /* ===== PAGE WRAP ===== */
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 40px 64px; }

    /* ===== STATS ===== */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: linear-gradient(145deg, #fff 0%, #fbfaf8 100%);
      border: 1px solid #e5e0d8; border-radius: var(--radius);
      padding: 20px 22px; box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .stat-card:nth-child(1) { background: linear-gradient(145deg,#fff 0%,#f0fdfa 100%); border-color: #99f6e4; }
    .stat-card:nth-child(2) { background: linear-gradient(145deg,#fff 0%,#fef9f0 100%); border-color: #fed7aa; }
    .stat-card:nth-child(3) { background: linear-gradient(145deg,#fff 0%,#f0fdf4 100%); border-color: #bbf7d0; }
    .stat-card:nth-child(4) { background: linear-gradient(145deg,#fff 0%,#f5f3ff 100%); border-color: #ddd6fe; }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--ink); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 0.78rem; color: var(--ink-3); font-weight: 500; }

    /* ===== TABS ===== */
    .tab-bar {
      display: flex; gap: 2px; border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab {
      padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--ink-3);
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s; white-space: nowrap;
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ===== EVIDENCE REVIEW LIST ===== */
    .evidence-list { display: flex; flex-direction: column; gap: 12px; }

    .ev-card {
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow .2s;
    }
    .ev-card:hover { box-shadow: var(--shadow); }
    .ev-card.status-pending { border-left: 3px solid #f59e0b; }
    .ev-card.status-approved { border-left: 3px solid #22c55e; }
    .ev-card.status-rejected { border-left: 3px solid #ef4444; }
    .ev-card.status-under-review { border-left: 3px solid #3b82f6; }

    .ev-card-header {
      padding: 16px 18px; display: flex; align-items: flex-start; gap: 12px;
    }
    .ev-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
    }
    .ev-body { flex: 1; min-width: 0; }
    .ev-user { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
    .ev-comp { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
    .ev-desc { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin-bottom: 8px; }
    .ev-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .ev-date { font-size: 11px; color: var(--ink-3); }
    .ev-file { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); font-weight: 600; }

    .platform-tag {
      display: inline-flex; padding: 2px 8px; border-radius: 50px;
      font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    }
    .platform-tag.teachers { background: #ede9fe; color: #7c3aed; }
    .platform-tag.academic { background: #ccfbf1; color: #0f766e; }

    .ev-status-badge {
      display: inline-flex; padding: 3px 10px; border-radius: 50px;
      font-size: 11px; font-weight: 700;
    }
    .ev-status-badge.pending { background: #fef3c7; color: #92400e; }
    .ev-status-badge.approved { background: #dcfce7; color: #15803d; }
    .ev-status-badge.rejected { background: #ffe4e6; color: #be123c; }
    .ev-status-badge.under-review { background: #dbeafe; color: #1d4ed8; }

    .level-badge {
      display: inline-flex; padding: 2px 8px; border-radius: 50px;
      font-size: 10px; font-weight: 700;
    }
    .lvl-awareness { background: #e0f2fe; color: #0369a1; }
    .lvl-practitioner { background: #fef3c7; color: #92400e; }
    .lvl-advanced { background: #ede9fe; color: #6d28d9; }
    .lvl-lead { background: #dcfce7; color: #15803d; }

    /* ===== ACTION PANEL ===== */
    .ev-actions {
      padding: 14px 18px; border-top: 1px solid var(--border);
      background: #fafaf8; display: flex; gap: 10px; align-items: flex-start;
      flex-wrap: wrap;
    }
    .ev-note-input {
      flex: 1; min-width: 200px; padding: 9px 12px; border-radius: 9px;
      border: 1.5px solid var(--border); background: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink);
      transition: border-color .15s;
    }
    .ev-note-input:focus { outline: none; border-color: var(--accent); }
    .ev-note-input::placeholder { color: var(--ink-3); }
    .btn-approve {
      padding: 9px 18px; border-radius: 9px; border: none;
      background: #22c55e; color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all .15s; display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn-approve:hover { background: #16a34a; }
    .btn-reject {
      padding: 9px 18px; border-radius: 9px; border: none;
      background: #ef4444; color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all .15s; display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn-reject:hover { background: #dc2626; }
    .btn-review {
      padding: 9px 18px; border-radius: 9px;
      border: 1.5px solid #3b82f6; background: #eff6ff; color: #1d4ed8;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all .15s; white-space: nowrap;
    }
    .btn-review:hover { background: #dbeafe; }

    /* ===== CERTIFICATE ISSUE PANEL ===== */
    .cert-issue-card {
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      padding: 22px; box-shadow: var(--shadow-sm); margin-bottom: 12px;
    }
    .cert-issue-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
    .cert-issue-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .cert-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
    .cert-label { font-size: 11px; font-weight: 700; color: var(--ink-3); letter-spacing: .05em; text-transform: uppercase; }
    .cert-select, .cert-input {
      padding: 9px 12px; border-radius: 9px; border: 1.5px solid var(--border);
      background: var(--paper); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink);
      transition: border-color .15s;
    }
    .cert-select:focus, .cert-input:focus { outline: none; border-color: var(--accent); background: #fff; }
    .btn-issue-cert {
      padding: 10px 22px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .18s;
      white-space: nowrap;
    }
    .btn-issue-cert:hover { background: var(--accent-dk); transform: translateY(-1px); }
    .btn-issue-cert:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ===== ISSUED CERTS TABLE ===== */
    .certs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .certs-table th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .07em; border-bottom: 2px solid var(--border); background: var(--paper); }
    .certs-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--ink); vertical-align: top; }
    .certs-table tr:last-child td { border-bottom: none; }
    .certs-table tr:hover td { background: #fafaf8; }

    /* ===== FILTER BAR ===== */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
    .filter-chip {
      padding: 6px 14px; border-radius: 50px; border: 1.5px solid var(--border);
      background: #fff; font-size: 12px; font-weight: 600; color: var(--ink-3);
      cursor: pointer; transition: all .15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { border-color: var(--accent); background: var(--accent-2); color: var(--accent); }

    /* ===== EMPTY STATE ===== */
    .empty-state { text-align: center; padding: 52px 20px; color: var(--ink-3); font-size: 14px; }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; }

    /* ===== REVOKE CONFIRM ===== */
    [data-confirming] { background: #ef4444 !important; }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .page-wrap { padding: 20px 16px 60px; }
      .hero { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div>
      <p class="hero-eyebrow">CentralHub · Admin</p>
      <h1 class="hero-title">Competency Admin</h1>
      <p class="hero-sub">Review evidence submissions, approve or reject competency claims, and issue official certificates to teachers and administrators.</p>
    </div>
  </div>
</div>

<div class="page-wrap">

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="skel" style="height:50px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:50px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:50px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:50px;"></div></div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('review', this)">Evidence Review</div>
    <div class="tab" onclick="switchTab('issue', this)">Issue Certificates</div>
    <div class="tab" onclick="switchTab('issued', this)">Issued Certificates</div>
  </div>

  <!-- TAB: EVIDENCE REVIEW -->
  <div id="tab-review">
    <div class="filter-bar">
      <span style="font-size:12px;font-weight:600;color:var(--ink-3);">Status:</span>
      <button class="filter-chip active" onclick="setEvFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setEvFilter('pending',this)">Pending</button>
      <button class="filter-chip" onclick="setEvFilter('under-review',this)">Under Review</button>
      <button class="filter-chip" onclick="setEvFilter('approved',this)">Approved</button>
      <button class="filter-chip" onclick="setEvFilter('rejected',this)">Rejected</button>
      <span style="font-size:12px;font-weight:600;color:var(--ink-3);margin-left:8px;">Platform:</span>
      <button class="filter-chip active" onclick="setPlatFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setPlatFilter('teachers',this)">Teachers</button>
      <button class="filter-chip" onclick="setPlatFilter('academic',this)">Academic</button>
    </div>
    <div class="evidence-list" id="evidenceList">
      <div class="skel" style="height:100px;border-radius:14px;"></div>
      <div class="skel" style="height:100px;border-radius:14px;"></div>
    </div>
  </div>

  <!-- TAB: ISSUE CERTIFICATES -->
  <div id="tab-issue" style="display:none;">
    <div class="cert-issue-card">
      <div class="cert-issue-title">Issue Certificate Manually</div>
      <div class="cert-issue-form">
        <div class="cert-field">
          <label class="cert-label">Platform</label>
          <select class="cert-select" id="certPlatform">
            <option value="teachers">Teachers Hub</option>
            <option value="academic">Academic Hub</option>
          </select>
        </div>
        <div class="cert-field">
          <label class="cert-label">User Email</label>
          <input class="cert-input" id="certUserEmail" type="email" placeholder="user@school.sch.id">
        </div>
        <div class="cert-field">
          <label class="cert-label">Domain</label>
          <select class="cert-select" id="certDomain">
            <option value="">— select platform first —</option>
          </select>
        </div>
        <div class="cert-field">
          <label class="cert-label">Note (optional)</label>
          <input class="cert-input" id="certNote" type="text" placeholder="e.g. Issued after portfolio review">
        </div>
        <button class="btn-issue-cert" onclick="issueCertificate()">🎓 Issue Certificate</button>
      </div>
      <div id="certIssueError" style="font-size:12px;color:#dc2626;margin-top:10px;display:none;"></div>
      <div id="certIssueSuccess" style="font-size:13px;font-weight:600;color:#15803d;margin-top:10px;background:#dcfce7;border-radius:10px;padding:12px 14px;display:none;"></div>
    </div>
  </div>

  <!-- TAB: ISSUED CERTIFICATES -->
  <div id="tab-issued" style="display:none;">
    <div id="issuedCertsWrap">
      <div class="skel" style="height:60px;border-radius:10px;margin-bottom:8px;"></div>
    </div>
  </div>

</div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
import {
  collection, doc, getDoc, getDocs, updateDoc, addDoc,
  query, where, orderBy, serverTimestamp, limit
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const TEACHERS_DOMAINS = [
  {id:'curriculum',name:'Curriculum Design & Delivery'},
  {id:'assessment',name:'Assessment & Feedback'},
  {id:'classroom',name:'Classroom Management'},
  {id:'pedagogy',name:'Pedagogical Practice'},
  {id:'digital',name:'Digital Literacy & EdTech'},
  {id:'professional',name:'Professional Growth & Leadership'},
];
const ACADEMIC_DOMAINS = [
  {id:'data-leadership',name:'Data-Driven Leadership'},
  {id:'curriculum-oversight',name:'Curriculum Oversight & Quality'},
  {id:'staff-development',name:'Staff Development & Appraisal'},
  {id:'strategic-planning',name:'Strategic Planning & Improvement'},
  {id:'accreditation',name:'Accreditation & Compliance'},
  {id:'student-outcomes',name:'Student Outcomes & Wellbeing'},
];
const LEVEL_LABEL = {awareness:'Awareness',practitioner:'Practitioner',advanced:'Advanced',lead:'Lead / Mentor'};

let isAdmin = false;
let allEvidence = [];
let evFilter = 'all';
let platFilter = 'all';
let allCerts = [];

document.addEventListener('authReady', async ({ detail: { user, profile } }) => {
  isAdmin = profile?.role_centralhub === 'central_admin';
  if (!isAdmin) {
    document.querySelector('.hero-sub').textContent = 'Read-only view — admin access required to review or issue certificates.';
  }
  await Promise.all([loadEvidence(), loadIssuedCerts()]);
  renderStats();
  renderEvidence();
  populateDomainDropdown();
});

async function loadEvidence() {
  const q = query(
    collection(window.db, 'competency_evidence'),
    orderBy('createdAt', 'desc'),
    limit(200)
  );
  const snap = await getDocs(q);
  allEvidence = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function loadIssuedCerts() {
  const q = query(collection(window.db, 'competency_certificates'), orderBy('issuedAt', 'desc'), limit(200));
  const snap = await getDocs(q);
  allCerts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

function renderStats() {
  const pending = allEvidence.filter(e => e.status === 'pending').length;
  const underReview = allEvidence.filter(e => e.status === 'under-review').length;
  const approved = allEvidence.filter(e => e.status === 'approved').length;
  const certs = allCerts.length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${pending}</div><div class="stat-label">Pending Review</div></div>
    <div class="stat-card"><div class="stat-num">${underReview}</div><div class="stat-label">Under Review</div></div>
    <div class="stat-card"><div class="stat-num">${approved}</div><div class="stat-label">Approved Submissions</div></div>
    <div class="stat-card"><div class="stat-num">${certs}</div><div class="stat-label">Certificates Issued</div></div>
  `;
}

function renderEvidence() {
  let filtered = allEvidence;
  if (evFilter !== 'all') filtered = filtered.filter(e => e.status === evFilter);
  if (platFilter !== 'all') filtered = filtered.filter(e => e.platform === platFilter);

  const list = document.getElementById('evidenceList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📂</div>No evidence submissions found.</div>';
    return;
  }

  const statusMap = {pending:'Pending Review','under-review':'Under Review',approved:'Approved',rejected:'Revise & Resubmit'};

  list.innerHTML = filtered.map(ev => {
    const initials = (ev.userDisplayName || ev.userEmail || '?').substring(0, 2).toUpperCase();
    const date = ev.createdAt?.toDate?.()?.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) || '';
    const actionsDisabled = !isAdmin;

    return `
      <div class="ev-card status-${ev.status}" id="ev-${ev.id}">
        <div class="ev-card-header">
          <div class="ev-avatar">${initials}</div>
          <div class="ev-body">
            <div class="ev-user">${ev.userDisplayName || ev.userEmail || 'Unknown User'}</div>
            <div class="ev-comp">${ev.domain} — ${ev.compName}</div>
            <div class="ev-desc">${ev.description}</div>
            <div class="ev-meta">
              <span class="platform-tag ${ev.platform}">${ev.platform}</span>
              <span class="ev-status-badge ${ev.status}">${statusMap[ev.status] || ev.status}</span>
              <span class="level-badge lvl-${ev.level}">${LEVEL_LABEL[ev.level] || ev.level}</span>
              <span class="ev-date">${date}</span>
              ${ev.fileName ? `<span class="ev-file">📎 ${ev.fileName}</span>` : ''}
            </div>
            ${ev.reviewerNote ? `<div style="margin-top:8px;font-size:12px;font-style:italic;color:var(--ink-3);">Reviewer note: ${ev.reviewerNote}</div>` : ''}
          </div>
        </div>
        ${isAdmin && ev.status !== 'approved' ? `
        <div class="ev-actions">
          <input class="ev-note-input" id="note-${ev.id}" placeholder="Optional note to the user (shown with your decision)">
          <button class="btn-review" onclick="setUnderReview('${ev.id}')">👁 Mark Under Review</button>
          <button class="btn-approve" onclick="approveEvidence('${ev.id}','${ev.uid}','${ev.compId}','${ev.level}','${ev.platform}')">✓ Approve</button>
          <button class="btn-reject" onclick="rejectEvidence('${ev.id}')">✕ Reject</button>
        </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

window.setUnderReview = async function(evId) {
  await updateDoc(doc(window.db, 'competency_evidence', evId), {
    status: 'under-review', updatedAt: serverTimestamp()
  });
  const idx = allEvidence.findIndex(e => e.id === evId);
  if (idx >= 0) allEvidence[idx].status = 'under-review';
  renderStats(); renderEvidence();
};

window.approveEvidence = async function(evId, userUid, compId, level, platform) {
  const note = document.getElementById(`note-${evId}`)?.value?.trim() || null;

  // 1. Mark evidence as approved
  await updateDoc(doc(window.db, 'competency_evidence', evId), {
    status: 'approved',
    reviewerNote: note,
    reviewedBy: window.currentUser.uid,
    updatedAt: serverTimestamp(),
  });

  // 2. Update user's earned competencies
  const earnedField = platform === 'academic' ? 'earned_academic' : 'earned';
  const ucRef = doc(window.db, 'user_competencies', userUid);
  const ucSnap = await getDoc(ucRef);
  const existing = ucSnap.exists() ? (ucSnap.data()[earnedField] || {}) : {};
  existing[compId] = { level, approvedAt: new Date().toISOString(), evidenceId: evId };
  await updateDoc(ucRef, { [earnedField]: existing });

  const idx = allEvidence.findIndex(e => e.id === evId);
  if (idx >= 0) { allEvidence[idx].status = 'approved'; allEvidence[idx].reviewerNote = note; }
  renderStats(); renderEvidence();
};

window.rejectEvidence = async function(evId) {
  const note = document.getElementById(`note-${evId}`)?.value?.trim() || '';
  if (!note) {
    alert('Please add a note explaining what needs improvement before rejecting.');
    document.getElementById(`note-${evId}`)?.focus();
    return;
  }
  await updateDoc(doc(window.db, 'competency_evidence', evId), {
    status: 'rejected',
    reviewerNote: note,
    reviewedBy: window.currentUser.uid,
    updatedAt: serverTimestamp(),
  });
  const idx = allEvidence.findIndex(e => e.id === evId);
  if (idx >= 0) { allEvidence[idx].status = 'rejected'; allEvidence[idx].reviewerNote = note; }
  renderStats(); renderEvidence();
};

// ─── CERTIFICATE ISSUANCE ─────────────────────────────────────────────────────
function populateDomainDropdown() {
  const platSel = document.getElementById('certPlatform');
  const updateDomains = () => {
    const domains = platSel.value === 'academic' ? ACADEMIC_DOMAINS : TEACHERS_DOMAINS;
    document.getElementById('certDomain').innerHTML =
      '<option value="">— select domain —</option>' +
      domains.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
  };
  platSel.addEventListener('change', updateDomains);
  updateDomains();
}

window.issueCertificate = async function() {
  const platform = document.getElementById('certPlatform').value;
  const email = document.getElementById('certUserEmail').value.trim().toLowerCase();
  const domainId = document.getElementById('certDomain').value;
  const note = document.getElementById('certNote').value.trim();

  const errEl = document.getElementById('certIssueError');
  const succEl = document.getElementById('certIssueSuccess');
  errEl.style.display = 'none'; succEl.style.display = 'none';

  if (!email) { errEl.textContent = 'User email is required.'; errEl.style.display = 'block'; return; }
  if (!domainId) { errEl.textContent = 'Please select a domain.'; errEl.style.display = 'block'; return; }

  // Look up user by email
  const usersQ = query(collection(window.db, 'users'), where('email', '==', email), limit(1));
  const usersSnap = await getDocs(usersQ);
  if (usersSnap.empty) { errEl.textContent = 'No user found with that email address.'; errEl.style.display = 'block'; return; }

  const userDoc = usersSnap.docs[0];
  const userData = userDoc.data();
  const uid = userDoc.id;

  const domains = platform === 'academic' ? ACADEMIC_DOMAINS : TEACHERS_DOMAINS;
  const domainObj = domains.find(d => d.id === domainId);

  // Check for duplicate
  const dupQ = query(
    collection(window.db, 'competency_certificates'),
    where('uid', '==', uid),
    where('platform', '==', platform),
    where('domainId', '==', domainId)
  );
  const dupSnap = await getDocs(dupQ);
  if (!dupSnap.empty) {
    errEl.textContent = 'This user already has a certificate for this domain on this platform.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.querySelector('.btn-issue-cert');
  btn.disabled = true; btn.textContent = 'Issuing…';
  try {
    const certRef = await addDoc(collection(window.db, 'competency_certificates'), {
      uid,
      userEmail: userData.email,
      userDisplayName: userData.displayName || '',
      platform,
      domainId,
      domainName: domainObj?.name || domainId,
      issuedBy: window.currentUser.email,
      issuedByUid: window.currentUser.uid,
      note: note || null,
      issuedAt: serverTimestamp(),
    });
    succEl.textContent = `✓ Certificate issued to ${userData.displayName || email} for "${domainObj?.name}" (${platform}). ID: ${certRef.id.substring(0,8).toUpperCase()}`;
    succEl.style.display = 'block';
    await loadIssuedCerts();
    renderStats();
    renderIssuedCerts();
  } catch (err) {
    errEl.textContent = 'Failed to issue certificate: ' + err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '🎓 Issue Certificate';
  }
};

function renderIssuedCerts() {
  const wrap = document.getElementById('issuedCertsWrap');
  if (!allCerts.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div>No certificates issued yet.</div>';
    return;
  }
  wrap.innerHTML = `
    <table class="certs-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Platform</th>
          <th>Domain</th>
          <th>Issued</th>
          <th>Issued By</th>
          <th>Cert ID</th>
          ${isAdmin ? '<th>Actions</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${allCerts.map(cert => {
          const date = cert.issuedAt?.toDate?.()?.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) || '';
          return `
            <tr>
              <td><div style="font-weight:600;">${cert.userDisplayName || cert.userEmail}</div><div style="font-size:11px;color:var(--ink-3);">${cert.userEmail}</div></td>
              <td><span class="platform-tag ${cert.platform}">${cert.platform}</span></td>
              <td style="font-size:13px;">${cert.domainName}</td>
              <td style="font-size:12px;color:var(--ink-3);">${date}</td>
              <td style="font-size:12px;color:var(--ink-3);">${cert.issuedBy || '—'}</td>
              <td><span style="font-family:'DM Mono',monospace;font-size:11px;">${cert.id.substring(0,8).toUpperCase()}</span></td>
              ${isAdmin ? `<td><button style="padding:5px 12px;border-radius:8px;border:1px solid #fca5a5;background:#ffe4e6;color:#dc2626;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;" onclick="revokeCert('${cert.id}',this)">Revoke</button></td>` : ''}
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

window.revokeCert = async function(certId, btn) {
  if (!btn.dataset.confirming) {
    btn.dataset.confirming = '1';
    btn.textContent = 'Confirm Revoke';
    setTimeout(() => { if (btn.dataset.confirming) { btn.dataset.confirming = ''; btn.textContent = 'Revoke'; } }, 3000);
    return;
  }
  // Actually would deleteDoc — but instead we mark revoked to keep audit trail
  await updateDoc(doc(window.db, 'competency_certificates', certId), {
    revoked: true, revokedAt: serverTimestamp(), revokedBy: window.currentUser.uid
  });
  const idx = allCerts.findIndex(c => c.id === certId);
  if (idx >= 0) allCerts.splice(idx, 1);
  renderIssuedCerts(); renderStats();
};

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
window.switchTab = function(tab, el) {
  ['review','issue','issued'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'issued') renderIssuedCerts();
};

window.setEvFilter = function(f, btn) {
  evFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => {
    if (['all','pending','under-review','approved','rejected'].includes(c.textContent.toLowerCase().replace(' ','')) ||
        c.textContent === 'All' || c.textContent === 'Pending' || c.textContent.includes('Review') ||
        c.textContent === 'Approved' || c.textContent === 'Rejected') {
      c.classList.remove('active');
    }
  });
  btn.classList.add('active');
  renderEvidence();
};
window.setPlatFilter = function(f, btn) {
  platFilter = f;
  // reset platform filter buttons only
  document.querySelectorAll('.filter-chip').forEach(c => {
    if (c.textContent === 'All' || c.textContent === 'Teachers' || c.textContent === 'Academic') {
      c.classList.remove('active');
    }
  });
  btn.classList.add('active');
  renderEvidence();
};
</script>
</body>
