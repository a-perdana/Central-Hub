<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EASE Item Author — CentralHub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%236c5ce7'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    :root { --accent: #0891b2; --accent-dk: #0e7490; --accent-2: #ecfeff; }
    .hero { background: linear-gradient(140deg, #083344 0%, #155e75 50%, #0891b2 100%); padding: 36px 40px; color: #fff; }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero h1 { font-family: 'Lora', serif; font-size: 1.8rem; }
    .hero p { color: rgba(255,255,255,.7); font-size: .9rem; max-width: 620px; }
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 32px 80px; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
    .toolbar select, .toolbar input { padding: 8px 12px; font-family: inherit; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }
    .btn-primary { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-secondary { padding: 7px 14px; background: #fff; color: var(--ink); border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; cursor: pointer; }
    .btn-danger { padding: 7px 14px; background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; border-radius: 8px; font-family: inherit; font-size: 13px; cursor: pointer; }

    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .stat-num { font-family: 'Lora', serif; font-size: 1.5rem; line-height: 1; }
    .stat-lbl { font-size: 11.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    table.items { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 12px; border-collapse: separate; border-spacing: 0; overflow: hidden; }
    table.items th { padding: 11px 14px; text-align: left; font-size: 11.5px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; background: var(--paper); border-bottom: 1px solid var(--border); }
    table.items td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
    table.items tr:last-child td { border-bottom: none; }
    .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
    .pill-easy { background: #dcfce7; color: #166534; }
    .pill-medium { background: #fef3c7; color: #92400e; }
    .pill-hard { background: #fee2e2; color: #b91c1c; }
    .pill-mcq { background: #ede9fe; color: #6c5ce7; }
    .pill-numeric { background: #ecfeff; color: #0891b2; }
    .pill-short { background: #fef3c7; color: #92400e; }
    .pill-pilot { background: #fef3c7; color: #92400e; }
    .pill-calibrated { background: #dcfce7; color: #166534; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 40px 20px; }
    .modal-overlay.is-open { display: flex; }
    .modal { background: #fff; border-radius: 14px; width: min(640px, 100%); max-height: calc(100vh - 80px); display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
    .modal h2 { font-family: 'Lora', serif; font-size: 1.3rem; padding: 24px 24px 0; }
    .modal-body { padding: 14px 24px 4px; overflow-y: auto; flex: 1 1 auto; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 24px; border-top: 1px solid var(--border); background: #fff; flex-shrink: 0; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12.5px; font-weight: 500; color: var(--ink-2); margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; font-family: inherit; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .empty { text-align: center; padding: 60px 20px; color: var(--ink-3); }
    .empty-title { font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
    .access-warn { padding: 14px 18px; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; border-radius: 10px; margin-bottom: 18px; font-size: 13px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 18px; background: var(--ink); color: #fff; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .2s; z-index: 999; }
    .toast.is-visible { opacity: 1; }
  </style>
</head>
<body>
  <script src="firebase-config.js"></script>
  <script type="module" src="auth-guard.js"></script>

  <!-- SHARED_NAVBAR -->

  <header class="hero">
    <div class="hero-inner">
      <div style="font-size:.7rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.45); margin-bottom:8px;">EASE Growth Engine</div>
      <h1>EASE Item Author</h1>
      <p>Author the adaptive 3-band item bank for EASE Growth (Math / English / Science). Easy / Medium / Hard difficulty bands bootstrap the Rasch-lite engine; calibrated logits replace them after enough live response data.</p>
    </div>
  </header>

  <main class="page-wrap">
    <a href="index" style="font-size:.86rem; color:var(--ink-3); text-decoration:none;">← Back to Central Hub</a>
    <div id="accessWarn" class="access-warn" hidden style="margin-top:18px"></div>

    <div class="stat-row" id="statRow" style="margin-top:18px"></div>

    <div class="toolbar">
      <select id="fSubject"><option value="">All subjects</option><option value="math">Math</option><option value="english">English</option><option value="science">Science</option></select>
      <select id="fDifficulty"><option value="">All difficulties</option><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select>
      <select id="fType"><option value="">All types</option><option value="mcq">MCQ</option><option value="numeric">Numeric</option><option value="short">Short</option></select>
      <input id="fSearch" placeholder="Search by stem…">
      <span style="margin-left:auto"></span>
      <button id="newItemBtn" class="btn-primary">+ New EASE item</button>
    </div>

    <div id="itemsBox"></div>
  </main>

  <div id="itemModal" class="modal-overlay" role="dialog" aria-hidden="true">
    <div class="modal" style="width: min(1100px, 100%); max-width: 1100px;">
      <h2 id="iModalTitle">New EASE item</h2>
      <div class="modal-body" id="easeEditorMount" style="padding: 18px 22px;"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import {
      collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, getDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { mountQuestionEditor } from './partials/question-editor.js';

    let items = [];
    let unsub = null;
    let editingId = null;

    document.addEventListener('authReady', () => {
      const profile = window.userProfile || {};
      const isAdmin = profile.role_centralhub === 'central_admin';
      const sub = profile.ch_sub_roles || [];
      if (!(isAdmin || sub.includes('director') || sub.includes('coordinator'))) {
        document.getElementById('accessWarn').hidden = false;
        document.getElementById('accessWarn').textContent = 'EASE item authoring restricted to central_admin / director / coordinator.';
        return;
      }
      subscribe();
    });

    function subscribe() {
      if (unsub) unsub();
      unsub = onSnapshot(collection(window.db, 'ease_items'),
        snap => { items = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); },
        err => console.error('[ease-item-author] subscribe error', err)
      );
    }

    document.getElementById('fSubject').addEventListener('change', render);
    document.getElementById('fDifficulty').addEventListener('change', render);
    document.getElementById('fType').addEventListener('change', render);
    document.getElementById('fSearch').addEventListener('input', render);
    document.getElementById('newItemBtn').addEventListener('click', () => openItem(null));

    function render() {
      const subj = document.getElementById('fSubject').value;
      const diff = document.getElementById('fDifficulty').value;
      const type = document.getElementById('fType').value;
      const search = (document.getElementById('fSearch').value || '').trim().toLowerCase();
      const filtered = items.filter(it => {
        if (subj && it.subjectId !== subj) return false;
        if (diff && it.difficulty !== diff) return false;
        if (type && it.type !== type) return false;
        if (search && !(it.stem || '').toLowerCase().includes(search)) return false;
        return true;
      }).sort((a, b) => (a.subjectId || '').localeCompare(b.subjectId || '') || (a.difficulty || '').localeCompare(b.difficulty || ''));

      const counts = { math: 0, english: 0, science: 0, easy: 0, medium: 0, hard: 0 };
      items.forEach(i => {
        if (counts[i.subjectId] != null) counts[i.subjectId]++;
        if (counts[i.difficulty] != null) counts[i.difficulty]++;
      });
      document.getElementById('statRow').innerHTML = `
        <div class="stat-card"><div class="stat-num">${items.length}</div><div class="stat-lbl">Total items</div></div>
        <div class="stat-card"><div class="stat-num">${counts.math}</div><div class="stat-lbl">Math</div></div>
        <div class="stat-card"><div class="stat-num">${counts.english}</div><div class="stat-lbl">English</div></div>
        <div class="stat-card"><div class="stat-num">${counts.science}</div><div class="stat-lbl">Science</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#16a34a">${counts.easy}</div><div class="stat-lbl">Easy</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#92400e">${counts.medium}</div><div class="stat-lbl">Medium</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#b91c1c">${counts.hard}</div><div class="stat-lbl">Hard</div></div>
      `;

      const box = document.getElementById('itemsBox');
      if (filtered.length === 0) {
        box.innerHTML = '<div class="empty"><div class="empty-title">No items</div>Click + New EASE item to author one.</div>';
        return;
      }
      box.innerHTML = `
        <table class="items">
          <thead><tr><th>Subject</th><th>Difficulty</th><th>Type</th><th>Stem</th><th>Strand</th><th>Phase</th><th></th></tr></thead>
          <tbody>${filtered.map(it => `
            <tr>
              <td><strong>${escHtml(it.subjectId)}</strong></td>
              <td><span class="pill pill-${escAttr(it.difficulty)}">${escHtml(it.difficulty)}</span></td>
              <td><span class="pill pill-${escAttr(it.type)}">${escHtml(it.type)}</span></td>
              <td>${escHtml((it.stem || '').slice(0, 90))}${(it.stem||'').length > 90 ? '…' : ''}</td>
              <td style="color:var(--ink-3); font-size:12px">${escHtml(it.strandCode || '—')}</td>
              <td>${it.pilotPhase === false ? '<span class="pill pill-calibrated">calibrated</span>' : '<span class="pill pill-pilot">pilot</span>'}</td>
              <td style="text-align:right"><button class="btn-secondary" data-act="edit" data-id="${escAttr(it.id)}">Edit</button> <button class="btn-danger" data-act="del" data-id="${escAttr(it.id)}">Del</button></td>
            </tr>
          `).join('')}</tbody>
        </table>
      `;
      box.querySelectorAll('button[data-act]').forEach(b => {
        b.addEventListener('click', () => action(b.dataset.act, b.dataset.id));
      });
    }

    async function action(act, id) {
      if (act === 'edit') return openItem(id);
      if (act === 'del') {
        if (!confirm('Delete this item?')) return;
        try { await deleteDoc(doc(window.db, 'ease_items', id)); toast('Deleted.'); }
        catch (e) { toast('Failed: ' + (e.message || e.code)); }
      }
    }

    // Item editor: shared rich editor (markdown + LaTeX + Cambridge metadata)
    // + EASE-specific extra fields (strandCode, stage_min, stage_max) injected
    // into the metadata column via the editor's extraFieldsHtml hook.
    let activeEditor = null;
    let easeExtraState = { strandCode: '', stage_min: 7, stage_max: 9 };

    const EASE_EXTRA_HTML = `
      <div class="qe-section" style="background:#fff;border:1px solid var(--border,#e5e7eb);border-radius:10px;padding:14px;margin-bottom:14px;">
        <h3 style="font-family:'Lora',serif;font-size:.98rem;margin:0 0 10px;font-weight:600;">EASE adaptive scope</h3>
        <div class="qe-row" style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--ink-2,#444);">Strand code</label>
          <input id="easeStrand" type="text" placeholder="e.g. algebra, reading, cell-biology" style="padding:8px 10px;border:1px solid var(--border,#e5e7eb);border-radius:8px;font:inherit;font-size:13px;">
        </div>
        <div class="qe-row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:12px;font-weight:600;color:var(--ink-2,#444);">Stage min</label>
            <input id="easeStageMin" type="number" min="7" max="12" value="7" style="padding:8px 10px;border:1px solid var(--border,#e5e7eb);border-radius:8px;font:inherit;font-size:13px;">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:12px;font-weight:600;color:var(--ink-2,#444);">Stage max</label>
            <input id="easeStageMax" type="number" min="7" max="12" value="9" style="padding:8px 10px;border:1px solid var(--border,#e5e7eb);border-radius:8px;font:inherit;font-size:13px;">
          </div>
        </div>
      </div>
    `;

    async function openItem(id) {
      editingId = id;
      let it = { type: 'mcq', difficulty: 'medium', subjectId: 'math', strandCode: '', stem: '', options: ['', '', '', ''], correctIdx: 0, stage_min: 7, stage_max: 9 };
      if (id) {
        const snap = await getDoc(doc(window.db, 'ease_items', id));
        if (snap.exists()) it = { id, ...snap.data() };
      }
      easeExtraState = {
        strandCode: it.strandCode || '',
        stage_min:  Number(it.stage_min) || 7,
        stage_max:  Number(it.stage_max) || 9,
      };
      document.getElementById('iModalTitle').textContent = id ? 'Edit EASE item' : 'New EASE item';
      const mount = document.getElementById('easeEditorMount');
      mount.innerHTML = '<div style="padding:30px;text-align:center;color:#888">Loading editor…</div>';
      document.getElementById('itemModal').classList.add('is-open');

      activeEditor = await mountQuestionEditor(mount, {
        mode: 'ease',
        initialItem: it,
        extraFieldsHtml: EASE_EXTRA_HTML,
        extraFieldsBind: (root) => {
          const strand = root.querySelector('#easeStrand');
          const smin   = root.querySelector('#easeStageMin');
          const smax   = root.querySelector('#easeStageMax');
          if (strand) {
            strand.value = easeExtraState.strandCode || '';
            strand.addEventListener('input', () => { easeExtraState.strandCode = strand.value; });
          }
          if (smin) {
            smin.value = easeExtraState.stage_min;
            smin.addEventListener('input', () => { easeExtraState.stage_min = Number(smin.value) || 7; });
          }
          if (smax) {
            smax.value = easeExtraState.stage_max;
            smax.addEventListener('input', () => { easeExtraState.stage_max = Number(smax.value) || 9; });
          }
        },
        onSave: async (payload) => { await save(payload); closeItem(); },
        onCancel: closeItem,
      });
    }
    function closeItem() {
      document.getElementById('itemModal').classList.remove('is-open');
      if (activeEditor) { activeEditor.destroy(); activeEditor = null; }
    }

    async function save(corePayload) {
      try {
        const payload = {
          ...corePayload,
          strandCode: easeExtraState.strandCode.trim() || null,
          stage_min:  easeExtraState.stage_min,
          stage_max:  easeExtraState.stage_max,
          pilotPhase: true,
          seenCount:  0,
          correctRate: null,
          authorUid:  window.currentUser.uid,
          updatedAt:  serverTimestamp(),
        };
        if (editingId) {
          await updateDoc(doc(window.db, 'ease_items', editingId), payload);
        } else {
          payload.createdAt = serverTimestamp();
          await addDoc(collection(window.db, 'ease_items'), payload);
        }
        toast('Saved.');
      } catch (e) {
        console.error('[ease-item-author] save failed:', e);
        toast('Save failed: ' + (e.message || e.code));
      }
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('is-visible');
      setTimeout(() => t.classList.remove('is-visible'), 1800);
    }
    function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escAttr(s) { return escHtml(s); }
  </script>
</body>
</html>
