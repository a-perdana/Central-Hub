<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Health — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    /* ===== HERO ===== */
    .nh-hero {
      background: linear-gradient(135deg, #0a1628 0%, #0f2744 55%, #071020 100%);
      padding: 48px 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .nh-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 10% 70%, rgba(34,197,94,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(8,145,178,0.1) 0%, transparent 45%),
        radial-gradient(circle at 50% 110%, rgba(245,158,11,0.08) 0%, transparent 50%);
      animation: heroPulse 10s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes heroPulse {
      from { opacity: 0.7; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.03); }
    }
    .nh-hero-inner {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
    }
    .nh-hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .nh-hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .nh-hero-title {
      font-family: "Lora", serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .nh-hero-sub {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      max-width: 460px;
      line-height: 1.6;
    }

    /* Summary stat chips */
    .nh-summary-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
      padding-top: 4px;
    }
    .nh-sum-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px;
      padding: 14px 22px;
      min-width: 88px;
      gap: 6px;
      transition: background 0.2s;
    }
    .nh-sum-chip:hover { background: rgba(255,255,255,0.13); }
    .nh-sum-val {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .nh-sum-val.green  { color: #4ade80; }
    .nh-sum-val.amber  { color: #fbbf24; }
    .nh-sum-val.red    { color: #f87171; }
    .nh-sum-val.gray   { color: rgba(255,255,255,0.4); }
    .nh-sum-lbl {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.3;
    }

    /* Legend row */
    .nh-legend-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .nh-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.76rem;
      color: rgba(255,255,255,0.45);
    }
    .nh-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== FILTERS ===== */
    .nh-main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 48px 64px;
    }
    .nh-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .nh-search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
      max-width: 280px;
    }
    .nh-search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-3);
      pointer-events: none;
    }
    .nh-search {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: "DM Sans", sans-serif;
      font-size: 0.875rem;
      color: var(--ink);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .nh-search:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
    }
    .nh-filter-chips {
      display: flex;
      gap: 6px;
    }
    .nh-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--ink-2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: "DM Sans", sans-serif;
    }
    .nh-chip:hover { border-color: #22c55e; color: #16a34a; }
    .nh-chip.active { background: #16a34a; color: #fff; border-color: #16a34a; }
    .nh-chip.active.amber { background: #d97706; border-color: #d97706; }
    .nh-chip.active.red   { background: #dc2626; border-color: #dc2626; }
    .nh-results-meta {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--ink-3);
    }

    /* ===== SCHOOL GRID ===== */
    .nh-school-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .nh-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      display: block;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .nh-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

    .nh-card-accent {
      height: 4px;
    }
    .nh-card-accent.ok   { background: #22c55e; }
    .nh-card-accent.warn { background: #f59e0b; }
    .nh-card-accent.risk { background: #ef4444; }
    .nh-card-accent.na   { background: #e5e7eb; }

    .nh-card-body { padding: 16px 18px 14px; }
    .nh-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .nh-school-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
    }
    .nh-school-city {
      font-size: 0.76rem;
      color: var(--ink-3);
      margin-top: 2px;
    }
    .nh-status-badge {
      font-size: 0.67rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }
    .nh-status-badge.ok   { background: #dcfce7; color: #15803d; }
    .nh-status-badge.warn { background: #fef3c7; color: #92400e; }
    .nh-status-badge.risk { background: #fee2e2; color: #991b1b; }
    .nh-status-badge.na   { background: var(--paper-2); color: var(--ink-3); }

    .nh-metrics { display: flex; flex-direction: column; gap: 9px; }
    .nh-metric {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nh-metric-label {
      font-size: 0.76rem;
      color: var(--ink-3);
      min-width: 120px;
      flex-shrink: 0;
    }
    .nh-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--paper-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .nh-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.7s ease;
    }
    .nh-bar-fill.green { background: #22c55e; }
    .nh-bar-fill.amber { background: #f59e0b; }
    .nh-bar-fill.red   { background: #ef4444; }
    .nh-bar-fill.gray  { background: #d1d5db; }
    .nh-pct {
      font-size: 0.74rem;
      font-weight: 700;
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .nh-no-data {
      font-size: 0.73rem;
      color: var(--ink-3);
      font-style: italic;
    }

    .nh-card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 18px 12px;
      border-top: 1px solid var(--paper-2);
    }
    .nh-view-link {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nh-view-link:hover { text-decoration: underline; }

    /* Empty */
    .nh-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-3);
      font-size: 0.9rem;
    }
    .nh-empty svg { opacity: 0.2; margin-bottom: 14px; display: block; margin-inline: auto; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .nh-hero { padding: 32px 24px 28px; }
      .nh-main { padding: 24px 24px 48px; }
      .nh-hero-title { font-size: 1.75rem; }
      .nh-hero-top { flex-direction: column; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- SHARED_NAVBAR -->

<!-- ===== HERO ===== -->
<section class="nh-hero" aria-label="Network Health">
  <div class="nh-hero-inner">
    <div class="nh-hero-top">
      <div>
        <p class="nh-hero-eyebrow">Network Health · Central Hub</p>
        <h1 class="nh-hero-title">Network Health</h1>
        <p class="nh-hero-sub">Live pacing progress, checklist completion, and survey response rates across all partner schools.</p>
      </div>
      <div class="nh-summary-chips">
        <div class="nh-sum-chip">
          <span class="nh-sum-val" id="sumTotal"><span class="skel" style="width:28px;height:28px;border-radius:6px;display:inline-block"></span></span>
          <span class="nh-sum-lbl">Total<br>Schools</span>
        </div>
        <div class="nh-sum-chip">
          <span class="nh-sum-val green" id="sumOnTrack">—</span>
          <span class="nh-sum-lbl">On<br>Track</span>

        <div class="nh-sum-chip">
          <span class="nh-sum-val amber" id="sumAtRisk">—</span>
          <span class="nh-sum-lbl">At<br>Risk</span>
        </div>
        <div class="nh-sum-chip">
          <span class="nh-sum-val red" id="sumBehind">—</span>
          <span class="nh-sum-lbl">Behind</span>

      </div>
    </div>
    <div class="nh-legend-row">
      <div class="nh-legend-item"><div class="nh-legend-dot" style="background:#4ade80"></div>On track — avg ≥ 80%</div>
      <div class="nh-legend-item"><div class="nh-legend-dot" style="background:#fbbf24"></div>At risk — avg 50–79%</div>
      <div class="nh-legend-item"><div class="nh-legend-dot" style="background:#f87171"></div>Behind — avg &lt; 50%</div>
      <div class="nh-legend-item"><div class="nh-legend-dot" style="background:rgba(255,255,255,0.25)"></div>No data</div>
    </div>
  </div>
</section>

<!-- ===== MAIN ===== -->
<div class="nh-main">

  <!-- Toolbar -->
  <div class="nh-toolbar">
    <div class="nh-search-wrap">
      <svg class="nh-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="nh-search" id="nhSearch" type="search" placeholder="Search school…" aria-label="Search schools">
    </div>
    <div class="nh-filter-chips" role="group" aria-label="Status filter">
      <button class="nh-chip active" data-status="">All</button>
      <button class="nh-chip" data-status="ok">On Track</button>
      <button class="nh-chip" data-status="warn">At Risk</button>
      <button class="nh-chip active red" data-status="risk">Behind</button>
    </div>
    <span class="nh-results-meta" id="nhResultsMeta"></span>
  </div>

  <!-- Grid -->
  <div class="nh-school-grid" id="nhGrid">
    <!-- skeleton cards -->
    <div class="nh-card" style="pointer-events:none" aria-hidden="true">
      <div class="nh-card-accent na"></div>
      <div class="nh-card-body">
        <div class="nh-card-top">
          <div><span class="skel" style="width:140px;height:14px;display:block;margin-bottom:6px"></span><span class="skel" style="width:90px;height:11px;display:block"></span></div>
          <span class="skel" style="width:60px;height:20px;border-radius:10px;display:block"></span>
        </div>
        <div class="nh-metrics">
          <div class="nh-metric"><span class="skel" style="width:100px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
          <div class="nh-metric"><span class="skel" style="width:110px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
          <div class="nh-metric"><span class="skel" style="width:95px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
        </div>
      </div>
    </div>
    <div class="nh-card" style="pointer-events:none" aria-hidden="true">
      <div class="nh-card-accent na"></div>
      <div class="nh-card-body">
        <div class="nh-card-top">
          <div><span class="skel" style="width:120px;height:14px;display:block;margin-bottom:6px"></span><span class="skel" style="width:80px;height:11px;display:block"></span></div>
          <span class="skel" style="width:60px;height:20px;border-radius:10px;display:block"></span>
        </div>
        <div class="nh-metrics">
          <div class="nh-metric"><span class="skel" style="width:100px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
          <div class="nh-metric"><span class="skel" style="width:110px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
          <div class="nh-metric"><span class="skel" style="width:95px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
        </div>
      </div>
    </div>
    <div class="nh-card" style="pointer-events:none" aria-hidden="true">
      <div class="nh-card-accent na"></div>
      <div class="nh-card-body">
        <div class="nh-card-top">
          <div><span class="skel" style="width:155px;height:14px;display:block;margin-bottom:6px"></span><span class="skel" style="width:70px;height:11px;display:block"></span></div>
          <span class="skel" style="width:60px;height:20px;border-radius:10px;display:block"></span>
        </div>
        <div class="nh-metrics">
          <div class="nh-metric"><span class="skel" style="width:100px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
          <div class="nh-metric"><span class="skel" style="width:110px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
          <div class="nh-metric"><span class="skel" style="width:95px;height:10px"></span><span class="skel" style="flex:1;height:6px;border-radius:3px"></span></div>
        </div>
      </div>
    </div>
  </div>

</div>
<!-- /nh-main -->

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>

<script type="module">
import {
  collection, getDocs, query, where, orderBy, limit
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let allCards = []; // { school, pacingPct, checklistPct, surveyPct, dotClass }
let activeStatus = '';

document.addEventListener('authReady', async () => {
  const db = window.db;
  const grid = document.getElementById('nhGrid');

  try {
    const schoolsSnap = await getDocs(
      query(collection(db, 'partner_schools'), where('status', '==', 'active'))
    );
    if (schoolsSnap.empty) {
      grid.innerHTML = '<div class="nh-empty"><p>No active schools found.</p></div>';
      updateSummary([]);
      return;
    }
    const schools = schoolsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Network-wide reads — admin-only page so full data is intentional, but
    // hard-cap at 5000 to prevent runaway reads if the network grows past
    // expectations (800 teachers × 40 weeks = 32k weekly_progress docs is
    // already in the hot path otherwise).
    const [progressSnap, checklistSnap, surveyResponsesSnap, surveysSnap] = await Promise.allSettled([
      getDocs(query(collection(db, 'userProgress'),    limit(2000))),
      getDocs(query(collection(db, 'weekly_progress'), limit(5000))),
      getDocs(query(collection(db, 'survey_responses'), limit(500))),
      getDocs(query(collection(db, 'surveys'), where('status', '==', 'published'), limit(50))),
    ]);

    // Per-school pacing average
    const pacingBySchool = {};
    if (progressSnap.status === 'fulfilled') {
      progressSnap.value.docs.forEach(d => {
        const data = d.data();
        const sid = data.schoolId;
        if (!sid) return;
        if (!pacingBySchool[sid]) pacingBySchool[sid] = { total: 0, count: 0 };
        const pct = typeof data.overallPct === 'number' ? data.overallPct
                  : typeof data.completionPct === 'number' ? data.completionPct : null;
        if (pct !== null) { pacingBySchool[sid].total += pct; pacingBySchool[sid].count++; }
      });
    }

    // Per-school checklist completion
    const checklistBySchool = {};
    if (checklistSnap.status === 'fulfilled') {
      checklistSnap.value.docs.forEach(d => {
        const data = d.data();
        const sid = data.schoolId;
        if (!sid) return;
        if (!checklistBySchool[sid]) checklistBySchool[sid] = { done: 0, total: 0 };
        checklistBySchool[sid].total++;
        if (data.completedCount > 0 && data.totalCount > 0) {
          if ((data.completedCount / data.totalCount) * 100 >= 80) checklistBySchool[sid].done++;
        }
      });
    }

    // Per-school survey response rate
    const surveyCountBySchool = {};
    if (surveyResponsesSnap.status === 'fulfilled') {
      surveyResponsesSnap.value.docs.forEach(d => {
        const data = d.data();
        const sid = data.schoolId;
        if (!sid) return;
        if (!surveyCountBySchool[sid]) surveyCountBySchool[sid] = 0;
        surveyCountBySchool[sid]++;
      });
    }
    const totalActiveSurveys = surveysSnap.status === 'fulfilled' ? surveysSnap.value.size : 0;

    // Build card data
    allCards = schools
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
      .map(school => {
        const sid = school.id;
        const p = pacingBySchool[sid];
        const pacingPct = p && p.count > 0 ? Math.round(p.total / p.count) : null;

        const c = checklistBySchool[sid];
        const checklistPct = c && c.total > 0 ? Math.round((c.done / c.total) * 100) : null;

        const surveyResponses = surveyCountBySchool[sid] || 0;
        const surveyPct = totalActiveSurveys > 0 && school.staffCount > 0
          ? Math.min(100, Math.round((surveyResponses / (totalActiveSurveys * (school.staffCount || 5))) * 100))
          : null;

        const vals = [pacingPct, checklistPct].filter(v => v !== null);
        const avg = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
        const dotClass = avg === null ? 'na' : avg >= 80 ? 'ok' : avg >= 50 ? 'warn' : 'risk';

        return { school, pacingPct, checklistPct, surveyPct, dotClass, avg };
      });

    updateSummary(allCards);
    renderCards();

  } catch (err) {
    console.error('network-health error:', err);
    document.getElementById('nhGrid').innerHTML =
      '<div class="nh-empty"><p>Could not load network health data.</p></div>';
  }
});

function updateSummary(cards) {
  document.getElementById('sumTotal').textContent   = cards.length;
  document.getElementById('sumOnTrack').textContent = cards.filter(c => c.dotClass === 'ok').length;
  document.getElementById('sumAtRisk').textContent  = cards.filter(c => c.dotClass === 'warn').length;
  document.getElementById('sumBehind').textContent  = cards.filter(c => c.dotClass === 'risk').length;
}

function getFiltered() {
  const q = document.getElementById('nhSearch').value.trim().toLowerCase();
  return allCards.filter(item => {
    if (activeStatus && item.dotClass !== activeStatus) return false;
    if (q && !(item.school.name || '').toLowerCase().includes(q) &&
             !(item.school.city || '').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderCards() {
  const filtered = getFiltered();
  const grid = document.getElementById('nhGrid');
  document.getElementById('nhResultsMeta').textContent =
    filtered.length === allCards.length
      ? `${filtered.length} schools`
      : `${filtered.length} of ${allCards.length} schools`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="nh-empty">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <p>No schools match your filters.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(({ school, pacingPct, checklistPct, surveyPct, dotClass }) => {
    const badgeLabel = dotClass === 'ok' ? 'On Track' : dotClass === 'warn' ? 'At Risk' : dotClass === 'risk' ? 'Behind' : 'No Data';

    function metricRow(label, pct) {
      if (pct === null) return `
        <div class="nh-metric">
          <span class="nh-metric-label">${label}</span>
          <span class="nh-no-data">No data</span>
        </div>`;
      const barClass = pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';
      const pctColor = pct >= 80 ? '#16a34a' : pct >= 50 ? '#d97706' : '#dc2626';
      return `
        <div class="nh-metric">
          <span class="nh-metric-label">${label}</span>
          <div class="nh-bar-wrap"><div class="nh-bar-fill ${barClass}" style="width:${pct}%"></div></div>
          <span class="nh-pct" style="color:${pctColor}">${pct}%</span>
        </div>`;
    }

    return `
    <div class="nh-card">
      <div class="nh-card-accent ${dotClass}"></div>
      <div class="nh-card-body">
        <div class="nh-card-top">
          <div>
            <div class="nh-school-name">${esc(school.name || '—')}</div>
            <div class="nh-school-city">${esc(school.city || '')}</div>
          </div>
          <span class="nh-status-badge ${dotClass}">${badgeLabel}</span>
        </div>
        <div class="nh-metrics">
          ${metricRow('Pacing progress', pacingPct)}
          ${metricRow('Checklist (this week)', checklistPct)}
          ${metricRow('Survey responses', surveyPct)}
        </div>
      </div>
      <div class="nh-card-footer">
        <a href="schools" class="nh-view-link">View school
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
    </div>`;
  }).join('');
}

// Controls
document.getElementById('nhSearch').addEventListener('input', renderCards);

document.querySelector('.nh-filter-chips').addEventListener('click', e => {
  const btn = e.target.closest('.nh-chip');
  if (!btn) return;
  activeStatus = btn.dataset.status;
  document.querySelectorAll('.nh-chip').forEach(c => c.classList.toggle('active', c === btn));
  renderCards();
});
</script>

</body>
</html>
