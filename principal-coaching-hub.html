<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal Coaching Hub — Central Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<!-- SHARED_NAVBAR -->
<style>
:root { --accent: #6c5ce7; --accent-dk: #4e3db8; --accent-2: #ddd6fe; }
body { padding-top: 62px; background: var(--paper); }
.page-wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 80px; }
.page-header {
  background: linear-gradient(135deg, #1a1530 0%, #2d2354 55%, #0a0815 100%);
  color: #fff; padding: 32px 28px; border-radius: 16px; margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.page-header::before { content: ''; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 80% 20%, rgba(108,92,231,0.22) 0%, transparent 55%); }
.page-header > * { position: relative; z-index: 1; }
.page-header .eyebrow { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.page-header h1 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; margin: 0 0 6px; }
.page-header p { font-size: 14px; color: rgba(255,255,255,0.65); max-width: 700px; margin: 0; }

.toolbar {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 18px; display: flex; gap: 14px; align-items: center;
  font-size: 13px; color: var(--ink-2);
}
.toolbar input { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; flex: 1; max-width: 360px; }
.toolbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-2); }

.principal-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 22px; margin-bottom: 12px; box-shadow: var(--shadow-sm);
  display: grid; grid-template-columns: 1fr auto auto; gap: 16px; align-items: center;
}
.p-info .name { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 600; color: var(--ink); margin: 0 0 2px; }
.p-info .school { font-size: 12.5px; color: var(--ink-3); }
.p-info .email  { font-size: 11.5px; color: var(--ink-3); font-family: 'DM Mono', monospace; }
.p-meta { font-size: 11.5px; color: var(--ink-3); text-align: right; }
.p-meta .lbl { font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10.5px; }
.p-meta .val { color: var(--ink); font-weight: 500; font-size: 12.5px; margin-top: 2px; }

.actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.action-btn {
  padding: 7px 12px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: var(--white); color: var(--ink-2);
  text-decoration: none; transition: all 0.12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent-dk); background: var(--accent-2); transform: translateY(-1px); }
.action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.action-btn.primary:hover { background: var(--accent-dk); border-color: var(--accent-dk); color: #fff; }
.action-btn .ico { width: 13px; height: 13px; }

.empty { text-align: center; padding: 60px 20px; color: var(--ink-3); }
.loading-state, .access-denied { text-align: center; padding: 80px 20px; color: var(--ink-3); }
.access-denied h2 { font-family: 'Lora', serif; color: #991b1b; margin-bottom: 8px; }

@media (max-width: 720px) {
  .page-header { padding: 22px 18px; }
  .principal-card { grid-template-columns: 1fr; }
  .p-meta { text-align: left; }
  .actions { justify-content: flex-start; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar input { max-width: none; }
}
</style>
</head>
<body style="display:none">
<div class="page-wrap">
  <div class="page-header">
    <div class="eyebrow">Principal Coaching · HQ Director Hub</div>
    <h1>Principal Coaching Hub</h1>
    <p>Pick a principal to log a new coaching session for today, or open an existing draft. Each principal card shows the most recent logged session date so you can pace your visits.</p>
  </div>
  <div id="content"><div class="loading-state">Loading principals…</div></div>
</div>

<script type="module" src="auth-guard.js"></script>
<script type="module">
import { collection, query, where, getDocs, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.addEventListener('authReady', async () => {
  document.body.style.display = '';

  // Audience: HQ Director (CH ch_sub_roles.director) or central_admin.
  // Foundation Reps explicitly excluded — coaching confidentiality.
  const profile = window.userProfile;
  const chSubs = profile?.ch_sub_roles || [];
  const isAdmin = profile?.role_centralhub === 'central_admin';
  const eligible = isAdmin || chSubs.includes('director');
  if (!eligible) {
    showAccessDenied('Principal coaching is restricted to HQ Directors. Foundation Reps are excluded by design.');
    return;
  }

  try {
    // 1. Find users with school_principal sub-role
    const q = query(
      collection(window.db, 'users'),
      where('ah_sub_roles', 'array-contains', 'school_principal')
    );
    const snap = await getDocs(q);
    let principals = snap.docs.map(d => ({ uid: d.id, ...d.data() }));

    // 2. Resolve school names
    const schoolIds = [...new Set(principals.map(p => p.schoolId).filter(Boolean))];
    const schoolMap = {};
    for (const sid of schoolIds) {
      try {
        const sSnap = await getDoc(doc(window.db, 'partner_schools', sid));
        if (sSnap.exists()) schoolMap[sid] = sSnap.data().name || sid;
      } catch (_) { /* ignore */ }
    }
    principals.forEach(p => { p.schoolName = schoolMap[p.schoolId] || p.school || '—'; });

    // 3. For each principal, find the most recent logged coaching session.
    // Single query then group client-side to avoid N+1.
    try {
      const sessionsSnap = await getDocs(
        query(collection(window.db, 'principal_coaching_sessions'), where('mentorUid', '==', window.currentUser.uid))
      );
      const lastByPrincipal = {};
      sessionsSnap.forEach(d => {
        const s = d.data();
        if (s.status !== 'logged') return;
        const cur = lastByPrincipal[s.principalUid];
        if (!cur || (s.sessionDate || '').localeCompare(cur) > 0) lastByPrincipal[s.principalUid] = s.sessionDate;
      });
      principals.forEach(p => { p.lastSessionDate = lastByPrincipal[p.uid] || null; });
    } catch (e) {
      // No history is not an error — show '—' instead.
      principals.forEach(p => { p.lastSessionDate = null; });
    }

    principals.sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
    render(principals);
  } catch (err) {
    console.error('boot', err);
    document.getElementById('content').innerHTML = `<div class="access-denied"><h2>Could not load</h2><p>${escapeHtml(err.message || 'unknown error')}</p></div>`;
  }
});

let allPrincipals = [];
function render(principals) {
  allPrincipals = principals;
  const root = document.getElementById('content');
  if (!principals.length) {
    root.innerHTML = `<div class="empty">No school principals found across the network.</div>`;
    return;
  }
  root.innerHTML = `
    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Search by name, school, or email…" autocomplete="off">
      <span id="resultCount">${principals.length} principals</span>
    </div>
    <div id="cardList">${principals.map(renderCard).join('')}</div>
  `;
  document.getElementById('searchInput').addEventListener('input', (e) => filterPrincipals(e.target.value));
}

function filterPrincipals(qRaw) {
  const q = qRaw.trim().toLowerCase();
  const filtered = q
    ? allPrincipals.filter(p => [p.displayName, p.schoolName, p.email].some(x => (x || '').toLowerCase().includes(q)))
    : allPrincipals;
  document.getElementById('cardList').innerHTML = filtered.map(renderCard).join('');
  document.getElementById('resultCount').textContent = `${filtered.length} principal${filtered.length === 1 ? '' : 's'}`;
}

function renderCard(p) {
  const uid   = encodeURIComponent(p.uid);
  const today = new Date().toISOString().slice(0, 10);
  const last  = p.lastSessionDate || '—';
  return `
    <div class="principal-card">
      <div class="p-info">
        <div class="name">${escapeHtml(p.displayName || p.uid)}</div>
        <div class="school">${escapeHtml(p.schoolName)}</div>
        <div class="email">${escapeHtml(p.email || '')}</div>
      </div>
      <div class="p-meta">
        <div class="lbl">Last session</div>
        <div class="val">${escapeHtml(last)}</div>
      </div>
      <div class="actions">
        <a class="action-btn primary" href="/principal-coaching-session?principalUid=${uid}&date=${today}">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
          New session (today)
        </a>
        ${p.lastSessionDate ? `
          <a class="action-btn" href="/principal-coaching-session?principalUid=${uid}&date=${encodeURIComponent(p.lastSessionDate)}" title="Open the most recent draft / log if not yet locked">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            Open last
          </a>
        ` : ''}
      </div>
    </div>
  `;
}

function showAccessDenied(msg) {
  document.body.style.display = '';
  document.getElementById('content').innerHTML = `<div class="access-denied"><h2>Cannot open</h2><p>${escapeHtml(msg)}</p></div>`;
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
</script>
</body>
</html>
