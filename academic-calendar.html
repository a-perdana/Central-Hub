<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Calendar — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">

  <!-- React 18 + Babel standalone (browser JSX transpilation) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    #calendar-root {
      min-height: calc(100vh - 62px);
    }

    /* ===== MODAL (admin form) ===== */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.22);
    }
    .modal-box h3 {
      font-size: 17px; font-weight: 800; color: #0F172A; margin-bottom: 20px;
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 11px; font-weight: 700;
      color: #64748B; text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .form-row input,
    .form-row select {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: #0F172A;
      outline: none; transition: border-color 0.15s;
    }
    .form-row input:focus,
    .form-row select:focus { border-color: #2563EB; }
    .form-row.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-err { font-size: 12px; color: #DC2626; margin-top: 4px; display: none; }
    .form-err.visible { display: block; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-primary {
      padding: 9px 20px; background: #2563EB; color: #fff;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1D4ED8; }
    .btn-secondary {
      padding: 9px 20px; background: #F1F5F9; color: #374151;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    /* ===== TOAST ===== */
    #cal-toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #0F172A; color: #fff; padding: 10px 22px;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 400; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    #cal-toast.show { opacity: 1; }

  </style>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- ===== TOP NAV ===== -->
<!-- SHARED_NAVBAR -->

<!-- ===== CALENDAR ROOT ===== -->
<div id="calendar-root"></div>

<!-- ===== TOAST ===== -->
<div id="cal-toast"></div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>

<script type="module">
  // ─── Firestore imports ────────────────────────────────────────────────────────
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Expose Firestore helpers to React (Babel/text-babel scope)
  window.__calFS = {
    getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
    doc, getDoc, setDoc, serverTimestamp, query, orderBy,
  };

  // ─── Wait for auth then mount React ──────────────────────────────────────────
  document.addEventListener('authReady', ({ detail: { profile } }) => {
    const isAdmin = profile?.role_centralhub === 'central_admin'
                 || profile?.role === 'central_admin';
    window.__calIsAdmin = isAdmin;

    // Mount is deferred so Babel has time to register the component
    requestAnimationFrame(() => {
      const root = ReactDOM.createRoot(document.getElementById('calendar-root'));
      root.render(React.createElement(AcademicCalendar, { isAdmin }));
    });
  });
</script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect, useCallback, useMemo } = React;

  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const SHEETS_API_URL    = "https://script.google.com/macros/s/AKfycbzi-8Cyh9MYI_AwKyOY9QzS65bfBcNvN4bxhMB7DHiruzoq6ZXfq3P8CyeJumS0pbpZ/exec";
  const FS_COLLECTION     = "calendar_events";
  const FS_SETTINGS_DOC   = "calendar_settings";  // collection
  const FS_SETTINGS_ID    = "current";             // single document

  // Fallback used only before Firestore settings are loaded for the first time
  const DEFAULT_YEAR_START_ISO    = "2025-07-21";
  const DEFAULT_TOTAL_WEEKS       = 36;
  const DEFAULT_TERMS = [
    { label: "Semester 1", start: "2025-07-21", end: "2025-11-28" },
    { label: "Semester 2", start: "2026-01-05", end: "2026-05-29" },
  ];

  // ─── DEPARTMENT + CATEGORY CONFIG ────────────────────────────────────────────
  const DEPARTMENTS = {
    "Academic":           { color: "#2563EB", bg: "#EFF6FF", border: "#BFDBFE", dot: "#2563EB",  label: "Academic" },
    "College Counseling": { color: "#D97706", bg: "#FFFBEB", border: "#FDE68A", dot: "#D97706",  label: "College Counseling" },
    "Admin/Operations":   { color: "#059669", bg: "#ECFDF5", border: "#A7F3D0", dot: "#059669",  label: "Admin / Operations" },
    "Cambridge":          { color: "#0891b2", bg: "#E0F9FF", border: "#A5F3FC", dot: "#0891b2",  label: "Cambridge" },
  };

  const CATEGORY_OVERRIDES = {
    "Public Holiday": { color: "#DC2626", bg: "#FEF2F2", border: "#FECACA", dot: "#DC2626" },
    "Assessment":     { color: "#7C3AED", bg: "#F5F3FF", border: "#DDD6FE", dot: "#7C3AED" },
  };

  const ALL_CATEGORIES = [
    "Academic", "Academic Week", "Assessment", "Appraisal Visit",
    "Cambridge Deadline", "Cambridge Exam Period", "Cambridge Results",
    "Meeting", "Parent Event", "Professional Development",
    "Public Holiday", "Reporting", "School Visit", "Staff Event", "Student Event",
  ];

  function getEventStyle(event) {
    if (CATEGORY_OVERRIDES[event.category]) return CATEGORY_OVERRIDES[event.category];
    return DEPARTMENTS[event.department] || DEPARTMENTS["Academic"];
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function normalizeDate(str) {
    if (!str) return null;
    const s = String(str);
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
    const MM = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
    const m = s.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
    if (m && MM[m[1]]) return `${m[3]}-${MM[m[1]]}-${String(m[2]).padStart(2,"0")}`;
    return null;
  }

  function parseDate(str) {
    const s = normalizeDate(str) || String(str).slice(0, 10);
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
  }
  function isoDate(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  }
  function eventSpansDay(event, dayStr) {
    const day   = parseDate(dayStr);
    const start = parseDate(event.date_start);
    const end   = parseDate(event.date_end);
    return day >= start && day <= end;
  }

  function showToast(msg) {
    const el = document.getElementById('cal-toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ─── SUB-COMPONENTS ──────────────────────────────────────────────────────────
  function FilterChip({ label, color, active, onClick }) {
    return (
      <button onClick={onClick} style={{
        padding: "5px 12px", borderRadius: 20,
        border: `2px solid ${active ? color : "rgba(255,255,255,0.25)"}`,
        background: active ? color : "rgba(255,255,255,0.08)",
        color: active ? "white" : "rgba(255,255,255,0.6)",
        fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all 0.15s",
      }}>
        {label}
      </button>
    );
  }

  function Tag({ color, bg, children }) {
    return (
      <span style={{ fontSize: 11, fontWeight: 700, color, background: bg, padding: "3px 8px", borderRadius: 5 }}>
        {children}
      </span>
    );
  }

  function LegendItem({ color, label }) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: color }} />
        <span style={{ fontSize: 12, color: "#64748B", fontWeight: 500 }}>{label}</span>
      </div>
    );
  }

  const navBtnStyle = {
    padding: "8px 16px", background: "white", border: "1px solid #E2E8F0",
    borderRadius: 8, cursor: "pointer", fontWeight: 700, color: "#374151", fontSize: 13,
  };

  // ─── ACADEMIC YEAR SETTINGS MODAL ───────────────────────────────────────────
  function AcademicYearSettingsModal({ yearStart, totalWeeks, terms, onSave, onClose, teachingWeeks, twSyncing, twSyncMsg, onSyncTeachingWeeks, onUpdateWeek }) {
    const [yStart,  setYStart]  = useState(yearStart);
    const [weeks,   setWeeks]   = useState(String(totalWeeks));
    const [termRows, setTermRows] = useState(
      terms.length ? terms : [{ label: "Semester 1", start: "", end: "" }, { label: "Semester 2", start: "", end: "" }]
    );
    const [saving,  setSaving]  = useState(false);
    const [err,     setErr]     = useState("");
    const [editingWeek, setEditingWeek] = useState(null); // {idx, mon, fri}
    const [weekSection, setWeekSection] = useState(false);

    function setTerm(idx, field, val) {
      setTermRows(rows => rows.map((r, i) => i === idx ? { ...r, [field]: val } : r));
    }
    function addTerm() {
      setTermRows(rows => [...rows, { label: `Term ${rows.length + 1}`, start: "", end: "" }]);
    }
    function removeTerm(idx) {
      setTermRows(rows => rows.filter((_, i) => i !== idx));
    }

    async function handleSave() {
      if (!yStart) { setErr("Academic year start date is required."); return; }
      const w = parseInt(weeks);
      if (!w || w < 1 || w > 52) { setErr("Total teaching weeks must be between 1 and 52."); return; }
      for (const t of termRows) {
        if (!t.label.trim() || !t.start || !t.end) { setErr("All term fields are required."); return; }
        if (t.end < t.start) { setErr(`Term "${t.label}": end date must be after start date.`); return; }
      }
      setSaving(true);
      setErr("");
      await onSave({ academicYearStart: yStart, totalTeachingWeeks: w, terms: termRows });
      setSaving(false);
    }

    return (
      <div className="modal-backdrop" onClick={onClose}>
        <div className="modal-box" style={{ maxWidth: 560 }} onClick={e => e.stopPropagation()}>
          <h3>Academic Year Settings</h3>

          <div className="form-row two-col">
            <div>
              <label>Academic Year Start</label>
              <input type="date" value={yStart} onChange={e => setYStart(e.target.value)} />
            </div>
            <div>
              <label>Total Teaching Weeks</label>
              <input type="number" min="1" max="52" value={weeks} onChange={e => setWeeks(e.target.value)} placeholder="e.g. 36" />
            </div>
          </div>

          <div style={{ marginTop: 18, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em" }}>Terms / Semesters</span>
              <button onClick={addTerm} style={{ fontSize: 12, fontWeight: 700, color: "#2563EB", background: "none", border: "none", cursor: "pointer" }}>+ Add Term</button>
            </div>
            {termRows.map((t, idx) => (
              <div key={idx} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: 8, marginBottom: 8, alignItems: "end" }}>
                <div>
                  {idx === 0 && <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 5 }}>Label</label>}
                  <input value={t.label} onChange={e => setTerm(idx, "label", e.target.value)} placeholder="Semester 1" style={{ width: "100%", padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontFamily: "'DM Sans',sans-serif", fontSize: 13 }} />
                </div>
                <div>
                  {idx === 0 && <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 5 }}>Start</label>}
                  <input type="date" value={t.start} onChange={e => setTerm(idx, "start", e.target.value)} style={{ width: "100%", padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontFamily: "'DM Sans',sans-serif", fontSize: 13 }} />
                </div>
                <div>
                  {idx === 0 && <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 5 }}>End</label>}
                  <input type="date" value={t.end} onChange={e => setTerm(idx, "end", e.target.value)} style={{ width: "100%", padding: "9px 12px", border: "1.5px solid #E2E8F0", borderRadius: 8, fontFamily: "'DM Sans',sans-serif", fontSize: 13 }} />
                </div>
                <button onClick={() => removeTerm(idx)} title="Remove" style={{ background: "none", border: "none", cursor: "pointer", color: "#DC2626", fontSize: 18, paddingBottom: 2 }}>×</button>
              </div>
            ))}
          </div>

          {err && <div className="form-err visible" style={{ marginBottom: 10 }}>{err}</div>}

          {/* ── Teaching Schedule ── */}
          <div style={{ borderTop: "1.5px solid #E2E8F0", marginTop: 20, paddingTop: 18 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#64748B", textTransform: "uppercase", letterSpacing: "0.08em" }}>Teaching Schedule</div>
                {teachingWeeks.length > 0 && (
                  <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 2 }}>{teachingWeeks.length} teaching weeks computed</div>
                )}
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {teachingWeeks.length > 0 && (
                  <button onClick={() => setWeekSection(v => !v)} style={{ fontSize: 12, fontWeight: 700, color: "#2563EB", background: "none", border: "none", cursor: "pointer", padding: "4px 8px" }}>
                    {weekSection ? "Hide weeks ▲" : "Show weeks ▼"}
                  </button>
                )}
                <button onClick={onSyncTeachingWeeks} disabled={twSyncing} style={{
                  padding: "7px 14px", background: twSyncing ? "#F1F5F9" : "#0F172A", color: twSyncing ? "#94A3B8" : "#fff",
                  border: "none", borderRadius: 8, fontWeight: 700, fontSize: 12,
                  cursor: twSyncing ? "default" : "pointer", fontFamily: "'DM Sans',sans-serif",
                }}>
                  {twSyncing ? "Syncing…" : "⟳ Sync Teaching Weeks"}
                </button>
              </div>
            </div>

            {twSyncMsg && (
              <div style={{ fontSize: 12, color: twSyncMsg.startsWith("✓") ? "#059669" : "#DC2626", background: twSyncMsg.startsWith("✓") ? "#ECFDF5" : "#FEF2F2", border: `1px solid ${twSyncMsg.startsWith("✓") ? "#A7F3D0" : "#FECACA"}`, borderRadius: 8, padding: "8px 12px", marginBottom: 10 }}>
                {twSyncMsg}
              </div>
            )}

            {weekSection && teachingWeeks.length > 0 && (
              <div style={{ maxHeight: 320, overflowY: "auto", border: "1px solid #E2E8F0", borderRadius: 10 }}>
                {/* Edit row */}
                {editingWeek !== null && (
                  <div style={{ position: "sticky", top: 0, background: "#EFF6FF", borderBottom: "1px solid #BFDBFE", padding: "10px 14px", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", zIndex: 1 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#1E40AF", minWidth: 70 }}>Week {teachingWeeks[editingWeek].weekNo}</span>
                    <input type="date" defaultValue={teachingWeeks[editingWeek].mon} id="tw-edit-mon"
                      style={{ padding: "5px 8px", border: "1.5px solid #BFDBFE", borderRadius: 6, fontSize: 12, fontFamily: "'DM Sans',sans-serif" }} />
                    <span style={{ fontSize: 12, color: "#64748B" }}>–</span>
                    <input type="date" defaultValue={teachingWeeks[editingWeek].fri} id="tw-edit-fri"
                      style={{ padding: "5px 8px", border: "1.5px solid #BFDBFE", borderRadius: 6, fontSize: 12, fontFamily: "'DM Sans',sans-serif" }} />
                    <button onClick={() => {
                      const mon = document.getElementById("tw-edit-mon").value;
                      const fri = document.getElementById("tw-edit-fri").value;
                      if (mon && fri) { onUpdateWeek(editingWeek, mon, fri); setEditingWeek(null); }
                    }} style={{ padding: "5px 12px", background: "#2563EB", color: "#fff", border: "none", borderRadius: 6, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Save</button>
                    <button onClick={() => setEditingWeek(null)} style={{ padding: "5px 12px", background: "#F1F5F9", color: "#64748B", border: "none", borderRadius: 6, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Cancel</button>
                  </div>
                )}
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#F8FAFC" }}>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: "#64748B", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em" }}>#</th>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: "#64748B", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em" }}>Semester</th>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: "#64748B", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em" }}>Sem Week</th>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: "#64748B", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em" }}>Mon</th>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: "#64748B", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.06em" }}>Fri</th>
                      <th style={{ padding: "8px 6px", textAlign: "center", fontWeight: 700, color: "#64748B", fontSize: 11 }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {teachingWeeks.map((w, idx) => (
                      <tr key={idx} style={{ borderTop: "1px solid #F1F5F9", background: editingWeek === idx ? "#EFF6FF" : (idx % 2 === 0 ? "white" : "#FAFBFC") }}>
                        <td style={{ padding: "7px 12px", fontWeight: 700, color: "#0F172A" }}>{w.weekNo}</td>
                        <td style={{ padding: "7px 12px", color: "#64748B" }}>{w.semLabel || "—"}</td>
                        <td style={{ padding: "7px 12px", color: "#64748B" }}>{w.semWeekNo}</td>
                        <td style={{ padding: "7px 12px", color: "#334155", fontFamily: "monospace" }}>{w.mon}</td>
                        <td style={{ padding: "7px 12px", color: "#334155", fontFamily: "monospace" }}>{w.fri}</td>
                        <td style={{ padding: "7px 6px", textAlign: "center" }}>
                          <button onClick={() => setEditingWeek(editingWeek === idx ? null : idx)} style={{ background: "none", border: "none", cursor: "pointer", color: "#2563EB", fontSize: 12, fontWeight: 700, padding: "2px 6px" }}>Edit</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          <div className="modal-actions" style={{ marginTop: 20 }}>
            <button className="btn-secondary" onClick={onClose}>Close</button>
            <button className="btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? "Saving…" : "Save Settings"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── EVENT FORM MODAL ────────────────────────────────────────────────────────
  const EMPTY_FORM = { title: "", department: "Academic", category: "Academic", date_start: "", date_end: "" };

  function EventFormModal({ initial, onSave, onClose }) {
    const [form,    setForm]    = useState(initial || EMPTY_FORM);
    const [errors,  setErrors]  = useState({});
    const [saving,  setSaving]  = useState(false);
    const isEdit = !!(initial && initial._fsId);

    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    async function handleSave() {
      const errs = {};
      if (!form.title.trim())      errs.title      = "Title is required";
      if (!form.date_start)        errs.date_start = "Start date is required";
      if (!form.date_end)          errs.date_end   = "End date is required";
      if (form.date_end < form.date_start) errs.date_end = "End date must be after start date";
      if (Object.keys(errs).length) { setErrors(errs); return; }
      setSaving(true);
      await onSave({ ...form, title: form.title.trim() });
      setSaving(false);
    }

    return (
      <div className="modal-backdrop" onClick={onClose}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <h3>{isEdit ? "Edit Event" : "Add Event"}</h3>

          <div className="form-row">
            <label>Title</label>
            <input value={form.title} onChange={e => set("title", e.target.value)}
              placeholder="Event title" onKeyDown={e => e.key === "Enter" && handleSave()} />
            {errors.title && <div className="form-err visible">{errors.title}</div>}
          </div>

          <div className="form-row two-col">
            <div>
              <label>Start Date</label>
              <input type="date" value={form.date_start} onChange={e => set("date_start", e.target.value)} />
              {errors.date_start && <div className="form-err visible">{errors.date_start}</div>}
            </div>
            <div>
              <label>End Date</label>
              <input type="date" value={form.date_end} onChange={e => set("date_end", e.target.value)} />
              {errors.date_end && <div className="form-err visible">{errors.date_end}</div>}
            </div>
          </div>

          <div className="form-row">
            <label>Department</label>
            <select value={form.department} onChange={e => set("department", e.target.value)}>
              {Object.keys(DEPARTMENTS).map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>

          <div className="form-row">
            <label>Category</label>
            <select value={form.category} onChange={e => set("category", e.target.value)}>
              {ALL_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>

          <div className="modal-actions">
            <button className="btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? "Saving…" : isEdit ? "Save Changes" : "Add Event"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── MAIN COMPONENT ──────────────────────────────────────────────────────────
  function AcademicCalendar({ isAdmin }) {
    const today = new Date();
    const [currentYear,  setCurrentYear]  = useState(today.getFullYear());
    const [currentMonth, setCurrentMonth] = useState(today.getMonth());
    const [events,       setEvents]       = useState([]);
    const [dataSource,   setDataSource]   = useState("loading"); // "loading" | "sheets" | "firestore" | "sheets+firestore" | "empty"
    const [selectedEvent, setSelectedEvent] = useState(null);
    const [view,         setView]         = useState("month");
    const [activeFilters, setActiveFilters] = useState(new Set(["Academic","College Counseling","Admin/Operations","Cambridge"]));
    const [activeCategoryFilters, setActiveCategoryFilters] = useState(new Set(["Public Holiday","Assessment"]));
    const [formModal,       setFormModal]       = useState(null); // null | { initial } — admin only
    const [deleteTarget,    setDeleteTarget]    = useState(null); // null | eventId — admin only
    const [yearStartIso,    setYearStartIso]    = useState(DEFAULT_YEAR_START_ISO);
    const [totalWeeks,      setTotalWeeks]      = useState(DEFAULT_TOTAL_WEEKS);
    const [terms,           setTerms]           = useState(DEFAULT_TERMS);
    const [settingsModal,   setSettingsModal]   = useState(false); // admin only
    const [teachingWeeks,   setTeachingWeeks]   = useState([]);
    const [twSyncing,       setTwSyncing]       = useState(false);
    const [twSyncMsg,       setTwSyncMsg]       = useState("");
    // sheetsVersionModal: show original Sheets data for an overridden event
    const [sheetsVersionModal, setSheetsVersionModal] = useState(null);

    // ─── Load Firestore events ────────────────────────────────────────────────
    const loadFromFirestore = useCallback(async () => {
      const { getFirestore, collection, getDocs, query, orderBy } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const snap = await getDocs(query(collection(db, FS_COLLECTION), orderBy("date_start")));
      if (snap.empty) return [];
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }, []);

    // ─── Merge Sheets + Firestore ─────────────────────────────────────────────
    // Firestore docs with sheets_id override the matching Sheets row.
    // Firestore docs without sheets_id are new admin-added events.
    function mergeEvents(sheetsEvents, fsEvents) {
      // Build override map: sheets_id → firestore doc
      const overrides = {};
      const fsOnly = [];
      fsEvents.forEach(fe => {
        if (fe.sheets_id) overrides[fe.sheets_id] = fe;
        else fsOnly.push(fe);
      });

      const merged = sheetsEvents.map(se => {
        if (overrides[se.id]) {
          // Return Firestore version, but keep sheets_original for diffing
          return { ...overrides[se.id], _sheetsOriginal: se };
        }
        return se;
      });

      // Add Firestore-only events (no matching Sheets row)
      fsOnly.forEach(fe => merged.push(fe));

      return merged;
    }

    // ─── Load academic year settings from calendar_settings/current ─────────
    useEffect(() => {
      async function loadSettings() {
        const { getFirestore, doc, getDoc } = window.__calFS;
        const db = getFirestore(window.firebaseApp);
        const snap = await getDoc(doc(db, FS_SETTINGS_DOC, FS_SETTINGS_ID));
        if (!snap.exists()) return; // keep defaults
        const d = snap.data();
        if (d.academicYearStart) setYearStartIso(d.academicYearStart);
        if (d.totalTeachingWeeks) setTotalWeeks(d.totalTeachingWeeks);
        if (Array.isArray(d.terms) && d.terms.length) setTerms(d.terms);
      }
      loadSettings();
    }, []);

    // ─── Initial data fetch: Sheets + Firestore in parallel ──────────────────
    useEffect(() => {
      let cancelled = false;

      async function init() {
        const [sheetsResult, fsResult] = await Promise.allSettled([
          fetch(SHEETS_API_URL).then(r => r.json()),
          loadFromFirestore(),
        ]);

        if (cancelled) return;

        const sheetsOk = sheetsResult.status === "fulfilled" && Array.isArray(sheetsResult.value) && sheetsResult.value.length > 0;
        const fsOk     = fsResult.status === "fulfilled" && fsResult.value && fsResult.value.length > 0;

        const sheetsEvents = sheetsOk
          ? sheetsResult.value.map(e => e ? {
              ...e,
              date_start: normalizeDate(e.date_start) || e.date_start,
              date_end:   normalizeDate(e.date_end)   || e.date_end,
            } : null).filter(Boolean)
          : [];

        const fsEvents = fsOk ? fsResult.value : [];

        if (sheetsOk && fsOk) {
          setEvents(mergeEvents(sheetsEvents, fsEvents));
          setDataSource("sheets+firestore");
        } else if (sheetsOk) {
          setEvents(sheetsEvents);
          setDataSource("sheets");
        } else if (fsOk) {
          setEvents(fsEvents);
          setDataSource("firestore");
        } else {
          setEvents([]);
          setDataSource("empty");
        }
      }

      init();
      return () => { cancelled = true; };
    }, [loadFromFirestore]);

    // ─── Admin: reload both sources and re-merge ─────────────────────────────
    const reloadAll = useCallback(async () => {
      const [sheetsResult, fsResult] = await Promise.allSettled([
        fetch(SHEETS_API_URL).then(r => r.json()),
        loadFromFirestore(),
      ]);

      const sheetsOk = sheetsResult.status === "fulfilled" && Array.isArray(sheetsResult.value) && sheetsResult.value.length > 0;
      const fsOk     = fsResult.status === "fulfilled" && fsResult.value && fsResult.value.length > 0;

      const sheetsEvents = sheetsOk
        ? sheetsResult.value.map(e => e ? {
            ...e,
            date_start: normalizeDate(e.date_start) || e.date_start,
            date_end:   normalizeDate(e.date_end)   || e.date_end,
          } : null).filter(Boolean)
        : [];

      const fsEvents = fsOk ? fsResult.value : [];

      if (sheetsOk && fsOk) {
        setEvents(mergeEvents(sheetsEvents, fsEvents));
        setDataSource("sheets+firestore");
      } else if (sheetsOk) {
        setEvents(sheetsEvents);
        setDataSource("sheets");
      } else if (fsOk) {
        setEvents(fsEvents);
        setDataSource("firestore");
      } else {
        setEvents([]);
        setDataSource("empty");
      }
    }, [loadFromFirestore]);

    // ─── Teaching schedule: load from Firestore ───────────────────────────────
    const loadTeachingWeeks = useCallback(async () => {
      const { getFirestore, doc, getDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const snap = await getDoc(doc(db, 'teaching_schedule', 'main'));
      if (snap.exists() && Array.isArray(snap.data().weeks)) {
        setTeachingWeeks(snap.data().weeks);
      }
    }, []);

    useEffect(() => { loadTeachingWeeks(); }, [loadTeachingWeeks]);

    // ─── Teaching schedule: sync from Sheets + calendar_settings ─────────────
    const syncTeachingWeeks = useCallback(async () => {
      setTwSyncing(true);
      setTwSyncMsg("");
      try {
        const { getFirestore, doc, getDoc, setDoc, serverTimestamp } = window.__calFS;
        const db = getFirestore(window.firebaseApp);

        const [sheetsRes, calSnap] = await Promise.all([
          fetch(SHEETS_API_URL).then(r => r.json()),
          getDoc(doc(db, 'calendar_settings', 'current')),
        ]);

        let yearStartIso = '2025-07-21';
        let termsCfg = [];
        if (calSnap.exists()) {
          const cd = calSnap.data();
          if (cd.academicYearStart) yearStartIso = cd.academicYearStart;
          if (Array.isArray(cd.terms)) termsCfg = cd.terms;
        }

        const localDateStr = d => {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        };

        const yearStartRaw = new Date(yearStartIso + 'T00:00:00');
        const dow = yearStartRaw.getDay();
        const yearStart = new Date(yearStartRaw);
        yearStart.setDate(yearStartRaw.getDate() + (dow === 0 ? 1 : dow === 1 ? 0 : -(dow - 1)));

        function normDate(str) {
          if (!str) return null;
          const s = String(str);
          if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
          const MM = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
          const m2 = s.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
          if (m2 && MM[m2[1]]) return `${m2[3]}-${MM[m2[1]]}-${String(m2[2]).padStart(2,'0')}`;
          return null;
        }

        const evts = Array.isArray(sheetsRes) ? sheetsRes.map(e => ({
          ...e, date_start: normDate(e.date_start), date_end: normDate(e.date_end) || normDate(e.date_start),
        })).filter(e => e.date_start) : [];

        const skipDates = new Set();
        const addRange = (ds, de) => {
          const s = new Date(ds + 'T00:00:00'), e = new Date(de + 'T00:00:00');
          for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
            const wd = d.getDay();
            if (wd >= 1 && wd <= 5) skipDates.add(localDateStr(d));
          }
        };

        // Public holidays do NOT skip the whole week (lessons still run on other days).
        // Only skip full weeks: EASE exam weeks and school holiday blocks.
        evts.filter(e => e.category === 'Assessment' && e.title && e.title.toUpperCase().includes('EASE')).forEach(e => addRange(e.date_start, e.date_end));

        const sem1HolStart = evts.find(e => /start of semester 1 holiday/i.test(e.title));
        const sem2Start    = evts.find(e => /start of semester 2/i.test(e.title) && !/holiday/i.test(e.title));
        if (sem1HolStart && sem2Start) addRange(sem1HolStart.date_start, sem2Start.date_start);

        const ramStart = evts.find(e => /start of ramadhan holiday/i.test(e.title));
        const ramEnd   = evts.find(e => /end of ramadhan holiday/i.test(e.title));
        if (ramStart && ramEnd) addRange(ramStart.date_start, ramEnd.date_start);

        const semBounds = termsCfg.map(t => ({
          label: t.label || '',
          start: new Date(t.start + 'T00:00:00'),
          end:   new Date(t.end   + 'T23:59:59'),
        }));
        const semCounters = semBounds.map(() => 0);

        const computedWeeks = [];
        let globalWeekNo = 0;
        for (let w = 0; w < 70; w++) {
          const mon = new Date(yearStart); mon.setDate(yearStart.getDate() + w * 7);
          const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
          let skip = false;
          for (let i = 0; i < 5; i++) {
            const d = new Date(mon); d.setDate(mon.getDate() + i);
            if (skipDates.has(localDateStr(d))) { skip = true; break; }
          }
          if (!skip) {
            globalWeekNo++;
            const mid = new Date(mon); mid.setDate(mon.getDate() + 2);
            let semLabel = '', semWeekNo = globalWeekNo;
            for (let si = 0; si < semBounds.length; si++) {
              if (mid >= semBounds[si].start && mid <= semBounds[si].end) {
                semCounters[si]++;
                semLabel = semBounds[si].label;
                semWeekNo = semCounters[si];
                break;
              }
            }
            computedWeeks.push({ weekNo: globalWeekNo, semLabel, semWeekNo, mon: localDateStr(mon), fri: localDateStr(fri) });
          }
        }

        await setDoc(doc(db, 'teaching_schedule', 'main'), {
          academicYearStart: yearStartIso,
          skippedWeekCount: 70 - computedWeeks.length,
          teachingWeekCount: computedWeeks.length,
          weeks: computedWeeks,
          syncedAt: serverTimestamp(),
        });

        setTeachingWeeks(computedWeeks);
        setTwSyncMsg(`✓ Synced — ${computedWeeks.length} teaching weeks saved (${70 - computedWeeks.length} skipped).`);
      } catch (e) {
        setTwSyncMsg(`Sync failed: ${e.message}`);
      } finally {
        setTwSyncing(false);
      }
    }, [terms, yearStartIso]);

    // ─── Teaching schedule: update a single week's dates ─────────────────────
    const updateTeachingWeek = useCallback(async (idx, mon, fri) => {
      const { getFirestore, doc, updateDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const updated = teachingWeeks.map((w, i) => i === idx ? { ...w, mon, fri } : w);
      await updateDoc(doc(db, 'teaching_schedule', 'main'), { weeks: updated });
      setTeachingWeeks(updated);
    }, [teachingWeeks]);

    // ─── Admin: save academic year settings ──────────────────────────────────
    const handleSettingsSave = useCallback(async ({ academicYearStart, totalTeachingWeeks, terms: newTerms }) => {
      const { getFirestore, doc, setDoc, serverTimestamp } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      await setDoc(doc(db, FS_SETTINGS_DOC, FS_SETTINGS_ID), {
        academicYearStart,
        totalTeachingWeeks,
        terms: newTerms,
        updatedAt: serverTimestamp(),
      });
      setYearStartIso(academicYearStart);
      setTotalWeeks(totalTeachingWeeks);
      setTerms(newTerms);
      setSettingsModal(false);
      showToast("Academic year settings saved.");
    }, []);

    // ─── Admin: save (create or update) ──────────────────────────────────────
    const handleFormSave = useCallback(async (formData) => {
      const { getFirestore, collection, addDoc, updateDoc, doc, serverTimestamp } = window.__calFS;
      const db = getFirestore(window.firebaseApp);

      // Existing Firestore doc (has a real Firestore ID stored in formData.id,
      // which is the Firestore doc id — distinct from sheets_id)
      const isExistingFsDoc = formData._fsId != null;

      if (isExistingFsDoc) {
        // Update in-place
        const { _fsId, _sheetsOriginal, id, ...fields } = formData;
        await updateDoc(doc(db, FS_COLLECTION, _fsId), { ...fields, updatedAt: serverTimestamp() });
        showToast("Event updated.");
      } else if (formData._isSheets) {
        // Sheets event being overridden → create Firestore doc with sheets_id
        const { _isSheets, _sheetsOriginal, id: sheetsId, ...fields } = formData;
        const sheetsOriginal = { title: formData._sheetsOriginal?.title, date_start: formData._sheetsOriginal?.date_start,
          date_end: formData._sheetsOriginal?.date_end, department: formData._sheetsOriginal?.department, category: formData._sheetsOriginal?.category };
        await addDoc(collection(db, FS_COLLECTION), { ...fields, sheets_id: sheetsId, sheets_original: sheetsOriginal, createdAt: serverTimestamp() });
        showToast("Event override saved.");
      } else {
        // Brand new event
        const { _fsId, _isSheets, _sheetsOriginal, ...fields } = formData;
        await addDoc(collection(db, FS_COLLECTION), { ...fields, createdAt: serverTimestamp() });
        showToast("Event added.");
      }

      await reloadAll();
      setFormModal(null);
      setSelectedEvent(null);
    }, [reloadAll]);

    // ─── Admin: delete ────────────────────────────────────────────────────────
    const handleDelete = useCallback(async (fsId) => {
      if (!fsId) return;
      const { getFirestore, doc, deleteDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      await deleteDoc(doc(db, FS_COLLECTION, fsId));
      showToast("Event deleted.");
      await reloadAll();
      setSelectedEvent(null);
      setDeleteTarget(null);
    }, [reloadAll]);

    // ─── Nav helpers ──────────────────────────────────────────────────────────
    const prevMonth = () => {
      if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); }
      else setCurrentMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y => y + 1); }
      else setCurrentMonth(m => m + 1);
    };

    const filteredEvents = useMemo(() => events.filter(e => {
      if (!e || !e.date_start || !e.date_end) return false;
      if (CATEGORY_OVERRIDES[e.category]) return activeCategoryFilters.has(e.category);
      return activeFilters.has(e.department);
    }), [events, activeFilters, activeCategoryFilters]);

    const calendarDays = useMemo(() => {
      const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let d = 1; d <= daysInMonth; d++) days.push(d);
      return days;
    }, [currentYear, currentMonth]);

    const getEventsForDay = (day) => {
      if (!day) return [];
      const dayStr = isoDate(new Date(currentYear, currentMonth, day));
      return filteredEvents.filter(e => eventSpansDay(e, dayStr));
    };

    const upcomingEvents = useMemo(() => {
      const todayStr = isoDate(today);
      return filteredEvents
        .filter(e => e.date_start && e.date_end && String(e.date_end).slice(0, 10) >= todayStr)
        .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start)))
        .slice(0, 30);
    }, [filteredEvents]);

    const yearStats = useMemo(() => {
      const deptCount = {};
      const catCount  = {};
      let total = 0;
      events.forEach(e => {
        if (!e || !e.date_start) return;
        total++;
        deptCount[e.department] = (deptCount[e.department] || 0) + 1;
        catCount[e.category]    = (catCount[e.category]    || 0) + 1;
      });
      return { deptCount, catCount, total };
    }, [events]);

    const allEventsSorted = useMemo(() =>
      events.filter(e => e && e.date_start)
            .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start))),
    [events]);

    // ─── Week view ────────────────────────────────────────────────────────────
    const academicYearStart = useMemo(() => parseDate(yearStartIso), [yearStartIso]);

    const weeklyEvents = useMemo(() => {
      const weeks = [];
      const sorted = filteredEvents
        .filter(e => e.date_start && e.date_end)
        .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start)));

      sorted.forEach(ev => {
        const evStart = parseDate(ev.date_start);
        const diff = Math.floor((evStart - academicYearStart) / (7 * 24 * 3600 * 1000));
        if (diff < 0) return; // before academic year
        const weekNum = diff + 1;

        let weekObj = weeks.find(w => w.weekNum === weekNum);
        if (!weekObj) {
          const monDate = new Date(academicYearStart.getTime() + (weekNum - 1) * 7 * 24 * 3600 * 1000);
          const friDate = new Date(monDate.getTime() + 4 * 24 * 3600 * 1000);
          weekObj = { weekNum, monDate, friDate, events: [] };
          weeks.push(weekObj);
        }
        weekObj.events.push(ev);
      });

      return weeks.sort((a, b) => a.weekNum - b.weekNum);
    }, [filteredEvents, academicYearStart]);

    // Scroll to current week when week view is activated
    useEffect(() => {
      if (view !== "week") return;
      const now = new Date();
      const diff = Math.floor((now - academicYearStart) / (7 * 24 * 3600 * 1000));
      const currentWeekNum = diff + 1;
      if (currentWeekNum < 1) return;
      requestAnimationFrame(() => {
        const el = document.getElementById(`week-${currentWeekNum}`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    }, [view, academicYearStart]);

    const toggleFilter = (key, setFn) => setFn(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });

    const isToday = (day) => {
      const t = new Date();
      return day === t.getDate() && currentMonth === t.getMonth() && currentYear === t.getFullYear();
    };

    // ─── Data source badge ────────────────────────────────────────────────────
    const sourceBadge = ({
      loading:          { label: "Loading…",                  color: "#94A3B8" },
      "sheets+firestore": { label: "Google Sheets + Firestore", color: "#059669" },
      sheets:           { label: "Live — Google Sheets",      color: "#059669" },
      firestore:        { label: "Live — Firestore",          color: "#2563EB" },
      empty:            { label: "No data",                   color: "#DC2626" },
    })[dataSource] || { label: dataSource, color: "#94A3B8" };

    return (
      <div style={{ fontFamily: "'DM Sans','Helvetica Neue',sans-serif", background: "#F8FAFC", minHeight: "100%" }}>

        {/* ── Header ── */}
        <div style={{ background: "linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #1D4ED8 100%)", padding: "28px 32px 24px", color: "white" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, gap: 16, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", color: "#93C5FD", textTransform: "uppercase", marginBottom: 4 }}>
                Eduversal Indonesia
              </div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, letterSpacing: "-0.5px" }}>
                Academic Calendar 2025–2026
              </h1>
              {/* Data source badge */}
              <div style={{ marginTop: 8, display: "inline-flex", alignItems: "center", gap: 6,
                background: "rgba(255,255,255,0.1)", borderRadius: 20, padding: "4px 12px" }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: sourceBadge.color }} />
                <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.75)" }}>
                  {sourceBadge.label}
                </span>
              </div>
            </div>

            {/* Right side: admin button + view toggle */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 10 }}>
              {isAdmin && (
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setSettingsModal(true)} style={{
                    padding: "9px 18px", background: "rgba(255,255,255,0.12)", color: "#fff",
                    border: "1.5px solid rgba(255,255,255,0.3)", borderRadius: 8, fontWeight: 700, fontSize: 13,
                    cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
                  }}>
                    ⚙ Year Settings
                  </button>
                  <button onClick={() => setFormModal({ initial: null })} style={{
                    padding: "9px 18px", background: "#2563EB", color: "#fff",
                    border: "none", borderRadius: 8, fontWeight: 700, fontSize: 13,
                    cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
                  }}>
                    + Add Event
                  </button>
                </div>
              )}
              <div style={{ display: "flex", gap: 6, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: 4 }}>
                {[["week","Week"],["month","Month"],["list","List"],["all","All Events"]].map(([v, label]) => (
                  <button key={v} onClick={() => setView(v)} style={{
                    padding: "7px 16px", borderRadius: 7, border: "none", cursor: "pointer",
                    background: view === v ? "white" : "transparent",

                              ? (isSheetsOverride ? "Revert to Sheets" : "Confirm Delete")
                              : (isSheetsOverride ? "Remove Override" : "Delete")}
                          </button>
                        )}
                      </div>
                    )}

                    <button onClick={() => { setSelectedEvent(null); setDeleteTarget(null); }} style={{
                      width: "100%", padding: "10px", background: "#F1F5F9",
                      border: "none", borderRadius: 8, cursor: "pointer",
                      fontWeight: 700, color: "#64748B", fontSize: 14,
                      fontFamily: "'DM Sans',sans-serif",
                    }}>Close</button>
                  </>
                );
              })()}
            </div>
          </div>
        )}

        {/* ── Sheets Original Version Modal ── */}
        {sheetsVersionModal && (
          <div onClick={() => setSheetsVersionModal(null)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 300, backdropFilter: "blur(4px)",
          }}>
            <div onClick={e => e.stopPropagation()} style={{
              background: "white", borderRadius: 16, padding: 28,
              maxWidth: 400, width: "90%", boxShadow: "0 25px 60px rgba(0,0,0,0.2)",
            }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#D97706", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>
                Google Sheets version
              </div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>TITLE</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#0F172A" }}>{sheetsVersionModal.title}</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <div>
                  <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>START</div>
                  <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.date_start}</div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>END</div>
                  <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.date_end}</div>
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>DEPARTMENT</div>
                <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.department}</div>
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>CATEGORY</div>
                <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.category}</div>
              </div>
              <button onClick={() => setSheetsVersionModal(null)} style={{
                width: "100%", padding: "10px", background: "#F1F5F9",
                border: "none", borderRadius: 8, cursor: "pointer",
                fontWeight: 700, color: "#64748B", fontSize: 14,
                fontFamily: "'DM Sans',sans-serif",
              }}>Close</button>
            </div>
          </div>
        )}

        {/* ── Admin Form Modal ── */}
        {formModal && (
          <EventFormModal
            initial={formModal.initial}
            onSave={handleFormSave}
            onClose={() => setFormModal(null)}
          />
        )}

        {settingsModal && (
          <AcademicYearSettingsModal
            yearStart={yearStartIso}
            totalWeeks={totalWeeks}
            terms={terms}
            onSave={handleSettingsSave}
            onClose={() => setSettingsModal(false)}
            teachingWeeks={teachingWeeks}
            twSyncing={twSyncing}
            twSyncMsg={twSyncMsg}
            onSyncTeachingWeeks={syncTeachingWeeks}
            onUpdateWeek={updateTeachingWeek}
          />
        )}
      </div>
    );
  }
</script>

</body>
</html>
