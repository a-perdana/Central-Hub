<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Calendar — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">

  <!-- React 18 + Babel standalone (browser JSX transpilation) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    #calendar-root {
      min-height: calc(100vh - 62px);
    }

    /* ===== MODAL (admin form) ===== */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.22);
    }
    .modal-box h3 {
      font-size: 17px; font-weight: 800; color: #0F172A; margin-bottom: 20px;
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 11px; font-weight: 700;
      color: #64748B; text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .form-row input,
    .form-row select {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: #0F172A;
      outline: none; transition: border-color 0.15s;
    }
    .form-row input:focus,
    .form-row select:focus { border-color: #2563EB; }
    .form-row.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-err { font-size: 12px; color: #DC2626; margin-top: 4px; display: none; }
    .form-err.visible { display: block; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-primary {
      padding: 9px 20px; background: #2563EB; color: #fff;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1D4ED8; }
    .btn-secondary {
      padding: 9px 20px; background: #F1F5F9; color: #374151;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    /* ===== TOAST ===== */
    #cal-toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #0F172A; color: #fff; padding: 10px 22px;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 400; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    #cal-toast.show { opacity: 1; }

  </style>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- ===== TOP NAV ===== -->
<!-- SHARED_NAVBAR -->

<!-- ===== CALENDAR ROOT ===== -->
<div id="calendar-root"></div>

<!-- ===== TOAST ===== -->
<div id="cal-toast"></div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>

<script type="module">
  // ─── Firestore imports ────────────────────────────────────────────────────────
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Expose Firestore helpers to React (Babel/text-babel scope)
  window.__calFS = {
    getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
    doc, getDoc, setDoc, serverTimestamp, query, orderBy,
  };

  // ─── Wait for auth then mount React ──────────────────────────────────────────
  document.addEventListener('authReady', ({ detail: { profile } }) => {
    const isAdmin = profile?.role_centralhub === 'central_admin'
                 || profile?.role === 'central_admin';
    window.__calIsAdmin = isAdmin;

    // Mount is deferred so Babel has time to register the component
    requestAnimationFrame(() => {
      const root = ReactDOM.createRoot(document.getElementById('calendar-root'));
      root.render(React.createElement(AcademicCalendar, { isAdmin }));
    });
  });
</script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect, useCallback, useMemo } = React;

  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const SHEETS_API_URL    = "https://script.google.com/macros/s/AKfycbz8Wiv4ndiecRZSYmbLsOe9DVc8A7BiV0TMHVV_8x9Tz08goc8WVhPQGtMW3umkTyO5/exec";
  const FS_COLLECTION     = "calendar_events";
  const FS_SETTINGS_DOC   = "calendar_settings";  // collection
  const FS_SETTINGS_ID    = "current";             // single document

  // Fallback used only before Firestore settings are loaded for the first time
  const DEFAULT_YEAR_START_ISO    = "2025-07-21";
  const DEFAULT_TOTAL_WEEKS       = 36;
  const DEFAULT_TERMS = [
    { label: "Semester 1", start: "2025-07-21", end: "2025-11-28" },
    { label: "Semester 2", start: "2026-01-05", end: "2026-05-29" },
  ];

  // ─── DEPARTMENT + CATEGORY CONFIG ────────────────────────────────────────────
  const DEPARTMENTS = {
    "Academic":           { color: "#2563EB", bg: "#EFF6FF", border: "#BFDBFE", dot: "#2563EB",  label: "Academic" },
    "College Counseling": { color: "#D97706", bg: "#FFFBEB", border: "#FDE68A", dot: "#D97706",  label: "College Counseling" },
    "Admin/Operations":   { color: "#059669", bg: "#ECFDF5", border: "#A7F3D0", dot: "#059669",  label: "Admin / Operations" },
    "Cambridge":          { color: "#0891b2", bg: "#E0F9FF", border: "#A5F3FC", dot: "#0891b2",  label: "Cambridge" },
  };

  const CATEGORY_OVERRIDES = {
    "Public Holiday": { color: "#DC2626", bg: "#FEF2F2", border: "#FECACA", dot: "#DC2626" },
    "Assessment":     { color: "#7C3AED", bg: "#F5F3FF", border: "#DDD6FE", dot: "#7C3AED" },
  };

  const ALL_CATEGORIES = [
    "Academic", "Academic Week", "Assessment", "Appraisal Visit",
    "Cambridge Deadline", "Cambridge Exam Period", "Cambridge Results",
    "Meeting", "Parent Event", "Professional Development",
    "Public Holiday", "Reporting", "School Visit", "Staff Event", "Student Event",
  ];

  function getEventStyle(event) {
    if (CATEGORY_OVERRIDES[event.category]) return CATEGORY_OVERRIDES[event.category];
    return DEPARTMENTS[event.department] || DEPARTMENTS["Academic"];
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function normalizeDate(str) {
    if (!str) return null;
    const s = String(str);
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
    const MM = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
    const m = s.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
    if (m && MM[m[1]]) return `${m[3]}-${MM[m[1]]}-${String(m[2]).padStart(2,"0")}`;
    return null;
  }

  function parseDate(str) {
    const s = normalizeDate(str) || String(str).slice(0, 10);
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
  }
  function isoDate(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  }
  function eventSpansDay(event, dayStr) {
    const day   = parseDate(dayStr);
    const start = parseDate(event.date_start);
    const end   = parseDate(event.date_end);
    return day >= start && day <= end;
  }

  function showToast(msg) {
    const el = document.getElementById('cal-toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ─── SUB-COMPONENTS ──────────────────────────────────────────────────────────
  function FilterChip({ label, color, active, onClick }) {
    return (
      <button onClick={onClick} style={{
        padding: "5px 12px", borderRadius: 20,
        border: `2px solid ${active ? color : "rgba(255,255,255,0.25)"}`,
        background: active ? color : "rgba(255,255,255,0.08)",
        color: active ? "white" : "rgba(255,255,255,0.6)",
        fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all 0.15s",
      }}>
        {label}
      </button>
    );
  }

  function Tag({ color, bg, children }) {
    return (
      <span style={{ fontSize: 11, fontWeight: 700, color, background: bg, padding: "3px 8px", borderRadius: 5 }}>
        {children}
      </span>
    );
  }

  function LegendItem({ color, label }) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: color }} />
        <span style={{ fontSize: 12, color: "#64748B", fontWeight: 500 }}>{label}</span>
      </div>
    );
  }

  const navBtnStyle = {
    padding: "8px 16px", background: "white", border: "1px solid #E2E8F0",
    borderRadius: 8, cursor: "pointer", fontWeight: 700, color: "#374151", fontSize: 13,
  };

  // ─── 2-MONTH STRIP VIEW ─────────────────────────────────────────────────────
  // Wide-scan calendar grid: 2 months side by side with category-colored
  // event cells + dashed-frame multi-day continuation + per-month foot panel
  // listing events. Mirrors the AH/TH/CH school-events strip but consumes
  // the academic calendar's department + category palette via getEventStyle().
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  function StripView({ anchorMonth, anchorYear, events, onShift, onDayClick }) {
    // Build per-day index — first day = "start", subsequent days = "continuation"
    const { byDay, contByDay } = useMemo(() => {
      const bd = {}, cb = {};
      events.forEach(ev => {
        if (!ev.date_start) return;
        const start = parseDate(ev.date_start);
        const end   = parseDate(ev.date_end || ev.date_start);
        let cur = new Date(start);
        let isFirst = true;
        while (cur <= end) {
          const key = isoDate(cur);
          if (isFirst) (bd[key] = bd[key] || []).push(ev);
          else         (cb[key] = cb[key] || []).push(ev);
          cur.setDate(cur.getDate() + 1);
          isFirst = false;
        }
      });
      return { byDay: bd, contByDay: cb };
    }, [events]);

    let mB = anchorMonth + 1, yB = anchorYear;
    if (mB > 11) { mB = 0; yB += 1; }
    const labelA = `${MONTHS[anchorMonth]} ${anchorYear}`;
    const labelB = `${MONTHS[mB]} ${yB}`;

    return (
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "20px 24px 32px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <button onClick={() => onShift(-2)} style={navBtnStyle}>← Prev 2 months</button>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#0F172A" }}>{labelA} – {labelB}</div>
          <button onClick={() => onShift( 2)} style={navBtnStyle}>Next 2 months →</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }} className="strip-grid">
          <StripMonth year={anchorYear} month={anchorMonth} byDay={byDay} contByDay={contByDay} onDayClick={onDayClick} />
          <StripMonth year={yB}        month={mB}          byDay={byDay} contByDay={contByDay} onDayClick={onDayClick} />
        </div>
        <style>{`
          @media (max-width: 900px) { .strip-grid { grid-template-columns: 1fr !important; gap: 18px !important; } }
        `}</style>
      </div>
    );
  }

  function StripMonth({ year, month, byDay, contByDay, onDayClick }) {
    const today = new Date();
    const isCurrent = (today.getFullYear() === year && today.getMonth() === month);
    const firstDay  = new Date(year, month, 1).getDay();
    const lastDate  = new Date(year, month + 1, 0).getDate();

    // Set of day-numbers (1..31) to glow because the user is hovering a
    // foot-panel row. Empty Set = nothing hovered. Local to this month
    // card so the two months in 2-month strip don't interfere.
    const [hoveredDays, setHoveredDays] = useState(() => new Set());

    const cells = [];
    // Empty cells before the 1st
    for (let i = 0; i < firstDay; i++) {
      cells.push(<div key={`e${i}`} style={{ aspectRatio: "1 / 1", minHeight: 36 }} />);
    }
    const dayList = []; // foot panel items
    for (let d = 1; d <= lastDate; d++) {
      const key = `${year}-${String(month + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const startEvts = byDay[key] || [];
      const contEvts  = contByDay[key] || [];
      const allEvts   = [...startEvts, ...contEvts];
      const isToday   = (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d);

      let cellStyle = {
        aspectRatio: "1 / 1", minHeight: 36, background: "white", borderRadius: 6,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 13, fontWeight: 500, color: "#0F172A", position: "relative",
        cursor: allEvts.length ? "pointer" : "default",
        outline: isToday ? "2px solid #2563EB" : "none", outlineOffset: -2,
        transition: "transform 0.1s",
      };
      let extra = null; // multi-event dot indicator

      if (allEvts.length > 0) {
        const dominant = startEvts[0] || contEvts[0];
        const st = getEventStyle(dominant);
        const isContOnly = startEvts.length === 0 && contEvts.length > 0;
        if (isContOnly) {
          // Continuation: white background + dashed outline in cat color
          cellStyle.background = "white";
          extra = (
            <div style={{
              position: "absolute", inset: 2, borderRadius: 5,
              border: `2px dashed ${st.color}`, opacity: 0.55, pointerEvents: "none",
            }} />
          );
        } else {
          cellStyle.background = st.color;
          cellStyle.color = "#fff";
          cellStyle.fontWeight = 700;
        }
        if (isToday) {
          // Make the today outline visible against colored cells
          cellStyle.outline = "2px solid #fff";
          cellStyle.boxShadow = "0 0 0 2px #2563EB";
        }
        // Glow when the user hovers the matching foot-panel row
        if (hoveredDays.has(d)) {
          cellStyle.transform = "scale(1.10)";
          cellStyle.zIndex = 3;
          cellStyle.outline = `2px solid ${st.color}`;
          cellStyle.outlineOffset = 2;
          cellStyle.boxShadow = `0 6px 16px ${st.color}55, 0 0 0 4px ${st.color}33`;
        }
      }

      cells.push(
        <div
          key={d}
          title={allEvts.map(e => e.title).join(" · ")}
          onClick={allEvts.length ? () => onDayClick(key, allEvts) : undefined}
          onMouseEnter={allEvts.length ? (e) => { e.currentTarget.style.transform = "scale(1.06)"; e.currentTarget.style.zIndex = "2"; } : undefined}
          onMouseLeave={allEvts.length ? (e) => { e.currentTarget.style.transform = ""; e.currentTarget.style.zIndex = ""; } : undefined}
          style={cellStyle}
        >
          {extra}
          <span style={{ position: "relative", zIndex: 1 }}>{d}</span>
          {allEvts.length > 1 && (
            <span style={{
              position: "absolute", top: 3, right: 3,
              width: 5, height: 5, borderRadius: "50%",
              background: cellStyle.background === "white" ? "#0F172A" : "rgba(255,255,255,0.85)",
            }} />
          )}
        </div>
      );

      if (startEvts.length > 0) startEvts.forEach(ev => dayList.push({ day: d, ev }));
    }

    return (
      <div style={{ background: "white", border: `1px solid ${isCurrent ? "#2563EB" : "#E2E8F0"}`, borderRadius: 12,
                    boxShadow: isCurrent ? "0 0 0 2px rgba(37,99,235,0.15), 0 1px 3px rgba(0,0,0,0.06)" : "0 1px 3px rgba(0,0,0,0.06)",
                    overflow: "hidden" }}>
        <div style={{
          background: isCurrent
            ? "linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%)"
            : "linear-gradient(135deg, #f97316 0%, #ea580c 100%)",
          color: "#fff", textAlign: "center", padding: "10px 14px",
          fontSize: 13, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase",
        }}>{MONTHS[month]}</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 2, padding: 10, background: "#F1F5F9" }}>
          {DOW.map(d => (
            <div key={d} style={{ fontSize: 10, fontWeight: 700, color: "#64748B",
              textTransform: "uppercase", letterSpacing: "0.06em", textAlign: "center", padding: "6px 0 4px" }}>{d}</div>
          ))}
          {cells}
        </div>
        <div style={{ padding: "12px 16px", borderTop: "1px solid #E2E8F0",
                      maxHeight: 220, overflowY: "auto" }}>
          {dayList.length === 0
            ? <div style={{ fontSize: 12, color: "#94A3B8", fontStyle: "italic" }}>No events this month.</div>
            : dayList.map(({ day, ev }, i) => {
                let dayLabel = String(day);
                if (ev.date_end && ev.date_end !== ev.date_start) {
                  const endParts = String(ev.date_end).split("-").map(Number);
                  const sameMonth = (endParts[0] === year && endParts[1] === month + 1);
                  if (sameMonth) dayLabel = `${day}-${endParts[2]}`;
                }
                const st = getEventStyle(ev);
                // Compute every in-month day this event covers, so hover
                // can light up multi-day spans (e.g. "23-25") all at once.
                const covered = [];
                const evStart = parseDate(ev.date_start);
                const evEnd   = parseDate(ev.date_end || ev.date_start);
                if (evStart && evEnd) {
                  const cur = new Date(evStart);
                  while (cur <= evEnd) {
                    if (cur.getFullYear() === year && cur.getMonth() === month) covered.push(cur.getDate());
                    cur.setDate(cur.getDate() + 1);
                  }
                }
                return (
                  <div
                    key={`${day}-${i}`}
                    onMouseEnter={() => setHoveredDays(new Set(covered))}
                    onMouseLeave={() => setHoveredDays(new Set())}
                    onClick={() => {
                      const k = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                      const startEvts = byDay[k] || [];
                      const contEvts  = contByDay[k] || [];
                      onDayClick(k, [...startEvts, ...contEvts]);
                    }}
                    style={{
                      display: "flex", gap: 8, alignItems: "flex-start",
                      fontSize: 12.5, lineHeight: 1.4, padding: "4px 6px",
                      borderRadius: 4, cursor: "pointer",
                      background: covered.length && hoveredDays.has(day) ? "#F1F5F9" : "transparent",
                      transition: "background 0.1s",
                    }}
                  >
                    <span style={{ fontWeight: 700, minWidth: 36, flexShrink: 0, color: st.color }}>{dayLabel}:</span>
                    <span style={{ color: "#0F172A", flex: 1 }}>{ev.title}</span>
                  </div>
                );
              })
          }
        </div>
      </div>
    );
  }

  // Day-detail popover used by StripView when clicking a cell. Lists every
  // event on that day with category badge + date range + click-through to
  // the existing event-details modal.
  function DayDetailPopover({ dateKey, events, onClose, onPick }) {
    const [y, m, d] = dateKey.split("-").map(Number);
    const dt = new Date(y, m - 1, d);
    const dowName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][dt.getDay()];
    return (
      <div onClick={onClose} style={{
        position: "fixed", inset: 0, background: "rgba(15,23,42,0.55)",
        backdropFilter: "blur(4px)", zIndex: 9000,
        display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
      }}>
        <div onClick={e => e.stopPropagation()} style={{
          background: "white", borderRadius: 14, width: "100%", maxWidth: 480,
          boxShadow: "0 25px 60px rgba(0,0,0,0.22)", overflow: "hidden",
        }}>
          <div style={{ padding: "16px 20px", borderBottom: "1px solid #E2E8F0",
                        display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "#0F172A", margin: 0 }}>
              {dowName}, {d} {MONTHS[m - 1]} {y}
            </h3>
            <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer",
              color: "#94A3B8", fontSize: 22, lineHeight: 1, padding: "0 4px" }}>×</button>
          </div>
          <div style={{ padding: "16px 20px", maxHeight: "60vh", overflowY: "auto" }}>
            {events.map((ev, i) => {
              const st = getEventStyle(ev);
              const dateRange = ev.date_start === ev.date_end
                ? ev.date_start
                : `${ev.date_start} → ${ev.date_end}`;
              return (
                <div key={ev.id || i}
                  onClick={() => { onPick(ev); onClose(); }}
                  style={{
                    padding: 10, border: "1px solid #F1F5F9", borderRadius: 8,
                    marginBottom: 8, cursor: "pointer",
                    transition: "background 0.12s, border-color 0.12s",
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = "#F8FAFC"; e.currentTarget.style.borderColor = st.border || "#E2E8F0"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = ""; e.currentTarget.style.borderColor = "#F1F5F9"; }}
                >
                  <div style={{ fontSize: 14, fontWeight: 600, color: "#0F172A", marginBottom: 4 }}>{ev.title}</div>
                  <div style={{ fontSize: 12, color: "#64748B", display: "flex", gap: 10, alignItems: "center" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 5,
                                   background: st.bg, color: st.color }}>
                      {ev.category || ev.department || "—"}
                    </span>
                    <span>{dateRange}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
