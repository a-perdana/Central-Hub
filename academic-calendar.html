  // ─── MAIN COMPONENT ──────────────────────────────────────────────────────────
  function AcademicCalendar({ isAdmin }) {
    const today = new Date();
    const [currentYear,  setCurrentYear]  = useState(today.getFullYear());
    const [currentMonth, setCurrentMonth] = useState(today.getMonth());
    const [events,       setEvents]       = useState([]);
    const [dataSource,   setDataSource]   = useState("loading"); // "loading" | "firestore" | "empty"
    const [selectedEvent, setSelectedEvent] = useState(null);
    // View persisted in localStorage so user's choice sticks. New default
    // is "strip" (2-month grid) — wider scan than the single-month grid.
    const [view, setView] = useState(() => {
      try { return localStorage.getItem("academicCalView") || "strip"; }
      catch (_) { return "strip"; }
    });
    useEffect(() => {
      try { localStorage.setItem("academicCalView", view); } catch(_) {}
    }, [view]);
    // Strip-view 2-month anchor (separate from currentMonth which the
    // single-month grid uses). Defaults to today's month.
    const __today = new Date();
    const [stripMonth, setStripMonth] = useState(__today.getMonth());
    const [stripYear,  setStripYear]  = useState(__today.getFullYear());
    // Day-detail popover for strip view — { dateKey, events[] } | null
    const [dayDetail, setDayDetail] = useState(null);
    const [activeFilters, setActiveFilters] = useState(new Set(["Academic","College Counseling","Admin/Operations","Cambridge"]));
    const [activeCategoryFilters, setActiveCategoryFilters] = useState(new Set(["Public Holiday","Assessment"]));
    const [formModal,       setFormModal]       = useState(null); // null | { initial } — admin only
    const [deleteTarget,    setDeleteTarget]    = useState(null); // null | eventId — admin only
    const [yearStartIso,    setYearStartIso]    = useState(DEFAULT_YEAR_START_ISO);
    const [totalWeeks,      setTotalWeeks]      = useState(DEFAULT_TOTAL_WEEKS);
    const [terms,           setTerms]           = useState(DEFAULT_TERMS);
    const [settingsModal,   setSettingsModal]   = useState(false); // admin only
    const [teachingWeeks,   setTeachingWeeks]   = useState([]);
    const [twSyncing,       setTwSyncing]       = useState(false);
    const [twSyncMsg,       setTwSyncMsg]       = useState("");
    // sheetsVersionModal: show original Sheets data for an overridden event
    const [sheetsVersionModal, setSheetsVersionModal] = useState(null);

    // ─── Load Firestore events ────────────────────────────────────────────────
    // Firestore is the single source of truth. Each synced doc carries
    // `sheets_original` (snapshot of Sheets at sync time). The "edited" badge
    // surfaces ONLY when current fields actually diverge from that snapshot,
    // not just because the field exists — every synced doc has it.
    const loadFromFirestore = useCallback(async () => {
      const { getFirestore, collection, getDocs, query, orderBy } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const snap = await getDocs(query(collection(db, FS_COLLECTION), orderBy("date_start")));
      if (snap.empty) return [];
      const DIFF_FIELDS = ['title', 'date_start', 'date_end', 'department', 'category'];
      return snap.docs.map(d => {
        const data = d.data();
        const ev = { id: d.id, ...data };
        // Diff current vs snapshot — only flag as "edited" if anything differs.
        if (data.sheets_original) {
          const drift = DIFF_FIELDS.some(f => (data[f] ?? '') !== (data.sheets_original[f] ?? ''));
          if (drift) ev._sheetsOriginal = data.sheets_original;
        }
        return ev;
      });
    }, []);

    // ─── Load academic year settings from calendar_settings/current ─────────
    useEffect(() => {
      async function loadSettings() {
        const { getFirestore, doc, getDoc } = window.__calFS;
        const db = getFirestore(window.firebaseApp);
        const snap = await getDoc(doc(db, FS_SETTINGS_DOC, FS_SETTINGS_ID));
        if (!snap.exists()) return; // keep defaults
        const d = snap.data();
        if (d.academicYearStart) setYearStartIso(d.academicYearStart);
        if (d.totalTeachingWeeks) setTotalWeeks(d.totalTeachingWeeks);
        if (Array.isArray(d.terms) && d.terms.length) setTerms(d.terms);
      }
      loadSettings();
    }, []);

    // ─── Initial data fetch: Firestore only ──────────────────────────────────
    // Sheets is no longer read at page load. The Apps Script feeder is only
    // touched by the admin "Sync from Sheets" button (handleSyncFromSheets).
    useEffect(() => {
      let cancelled = false;

      async function init() {
        const fsEvents = await loadFromFirestore().catch(() => []);
        if (cancelled) return;
        if (fsEvents.length > 0) {
          setEvents(fsEvents);
          setDataSource("firestore");
        } else {
          setEvents([]);
          setDataSource("empty");
        }
      }

      init();
      return () => { cancelled = true; };
    }, [loadFromFirestore]);

    // ─── Admin: re-read Firestore (after sync / edit / delete) ───────────────
    const reloadAll = useCallback(async () => {
      const fsEvents = await loadFromFirestore().catch(() => []);
      if (fsEvents.length > 0) {
        setEvents(fsEvents);
        setDataSource("firestore");
      } else {
        setEvents([]);
        setDataSource("empty");
      }
    }, [loadFromFirestore]);

    // ─── Teaching schedule: load from Firestore ───────────────────────────────
    const loadTeachingWeeks = useCallback(async () => {
      const { getFirestore, doc, getDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const snap = await getDoc(doc(db, 'teaching_schedule', 'main'));
      if (snap.exists() && Array.isArray(snap.data().weeks)) {
        setTeachingWeeks(snap.data().weeks);
      }
    }, []);

    useEffect(() => { loadTeachingWeeks(); }, [loadTeachingWeeks]);

    // ─── Teaching schedule: sync from Sheets + calendar_settings ─────────────
    const syncTeachingWeeks = useCallback(async () => {
      setTwSyncing(true);
      setTwSyncMsg("");
      try {
        const { getFirestore, doc, getDoc, setDoc, serverTimestamp } = window.__calFS;
        const db = getFirestore(window.firebaseApp);

        // Read events from Firestore (Sheets is no longer a runtime data source —
        // it's only touched by the admin "Sync from Sheets" button via handleSyncFromSheets).
        const { collection: collectionFn, getDocs: getDocsFn, query: queryFn, orderBy: orderByFn } = window.__calFS;
        const [eventsSnap, calSnap] = await Promise.all([
          getDocsFn(queryFn(collectionFn(db, FS_COLLECTION), orderByFn('date_start'))),
          getDoc(doc(db, 'calendar_settings', 'current')),
        ]);
        const sheetsRes = eventsSnap.empty
          ? []
          : eventsSnap.docs.map(d => d.data());

        let yearStartIso = '2025-07-21';
        let termsCfg = [];
        if (calSnap.exists()) {
          const cd = calSnap.data();
          if (cd.academicYearStart) yearStartIso = cd.academicYearStart;
          if (Array.isArray(cd.terms)) termsCfg = cd.terms;
        }

        const localDateStr = d => {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        };

        const yearStartRaw = new Date(yearStartIso + 'T00:00:00');
        const dow = yearStartRaw.getDay();
        const yearStart = new Date(yearStartRaw);
        yearStart.setDate(yearStartRaw.getDate() + (dow === 0 ? 1 : dow === 1 ? 0 : -(dow - 1)));

        // Build skip-week set: EASE exam weeks + Leadership Camp weeks
        function normDate(str) {
          if (!str) return null;
          const s = String(str);
          if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
          const MM = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
          const m2 = s.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
          if (m2 && MM[m2[1]]) return `${m2[3]}-${MM[m2[1]]}-${String(m2[2]).padStart(2,'0')}`;
          return null;
        }
        const evts = Array.isArray(sheetsRes) ? sheetsRes.map(e => ({
          ...e, date_start: normDate(e.date_start), date_end: normDate(e.date_end) || normDate(e.date_start),
        })).filter(e => e.date_start) : [];

        const skipWeekStarts = new Set();
        // skipWeekReasons: monStr → reason label
        const skipWeekReasons = {};
        const markSkipWeek = (ds, de, reason) => {
          const s = new Date(ds + 'T00:00:00'), e = new Date(de + 'T00:00:00');
          for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
            const wd = d.getDay();
            if (wd === 0 || wd === 6) continue;
            const mon = new Date(d); mon.setDate(d.getDate() - (wd - 1));
            const monStr = localDateStr(mon);
            skipWeekStarts.add(monStr);
            if (!skipWeekReasons[monStr]) skipWeekReasons[monStr] = reason;
          }
        };
        evts.filter(e => e.category === 'Assessment' && e.title && e.title.toUpperCase().includes('EASE')).forEach(e => markSkipWeek(e.date_start, e.date_end, 'EASE Exam'));
        evts.filter(e => /leadership camp/i.test(e.title)).forEach(e => markSkipWeek(e.date_start, e.date_end, 'Leadership Camp'));

        // Build a set of all Public Holiday dates (Mon–Fri only)
        const publicHolidayDates = new Set();
        evts.filter(e => e.category === 'Public Holiday').forEach(e => {
          const s = new Date(e.date_start + 'T00:00:00'), end = new Date(e.date_end + 'T00:00:00');
          for (let d = new Date(s); d <= end; d.setDate(d.getDate() + 1)) {
            const wd = d.getDay();
            if (wd >= 1 && wd <= 5) publicHolidayDates.add(localDateStr(d));
          }
        });

        // Every week within a semester is a teaching week, except EASE and Leadership Camp weeks,
        // and weeks where ALL 5 days are public holidays.
        const semBounds = termsCfg.map(t => ({
          label: t.label || '',
          start: new Date(t.start + 'T00:00:00'),
          end:   new Date(t.end   + 'T23:59:59'),
        }));
        const semCounters = semBounds.map(() => 0);

        const computedWeeks = [];
        const skippedWeeks = [];
        let globalWeekNo = 0;
        for (let w = 0; w < 70; w++) {
          const mon = new Date(yearStart); mon.setDate(yearStart.getDate() + w * 7);
          const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
          const mid = new Date(mon); mid.setDate(mon.getDate() + 2);
          const monStr = localDateStr(mon);
          let semLabel = '', semIdx = -1;
          for (let si = 0; si < semBounds.length; si++) {
            if (mid >= semBounds[si].start && mid <= semBounds[si].end) {
              semLabel = semBounds[si].label;
              semIdx = si;
              break;
            }
          }
          if (!semLabel) continue; // outside semester bounds entirely — ignore
          const allHoliday = [0,1,2,3,4].every(i => {
            const d = new Date(mon); d.setDate(mon.getDate() + i); return publicHolidayDates.has(localDateStr(d));
          });
          if (skipWeekStarts.has(monStr) || allHoliday) {
            let reason = skipWeekReasons[monStr];
            if (!reason) {
              // Collect names of public holiday events that overlap this week
              const weekDays = new Set([0,1,2,3,4].map(i => { const d = new Date(mon); d.setDate(mon.getDate() + i); return localDateStr(d); }));
              const names = evts
                .filter(e => e.category === 'Public Holiday' && e.title)
                .filter(e => {
                  const s = new Date(e.date_start + 'T00:00:00'), en = new Date(e.date_end + 'T00:00:00');
                  for (let d = new Date(s); d <= en; d.setDate(d.getDate() + 1)) { if (weekDays.has(localDateStr(d))) return true; }
                  return false;
                })
                .map(e => e.title);
              const unique = [...new Set(names)];
              reason = unique.length ? unique.join(' · ') : 'Public Holiday';
            }
            skippedWeeks.push({ mon: monStr, fri: localDateStr(fri), semLabel, reason });
          } else {
            globalWeekNo++;
            semCounters[semIdx]++;
            computedWeeks.push({ weekNo: globalWeekNo, semLabel, semWeekNo: semCounters[semIdx], mon: monStr, fri: localDateStr(fri) });
          }
        }

        await setDoc(doc(db, 'teaching_schedule', 'main'), {
          academicYearStart: yearStartIso,
          skippedWeekCount: skippedWeeks.length,
          teachingWeekCount: computedWeeks.length,
          weeks: computedWeeks,
          skippedWeeks,
          syncedAt: serverTimestamp(),
        });

        setTeachingWeeks(computedWeeks);
        setTwSyncMsg(`✓ Synced — ${computedWeeks.length} teaching weeks saved (${70 - computedWeeks.length} skipped).`);
      } catch (e) {
        setTwSyncMsg(`Sync failed: ${e.message}`);
      } finally {
        setTwSyncing(false);
      }
    }, [terms, yearStartIso]);

    // ─── Teaching schedule: update a single week's dates ─────────────────────
    const updateTeachingWeek = useCallback(async (idx, mon, fri) => {
      const { getFirestore, doc, updateDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const updated = teachingWeeks.map((w, i) => i === idx ? { ...w, mon, fri } : w);
      await updateDoc(doc(db, 'teaching_schedule', 'main'), { weeks: updated });
      setTeachingWeeks(updated);
    }, [teachingWeeks]);

    // ─── Admin: save academic year settings ──────────────────────────────────
    const handleSettingsSave = useCallback(async ({ academicYearStart, totalTeachingWeeks, terms: newTerms }) => {
      const { getFirestore, doc, setDoc, serverTimestamp } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      await setDoc(doc(db, FS_SETTINGS_DOC, FS_SETTINGS_ID), {
        academicYearStart,
        totalTeachingWeeks,
        terms: newTerms,
        updatedAt: serverTimestamp(),
      });
      setYearStartIso(academicYearStart);
      setTotalWeeks(totalTeachingWeeks);
      setTerms(newTerms);
      setSettingsModal(false);
      showToast("Academic year settings saved.");
    }, []);

    // ─── Admin: save (create or update) ──────────────────────────────────────
    const handleFormSave = useCallback(async (formData) => {
      const { getFirestore, collection, addDoc, updateDoc, doc, serverTimestamp } = window.__calFS;
      const db = getFirestore(window.firebaseApp);

      // Every event is now a Firestore doc. _fsId set → update existing;
      // unset → brand new admin-added event.
      const isExistingFsDoc = formData._fsId != null;

      if (isExistingFsDoc) {
        // Update in-place — strip transient editor fields, keep everything
        // else (including sheets_id + sheets_original snapshot for synced docs).
        const { _fsId, _sheetsOriginal, id, ...fields } = formData;
        await updateDoc(doc(db, FS_COLLECTION, _fsId), { ...fields, updatedAt: serverTimestamp() });
        showToast("Event updated.");
      } else {
        // Brand new event (no Sheets origin).
        const { _fsId, _sheetsOriginal, ...fields } = formData;
        await addDoc(collection(db, FS_COLLECTION), { ...fields, createdAt: serverTimestamp() });
        showToast("Event added.");
      }

      await reloadAll();
      setFormModal(null);
      setSelectedEvent(null);
    }, [reloadAll]);

    // ─── Admin: sync from Google Sheets into calendar_events ─────────────────
    // Imports every Sheets row that doesn't already have a Firestore doc with
    // matching sheets_id. Existing FS docs (admin overrides) are left untouched.
    // Idempotent: re-running only inserts new Sheets rows.
    //
    // The selected `syncYear` (e.g. '25_26' / '26_27') is stamped on every
    // imported doc as `academicYear`. The Apps Script feeder's SHEET_NAME must
    // already be pointing at the matching tab — admin redeploys the feeder
    // before pressing this button. The dropdown is purely a labelling choice;
    // it does NOT switch the Apps Script source.
    const [syncing,    setSyncing]    = useState(false);
    const [syncMsg,    setSyncMsg]    = useState("");
    const [syncYear,   setSyncYear]   = useState("25_26");
    const [adminMenuOpen, setAdminMenuOpen] = useState(false);
    const SYNC_YEAR_OPTIONS = ["24_25", "25_26", "26_27", "27_28"];

    // Close admin dropdown on outside click / Escape
    useEffect(() => {
      if (!adminMenuOpen) return;
      const onDocClick = (e) => {
        if (!e.target.closest?.("[data-admin-menu-root]")) setAdminMenuOpen(false);
      };
      const onKey = (e) => { if (e.key === "Escape") setAdminMenuOpen(false); };
      document.addEventListener("mousedown", onDocClick);
      document.addEventListener("keydown", onKey);
      return () => {
        document.removeEventListener("mousedown", onDocClick);
        document.removeEventListener("keydown", onKey);
      };
    }, [adminMenuOpen]);

    const handleSyncFromSheets = useCallback(async () => {
      setSyncing(true);
      setSyncMsg("");
      try {
        const { getFirestore, collection, addDoc, getDocs, serverTimestamp } = window.__calFS;
        const db = getFirestore(window.firebaseApp);

        const sheetsRaw = await fetch(SHEETS_API_URL).then(r => r.json());
        if (!Array.isArray(sheetsRaw) || sheetsRaw.length === 0) {
          throw new Error("Sheets returned no data");
        }

        const sheetsRows = sheetsRaw.map(e => e ? {
          ...e,
          date_start: normalizeDate(e.date_start) || e.date_start,
          date_end:   normalizeDate(e.date_end)   || e.date_end,
        } : null).filter(r => r && r.date_start && r.date_end && r.title);

        const fsSnap = await getDocs(collection(db, FS_COLLECTION));
        const existingSheetsIds = new Set();
        fsSnap.docs.forEach(d => {
          const sid = d.data().sheets_id;
          if (sid != null) existingSheetsIds.add(String(sid));
        });

        const toImport = sheetsRows.filter(r => !existingSheetsIds.has(String(r.id)));

        let inserted = 0;
        for (const r of toImport) {
          const { id: sheetsId, ...fields } = r;
          await addDoc(collection(db, FS_COLLECTION), {
            title:        fields.title || "",
            department:   fields.department || "Academic",
            category:     fields.category || "Academic",
            date_start:   fields.date_start,
            date_end:     fields.date_end,
            description:  fields.description || "",
            academicYear: syncYear,
            sheets_id:    sheetsId,
            sheets_original: {
              title: fields.title, date_start: fields.date_start, date_end: fields.date_end,
              department: fields.department, category: fields.category,
            },
            createdAt: serverTimestamp(),
          });
          inserted++;
        }

        await reloadAll();
        const skipped = sheetsRows.length - toImport.length;
        setSyncMsg(`✓ Synced ${syncYear} — ${inserted} imported, ${skipped} already in Firestore.`);
      } catch (e) {
        setSyncMsg(`Sync failed: ${e.message}`);
      } finally {
        setSyncing(false);
        setTimeout(() => setSyncMsg(""), 8000);
      }
    }, [reloadAll, syncYear]);

    // ─── Admin: delete ────────────────────────────────────────────────────────
    const handleDelete = useCallback(async (fsId) => {
      if (!fsId) return;
      const { getFirestore, doc, deleteDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      await deleteDoc(doc(db, FS_COLLECTION, fsId));
      showToast("Event deleted.");
      await reloadAll();
      setSelectedEvent(null);
      setDeleteTarget(null);
    }, [reloadAll]);

    // ─── Nav helpers ──────────────────────────────────────────────────────────
    const prevMonth = () => {
      if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); }
      else setCurrentMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y => y + 1); }
      else setCurrentMonth(m => m + 1);
    };

    const filteredEvents = useMemo(() => events.filter(e => {
      if (!e || !e.date_start || !e.date_end) return false;
      if (CATEGORY_OVERRIDES[e.category]) return activeCategoryFilters.has(e.category);
      return activeFilters.has(e.department);
    }), [events, activeFilters, activeCategoryFilters]);

    const calendarDays = useMemo(() => {
      const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let d = 1; d <= daysInMonth; d++) days.push(d);
      return days;
    }, [currentYear, currentMonth]);

    const getEventsForDay = (day) => {
      if (!day) return [];
      const dayStr = isoDate(new Date(currentYear, currentMonth, day));
      return filteredEvents.filter(e => eventSpansDay(e, dayStr));
    };

    const upcomingEvents = useMemo(() => {
      const todayStr = isoDate(today);
      return filteredEvents
        .filter(e => e.date_start && e.date_end && String(e.date_end).slice(0, 10) >= todayStr)
        .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start)))
        .slice(0, 30);
    }, [filteredEvents]);

    const yearStats = useMemo(() => {
      const deptCount = {};
      const catCount  = {};
      let total = 0;
      events.forEach(e => {
        if (!e || !e.date_start) return;
        total++;
        deptCount[e.department] = (deptCount[e.department] || 0) + 1;
        catCount[e.category]    = (catCount[e.category]    || 0) + 1;
      });
      return { deptCount, catCount, total };
    }, [events]);

    const allEventsSorted = useMemo(() =>
      events.filter(e => e && e.date_start)
            .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start))),
    [events]);

    // ─── Week view ────────────────────────────────────────────────────────────
    const academicYearStart = useMemo(() => parseDate(yearStartIso), [yearStartIso]);

    const weeklyEvents = useMemo(() => {
      const weeks = [];
      const sorted = filteredEvents
        .filter(e => e.date_start && e.date_end)
        .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start)));

      sorted.forEach(ev => {
        const evStart = parseDate(ev.date_start);
        const diff = Math.floor((evStart - academicYearStart) / (7 * 24 * 3600 * 1000));
        if (diff < 0) return; // before academic year
        const weekNum = diff + 1;

        let weekObj = weeks.find(w => w.weekNum === weekNum);
        if (!weekObj) {
          const monDate = new Date(academicYearStart.getTime() + (weekNum - 1) * 7 * 24 * 3600 * 1000);
          const friDate = new Date(monDate.getTime() + 4 * 24 * 3600 * 1000);
          weekObj = { weekNum, monDate, friDate, events: [] };
          weeks.push(weekObj);
        }
        weekObj.events.push(ev);
      });

      return weeks.sort((a, b) => a.weekNum - b.weekNum);
    }, [filteredEvents, academicYearStart]);

    // Scroll to current week when week view is activated
    useEffect(() => {
      if (view !== "week") return;
      const now = new Date();
      const diff = Math.floor((now - academicYearStart) / (7 * 24 * 3600 * 1000));
      const currentWeekNum = diff + 1;
      if (currentWeekNum < 1) return;
      requestAnimationFrame(() => {
        const el = document.getElementById(`week-${currentWeekNum}`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    }, [view, academicYearStart]);

    const toggleFilter = (key, setFn) => setFn(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });

    const isToday = (day) => {
      const t = new Date();
      return day === t.getDate() && currentMonth === t.getMonth() && currentYear === t.getFullYear();
    };

    return (
      <div style={{ fontFamily: "'DM Sans','Helvetica Neue',sans-serif", background: "#F8FAFC", minHeight: "100%" }}>

        {/* ── Header ── */}
        <div style={{ background: "linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #1D4ED8 100%)", padding: "28px 32px 24px", color: "white" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, gap: 16, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", color: "#93C5FD", textTransform: "uppercase", marginBottom: 4 }}>
                Eduversal Indonesia
              </div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, letterSpacing: "-0.5px" }}>
                Academic Calendar 2025–2026
              </h1>
            </div>

            {/* Right side: admin button + view toggle — laid out in a single row to match AH */}
            <div style={{ display: "flex", flexDirection: "row", alignItems: "center", gap: 10, flexWrap: "wrap", justifyContent: "flex-end" }}>
              {isAdmin && (
                <div data-admin-menu-root style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, position: "relative" }}>
                  <button
                    onClick={() => setAdminMenuOpen(o => !o)}
                    title="Admin tools: year selector, sync from Sheets, year settings, add event"
                    style={{
                      padding: "8px 14px", background: adminMenuOpen ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.12)",
                      color: "#fff", border: "1.5px solid rgba(255,255,255,0.3)", borderRadius: 8,
                      fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
                      display: "flex", alignItems: "center", gap: 6,
                    }}
                  >
                    ⚙ Admin <span style={{ fontSize: 10, opacity: 0.85, marginLeft: 2 }}>{adminMenuOpen ? "▴" : "▾"}</span>
                  </button>
                  {adminMenuOpen && (
                    <div style={{
                      position: "absolute", top: "calc(100% + 6px)", right: 0, zIndex: 50,
                      minWidth: 240, background: "#0F172A",
                      border: "1.5px solid rgba(255,255,255,0.18)", borderRadius: 10,
                      boxShadow: "0 14px 36px rgba(0,0,0,0.45)", padding: 8,
                      display: "flex", flexDirection: "column", gap: 6,
                    }}>
                      <div title="Stamps imported docs with this academicYear field. Make sure the Apps Script feeder's SHEET_NAME is pointing at the matching tab before syncing." style={{
                        display: "flex", alignItems: "center", gap: 6, padding: "8px 10px",
                        background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.15)",
                        borderRadius: 6,
                      }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.6)", letterSpacing: "0.05em", textTransform: "uppercase" }}>Year</span>
                        <select value={syncYear} onChange={e => setSyncYear(e.target.value)} disabled={syncing} style={{
                          flex: 1, background: "transparent", color: "#fff", border: "none", padding: "2px 4px",
                          fontWeight: 700, fontSize: 13, cursor: syncing ? "default" : "pointer",
                          fontFamily: "'DM Sans',sans-serif", outline: "none",
                        }}>
                          {SYNC_YEAR_OPTIONS.map(y => (
                            <option key={y} value={y} style={{ color: "#0F172A" }}>{y}</option>
                          ))}
                        </select>
                      </div>
                      <button onClick={() => { handleSyncFromSheets(); }} disabled={syncing} title={`Import new events from the Google Sheets master into Firestore, stamping academicYear='${syncYear}' on each new doc. Existing admin overrides are preserved.`} style={{
                        padding: "9px 12px", background: syncing ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.08)",
                        color: syncing ? "rgba(255,255,255,0.45)" : "#fff",
                        border: "1px solid rgba(255,255,255,0.2)", borderRadius: 6, fontWeight: 600, fontSize: 13,
                        cursor: syncing ? "default" : "pointer", fontFamily: "'DM Sans',sans-serif",
                        textAlign: "left",
                      }}>
                        {syncing ? "Syncing…" : `⟳ Sync ${syncYear} from Sheets`}
                      </button>
                      <button onClick={() => { setSettingsModal(true); setAdminMenuOpen(false); }} style={{
                        padding: "9px 12px", background: "rgba(255,255,255,0.08)", color: "#fff",
                        border: "1px solid rgba(255,255,255,0.2)", borderRadius: 6, fontWeight: 600, fontSize: 13,
                        cursor: "pointer", fontFamily: "'DM Sans',sans-serif", textAlign: "left",
                      }}>
                        ⚙ Year Settings
                      </button>
                      <button onClick={() => { setFormModal({ initial: null }); setAdminMenuOpen(false); }} style={{
                        padding: "9px 12px", background: "#2563EB", color: "#fff",
                        border: "none", borderRadius: 6, fontWeight: 700, fontSize: 13,
                        cursor: "pointer", fontFamily: "'DM Sans',sans-serif", textAlign: "left",
                      }}>
                        + Add Event
                      </button>
                    </div>
                  )}
                  {syncMsg && (
                    <div style={{
                      fontSize: 11, fontWeight: 600,
                      color: syncMsg.startsWith("✓") ? "#A7F3D0" : "#FCA5A5",
                      background: syncMsg.startsWith("✓") ? "rgba(5,150,105,0.18)" : "rgba(220,38,38,0.18)",
                      border: `1px solid ${syncMsg.startsWith("✓") ? "rgba(167,243,208,0.3)" : "rgba(252,165,165,0.3)"}`,
                      borderRadius: 6, padding: "4px 10px",
                    }}>
                      {syncMsg}
                    </div>
                  )}
                </div>
              )}
              <div style={{ display: "flex", gap: 6, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: 4 }}>
                {[["strip","2-Month"],["month","1-Month"],["week","Week"],["list","List"],["all","All Events"]].map(([v, label]) => (
                  <button key={v} onClick={() => setView(v)} style={{
                    padding: "7px 16px", borderRadius: 7, border: "none", cursor: "pointer",
                    background: view === v ? "white" : "transparent",
                    color: view === v ? "#1E3A5F" : "rgba(255,255,255,0.7)",
                    fontWeight: 700, fontSize: 13, transition: "all 0.15s",
                  }}>{label}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#CBD5E1", fontWeight: 600, marginRight: 4 }}>Filter:</span>
            {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
              <FilterChip key={key} label={cfg.label} color={cfg.color}
                active={activeFilters.has(key)}
                onClick={() => toggleFilter(key, setActiveFilters)} />
            ))}
            {Object.entries(CATEGORY_OVERRIDES).map(([key, cfg]) => (
              <FilterChip key={key} label={key} color={cfg.color}
                active={activeCategoryFilters.has(key)}
                onClick={() => toggleFilter(key, setActiveCategoryFilters)} />
            ))}
          </div>
        </div>

        {/* ── 2-Month Strip View ── */}
        {view === "strip" && (
          <StripView
            anchorMonth={stripMonth}
            anchorYear={stripYear}
            events={filteredEvents}
            onShift={(deltaMonths) => {
              let m = stripMonth + deltaMonths;
              let y = stripYear;
              while (m > 11) { m -= 12; y += 1; }
              while (m < 0)  { m += 12; y -= 1; }
              setStripMonth(m);
              setStripYear(y);
            }}
            onDayClick={(dateKey, evs) => setDayDetail({ dateKey, events: evs })}
          />
        )}

        {/* ── Month Navigator ── */}
        {view === "month" && (
          <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 32px 12px" }}>
            <button onClick={prevMonth} style={navBtnStyle}>← Prev</button>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#0F172A" }}>
                {MONTHS[currentMonth]} {currentYear}
              </div>
            </div>
            <button onClick={nextMonth} style={navBtnStyle}>Next →</button>
          </div>
        )}

        {/* ── Calendar Grid ── */}
        {view === "month" && (
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 24px 32px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 4, marginBottom: 4 }}>
              {DAYS.map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: "#64748B", padding: "6px 0", letterSpacing: "0.05em" }}>
                  {d}
                </div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 4 }}>
              {calendarDays.map((day, idx) => {
                const dayEvents = getEventsForDay(day);
                const today_   = isToday(day);
                return (
                  <div key={idx} style={{
                    minHeight: 90,
                    background: day ? (today_ ? "#EFF6FF" : "white") : "transparent",
                    borderRadius: 10,
                    border: day ? (today_ ? "2px solid #2563EB" : "1px solid #E2E8F0") : "none",
                    padding: day ? "8px 6px 6px" : 0,
                  }}>
                    {day && (
                      <>
                        <div style={{
                          fontSize: 13, fontWeight: today_ ? 800 : 500, marginBottom: 4,
                          display: "inline-flex", alignItems: "center", justifyContent: "center",
                          width: today_ ? 24 : "auto", height: today_ ? 24 : "auto",
                          background: today_ ? "#2563EB" : "transparent",
                          color: today_ ? "white" : "#374151",
                          borderRadius: today_ ? "50%" : 0,
                        }}>{day}</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                          {dayEvents.slice(0, 2).map(e => {
                            const st = getEventStyle(e);
                            return (
                              <div key={e.id} onClick={() => setSelectedEvent(e)} style={{
                                fontSize: 10, fontWeight: 600,
                                color: st.color, background: st.bg,
                                border: `1px solid ${st.border}`,
                                borderLeft: `3px solid ${st.dot}`,
                                borderRadius: 4, padding: "2px 4px",
                                lineHeight: 1.3, cursor: "pointer",
                                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                              }} title={e.title}>
                                {e.title}
                              </div>
                            );
                          })}
                          {dayEvents.length > 2 && (
                            <div style={{ fontSize: 10, color: "#94A3B8", fontWeight: 600, paddingLeft: 2 }}>
                              +{dayEvents.length - 2} more
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── Week View ── */}
        {view === "week" && (
          <div style={{ padding: "24px 32px 40px", maxWidth: 860 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, color: "#0F172A", marginBottom: 4 }}>Academic Year by Week</h2>
            <div style={{ fontSize: 13, color: "#64748B", marginBottom: 24 }}>
              Week 1 starts {academicYearStart.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })} · {totalWeeks} teaching weeks
              {terms.length > 0 && (
                <span> · {terms.map(t => `${t.label}: ${String(t.start).slice(5).replace("-","/")} – ${String(t.end).slice(5).replace("-","/")}`).join("  |  ")}</span>
              )}
            </div>

            {weeklyEvents.length === 0 && (
              <div style={{ color: "#94A3B8", textAlign: "center", padding: 40 }}>No events found.</div>
            )}

            {weeklyEvents.map(({ weekNum, monDate, friDate, events: wevents }) => {
              const fmtDate = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
              const isCurrent = (() => {
                const now = new Date();
                return now >= monDate && now <= new Date(friDate.getTime() + 24 * 3600 * 1000);
              })();
              return (
                <div key={weekNum} id={`week-${weekNum}`} style={{
                  marginBottom: 12,
                  border: `1.5px solid ${isCurrent ? "#2563EB" : "#E2E8F0"}`,
                  borderRadius: 12,
                  background: isCurrent ? "#EFF6FF" : "white",
                  overflow: "hidden",
                }}>
                  {/* Week header */}
                  <div style={{
                    display: "flex", alignItems: "center", gap: 12,
                    padding: "12px 20px",
                    background: isCurrent ? "#2563EB" : "#F8FAFC",
                    borderBottom: `1px solid ${isCurrent ? "#1D4ED8" : "#E2E8F0"}`,
                  }}>
                    <div style={{
                      fontSize: 13, fontWeight: 900,
                      color: isCurrent ? "white" : "#0F172A",
                      minWidth: 72,
                    }}>
                      Week {weekNum}
                    </div>
                    <div style={{ fontSize: 12, color: isCurrent ? "#BFDBFE" : "#64748B", fontWeight: 600 }}>
                      {fmtDate(monDate)} – {fmtDate(friDate)}
                    </div>
                    {isCurrent && (
                      <span style={{
                        marginLeft: "auto", fontSize: 11, fontWeight: 800,
                        background: "rgba(255,255,255,0.2)", color: "white",
                        padding: "3px 10px", borderRadius: 20,
                      }}>Current week</span>
                    )}
                    {!isCurrent && (
                      <span style={{ marginLeft: "auto", fontSize: 12, color: "#94A3B8", fontWeight: 600 }}>
                        {wevents.length} event{wevents.length !== 1 ? "s" : ""}
                      </span>
                    )}
                  </div>

                  {/* Events in this week */}
                  {wevents.length === 0 ? (
                    <div style={{ padding: "14px 20px", fontSize: 13, color: "#CBD5E1", fontStyle: "italic" }}>
                      No scheduled events
                    </div>
                  ) : (
                    <div style={{ padding: "10px 20px 14px" }}>
                      {wevents.map(e => {
                        const st = getEventStyle(e);
                        const ds = String(e.date_start).slice(0, 10);
                        const de = String(e.date_end).slice(0, 10);
                        return (
                          <div key={e.id} onClick={() => setSelectedEvent(e)} style={{
                            display: "flex", gap: 14, alignItems: "center",
                            padding: "9px 12px",
                            borderLeft: `4px solid ${st.dot}`,
                            borderRadius: 8,
                            background: st.bg,
                            marginBottom: 6,
                            cursor: "pointer",
                          }}>
                            <div style={{ minWidth: 90, fontSize: 12, fontWeight: 700, color: st.color }}>
                              {ds === de ? ds.slice(5).replace("-", " ") : `${ds.slice(5).replace("-"," ")} – ${de.slice(5).replace("-"," ")}`}
                            </div>
                            <div style={{ flex: 1, fontWeight: 700, fontSize: 14, color: "#0F172A", display: "flex", alignItems: "center", gap: 6 }}>
                              {e.title}
                              {e._sheetsOriginal && (
                                <span title="Edited — differs from Google Sheets" style={{ fontSize: 10, fontWeight: 800, color: "#D97706", background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 4, padding: "1px 6px", cursor: "default" }}>edited</span>
                              )}
                            </div>
                            <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                              <Tag color={st.color} bg="rgba(255,255,255,0.7)">{e.department}</Tag>
                              <Tag color="#64748B" bg="rgba(255,255,255,0.7)">{e.category}</Tag>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── List View ── */}
        {view === "list" && (
          <div style={{ padding: "24px 32px", maxWidth: 780 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, color: "#0F172A", marginBottom: 20 }}>Upcoming Events</h2>
            {upcomingEvents.length === 0 && (
              <div style={{ color: "#94A3B8", textAlign: "center", padding: 40 }}>No events found for selected filters.</div>
            )}
            {upcomingEvents.map((e, i) => {
              const st  = getEventStyle(e);
              const ds  = String(e.date_start).slice(0, 10);
              const sameAsLast = i > 0 && String(upcomingEvents[i-1].date_start).slice(0,7) === ds.slice(0,7);
              const monthLabel = !sameAsLast ? (
                <div style={{ fontSize: 12, fontWeight: 800, color: "#64748B", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: i > 0 ? 24 : 0, marginBottom: 8 }}>
                  {MONTHS[parseInt(ds.split("-")[1])-1]} {ds.split("-")[0]}
                </div>
              ) : null;
              return (
                <div key={e.id}>
                  {monthLabel}
                  <div onClick={() => setSelectedEvent(e)} style={{
                    display: "flex", gap: 16, alignItems: "flex-start",
                    padding: "12px 16px", background: "white",
                    border: "1px solid #E2E8F0", borderLeft: `4px solid ${st.dot}`,
                    borderRadius: 10, marginBottom: 6, cursor: "pointer",
                  }}>
                    <div style={{ minWidth: 70, textAlign: "center" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>
                        {MONTHS[parseInt(ds.split("-")[1])-1].slice(0,3)}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>
                        {ds.split("-")[2]}
                      </div>
                      {e.date_start !== e.date_end && (
                        <div style={{ fontSize: 10, color: "#94A3B8" }}>– {String(e.date_end).slice(8,10)}</div>
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0F172A", fontSize: 14, marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
                        {e.title}
                        {e._sheetsOriginal && (
                          <span title="Edited — differs from Google Sheets" style={{ fontSize: 10, fontWeight: 800, color: "#D97706", background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 4, padding: "1px 6px", cursor: "default" }}>edited</span>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <Tag color={st.color} bg={st.bg}>{e.department}</Tag>
                        <Tag color="#64748B" bg="#F1F5F9">{e.category}</Tag>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── All Events View ── */}
        {view === "all" && (
          <div style={{ padding: "28px 32px 40px", maxWidth: 960, margin: "0 auto" }}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 14, marginBottom: 28 }}>
              <div style={{ background: "white", borderRadius: 12, padding: "20px", border: "1px solid #E2E8F0", textAlign: "center" }}>
                <div style={{ fontSize: 44, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>{yearStats.total}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", marginTop: 8, textTransform: "uppercase", letterSpacing: "0.1em" }}>Total Events</div>
              </div>
              {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
                <div key={key} style={{ background: cfg.bg, borderRadius: 12, padding: "20px", border: `1px solid ${cfg.border}`, textAlign: "center" }}>
                  <div style={{ fontSize: 44, fontWeight: 900, color: cfg.color, lineHeight: 1 }}>{yearStats.deptCount[key] || 0}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: cfg.color, marginTop: 8, opacity: 0.8, textTransform: "uppercase", letterSpacing: "0.07em" }}>{cfg.label}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "22px 24px", marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 18 }}>Activity Distribution by Department</div>
              {Object.entries(DEPARTMENTS).map(([key, cfg]) => {
                const count = yearStats.deptCount[key] || 0;
                const pct   = yearStats.total ? Math.round(count / yearStats.total * 100) : 0;
                return (
                  <div key={key} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: cfg.color }}>{cfg.label}</span>
                      <span style={{ fontSize: 13, color: "#64748B", fontWeight: 600 }}>{count} events &middot; {pct}%</span>
                    </div>
                    <div style={{ height: 10, background: "#F1F5F9", borderRadius: 6, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: cfg.color, borderRadius: 6 }} />
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "22px 24px", marginBottom: 28 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>Events by Category</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {Object.entries(yearStats.catCount).sort((a, b) => b[1] - a[1]).map(([cat, count]) => {
                  const ov  = CATEGORY_OVERRIDES[cat];
                  return (
                    <div key={cat} style={{ display: "flex", alignItems: "center", gap: 8, background: ov ? ov.bg : "#F1F5F9", borderRadius: 8, padding: "8px 14px", border: `1px solid ${ov ? ov.border : "#E2E8F0"}` }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: ov ? ov.color : "#334155" }}>{cat}</span>
                      <span style={{ fontSize: 20, fontWeight: 900, color: ov ? ov.color : "#334155", lineHeight: 1 }}>{count}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>
              All {yearStats.total} Events — Chronological
            </div>
            {allEventsSorted.map((e, i) => {
              const st  = getEventStyle(e);
              const ds  = String(e.date_start).slice(0, 10);
              const sameAsLast = i > 0 && String(allEventsSorted[i-1].date_start).slice(0,7) === ds.slice(0,7);
              const monthLabel = !sameAsLast ? (
                <div style={{ fontSize: 12, fontWeight: 800, color: "#64748B", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: i > 0 ? 24 : 0, marginBottom: 8 }}>
                  {MONTHS[parseInt(ds.split("-")[1])-1]} {ds.split("-")[0]}
                </div>
              ) : null;
              return (
                <div key={e.id || i}>
                  {monthLabel}
                  <div onClick={() => setSelectedEvent(e)} style={{
                    display: "flex", gap: 16, alignItems: "flex-start",
                    padding: "12px 16px", background: "white",
                    border: "1px solid #E2E8F0", borderLeft: `4px solid ${st.dot}`,
                    borderRadius: 10, marginBottom: 6, cursor: "pointer",
                  }}>
                    <div style={{ minWidth: 70, textAlign: "center", flexShrink: 0 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>
                        {MONTHS[parseInt(ds.split("-")[1])-1].slice(0,3)}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>
                        {ds.split("-")[2]}
                      </div>
                      {e.date_start !== e.date_end && (
                        <div style={{ fontSize: 10, color: "#94A3B8" }}>– {String(e.date_end).slice(8,10)}</div>
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0F172A", fontSize: 14, marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
                        {e.title}
                        {e._sheetsOriginal && (
                          <span title="Edited — differs from Google Sheets" style={{ fontSize: 10, fontWeight: 800, color: "#D97706", background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 4, padding: "1px 6px", cursor: "default" }}>edited</span>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <Tag color={st.color} bg={st.bg}>{e.department}</Tag>
                        <Tag color="#64748B" bg="#F1F5F9">{e.category}</Tag>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── Legend ── */}
        {view !== "all" && (
          <div style={{ padding: "0 32px 32px", display: "flex", gap: 20, flexWrap: "wrap" }}>
            {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
              <LegendItem key={key} color={cfg.color} label={cfg.label} />
            ))}
            {Object.entries(CATEGORY_OVERRIDES).map(([key, cfg]) => (
              <LegendItem key={key} color={cfg.color} label={key} />
            ))}
          </div>
        )}

        {/* ── Day Detail Popover (strip view) ── */}
        {dayDetail && (
          <DayDetailPopover
            dateKey={dayDetail.dateKey}
            events={dayDetail.events}
            onClose={() => setDayDetail(null)}
            onPick={(ev) => setSelectedEvent(ev)}
          />
        )}

        {/* ── Event Detail Modal ── */}
        {selectedEvent && !formModal && (
          <div onClick={() => setSelectedEvent(null)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 200, backdropFilter: "blur(4px)",
          }}>
            <div onClick={ev => ev.stopPropagation()} style={{
              background: "white", borderRadius: 16, padding: 28,
              maxWidth: 440, width: "90%", boxShadow: "0 25px 60px rgba(0,0,0,0.2)",
            }}>
              {(() => {
                const st = getEventStyle(selectedEvent);
                // Every event is now a Firestore doc (Sheets-only events no
                // longer exist at runtime). isEdited surfaces the "edited"
                // diff banner; canDelete is always true.
                const isEdited = !!selectedEvent._sheetsOriginal;
                const fsId = selectedEvent.id || null;
                const canDelete = !!fsId;

                function openEdit() {
                  // Edit the Firestore doc in-place. The full doc data
                  // (including sheets_original snapshot, if any) is preserved
                  // — the editor strips _fsId/_sheetsOriginal on save.
                  setFormModal({ initial: { ...selectedEvent, _fsId: selectedEvent.id } });
                }

                return (
                  <>
                    <div style={{
                      height: 6, background: st.color, borderRadius: 3,
                      marginBottom: 20, marginTop: -4, marginLeft: -4, marginRight: -4,
                      borderTopLeftRadius: 12, borderTopRightRadius: 12,
                    }} />
                    <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 16 }}>
                      <div style={{
                        background: st.bg, border: `1px solid ${st.border}`,
                        borderRadius: 10, padding: "10px 14px", textAlign: "center", minWidth: 60,
                      }}>
                        <div style={{ fontSize: 10, fontWeight: 800, color: st.color, textTransform: "uppercase" }}>
                          {MONTHS[parseInt(String(selectedEvent.date_start).slice(5,7))-1].slice(0,3)}
                        </div>
                        <div style={{ fontSize: 24, fontWeight: 900, color: "#0F172A" }}>
                          {String(selectedEvent.date_start).slice(8,10)}
                        </div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <h3 style={{ margin: 0, fontSize: 17, fontWeight: 800, color: "#0F172A", lineHeight: 1.3 }}>
                          {selectedEvent.title}
                        </h3>
                        {selectedEvent.date_start !== selectedEvent.date_end && (
                          <div style={{ fontSize: 13, color: "#64748B", marginTop: 4 }}>
                            {selectedEvent.date_start} → {selectedEvent.date_end}
                          </div>
                        )}
                      </div>
                    </div>

                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: isEdited ? 12 : 20 }}>
                      <Tag color={st.color} bg={st.bg}>{selectedEvent.department}</Tag>
                      <Tag color="#64748B" bg="#F1F5F9">{selectedEvent.category}</Tag>
                    </div>

                    {/* Sheets override notification */}
                    {isEdited && (
                      <div style={{
                        marginBottom: 16, padding: "10px 14px",
                        background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 10,
                        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 16 }}>⚠️</span>
                          <span style={{ fontSize: 12, fontWeight: 700, color: "#92400E" }}>
                            Edited — differs from Google Sheets
                          </span>
                        </div>
                        <button onClick={() => setSheetsVersionModal(selectedEvent._sheetsOriginal)} style={{
                          fontSize: 11, fontWeight: 700, color: "#D97706",
                          background: "none", border: "1px solid #FCD34D", borderRadius: 6,
                          padding: "4px 10px", cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
                        }}>View Sheets version</button>
                      </div>
                    )}

                    {/* Admin actions */}
                    {isAdmin && (
                      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                        <button onClick={openEdit} style={{
                          flex: 1, padding: "8px", background: "#EFF6FF", color: "#2563EB",
                          border: "1px solid #BFDBFE", borderRadius: 8,
                          fontWeight: 700, fontSize: 13, cursor: "pointer",
                          fontFamily: "'DM Sans',sans-serif",
                        }}>Edit</button>
                        {canDelete && (
                          <button
                            onClick={() => {
                              if (deleteTarget === fsId) {
                                handleDelete(fsId);
                              } else {
                                setDeleteTarget(fsId);
                                setTimeout(() => setDeleteTarget(null), 3000);
                              }
                            }}
                            style={{
                              flex: 1, padding: "8px",
                              background: deleteTarget === fsId ? "#DC2626" : "#FEF2F2",
                              color: deleteTarget === fsId ? "#fff" : "#DC2626",
                              border: `1px solid ${deleteTarget === fsId ? "#DC2626" : "#FECACA"}`,
                              borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: "pointer",
                              fontFamily: "'DM Sans',sans-serif", transition: "all 0.15s",
                            }}>
                            {deleteTarget === fsId
                              ? (isEdited ? "Revert to Sheets" : "Confirm Delete")
                              : (isEdited ? "Remove Override" : "Delete")}
                          </button>
                        )}
                      </div>
                    )}

                    <button onClick={() => { setSelectedEvent(null); setDeleteTarget(null); }} style={{
                      width: "100%", padding: "10px", background: "#F1F5F9",
                      border: "none", borderRadius: 8, cursor: "pointer",
                      fontWeight: 700, color: "#64748B", fontSize: 14,
                      fontFamily: "'DM Sans',sans-serif",
                    }}>Close</button>
                  </>
                );
              })()}
            </div>
          </div>
        )}

        {/* ── Sheets Original Version Modal ── */}
        {sheetsVersionModal && (
          <div onClick={() => setSheetsVersionModal(null)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 300, backdropFilter: "blur(4px)",
          }}>
            <div onClick={e => e.stopPropagation()} style={{
              background: "white", borderRadius: 16, padding: 28,
              maxWidth: 400, width: "90%", boxShadow: "0 25px 60px rgba(0,0,0,0.2)",
            }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#D97706", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>
                Google Sheets version
              </div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>TITLE</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#0F172A" }}>{sheetsVersionModal.title}</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <div>
                  <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>START</div>
                  <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.date_start}</div>
                </div>
                <div>
                  <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>END</div>
                  <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.date_end}</div>
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>DEPARTMENT</div>
                <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.department}</div>
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, color: "#94A3B8", fontWeight: 700, marginBottom: 2 }}>CATEGORY</div>
                <div style={{ fontSize: 14, color: "#0F172A", fontWeight: 600 }}>{sheetsVersionModal.category}</div>
              </div>
              <button onClick={() => setSheetsVersionModal(null)} style={{
                width: "100%", padding: "10px", background: "#F1F5F9",
                border: "none", borderRadius: 8, cursor: "pointer",
                fontWeight: 700, color: "#64748B", fontSize: 14,
                fontFamily: "'DM Sans',sans-serif",
              }}>Close</button>
            </div>
          </div>
        )}

        {/* ── Admin Form Modal ── */}
        {formModal && (
          <EventFormModal
            initial={formModal.initial}
            onSave={handleFormSave}
            onClose={() => setFormModal(null)}
          />
        )}

        {settingsModal && (
          <AcademicYearSettingsModal
            yearStart={yearStartIso}
            totalWeeks={totalWeeks}
            terms={terms}
            onSave={handleSettingsSave}
            onClose={() => setSettingsModal(false)}
            teachingWeeks={teachingWeeks}
            twSyncing={twSyncing}
            twSyncMsg={twSyncMsg}
            onSyncTeachingWeeks={syncTeachingWeeks}
            onUpdateWeek={updateTeachingWeek}
          />
        )}
      </div>
    );
  }
</script>

</body>
</html>
