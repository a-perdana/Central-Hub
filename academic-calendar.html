    .btn-secondary {

  // ─── Firestore imports ────────────────────────────────────────────────────────
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Expose Firestore helpers to React (Babel/text-babel scope)
  window.__calFS = {
    getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
    doc, serverTimestamp, query, orderBy,
  };

  // ─── Wait for auth then mount React ──────────────────────────────────────────
  document.addEventListener('authReady', ({ detail: { profile } }) => {
    const isAdmin = profile?.role_centralhub === 'central_admin'
                 || profile?.role === 'central_admin';
    window.__calIsAdmin = isAdmin;

    // Mount is deferred so Babel has time to register the component
    requestAnimationFrame(() => {
      const root = ReactDOM.createRoot(document.getElementById('calendar-root'));
      root.render(React.createElement(AcademicCalendar, { isAdmin }));
    });
  });
</script>

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function normalizeDate(str) {
    if (!str) return null;
    const s = String(str);
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
    const MM = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
    const m = s.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
    if (m && MM[m[1]]) return `${m[3]}-${MM[m[1]]}-${String(m[2]).padStart(2,"0")}`;
    return null;
  }

  function parseDate(str) {
    const s = normalizeDate(str) || String(str).slice(0, 10);
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);

            <select value={form.category} onChange={e => set("category", e.target.value)}>
              {ALL_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>

          <div className="modal-actions">
            <button className="btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? "Saving…" : isEdit ? "Save Changes" : "Add Event"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── MAIN COMPONENT ──────────────────────────────────────────────────────────
  function AcademicCalendar({ isAdmin }) {
    const today = new Date();
    const [currentYear,  setCurrentYear]  = useState(today.getFullYear());
    const [currentMonth, setCurrentMonth] = useState(today.getMonth());
    const [events,       setEvents]       = useState(DEMO_EVENTS);
    const [dataSource,   setDataSource]   = useState("demo"); // "sheets" | "firestore" | "demo"
    const [selectedEvent, setSelectedEvent] = useState(null);
    const [view,         setView]         = useState("month");
    const [activeFilters, setActiveFilters] = useState(new Set(["Academic","College Counseling","Admin/Operations"]));
    const [activeCategoryFilters, setActiveCategoryFilters] = useState(new Set(["Public Holiday","Assessment"]));
    const [formModal,    setFormModal]    = useState(null); // null | { initial } — admin only
    const [deleteTarget, setDeleteTarget] = useState(null); // null | eventId — admin only

    // ─── Load Firestore events ────────────────────────────────────────────────
    const loadFromFirestore = useCallback(async () => {
      const { getFirestore, collection, getDocs, query, orderBy } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      const snap = await getDocs(query(collection(db, FS_COLLECTION), orderBy("date_start")));
      if (snap.empty) return null;
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }, []);

    // ─── Initial data fetch: Sheets → Firestore → Demo ───────────────────────
    useEffect(() => {
      let cancelled = false;

      async function init() {
        // 1. Try Google Sheets API
        try {
          const res  = await fetch(SHEETS_API_URL);
          const data = await res.json();
          if (!cancelled && Array.isArray(data) && data.length > 0) {
            setEvents(data.map(e => e ? {
              ...e,
              date_start: normalizeDate(e.date_start) || e.date_start,
              date_end:   normalizeDate(e.date_end)   || e.date_end,
            } : e));
            setDataSource("sheets");
            return;
          }
        } catch (_) { /* fall through */ }

        if (cancelled) return;

        // 2. Try Firestore
        try {
          const fsEvents = await loadFromFirestore();
          if (!cancelled && fsEvents && fsEvents.length > 0) {
            setEvents(fsEvents);
            setDataSource("firestore");
            return;
          }
        } catch (_) { /* fall through */ }

        // 3. Demo data (already set as default state)
        if (!cancelled) setDataSource("demo");
      }

      init();
      return () => { cancelled = true; };
    }, [loadFromFirestore]);

    // ─── Admin: reload from Firestore after a mutation ────────────────────────
    const reloadFirestore = useCallback(async () => {
      const fsEvents = await loadFromFirestore();
      if (fsEvents) setEvents(fsEvents);
    }, [loadFromFirestore]);

    // ─── Admin: save (create or update) ──────────────────────────────────────
    const handleFormSave = useCallback(async (formData) => {
      const { getFirestore, collection, addDoc, updateDoc, doc, serverTimestamp } = window.__calFS;
      const db = getFirestore(window.firebaseApp);

      if (formData.id && !formData.id.startsWith("d")) {
        // Edit existing Firestore doc
        const { id, ...fields } = formData;
        await updateDoc(doc(db, FS_COLLECTION, id), { ...fields, updatedAt: serverTimestamp() });
        showToast("Event updated.");
      } else {
        // New event
        const { id: _id, ...fields } = formData; // strip any temp id
        await addDoc(collection(db, FS_COLLECTION), { ...fields, createdAt: serverTimestamp() });
        showToast("Event added.");
      }

      await reloadFirestore();
      setFormModal(null);
      setSelectedEvent(null);
    }, [reloadFirestore]);

    // ─── Admin: delete ────────────────────────────────────────────────────────
    const handleDelete = useCallback(async (eventId) => {
      if (!eventId || eventId.startsWith("d")) return; // demo events can't be deleted
      const { getFirestore, doc, deleteDoc } = window.__calFS;
      const db = getFirestore(window.firebaseApp);
      await deleteDoc(doc(db, FS_COLLECTION, eventId));
      showToast("Event deleted.");
      await reloadFirestore();
      setSelectedEvent(null);
      setDeleteTarget(null);
    }, [reloadFirestore]);

    // ─── Nav helpers ──────────────────────────────────────────────────────────
    const prevMonth = () => {
      if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); }
      else setCurrentMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y => y + 1); }
      else setCurrentMonth(m => m + 1);
    };

    const filteredEvents = useMemo(() => events.filter(e => {
      if (!e || !e.date_start || !e.date_end) return false;
      if (CATEGORY_OVERRIDES[e.category]) return activeCategoryFilters.has(e.category);
      return activeFilters.has(e.department);
    }), [events, activeFilters, activeCategoryFilters]);

    const calendarDays = useMemo(() => {
      const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let d = 1; d <= daysInMonth; d++) days.push(d);
      return days;
    }, [currentYear, currentMonth]);

    const getEventsForDay = (day) => {
      if (!day) return [];
      const dayStr = isoDate(new Date(currentYear, currentMonth, day));
      return filteredEvents.filter(e => eventSpansDay(e, dayStr));
    };

    const upcomingEvents = useMemo(() => {
      const todayStr = isoDate(today);
      return filteredEvents
        .filter(e => e.date_start && e.date_end && String(e.date_end).slice(0, 10) >= todayStr)
        .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start)))
        .slice(0, 30);
    }, [filteredEvents]);

    const yearStats = useMemo(() => {
      const deptCount = {};
      const catCount  = {};
      let total = 0;
      events.forEach(e => {
        if (!e || !e.date_start) return;
        total++;
        deptCount[e.department] = (deptCount[e.department] || 0) + 1;
        catCount[e.category]    = (catCount[e.category]    || 0) + 1;
      });
      return { deptCount, catCount, total };
    }, [events]);

    const allEventsSorted = useMemo(() =>
      events.filter(e => e && e.date_start)
            .sort((a, b) => String(a.date_start).localeCompare(String(b.date_start))),
    [events]);

    const toggleFilter = (key, setFn) => setFn(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });

    const isToday = (day) => {
      const t = new Date();
      return day === t.getDate() && currentMonth === t.getMonth() && currentYear === t.getFullYear();
    };

    // ─── Data source badge ────────────────────────────────────────────────────
    const sourceBadge = {
      sheets:    { label: "Live — Google Sheets", color: "#059669", bg: "#ECFDF5" },
      firestore: { label: "Live — Firestore",     color: "#2563EB", bg: "#EFF6FF" },
      demo:      { label: "Demo data",            color: "#D97706", bg: "#FFFBEB" },
    }[dataSource];

    return (
      <div style={{ fontFamily: "'DM Sans','Helvetica Neue',sans-serif", background: "#F8FAFC", minHeight: "100%" }}>

        {/* ── Header ── */}
        <div style={{ background: "linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #1D4ED8 100%)", padding: "28px 32px 24px", color: "white" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, gap: 16, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.2em", color: "#93C5FD", textTransform: "uppercase", marginBottom: 4 }}>
                Eduversal Indonesia
              </div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, letterSpacing: "-0.5px" }}>
                Academic Calendar 2025–2026
              </h1>
              {/* Data source badge */}
              <div style={{ marginTop: 8, display: "inline-flex", alignItems: "center", gap: 6,
                background: "rgba(255,255,255,0.1)", borderRadius: 20, padding: "4px 12px" }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: sourceBadge.color }} />
                <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.75)" }}>
                  {sourceBadge.label}
                </span>
              </div>
            </div>

            {/* Right side: admin button + view toggle */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 10 }}>
              {isAdmin && (
                <button onClick={() => setFormModal({ initial: null })} style={{
                  padding: "9px 18px", background: "#2563EB", color: "#fff",
                  border: "none", borderRadius: 8, fontWeight: 700, fontSize: 13,
                  cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
                }}>
                  + Add Event
                </button>
              )}
              <div style={{ display: "flex", gap: 6, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: 4 }}>
                {[["month","Month"],["list","List"],["all","All Events"]].map(([v, label]) => (
                  <button key={v} onClick={() => setView(v)} style={{
                    padding: "7px 16px", borderRadius: 7, border: "none", cursor: "pointer",
                    background: view === v ? "white" : "transparent",
                    color: view === v ? "#1E3A5F" : "rgba(255,255,255,0.7)",
                    fontWeight: 700, fontSize: 13, transition: "all 0.15s",
                  }}>{label}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#CBD5E1", fontWeight: 600, marginRight: 4 }}>Filter:</span>
            {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
              <FilterChip key={key} label={cfg.label} color={cfg.color}
                active={activeFilters.has(key)}
                onClick={() => toggleFilter(key, setActiveFilters)} />
            ))}
            {Object.entries(CATEGORY_OVERRIDES).map(([key, cfg]) => (
              <FilterChip key={key} label={key} color={cfg.color}
                active={activeCategoryFilters.has(key)}
                onClick={() => toggleFilter(key, setActiveCategoryFilters)} />
            ))}
          </div>
        </div>

        {/* ── Month Navigator ── */}
        {view === "month" && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 32px 12px" }}>
            <button onClick={prevMonth} style={navBtnStyle}>← Prev</button>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#0F172A" }}>
                {MONTHS[currentMonth]} {currentYear}
              </div>
            </div>
            <button onClick={nextMonth} style={navBtnStyle}>Next →</button>
          </div>
        )}

        {/* ── Calendar Grid ── */}
        {view === "month" && (
          <div style={{ padding: "0 24px 32px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 4 }}>
              {DAYS.map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: "#64748B", padding: "6px 0", letterSpacing: "0.05em" }}>
                  {d}
                </div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
              {calendarDays.map((day, idx) => {
                const dayEvents = getEventsForDay(day);
                const today_   = isToday(day);
                return (
                  <div key={idx} style={{
                    minHeight: 90,
                    background: day ? (today_ ? "#EFF6FF" : "white") : "transparent",
                    borderRadius: 10,
                    border: day ? (today_ ? "2px solid #2563EB" : "1px solid #E2E8F0") : "none",
                    padding: day ? "8px 6px 6px" : 0,
                  }}>
                    {day && (
                      <>
                        <div style={{
                          fontSize: 13, fontWeight: today_ ? 800 : 500, marginBottom: 4,
                          display: "inline-flex", alignItems: "center", justifyContent: "center",
                          width: today_ ? 24 : "auto", height: today_ ? 24 : "auto",
                          background: today_ ? "#2563EB" : "transparent",
                          color: today_ ? "white" : "#374151",
                          borderRadius: today_ ? "50%" : 0,
                        }}>{day}</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                          {dayEvents.slice(0, 2).map(e => {
                            const st = getEventStyle(e);
                            return (
                              <div key={e.id} onClick={() => setSelectedEvent(e)} style={{
                                fontSize: 10, fontWeight: 600,
                                color: st.color, background: st.bg,
                                border: `1px solid ${st.border}`,
                                borderLeft: `3px solid ${st.dot}`,
                                borderRadius: 4, padding: "2px 4px",
                                lineHeight: 1.3, cursor: "pointer",
                                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                              }} title={e.title}>
                                {e.title}
                              </div>
                            );
                          })}
                          {dayEvents.length > 2 && (
                            <div style={{ fontSize: 10, color: "#94A3B8", fontWeight: 600, paddingLeft: 2 }}>
                              +{dayEvents.length - 2} more
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── List View ── */}
        {view === "list" && (
          <div style={{ padding: "24px 32px", maxWidth: 780 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, color: "#0F172A", marginBottom: 20 }}>Upcoming Events</h2>
            {upcomingEvents.length === 0 && (
              <div style={{ color: "#94A3B8", textAlign: "center", padding: 40 }}>No events found for selected filters.</div>
            )}
            {upcomingEvents.map((e, i) => {
              const st  = getEventStyle(e);
              const ds  = String(e.date_start).slice(0, 10);
              const sameAsLast = i > 0 && String(upcomingEvents[i-1].date_start).slice(0,7) === ds.slice(0,7);
              const monthLabel = !sameAsLast ? (
                <div style={{ fontSize: 12, fontWeight: 800, color: "#64748B", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: i > 0 ? 24 : 0, marginBottom: 8 }}>
                  {MONTHS[parseInt(ds.split("-")[1])-1]} {ds.split("-")[0]}
                </div>
              ) : null;
              return (
                <div key={e.id}>
                  {monthLabel}
                  <div onClick={() => setSelectedEvent(e)} style={{
                    display: "flex", gap: 16, alignItems: "flex-start",
                    padding: "12px 16px", background: "white",
                    border: "1px solid #E2E8F0", borderLeft: `4px solid ${st.dot}`,
                    borderRadius: 10, marginBottom: 6, cursor: "pointer",
                  }}>
                    <div style={{ minWidth: 70, textAlign: "center" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>
                        {MONTHS[parseInt(ds.split("-")[1])-1].slice(0,3)}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>
                        {ds.split("-")[2]}
                      </div>
                      {e.date_start !== e.date_end && (
                        <div style={{ fontSize: 10, color: "#94A3B8" }}>– {String(e.date_end).slice(8,10)}</div>
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0F172A", fontSize: 14, marginBottom: 4 }}>{e.title}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <Tag color={st.color} bg={st.bg}>{e.department}</Tag>
                        <Tag color="#64748B" bg="#F1F5F9">{e.category}</Tag>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── All Events View ── */}
        {view === "all" && (
          <div style={{ padding: "28px 32px 40px", maxWidth: 960, margin: "0 auto" }}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 14, marginBottom: 28 }}>
              <div style={{ background: "white", borderRadius: 12, padding: "20px", border: "1px solid #E2E8F0", textAlign: "center" }}>
                <div style={{ fontSize: 44, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>{yearStats.total}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", marginTop: 8, textTransform: "uppercase", letterSpacing: "0.1em" }}>Total Events</div>
              </div>
              {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
                <div key={key} style={{ background: cfg.bg, borderRadius: 12, padding: "20px", border: `1px solid ${cfg.border}`, textAlign: "center" }}>
                  <div style={{ fontSize: 44, fontWeight: 900, color: cfg.color, lineHeight: 1 }}>{yearStats.deptCount[key] || 0}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: cfg.color, marginTop: 8, opacity: 0.8, textTransform: "uppercase", letterSpacing: "0.07em" }}>{cfg.label}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "22px 24px", marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 18 }}>Activity Distribution by Department</div>
              {Object.entries(DEPARTMENTS).map(([key, cfg]) => {
                const count = yearStats.deptCount[key] || 0;
                const pct   = yearStats.total ? Math.round(count / yearStats.total * 100) : 0;
                return (
                  <div key={key} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: cfg.color }}>{cfg.label}</span>
                      <span style={{ fontSize: 13, color: "#64748B", fontWeight: 600 }}>{count} events &middot; {pct}%</span>
                    </div>
                    <div style={{ height: 10, background: "#F1F5F9", borderRadius: 6, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: cfg.color, borderRadius: 6 }} />
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "22px 24px", marginBottom: 28 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>Events by Category</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {Object.entries(yearStats.catCount).sort((a, b) => b[1] - a[1]).map(([cat, count]) => {
                  const ov  = CATEGORY_OVERRIDES[cat];
                  return (
                    <div key={cat} style={{ display: "flex", alignItems: "center", gap: 8, background: ov ? ov.bg : "#F1F5F9", borderRadius: 8, padding: "8px 14px", border: `1px solid ${ov ? ov.border : "#E2E8F0"}` }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: ov ? ov.color : "#334155" }}>{cat}</span>
                      <span style={{ fontSize: 20, fontWeight: 900, color: ov ? ov.color : "#334155", lineHeight: 1 }}>{count}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ fontSize: 11, fontWeight: 800, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 16 }}>
              All {yearStats.total} Events — Chronological
            </div>
            {allEventsSorted.map((e, i) => {
              const st  = getEventStyle(e);
              const ds  = String(e.date_start).slice(0, 10);
              const sameAsLast = i > 0 && String(allEventsSorted[i-1].date_start).slice(0,7) === ds.slice(0,7);
              const monthLabel = !sameAsLast ? (
                <div style={{ fontSize: 12, fontWeight: 800, color: "#64748B", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: i > 0 ? 24 : 0, marginBottom: 8 }}>
                  {MONTHS[parseInt(ds.split("-")[1])-1]} {ds.split("-")[0]}
                </div>
              ) : null;
              return (
                <div key={e.id || i}>
                  {monthLabel}
                  <div onClick={() => setSelectedEvent(e)} style={{
                    display: "flex", gap: 16, alignItems: "flex-start",
                    padding: "12px 16px", background: "white",
                    border: "1px solid #E2E8F0", borderLeft: `4px solid ${st.dot}`,
                    borderRadius: 10, marginBottom: 6, cursor: "pointer",
                  }}>
                    <div style={{ minWidth: 70, textAlign: "center", flexShrink: 0 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase" }}>
                        {MONTHS[parseInt(ds.split("-")[1])-1].slice(0,3)}
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#0F172A", lineHeight: 1 }}>
                        {ds.split("-")[2]}
                      </div>
                      {e.date_start !== e.date_end && (
                        <div style={{ fontSize: 10, color: "#94A3B8" }}>– {String(e.date_end).slice(8,10)}</div>
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0F172A", fontSize: 14, marginBottom: 4 }}>{e.title}</div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <Tag color={st.color} bg={st.bg}>{e.department}</Tag>
                        <Tag color="#64748B" bg="#F1F5F9">{e.category}</Tag>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── Legend ── */}
        {view !== "all" && (
          <div style={{ padding: "0 32px 32px", display: "flex", gap: 20, flexWrap: "wrap" }}>
            {Object.entries(DEPARTMENTS).map(([key, cfg]) => (
              <LegendItem key={key} color={cfg.color} label={cfg.label} />
            ))}
            {Object.entries(CATEGORY_OVERRIDES).map(([key, cfg]) => (
              <LegendItem key={key} color={cfg.color} label={key} />
            ))}
          </div>
        )}

        {/* ── Event Detail Modal ── */}
        {selectedEvent && !formModal && (
          <div onClick={() => setSelectedEvent(null)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 200, backdropFilter: "blur(4px)",
          }}>
            <div onClick={ev => ev.stopPropagation()} style={{
              background: "white", borderRadius: 16, padding: 28,
              maxWidth: 440, width: "90%", boxShadow: "0 25px 60px rgba(0,0,0,0.2)",
            }}>
              {(() => {
                const st = getEventStyle(selectedEvent);
                const isFirestoreEvent = selectedEvent.id && !String(selectedEvent.id).startsWith("d");
                return (
                  <>
                    <div style={{
                      height: 6, background: st.color, borderRadius: 3,
                      marginBottom: 20, marginTop: -4, marginLeft: -4, marginRight: -4,
                      borderTopLeftRadius: 12, borderTopRightRadius: 12,
                    }} />
                    <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 16 }}>
                      <div style={{
                        background: st.bg, border: `1px solid ${st.border}`,
                        borderRadius: 10, padding: "10px 14px", textAlign: "center", minWidth: 60,
                      }}>
                        <div style={{ fontSize: 10, fontWeight: 800, color: st.color, textTransform: "uppercase" }}>
                          {MONTHS[parseInt(String(selectedEvent.date_start).slice(5,7))-1].slice(0,3)}
                        </div>
                        <div style={{ fontSize: 24, fontWeight: 900, color: "#0F172A" }}>
                          {String(selectedEvent.date_start).slice(8,10)}
                        </div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <h3 style={{ margin: 0, fontSize: 17, fontWeight: 800, color: "#0F172A", lineHeight: 1.3 }}>
                          {selectedEvent.title}
                        </h3>
                        {selectedEvent.date_start !== selectedEvent.date_end && (
                          <div style={{ fontSize: 13, color: "#64748B", marginTop: 4 }}>
                            {selectedEvent.date_start} → {selectedEvent.date_end}
                          </div>
                        )}
                      </div>
                    </div>

                    <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                      <Tag color={st.color} bg={st.bg}>{selectedEvent.department}</Tag>
                      <Tag color="#64748B" bg="#F1F5F9">{selectedEvent.category}</Tag>
                    </div>

                    {/* Admin actions */}
                    {isAdmin && isFirestoreEvent && (
                      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                        <button onClick={() => setFormModal({ initial: selectedEvent })} style={{
                          flex: 1, padding: "8px", background: "#EFF6FF", color: "#2563EB",
                          border: "1px solid #BFDBFE", borderRadius: 8,
                          fontWeight: 700, fontSize: 13, cursor: "pointer",
                          fontFamily: "'DM Sans',sans-serif",
                        }}>Edit</button>
                        <button
                          data-confirming={deleteTarget === selectedEvent.id ? "true" : "false"}
                          onClick={() => {
                            if (deleteTarget === selectedEvent.id) {
                              handleDelete(selectedEvent.id);
                            } else {
                              setDeleteTarget(selectedEvent.id);
                              setTimeout(() => setDeleteTarget(null), 3000);
                            }
                          }}
                          style={{
                            flex: 1, padding: "8px",
                            background: deleteTarget === selectedEvent.id ? "#DC2626" : "#FEF2F2",
                            color: deleteTarget === selectedEvent.id ? "#fff" : "#DC2626",
                            border: `1px solid ${deleteTarget === selectedEvent.id ? "#DC2626" : "#FECACA"}`,
                            borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: "pointer",
                            fontFamily: "'DM Sans',sans-serif", transition: "all 0.15s",
                          }}>
                          {deleteTarget === selectedEvent.id ? "Confirm Delete" : "Delete"}
                        </button>
                      </div>
                    )}

                    <button onClick={() => { setSelectedEvent(null); setDeleteTarget(null); }} style={{
                      width: "100%", padding: "10px", background: "#F1F5F9",
                      border: "none", borderRadius: 8, cursor: "pointer",
                      fontWeight: 700, color: "#64748B", fontSize: 14,
                      fontFamily: "'DM Sans',sans-serif",
                    }}>Close</button>
                  </>
                );
              })()}
            </div>
          </div>
        )}

        {/* ── Admin Form Modal ── */}
        {formModal && (
          <EventFormModal
            initial={formModal.initial}
            onSave={handleFormSave}
            onClose={() => setFormModal(null)}
          />
        )}
      </div>
    );
  }
</script>

</body>
</html>
