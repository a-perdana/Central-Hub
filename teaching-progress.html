<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaching Progress — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    /* ===== Page accent overrides (green theme) ===== */
    :root {
      --accent:    #059669;
      --accent-dk: #047857;
      --accent-2:  #d1fae5;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(140deg, #064e3b 0%, #065f46 45%, #0d9488 100%);
      padding: 52px 40px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 70%, rgba(255,255,255,0.07) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(0,0,0,0.12) 0%, transparent 50%);
    }
    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }
    .hero-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .hero-eyebrow {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero-title {
      font-family: 'Lora', serif;
      font-size: 2.1rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .hero-desc {
      font-size: 0.925rem;
      color: rgba(255,255,255,0.68);
      max-width: 560px;
      line-height: 1.6;
    }

    /* ===== PAGE WRAPPER ===== */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 40px 72px;
    }

    /* ===== TEACHING PROGRESS ===== */
    .tp-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .tp-tab {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--ink-2);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tp-tab:hover { background: var(--paper-2); }
    .tp-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tp-table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .tp-table {
      width: 100%;
      border-collapse: collapse;
    }
    .tp-table thead tr {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
    }
    .tp-table th {
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 11px 18px;
      text-align: left;
    }
    .tp-table td {
      font-size: 0.855rem;
      color: var(--ink);
      padding: 13px 18px;
      border-bottom: 1px solid var(--paper-2);
      vertical-align: middle;
    }
    .tp-table tbody tr:last-child td { border-bottom: none; }
    .tp-table tbody tr:hover td { background: #fafaf8; }
    .tp-name {
      font-weight: 500;
    }
    .tp-email {
      font-size: 0.78rem;
      color: var(--ink-3);
      margin-top: 1px;
    }
    .tp-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tp-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--paper-2);
      border-radius: 3px;
      overflow: hidden;
      min-width: 80px;
    }
    .tp-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .tp-bar-fill.inprogress { background: #3b82f6; }
    .tp-pct {
      font-size: 0.78rem;
      color: var(--ink-3);
      width: 34px;
      text-align: right;
      flex-shrink: 0;
    }
    .tp-counts {
      font-size: 0.78rem;
      color: var(--ink-3);
    }
    .tp-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: #d1fae5;
      color: #065f46;
    }
    .tp-badge.inprogress {
      background: #dbeafe;
      color: #1e40af;
    }
    .tp-badge.notstarted {
      background: var(--paper-2);
      color: var(--ink-3);
    }
    .tp-active-topic {
      font-size: 0.82rem;
      color: var(--ink-2);
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tp-empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--ink-3);
      font-size: 0.875rem;
    }
    .tp-loading {
      padding: 32px 24px;
      text-align: center;
      color: var(--ink-3);
      font-size: 0.875rem;
    }
    .tp-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 18px;
      border-top: 1px solid var(--paper-2);
    }
    .tp-page-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--ink-2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .tp-page-btn:hover:not(:disabled) { background: var(--paper-2); border-color: #c8c5be; }
    .tp-page-btn:disabled { opacity: 0.35; cursor: default; }
    .tp-page-info {
      font-size: 0.82rem;
      color: var(--ink-3);
      min-width: 80px;
      text-align: center;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .hero         { padding: 36px 24px; }
      .hero-title   { font-size: 1.7rem; }
      .page-wrap    { padding: 24px 20px 48px; }
      .hero-inner   { flex-direction: column; gap: 16px; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- ===== TOP NAV ===== -->
<!-- SHARED_NAVBAR -->

<!-- ===== HERO ===== -->
<section class="hero" aria-label="Teaching Progress header">
  <div class="hero-inner">
    <div class="hero-icon" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </div>
    <div class="hero-text">
      <p class="hero-eyebrow">Curriculum · CentralHub</p>
      <h1 class="hero-title">Teaching Progress</h1>
      <p class="hero-desc">Real-time view of teacher pacing progress across all subjects. Data is pulled live from the Teachers Hub as teachers mark topics complete.</p>
    </div>
  </div>
</section>

<!-- ===== MAIN CONTENT ===== -->
<div class="page-wrap">

  <div class="tp-tabs" id="tpTabs" role="tablist">
    <button class="tp-tab active" data-subject="igcse-math"    role="tab" aria-selected="true">IGCSE Math</button>
    <button class="tp-tab"        data-subject="igcse-bio"     role="tab">IGCSE Biology</button>
    <button class="tp-tab"        data-subject="igcse-chem"    role="tab">IGCSE Chemistry</button>
    <button class="tp-tab"        data-subject="igcse-phys"    role="tab">IGCSE Physics</button>
    <button class="tp-tab"        data-subject="asal-math"     role="tab">A-Level Math</button>
    <button class="tp-tab"        data-subject="asal-bio"      role="tab">A-Level Biology</button>
    <button class="tp-tab"        data-subject="asal-chem"     role="tab">A-Level Chemistry</button>
    <button class="tp-tab"        data-subject="asal-phys"     role="tab">A-Level Physics</button>
    <button class="tp-tab"        data-subject="cp-math"       role="tab">Checkpoint Math</button>
    <button class="tp-tab"        data-subject="cp-science"    role="tab">Checkpoint Science</button>
    <button class="tp-tab"        data-subject="cp-english"    role="tab">Checkpoint English</button>
  </div>
  <div class="tp-table-wrap">
    <div class="tp-loading" id="tpLoading">Loading progress data…</div>
    <table class="tp-table" id="tpTable" style="display:none;">
      <thead>
        <tr>
          <th>Teacher</th>
          <th>Active Topic</th>
          <th>Completion</th>
          <th>Done</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tpTbody"></tbody>
    </table>
    <div class="tp-empty" id="tpEmpty" style="display:none;">No progress data for this subject yet.</div>
    <div class="tp-pagination" id="tpPagination" style="display:none;">
      <button class="tp-page-btn" id="tpPrev" aria-label="Previous page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="tp-page-info" id="tpPageInfo"></span>
      <button class="tp-page-btn" id="tpNext" aria-label="Next page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

</div><!-- /page-wrap -->

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>

<script type="module">
  import {
    collection, getDocs, doc, getDoc, query, where, limit
  } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  // ── Subject config ────────────────────────────────────────────────────────
  const SUBJECTS = {
    'igcse-math':  { label: 'IGCSE Math',       structureCol: 'math_pacing',              structureDoc: 'year9-10',  statusField: 'statuses'       },
    'igcse-bio':   { label: 'IGCSE Biology',     structureCol: 'biology_pacing',            structureDoc: 'year9-10',  statusField: 'bio_statuses'   },
    'igcse-chem':  { label: 'IGCSE Chemistry',   structureCol: 'chemistry_pacing',          structureDoc: 'year9-10',  statusField: 'chem_statuses'  },
    'igcse-phys':  { label: 'IGCSE Physics',     structureCol: 'physics_pacing',            structureDoc: 'year9-10',  statusField: 'phys_statuses'  },
    'asal-math':   { label: 'A-Level Math',           structureCol: 'asalevel_math_pacing',      structureDoc: 'year11-12', statusField: 'asmath_statuses'              },
    'asal-bio':    { label: 'A-Level Biology',        structureCol: 'asalevel_biology_pacing',   structureDoc: 'year11-12', statusField: 'asbio_statuses'               },
    'asal-chem':   { label: 'A-Level Chemistry',      structureCol: 'asalevel_chemistry_pacing', structureDoc: 'year11-12', statusField: 'aschem_statuses'              },
    'asal-phys':   { label: 'A-Level Physics',        structureCol: 'asalevel_physics_pacing',   structureDoc: 'year11-12', statusField: 'asphys_statuses'              },
    'cp-math':     { label: 'Checkpoint Math',        structureCol: 'checkpoint_math_pacing',    structureDoc: 'year7-8',   statusField: 'checkpoint_math_statuses'     },
    'cp-science':  { label: 'Checkpoint Science',     structureCol: 'checkpoint_science_pacing', structureDoc: 'year7-8',   statusField: 'checkpoint_science_statuses'  },
    'cp-english':  { label: 'Checkpoint English',     structureCol: 'checkpoint_english_pacing', structureDoc: 'year7-8',   statusField: 'checkpoint_english_statuses'  },
  };

  const PAGE_SIZE = 5;
  const PROGRESS_LIMIT = 2000;

  let currentSubject = 'igcse-math';
  let currentPage    = 1;
  let allRows        = [];   // sorted rows for current subject

  const structureCache = {};
  let progressCache = null;
  let teachersCache = null;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('tpLoading').style.display    = on ? '' : 'none';
    document.getElementById('tpTable').style.display      = on ? 'none' : '';
    document.getElementById('tpEmpty').style.display      = 'none';
    document.getElementById('tpPagination').style.display = 'none';
  }

  function showEmpty() {
    document.getElementById('tpLoading').style.display    = 'none';
    document.getElementById('tpTable').style.display      = 'none';
    document.getElementById('tpEmpty').style.display      = '';
    document.getElementById('tpPagination').style.display = 'none';
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Fetch pacing structure ────────────────────────────────────────────────
  async function getStructure(subjectKey) {
    if (structureCache[subjectKey]) return structureCache[subjectKey];
    const cfg = SUBJECTS[subjectKey];
    const snap = await getDoc(doc(window.db, cfg.structureCol, cfg.structureDoc));
    if (!snap.exists()) {
      structureCache[subjectKey] = { totalTopics: 0, topicIndex: {} };
      return structureCache[subjectKey];
    }
    const chapters = snap.data().chapters || [];
    let totalTopics = 0;
    const topicIndex = {};
    chapters.forEach((ch, ci) => {
      (ch.topics || []).forEach((t, ti) => {
        topicIndex[`${ci}-${ti}`] = t.topic || `Topic ${ti + 1}`;
        totalTopics++;
      });
    });
    structureCache[subjectKey] = { totalTopics, topicIndex };
    return structureCache[subjectKey];
  }

  // ── Fetch userProgress docs (capped) ──────────────────────────────────────
  async function getAllProgress() {
    if (progressCache) return progressCache;
    const snap = await getDocs(query(collection(window.db, 'userProgress'), limit(PROGRESS_LIMIT)));
    progressCache = {};
    snap.forEach(d => { progressCache[d.id] = d.data(); });
    return progressCache;
  }

  // ── Fetch teachers ────────────────────────────────────────────────────────
  async function getTeachers() {
    if (teachersCache) return teachersCache;
    const q = query(
      collection(window.db, 'users'),
      where('role_teachershub', '==', 'teachers_user')
    );
    const snap = await getDocs(q);
    teachersCache = {};
    snap.forEach(d => { teachersCache[d.id] = d.data(); });
    return teachersCache;
  }

  function findActiveTopics(statuses, topicIndex) {
    return Object.entries(statuses)
      .filter(([, v]) => v === 'inprogress')
      .map(([k]) => topicIndex[k])
      .filter(Boolean);
  }

  // ── Render one page of rows ───────────────────────────────────────────────
  function renderPage() {
    const totalPages = Math.ceil(allRows.length / PAGE_SIZE);
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageRows = allRows.slice(start, start + PAGE_SIZE);

    const tbody = document.getElementById('tpTbody');
    tbody.innerHTML = pageRows.map(r => {
      const pct = r.totalTopics > 0 ? Math.round((r.doneCount / r.totalTopics) * 100) : 0;
      const activeTopic = r.activeTopics[0] || null;
      let statusBadge;
      if (r.inprogressCount > 0) statusBadge = `<span class="tp-badge inprogress">In Progress</span>`;
      else if (r.doneCount > 0)  statusBadge = `<span class="tp-badge">Active</span>`;
      else                        statusBadge = `<span class="tp-badge notstarted">Not Started</span>`;

      return `<tr>
        <td>
          <div class="tp-name">${esc(r.displayName)}</div>
          <div class="tp-email">${esc(r.email)}</div>
        </td>
        <td>
          ${activeTopic
            ? `<div class="tp-active-topic" title="${esc(activeTopic)}">${esc(activeTopic)}</div>`
            : `<span style="color:var(--ink-3);font-size:0.82rem;">—</span>`}
        </td>
        <td>
          <div class="tp-bar-wrap">
            <div class="tp-bar-bg"><div class="tp-bar-fill" style="width:${pct}%"></div></div>
            <span class="tp-pct">${pct}%</span>
          </div>
        </td>
        <td><span class="tp-counts">${r.doneCount} / ${r.totalTopics}</span></td>
        <td>${statusBadge}</td>
      </tr>`;
    }).join('');

    // Update pagination controls
    const paginationEl = document.getElementById('tpPagination');
    if (totalPages > 1) {
      document.getElementById('tpPageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('tpPrev').disabled = currentPage === 1;
      document.getElementById('tpNext').disabled = currentPage === totalPages;
      paginationEl.style.display = 'flex';
    } else {
      paginationEl.style.display = 'none';
    }
  }

  // ── Load subject data & build full row list ───────────────────────────────
  async function renderSubject(subjectKey) {
    setLoading(true);
    const cfg = SUBJECTS[subjectKey];

    const [structure, allProgress, teachers] = await Promise.all([
      getStructure(subjectKey),
      getAllProgress(),
      getTeachers(),
    ]);

    const { totalTopics, topicIndex } = structure;

    const rows = [];
    for (const [uid, profile] of Object.entries(teachers)) {
      const prog = allProgress[uid];
      const statuses = (prog && prog[cfg.statusField]) ? prog[cfg.statusField] : {};
      const doneCount = Object.values(statuses).filter(v => v === 'done').length;
      const inprogressCount = Object.values(statuses).filter(v => v === 'inprogress').length;
      const activeTopics = findActiveTopics(statuses, topicIndex);
      const displayName = profile.displayName || (profile.email ? profile.email.split('@')[0] : uid);
      rows.push({ uid, displayName, email: profile.email || '', doneCount, inprogressCount, activeTopics, totalTopics });
    }

    rows.sort((a, b) => {
      if (b.inprogressCount !== a.inprogressCount) return b.inprogressCount - a.inprogressCount;
      return b.doneCount - a.doneCount;
    });

    if (rows.length === 0) { showEmpty(); return; }

    allRows = rows;
    currentPage = 1;

    document.getElementById('tpLoading').style.display = 'none';
    document.getElementById('tpTable').style.display   = '';
    renderPage();
  }

  // ── Pagination buttons ────────────────────────────────────────────────────
  document.getElementById('tpPrev').addEventListener('click', () => {
    if (currentPage > 1) { currentPage--; renderPage(); }
  });
  document.getElementById('tpNext').addEventListener('click', () => {
    const totalPages = Math.ceil(allRows.length / PAGE_SIZE);
    if (currentPage < totalPages) { currentPage++; renderPage(); }
  });

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.getElementById('tpTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tp-tab');
    if (!btn) return;
    document.querySelectorAll('.tp-tab').forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    currentSubject = btn.dataset.subject;
    renderSubject(currentSubject);
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  document.addEventListener('authReady', ({ detail: { profile } }) => {
    const isAdmin = profile?.role_centralhub === 'central_admin';
    if (isAdmin) {
      renderSubject(currentSubject);
    } else {
      document.getElementById('tpLoading').style.display = 'none';
      document.getElementById('tpEmpty').textContent = 'Admin access required to view teaching progress.';
      document.getElementById('tpEmpty').style.display = '';
    }
  });
</script>

</body>
</html>
