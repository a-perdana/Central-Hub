<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    :root {
      --accent:    #0891b2;
      --accent-dk: #0e7490;
      --accent-2:  #cffafe;
    }

    /* HERO */
    .hero {
      background: linear-gradient(140deg, #0c4a6e 0%, #0369a1 45%, #0891b2 100%);
      padding: 52px 40px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 12% 70%, rgba(255,255,255,0.07) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(0,0,0,0.15) 0%, transparent 50%);
    }
    .hero-inner {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: flex-start; gap: 24px;
    }
    .hero-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0; margin-top: 4px;
    }
    .hero-eyebrow { font-size: 0.78rem; font-weight: 500; color: rgba(255,255,255,0.55); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .hero-title { font-family: 'Lora', serif; font-size: 2.1rem; font-weight: 600; color: #fff; margin-bottom: 10px; line-height: 1.2; }
    .hero-desc { font-size: 0.925rem; color: rgba(255,255,255,0.68); max-width: 520px; line-height: 1.6; }

    /* PAGE WRAP */
    .page-wrap { max-width: 860px; margin: 0 auto; padding: 36px 40px 72px; }
    @media (max-width: 768px) {
      .hero { padding: 36px 24px; }
      .hero-title { font-size: 1.7rem; }
      .hero-inner { flex-direction: column; gap: 16px; }
      .page-wrap { padding: 24px 20px 48px; }
    }

    /* BACK LINK */
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.875rem; font-weight: 500; color: var(--ink-2);
      text-decoration: none; margin-bottom: 28px; transition: color 0.2s ease;
    }
    .back-link:hover { color: var(--ink); }

    /* FILTER TABS */
    .filter-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .ftab {
      padding: 10px 18px;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ink-3); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.15s ease;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .ftab:hover { color: var(--ink); }
    .ftab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .ftab-count {
      display: inline-block;
      background: var(--accent-2); color: var(--accent-dk);
      font-size: 0.68rem; font-weight: 700;
      padding: 1px 6px; border-radius: 10px;
      margin-left: 6px; vertical-align: middle;
    }

    /* MARK ALL READ */
    .notif-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .notif-toolbar-label {
      font-size: 0.875rem; color: var(--ink-3);
    }
    .btn-mark-all {
      font-size: 0.8rem; font-weight: 600;
      color: var(--accent); background: none; border: none;
      cursor: pointer; padding: 0; transition: color 0.2s;
    }
    .btn-mark-all:hover { color: var(--accent-dk); }

    /* FEED */
    .notif-feed { display: flex; flex-direction: column; gap: 1px; }

    .notif-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s ease, border-color 0.15s ease;
      text-decoration: none; color: inherit;
      margin-bottom: 6px;
    }
    .notif-item:hover { background: var(--paper); border-color: var(--accent-2); }
    .notif-item.unread { border-left: 3px solid var(--accent); }
    .notif-item.unread .notif-title { font-weight: 600; }

    .notif-icon-wrap {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .ni-ann  { background: #e0f2fe; color: #0891b2; }
    .ni-doc  { background: #f0fdf4; color: #16a34a; }
    .ni-msg  { background: #faf5ff; color: #7c3aed; }
    .ni-visit{ background: #ccfbf1; color: #0f766e; }
    .ni-kpi  { background: #fef3c7; color: #d97706; }
    .ni-survey{ background: #ede9fe; color: #7c3aed; }

    .notif-body { flex: 1; min-width: 0; }
    .notif-title {
      font-size: 0.9rem; color: var(--ink); margin-bottom: 3px;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .notif-meta { font-size: 0.78rem; color: var(--ink-3); }
    .notif-meta-tag {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      padding: 1px 7px; border-radius: 4px; margin-right: 6px;
      background: var(--paper-2); color: var(--ink-3);
    }

    .notif-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      margin-top: 6px;
    }
    .notif-item:not(.unread) .notif-dot { visibility: hidden; }

    /* DATE DIVIDER */
    .date-divider {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--ink-3);
      padding: 20px 0 8px;
    }
    .date-divider:first-child { padding-top: 0; }

    /* EMPTY */
    .notif-empty { padding: 60px 20px; text-align: center; }
    .notif-empty-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .notif-empty-title { font-size: 1rem; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
    .notif-empty-desc { font-size: 0.855rem; color: var(--ink-3); }

    /* SKELETON */
    .skel { background: var(--paper-2); border-radius: 6px; animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- SHARED_NAVBAR -->

<section class="hero" aria-label="Notifications header">
  <div class="hero-inner">
    <div class="hero-icon" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <div class="hero-text">
      <p class="hero-eyebrow">Platform Activity · CentralHub</p>
      <h1 class="hero-title">Notifications</h1>
      <p class="hero-desc">All platform activity in one place — announcements, new documents, message board posts, school visits, KPI updates, and survey results.</p>
    </div>
  </div>
</section>

<div class="page-wrap">
  <a href="index" class="back-link" aria-label="Return to dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Back to Dashboard
  </a>

  <!-- Filter tabs -->
  <div class="filter-tabs" role="tablist">
    <button class="ftab active" data-filter="all"         role="tab" aria-selected="true">All <span class="ftab-count" id="cnt-all">—</span></button>
    <button class="ftab"        data-filter="ann"         role="tab" aria-selected="false">Announcements <span class="ftab-count" id="cnt-ann">—</span></button>
    <button class="ftab"        data-filter="doc"         role="tab" aria-selected="false">Documents <span class="ftab-count" id="cnt-doc">—</span></button>
    <button class="ftab"        data-filter="msg"         role="tab" aria-selected="false">Messages <span class="ftab-count" id="cnt-msg">—</span></button>
    <button class="ftab"        data-filter="visit"       role="tab" aria-selected="false">Visits <span class="ftab-count" id="cnt-visit">—</span></button>
    <button class="ftab"        data-filter="survey"      role="tab" aria-selected="false">Surveys <span class="ftab-count" id="cnt-survey">—</span></button>
  </div>

  <div class="notif-toolbar">
    <p class="notif-toolbar-label" id="feedLabel">Loading…</p>
    <button class="btn-mark-all" id="btnMarkAll">Mark all as read</button>
  </div>

  <div id="notifFeed">
    <!-- Skeleton -->
    ${[...Array(5)].map((_,i) => `
    <div class="notif-item" style="pointer-events:none">
      <div class="skel notif-icon-wrap"></div>
      <div class="notif-body">
        <div class="skel" style="height:14px;width:${60+i*8}%;margin-bottom:7px"></div>
        <div class="skel" style="height:11px;width:35%"></div>
      </div>
    </div>`).join('')}
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>

<script type="module">
import {
  collection, query, where, orderBy, limit, getDocs,
  doc as fsDoc, updateDoc, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

/* ================================================================
   STATE
   ================================================================ */
let allItems = [];
let readSet  = new Set();   // IDs the current user has "read"
let currentFilter = 'all';

// Read set is persisted in localStorage per user uid
function readKey(uid) { return `ch_notif_read_${uid}`; }
function loadReadSet(uid) {
  try { return new Set(JSON.parse(localStorage.getItem(readKey(uid)) || '[]')); }
  catch { return new Set(); }
}
function saveReadSet(uid) {
  try { localStorage.setItem(readKey(uid), JSON.stringify([...readSet])); }
  catch {}
}

/* ================================================================
   ICONS
   ================================================================ */
const ICONS = {
  ann:   `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></svg>`,
  doc:   `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  msg:   `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  visit: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  kpi:   `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  survey:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
};
const LABELS = { ann:'Announcement', doc:'Document', msg:'Message', visit:'Visit', kpi:'KPI Update', survey:'Survey' };
const HREFS  = { ann:'announcements', doc:'documents', msg:'messageboard', visit:'school-visits', kpi:'kpi-admin', survey:'surveys' };

/* ================================================================
   AUTH READY
   ================================================================ */
document.addEventListener('authReady', async ({ detail: { user } }) => {
  const db = window.db;
  const uid = user.uid;
  readSet = loadReadSet(uid);

  await loadFeed(db);

  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ftab').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected','true');
      currentFilter = btn.dataset.filter;
      renderFeed();
    });
  });

  document.getElementById('btnMarkAll').addEventListener('click', () => {
    allItems.forEach(item => readSet.add(item.id));
    saveReadSet(uid);
    renderFeed();
  });
});

/* ================================================================
   LOAD FEED
   ================================================================ */
async function loadFeed(db) {
  const LIMIT = 50;
  try {
    const [annSnap, docSnap, msgSnap, visitSnap, surveySnap] = await Promise.all([
      getDocs(query(collection(db, 'announcements'),     orderBy('createdAt', 'desc'), limit(LIMIT))),
      getDocs(query(collection(db, 'central_documents'), orderBy('createdAt', 'desc'), limit(LIMIT))),
      getDocs(query(collection(db, 'topics'),            orderBy('createdAt', 'desc'), limit(LIMIT))),
      getDocs(query(collection(db, 'school_visits'),     orderBy('createdAt', 'desc'), limit(LIMIT))),
      getDocs(query(collection(db, 'surveys'),           orderBy('createdAt', 'desc'), limit(LIMIT))),
    ]);

    allItems = [
      ...annSnap.docs.map(d    => ({ id: d.id, type: 'ann',    data: d.data() })),
      ...docSnap.docs.map(d    => ({ id: d.id, type: 'doc',    data: d.data() })),
      ...msgSnap.docs.map(d    => ({ id: d.id, type: 'msg',    data: d.data() })),
      ...visitSnap.docs.map(d  => ({ id: d.id, type: 'visit',  data: d.data() })),
      ...surveySnap.docs.map(d => ({ id: d.id, type: 'survey', data: d.data() })),
    ].sort((a, b) => {
      const ta = a.data.createdAt?.toMillis?.() || 0;
      const tb = b.data.createdAt?.toMillis?.() || 0;
      return tb - ta;
    });

    // Update tab counts
    const counts = { all: allItems.length, ann:0, doc:0, msg:0, visit:0, survey:0 };
    allItems.forEach(i => { if (counts[i.type] !== undefined) counts[i.type]++; });
    Object.entries(counts).forEach(([k, v]) => {
      const el = document.getElementById(`cnt-${k}`);
      if (el) el.textContent = v;
    });

    renderFeed();
  } catch (err) {
    console.error('Notifications feed error:', err);
    document.getElementById('notifFeed').innerHTML = `
      <div class="notif-empty">
        <div class="notif-empty-icon">⚠️</div>
        <p class="notif-empty-title">Could not load notifications</p>
        <p class="notif-empty-desc">Check your connection and try refreshing.</p>
      </div>`;
  }
}

/* ================================================================
   RENDER
   ================================================================ */
function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 7 * 86400) return `${Math.floor(diff/86400)}d ago`;
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function dayLabel(ts) {
  if (!ts) return 'Unknown date';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return 'Unknown date';
  const today = new Date(); today.setHours(0,0,0,0);
  const yest  = new Date(today); yest.setDate(today.getDate()-1);
  const itemDay = new Date(d); itemDay.setHours(0,0,0,0);
  if (itemDay.getTime() === today.getTime()) return 'Today';
  if (itemDay.getTime() === yest.getTime())  return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function getTitle(item) {
  const d = item.data;
  return d.title || d.name || d.subject || d.purpose || 'Untitled';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderFeed() {
  const feed = document.getElementById('notifFeed');
  const uid  = window.currentUser?.uid;

  const filtered = currentFilter === 'all'
    ? allItems
    : allItems.filter(i => i.type === currentFilter);

  const unreadCount = filtered.filter(i => !readSet.has(i.id)).length;
  document.getElementById('feedLabel').textContent =
    `${filtered.length} notification${filtered.length !== 1 ? 's' : ''}` +
    (unreadCount > 0 ? ` · ${unreadCount} unread` : '');

  if (filtered.length === 0) {
    feed.innerHTML = `
      <div class="notif-empty">
        <div class="notif-empty-icon">🔔</div>
        <p class="notif-empty-title">No notifications</p>
        <p class="notif-empty-desc">Nothing here yet. Check back later.</p>
      </div>`;
    return;
  }

  // Group by day
  const groups = [];
  let currentDay = null;
  let currentGroup = null;
  filtered.forEach(item => {
    const dayStr = dayLabel(item.data.createdAt);
    if (dayStr !== currentDay) {
      currentDay = dayStr;
      currentGroup = { day: dayStr, items: [] };
      groups.push(currentGroup);
    }
    currentGroup.items.push(item);
  });

  feed.innerHTML = groups.map(({ day, items }) => `
    <div class="date-divider">${esc(day)}</div>
    ${items.map(item => {
      const unread = !readSet.has(item.id);
      const title = getTitle(item);
      const author = item.data.createdBy || item.data.authorName || '';
      const ago    = timeAgo(item.data.createdAt);
      return `<a class="notif-item ${unread ? 'unread' : ''}"
          href="${HREFS[item.type] || 'index'}"
          onclick="markRead('${esc(item.id)}','${esc(uid || '')}')"
          aria-label="${esc(LABELS[item.type])}: ${esc(title)}">
        <div class="notif-dot" aria-hidden="true"></div>
        <div class="notif-icon-wrap ni-${item.type}" aria-hidden="true">${ICONS[item.type] || ''}</div>
        <div class="notif-body">
          <p class="notif-title">${esc(title)}</p>
          <p class="notif-meta">
            <span class="notif-meta-tag">${esc(LABELS[item.type])}</span>
            ${author ? `${esc(author)} · ` : ''}${ago}
          </p>
        </div>
      </a>`;
    }).join('')}
  `).join('');
}

window.markRead = function(id, uid) {
  readSet.add(id);
  saveReadSet(uid);
  // Update unread count label in next tick after navigation link fires
  setTimeout(renderFeed, 0);
};
</script>

</body>
</html>
