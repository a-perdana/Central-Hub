<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console — CentralHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#1c1c2e; --ink-2:#44445a; --ink-3:#8888a8;
      --paper:#f7f6f3; --paper-2:#efede8; --white:#ffffff;
      --border:#e0ddd6; --accent:#0891b2; --accent-dk:#0e7490;
      --shadow-sm:0 1px 4px rgba(28,28,46,.07);
      --shadow:0 3px 14px rgba(28,28,46,.10);
      --shadow-lg:0 10px 40px rgba(28,28,46,.16);
      --radius:10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* PAGE HEADER */
    .page-header { padding: 28px 32px 0; max-width: 1440px; margin: 0 auto; }
    .page-header h1 { font-family: 'Lora', serif; font-size: 1.6rem; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .page-header p { font-size: 0.875rem; color: var(--ink-3); margin-bottom: 20px; }

    /* PAGE */
    .page-content { padding: 16px 32px 48px; max-width: 1440px; margin: 0 auto; }

    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar-search { flex: 1; min-width: 200px; position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }
    .search-input { width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--ink); background: var(--white); outline: none; box-shadow: var(--shadow-sm); transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--ink-3); }
    .filter-select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--ink); background: var(--white); outline: none; box-shadow: var(--shadow-sm); cursor: pointer; }
    .filter-select:focus { border-color: var(--accent); }
    .user-count { font-size: 0.85rem; color: var(--ink-3); padding: 0 4px; }

    /* TABLE */
    .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--paper); border-bottom: 1px solid var(--border); }
    th { padding: 11px 12px; text-align: left; font-size: 0.72rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--ink-2); }
    th.sort-asc, th.sort-desc { color: var(--accent); }
    .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    th.sortable:hover .sort-icon { opacity: 0.7; }
    th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity: 1; }
    td { padding: 12px 12px; font-size: 0.855rem; color: var(--ink); border-bottom: 1px solid var(--paper-2); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--paper); }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#7c3aed,#0891b2); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name-cell { display: flex; align-items: center; gap: 10px; }
    .user-name { font-weight: 500; }
    .user-email { font-size: 0.78rem; color: var(--ink-3); font-family: 'DM Mono', monospace; }
    .btn-action { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; color: var(--ink-2); cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-action:hover { color: var(--ink); border-color: #bbb; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; font-size: 0.68rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
    .badge-admin    { background: #fee2e2; color: #991b1b; }
    .badge-cuser    { background: #ede9fe; color: #5b21b6; }
    .badge-coord    { background: #e0f2fe; color: #0e7490; }
    .badge-teacher  { background: #d1fae5; color: #065f46; }
    .badge-central  { background: #ede9fe; color: #5b21b6; }
    .badge-academic { background: #fef3c7; color: #92400e; }
    .badge-teachers  { background: #d1fae5; color: #065f46; }
    .badge-research  { background: #fce7f3; color: #9d174d; }
    .badge-unknown   { background: var(--paper-2); color: var(--ink-3); }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }

    /* Pending approval highlight */
    tr.row-pending td { background: #fffbeb; }
    tr.row-pending:hover td { background: #fef3c7; }

    /* EMPTY / SKELETON */
    .empty-row td { text-align: center; padding: 48px; color: var(--ink-3); font-size: 0.875rem; }
    .skel { background: linear-gradient(90deg,var(--paper-2) 25%,var(--paper) 50%,var(--paper-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; display: inline-block; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* DRAWER */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(28,28,46,0.45); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 380px; max-width: 92vw; background: var(--white); box-shadow: var(--shadow-lg); display: flex; flex-direction: column; z-index: 201; transform: translateX(100%); transition: transform 0.3s ease; }
    .drawer-overlay.open .drawer { transform: translateX(0); }
    .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .drawer-head h3 { font-size: 1rem; font-weight: 600; }
    .drawer-close { background: none; border: none; font-size: 1.4rem; color: var(--ink-3); cursor: pointer; padding: 0; line-height: 1; }
    .drawer-close:hover { color: var(--ink); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .drawer-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 0.82rem; font-weight: 500; color: var(--ink-2); }
    .form-select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: var(--paper); outline: none; transition: border-color 0.2s; }
    .form-select:focus { border-color: var(--accent); background: var(--white); }
    .field-meta { font-size: 0.85rem; color: var(--ink-2); background: var(--paper); border-radius: 7px; padding: 10px 12px; font-family: 'DM Mono', monospace; border: 1px solid var(--border); }
    .form-input { padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: var(--paper); outline: none; transition: border-color 0.2s; width: 100%; }
    .form-input:focus { border-color: var(--accent); background: var(--white); }
    .form-input::placeholder { color: var(--ink-3); }
    .btn-delete { padding: 9px 16px; background: none; border: 1px solid #fca5a5; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: #dc2626; cursor: pointer; transition: background 0.2s, color 0.2s; margin-right: auto; }
    .btn-delete:hover { background: #fee2e2; }
    .btn-cancel { padding: 9px 18px; background: none; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--ink-2); cursor: pointer; }
    .btn-cancel:hover { border-color: #bbb; }
    .btn-save { padding: 9px 20px; background: linear-gradient(135deg,#7c3aed,#0891b2); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .drawer-error { font-size: 0.82rem; color: #dc2626; background: #fee2e2; border-radius: 6px; padding: 8px 12px; display: none; }
    .drawer-error.visible { display: block; }
    .drawer-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .page-header, .page-content { padding-left: 16px; padding-right: 16px; }
      th, td { padding: 10px 10px; }
      .user-email { display: none; }
    }
    @media (max-width: 560px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-search { min-width: 0; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
</head>
<body>

<!-- SHARED_NAVBAR -->

<div class="page-header">
  <h1>User Console</h1>
  <p>Manage platform access and roles for all registered users across the Eduversal network.</p>
</div>

<div class="page-content">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-search">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="search" placeholder="Search by name or email…" aria-label="Search users">
    </div>
    <select class="filter-select" id="roleFilter" aria-label="Filter by role">
      <option value="">All roles</option>
      <option value="central_admin">central_admin</option>
      <option value="central_user">central_user</option>
      <option value="academic_admin">academic_admin</option>
      <option value="academic_user">academic_user</option>
      <option value="teachers_admin">teachers_admin</option>
      <option value="teachers_user">teachers_user</option>
      <option value="research_admin">research_admin</option>
      <option value="research_user">research_user</option>
      <option value="__pending_ah">AH — pending approval</option>
    </select>
    <span class="user-count" id="userCount"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table aria-label="User directory">
      <thead>
        <tr>
          <th class="sortable" data-col="name">User<span class="sort-icon">↕</span></th>
          <th class="sortable" data-col="centralhub">CentralHub<span class="sort-icon">↕</span></th>
          <th class="sortable" data-col="academichub">Academic Hub<span class="sort-icon">↕</span></th>
          <th class="sortable" data-col="approval">AH Approval<span class="sort-icon">↕</span></th>
          <th class="sortable" data-col="teachershub">Teachers Hub<span class="sort-icon">↕</span></th>
          <th class="sortable" data-col="researchhub">Research Hub<span class="sort-icon">↕</span></th>
          <th class="sortable" data-col="joined">Joined<span class="sort-icon">↕</span></th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr><td colspan="8" style="padding:48px;text-align:center;color:var(--ink-3)">
          <span class="skel" style="height:16px;width:60%;display:block;margin:auto"></span>
        </td></tr>
      </tbody>
    </table>
    <div id="tablePager" style="display:none;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);font-size:0.82rem;color:var(--ink-3);">
      <span id="pagerInfo"></span>
      <div id="pagerBtns" style="display:flex;gap:4px"></div>
    </div>
  </div>

</div>

<!-- EDIT DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <div class="drawer">
    <div class="drawer-head">
      <h3 id="drawerTitle">Edit User</h3>
      <button class="drawer-close" id="drawerClose" aria-label="Close">&#215;</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-error" id="drawerError" role="alert"></div>

      <!-- Editable identity fields -->
      <div class="form-group">
        <label class="form-label" for="fieldName">Name</label>
        <input class="form-input" id="fieldName" type="text" placeholder="Full name">
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldEmail">Email</label>
        <input class="form-input" id="fieldEmail" type="email" placeholder="user@eduversal.org">
      </div>

      <hr class="drawer-divider">

      <!-- Per-platform role fields -->
      <div class="form-group">
        <label class="form-label" for="fieldRoleCH">CentralHub Role</label>
        <select class="form-select" id="fieldRoleCH">
          <option value="">— not set —</option>
          <option value="central_admin">central_admin</option>
          <option value="central_user">central_user</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldRoleAH">Academic Hub Role</label>
        <select class="form-select" id="fieldRoleAH">
          <option value="">— not set —</option>
          <option value="academic_admin">academic_admin</option>
          <option value="academic_user">academic_user</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldApprovalAH">Academic Hub Approval</label>
        <select class="form-select" id="fieldApprovalAH">
          <option value="">— not set —</option>
          <option value="pending">pending</option>
          <option value="approved">approved</option>
          <option value="rejected">rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldRoleTH">Teachers Hub Role</label>
        <select class="form-select" id="fieldRoleTH">
          <option value="">— not set —</option>
          <option value="teachers_admin">teachers_admin</option>
          <option value="teachers_user">teachers_user</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="fieldRoleRH">Research Hub Role</label>
        <select class="form-select" id="fieldRoleRH">
          <option value="">— not set —</option>
          <option value="research_admin">research_admin</option>
          <option value="research_user">research_user</option>
        </select>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn-delete" id="deleteBtn">Delete user</button>
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-save"   id="saveBtn">Save changes</button>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
  import { collection, getDocs, updateDoc, deleteDoc, doc as fsDoc, query, where }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  let db;
  let allUsers  = [];
  let editingId = null;
  let sortCol   = null;
  let sortDir   = 'asc';
  let currentPage = 0;
  const PAGE_SIZE = 10;

  const ROLE_BADGE = {
    central_admin:   '<span class="badge badge-admin">central_admin</span>',
    central_user:    '<span class="badge badge-cuser">central_user</span>',
    academic_admin:  '<span class="badge badge-coord">academic_admin</span>',
    academic_user:   '<span class="badge badge-teacher">academic_user</span>',
    teachers_admin:  '<span class="badge badge-academic">teachers_admin</span>',
    teachers_user:   '<span class="badge badge-teachers">teachers_user</span>',
    research_admin:  '<span class="badge badge-research">research_admin</span>',
    research_user:   '<span class="badge badge-research">research_user</span>',
  };

  const APPROVAL_BADGE = {
    pending:  '<span class="badge badge-pending">pending</span>',
    approved: '<span class="badge badge-approved">approved</span>',
    rejected: '<span class="badge badge-rejected">rejected</span>',
  };

  const PLATFORM_BADGE = {
    centralhub:  '<span class="badge badge-central">CentralHub</span>',
    academichub: '<span class="badge badge-academic">Academic Hub</span>',
    teachershub: '<span class="badge badge-teachers">Teachers Hub</span>',
  };

  document.addEventListener('authReady', async ({ detail: { profile } }) => {
    // Console is central_admin only
    if (profile.role !== 'central_admin') {
      window.location.replace('index');
      return;
    }
    db = window.db;
    await loadUsers();
    bindEvents();
  });

  async function loadUsers() {
    try {
      const snap = await getDocs(collection(db, 'users'));
      allUsers = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.email || '').localeCompare(b.email || ''));
      applyFilters();
    } catch (e) {
      document.getElementById('usersBody').innerHTML =
        '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--ink-3)">Could not load users.</td></tr>';
    }
  }

  function bindEvents() {
    ['searchInput', 'roleFilter'].forEach(id =>
      document.getElementById(id).addEventListener('input', applyFilters));
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('cancelBtn').addEventListener('click', closeDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDrawer();
    });
    document.getElementById('saveBtn').addEventListener('click', saveUser);
    document.getElementById('deleteBtn').addEventListener('click', deleteUser);
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col;
          sortDir = 'asc';
        }
        document.querySelectorAll('th.sortable').forEach(h => {
          h.classList.remove('sort-asc', 'sort-desc');
          h.querySelector('.sort-icon').textContent = '↕';
        });
        th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
        th.querySelector('.sort-icon').textContent = sortDir === 'asc' ? '↑' : '↓';
        applyFilters();
      });
    });
  }

  function applyFilters() {
    currentPage = 0;
    applyFiltersAtPage();
  }

  function applyFiltersAtPage() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const ro = document.getElementById('roleFilter').value;
    const list = allUsers.filter(u => {
      if (q && !u.displayName?.toLowerCase().includes(q) && !u.email?.toLowerCase().includes(q)) return false;
      if (ro === '__pending_ah') return u.approval_status_academichub === 'pending';
      if (ro && u.role_centralhub !== ro && u.role_academichub !== ro && u.role_teachershub !== ro && u.role_researchhub !== ro) return false;
      return true;
    });
    const sorted = sortList(list);
    document.getElementById('userCount').textContent =
      `${sorted.length} user${sorted.length !== 1 ? 's' : ''}`;
    renderTable(sorted);
  }

  const ROLE_ORDER = {
    central_admin: 0, central_user: 1,
    academic_admin: 0, academic_user: 1,
    teachers_admin: 0, teachers_user: 1,
    research_admin: 0, research_user: 1,
  };

  function sortList(list) {
    if (!sortCol) return list;
    return [...list].sort((a, b) => {
      let va, vb;
      if (sortCol === 'name') {
        va = (a.displayName || a.email || '').toLowerCase();
        vb = (b.displayName || b.email || '').toLowerCase();
      } else if (sortCol === 'centralhub') {
        va = ROLE_ORDER[a.role_centralhub] ?? 9;
        vb = ROLE_ORDER[b.role_centralhub] ?? 9;
      } else if (sortCol === 'academichub') {
        va = ROLE_ORDER[a.role_academichub] ?? 9;
        vb = ROLE_ORDER[b.role_academichub] ?? 9;
      } else if (sortCol === 'approval') {
        const ord = { pending: 0, approved: 1, rejected: 2 };
        va = ord[a.approval_status_academichub] ?? 9;
        vb = ord[b.approval_status_academichub] ?? 9;
      } else if (sortCol === 'teachershub') {
        va = ROLE_ORDER[a.role_teachershub] ?? 9;
        vb = ROLE_ORDER[b.role_teachershub] ?? 9;
      } else if (sortCol === 'researchhub') {
        va = ROLE_ORDER[a.role_researchhub] ?? 9;
        vb = ROLE_ORDER[b.role_researchhub] ?? 9;
      } else if (sortCol === 'joined') {
        va = a.createdAt?.toDate?.()?.getTime() ?? 0;
        vb = b.createdAt?.toDate?.()?.getTime() ?? 0;
      }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  function renderTable(list) {
    const body  = document.getElementById('usersBody');
    const pager = document.getElementById('tablePager');
    const info  = document.getElementById('pagerInfo');
    const btns  = document.getElementById('pagerBtns');

    if (!list.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="8">No users match your filters.</td></tr>';
      pager.style.display = 'none';
      return;
    }

    const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    if (currentPage >= totalPages) currentPage = totalPages - 1;
    const page = list.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

    body.innerHTML = page.map(u => {
      const name     = u.displayName || u.email?.split('@')[0] || '—';
      const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      const joined   = u.createdAt?.toDate
        ? u.createdAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '—';
      const chBadge      = ROLE_BADGE[u.role_centralhub]                 || '<span style="color:var(--ink-3)">—</span>';
      const ahBadge      = ROLE_BADGE[u.role_academichub]                || '<span style="color:var(--ink-3)">—</span>';
      const ahApproval   = APPROVAL_BADGE[u.approval_status_academichub] || '<span style="color:var(--ink-3)">—</span>';
      const thBadge      = ROLE_BADGE[u.role_teachershub]                || '<span style="color:var(--ink-3)">—</span>';
      const rhBadge      = ROLE_BADGE[u.role_researchhub]                || '<span style="color:var(--ink-3)">—</span>';
      const isPending    = u.approval_status_academichub === 'pending';
      const approvalCell = isPending
        ? `${ahApproval}
           <button class="btn-action" style="margin-left:6px;color:#065f46;border-color:#6ee7b7" onclick="approveUser('${u.id}')">Approve</button>
           <button class="btn-action" style="margin-left:4px;color:#991b1b;border-color:#fca5a5" onclick="rejectUser('${u.id}')">Reject</button>`
        : ahApproval;
      return `
        <tr${isPending ? ' class="row-pending"' : ''}>
          <td>
            <div class="user-name-cell">
              <div class="user-avatar" aria-hidden="true">${initials}</div>
              <div>
                <p class="user-name">${esc(name)}</p>
                <p class="user-email">${esc(u.email || '')}</p>
              </div>
            </div>
          </td>
          <td>${chBadge}</td>
          <td>${ahBadge}</td>
          <td style="white-space:nowrap">${approvalCell}</td>
          <td>${thBadge}</td>
          <td>${rhBadge}</td>
          <td style="color:var(--ink-3);font-size:0.82rem">${joined}</td>
          <td><button class="btn-action" onclick="editUser('${u.id}')">Edit</button></td>
        </tr>`;
    }).join('');

    if (totalPages <= 1) {
      pager.style.display = 'none';
    } else {
      pager.style.display = 'flex';
      const start = currentPage * PAGE_SIZE + 1;
      const end   = Math.min((currentPage + 1) * PAGE_SIZE, list.length);
      info.textContent = `${start}–${end} of ${list.length}`;
      btns.innerHTML = '';
      for (let i = 0; i < totalPages; i++) {
        const b = document.createElement('button');
        b.textContent = i + 1;
        b.style.cssText = `padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:${i===currentPage?'var(--accent)':'var(--white)'};color:${i===currentPage?'#fff':'var(--ink-2)'};font-size:0.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;`;
        b.addEventListener('click', () => { currentPage = i; applyFiltersAtPage(); });
        btns.appendChild(b);
      }
    }
  }

  function editUser(id) {
    const u = allUsers.find(x => x.id === id);
    if (!u) return;
    editingId = id;
    document.getElementById('fieldName').value       = u.displayName                   || '';
    document.getElementById('fieldEmail').value      = u.email                         || '';
    document.getElementById('fieldRoleCH').value     = u.role_centralhub               || '';
    document.getElementById('fieldRoleAH').value     = u.role_academichub              || '';
    document.getElementById('fieldApprovalAH').value = u.approval_status_academichub   || '';
    document.getElementById('fieldRoleTH').value     = u.role_teachershub              || '';
    document.getElementById('fieldRoleRH').value     = u.role_researchhub              || '';
    hideErr();
    document.getElementById('drawerOverlay').classList.add('open');
  }

  function closeDrawer() { document.getElementById('drawerOverlay').classList.remove('open'); }
  function showErr(m)    { const e=document.getElementById('drawerError'); e.textContent=m; e.classList.add('visible'); }
  function hideErr()     { document.getElementById('drawerError').classList.remove('visible'); }

  async function saveUser() {
    const displayName  = document.getElementById('fieldName').value.trim();
    const email        = document.getElementById('fieldEmail').value.trim();
    const roleCH       = document.getElementById('fieldRoleCH').value;
    const roleAH       = document.getElementById('fieldRoleAH').value;
    const approvalAH   = document.getElementById('fieldApprovalAH').value;
    const roleTH       = document.getElementById('fieldRoleTH').value;
    const roleRH       = document.getElementById('fieldRoleRH').value;
    if (!displayName) { showErr('Name is required.'); return; }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await updateDoc(fsDoc(db, 'users', editingId), {
        displayName,
        email,
        role_centralhub:              roleCH,
        role_academichub:             roleAH,
        approval_status_academichub:  approvalAH,
        role_teachershub:             roleTH,
        role_researchhub:             roleRH,
      });
      const u = allUsers.find(x => x.id === editingId);
      if (u) {
        u.displayName = displayName; u.email = email;
        u.role_centralhub = roleCH; u.role_academichub = roleAH;
        u.approval_status_academichub = approvalAH;
        u.role_teachershub = roleTH; u.role_researchhub = roleRH;
      }
      closeDrawer();
      applyFilters();
    } catch (e) {
      showErr(e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Save changes';
    }
  }

  async function deleteUser() {
    const u = allUsers.find(x => x.id === editingId);
    const name = u?.displayName || u?.email || 'this user';
    if (!confirm(`Remove ${name} from the platform? This cannot be undone.`)) return;
    const btn = document.getElementById('deleteBtn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      await deleteDoc(fsDoc(db, 'users', editingId));
      allUsers = allUsers.filter(x => x.id !== editingId);
      btn.disabled = false; btn.textContent = 'Delete user';
      closeDrawer();
      applyFilters();
    } catch (e) {
      showErr(e.message);
      btn.disabled = false; btn.textContent = 'Delete user';
    }
  }

  async function setApprovalStatus(id, status) {
    try {
      await updateDoc(fsDoc(db, 'users', id), { approval_status_academichub: status });
      const u = allUsers.find(x => x.id === id);
      if (u) u.approval_status_academichub = status;
      applyFilters();
    } catch (e) {
      alert('Could not update approval status: ' + e.message);
    }
  }

  function approveUser(id) { setApprovalStatus(id, 'approved'); }
  function rejectUser(id)  { setApprovalStatus(id, 'rejected'); }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.editUser    = editUser;
  window.approveUser = approveUser;
  window.rejectUser  = rejectUser;
</script>

</body>
</html>
